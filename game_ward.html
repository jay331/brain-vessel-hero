<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>腦脈先鋒｜病房探索 多地圖版</title>
<style>
:root{
  --bg:#0c1218;
  --sky1:#bfd6e8;
  --sky2:#9ab8cf;
  --gold:#f3ca70;
  --text:#f5f9ff;
  --safe-top:max(8px, env(safe-area-inset-top));
  --safe-bottom:max(10px, env(safe-area-inset-bottom));
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);font-family:"PingFang TC","Noto Sans TC",sans-serif;color:var(--text)}
button{font:inherit; cursor:pointer;}

.app{position:relative;width:100%;height:100%;overflow:hidden;background:linear-gradient(180deg,var(--sky1),var(--sky2) 36%,#6e90ab 100%)}
.topbar{
  position:absolute;left:0;right:0;top:0;z-index:30;
  padding:0 10px; padding-top:var(--safe-top); height:calc(48px + var(--safe-top));
  background:linear-gradient(180deg,rgba(34,58,84,.96),rgba(16,32,49,.92));
  display:flex;align-items:center;justify-content:space-between;
}
.brand{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:900;}

/* 全地圖導覽列 */
.map-nav{
  position:absolute;left:0;right:0;top:calc(48px + var(--safe-top));z-index:29;
  height:40px; background:rgba(10,20,30,.8); border-bottom:1px solid rgba(243,202,112,.3);
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.nav-btn{
  background:transparent; border:1px solid rgba(255,255,255,.2); color:#aaa;
  padding:4px 12px; border-radius:999px; font-size:12px; font-weight:bold; transition:all 0.2s;
}
.nav-btn.active{
  background:linear-gradient(180deg,#ffe59e,#efb949); border-color:#fff; color:#34270d; box-shadow:0 0 10px rgba(243,202,112,.5);
}

.scene{position:absolute;inset:0;top:calc(88px + var(--safe-top));overflow:hidden}

.game-world {
  position: absolute; left: 50%; top: 45%;
  width: 860px; height: 500px;
  transform: translate(-50%, -50%); transform-origin: center center;
  z-index: 2; transition: transform 0.2s ease-out;
}

.floorPlane{
  position:absolute;left:50%;top:50%;width:760px;height:580px;transform:translate(-50%,-50%) rotateX(62deg) rotateZ(-45deg);
  border-radius:34px; box-shadow:0 36px 70px rgba(0,0,0,.2); transition: background 0.3s;
}
/* 護理站地板 */
.floor-station { background:linear-gradient(180deg,#eef5fa,#d9e8f2); }
/* 病房地板 */
.floor-ward { background:linear-gradient(180deg,#f5f0e3,#e6dfca); }
/* 復健區地板 */
.floor-rehab { background:linear-gradient(180deg,#e3f5e9,#cbe6d4); }

/* 房間切換容器 */
.room-container { display: none; position: absolute; inset: 0; }
.room-container.active { display: block; }

/* 基礎物件與角色 (沿用你的設計並精簡) */
.object{position:absolute;border-radius:14px;box-shadow:0 8px 14px rgba(0,0,0,.14)}
.desk{width:140px;height:70px;background:linear-gradient(180deg,#c8def0,#9ec0d9);border:3px solid rgba(255,255,255,.65)}
.bed{width:112px;height:54px;background:linear-gradient(180deg,#d4e4ef,#adc5d9);border:3px solid rgba(255,255,255,.75)}
.machine{width:80px;height:100px;background:linear-gradient(180deg,#e8eef2,#b8c6d1);border:3px solid #fff; border-radius:8px;}
.machine-label{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:11px;background:#333;color:#fff;padding:2px 6px;border-radius:4px;white-space:nowrap;}

.character{position:absolute;width:58px;height:82px;transform:translate(-50%,-50%);z-index:8;}
.marker{position:absolute;left:50%;top:-26px;transform:translateX(-50%);padding:0 8px;border-radius:999px;background:linear-gradient(180deg,#ffe59c,#f0b94b);color:#2b2108;font-weight:900;animation:bob 1.2s infinite}
.name{position:absolute;left:50%;top:-8px;transform:translateX(-50%);padding:3px 8px;border-radius:999px;background:rgba(15,24,35,.82);font-size:10px;color:var(--gold);}
.head{position:absolute;left:50%;top:10px;transform:translateX(-50%);width:34px;height:34px;border-radius:50%;background:#f1c8a0;}
.body{position:absolute;left:50%;top:38px;transform:translateX(-50%);width:32px;height:38px;border-radius:13px;}
.player .body{background:linear-gradient(180deg,#fff,#dfeff9)}
.nurse .body{background:linear-gradient(180deg,#ffb6c1,#e58e9b)} /* 護理師粉色 */
.doctor .body{background:linear-gradient(180deg,#fff,#ccc)} /* 醫師白袍 */
.therapist .body{background:linear-gradient(180deg,#8ce260,#54b53d)} /* 治療師綠色 */

@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}

/* 提示與 UI */
.miniHint{
  position:absolute;left:50%;top:10px;transform:translateX(-50%);z-index:23;
  background:rgba(15,24,35,.85);border:1px solid rgba(243,202,112,.4);border-radius:999px;padding:8px 16px;
  font-size:12px; color:#fff; text-align:center; white-space:nowrap;
}
.warp-hint{
  position:absolute; padding:8px 12px; background:rgba(0,0,0,0.6); color:#fff; border-radius:8px; font-weight:bold; font-size:12px; animation:blink 1.5s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.5}}

.controlsWrap{position:absolute;left:0;right:0;bottom:0;padding-bottom:calc(14px + var(--safe-bottom));z-index:24;pointer-events:none}
.joystick{position:absolute;left:14px;bottom:calc(10px + var(--safe-bottom));width:116px;height:116px;border-radius:50%;background:rgba(10,17,24,.4);pointer-events:auto}
.joystick button{position:absolute;width:38px;height:38px;border-radius:50%;border:none;background:linear-gradient(180deg,#284766,#18314a);color:#fff;font-weight:900;}
.joystick .up{left:39px;top:5px} .joystick .down{left:39px;bottom:5px}
.joystick .left{left:5px;top:39px} .joystick .right{right:5px;top:39px}
.interactBtn{
  position:absolute;right:18px;bottom:calc(22px + var(--safe-bottom));width:76px;height:76px;border-radius:50%;border:none;
  background:linear-gradient(180deg,#8ae462,#54b73e);color:#12260c;font-weight:900;pointer-events:auto;
}

/* 對話框 (簡化版) */
.dialogMask{position:absolute;inset:0;z-index:40;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.5)}
.dialogBox{width:90%;max-width:400px;background:#17314d;border-radius:16px;padding:20px;border:2px solid var(--gold);color:#fff;}
.dialogBox h3{margin:0 0 10px 0; color:var(--gold);}
.dialogBox p{font-size:14px; line-height:1.5; margin-bottom:15px;}
.closeBtn{width:100%;padding:10px;border-radius:8px;border:none;background:var(--gold);color:#333;font-weight:bold;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">🏥 腦脈先鋒｜病房探索</div>
    <div style="font-weight:bold; font-size:12px;">🪙 120</div>
  </div>

  <div class="map-nav">
    <button class="nav-btn active" onclick="switchRoom('station')">護理站</button>
    <button class="nav-btn" onclick="switchRoom('ward')">01 病房</button>
    <button class="nav-btn" onclick="switchRoom('rehab')">復健區</button>
  </div>

  <div class="scene" id="scene">
    <div class="miniHint" id="miniHint">💬 提示：請先在護理站了解狀況</div>

    <div class="game-world" id="gameWorld">
      <div class="floorPlane floor-station" id="floorPlane"></div>

      <div class="room-container active" id="room-station">
        <div class="object desk" style="left:360px;top:150px"></div>
        <div class="character nurse" style="left:430px;top:210px">
          <div class="marker">!</div><div class="name">護理長</div>
          <div class="head"></div><div class="body"></div>
        </div>
        <div class="warp-hint" style="right:100px; top:250px;">往病房 ➡️</div>
      </div>

      <div class="room-container" id="room-ward">
        <div class="object bed" style="left:250px;top:150px"></div>
        <div class="object bed" style="left:450px;top:150px"></div>
        <div class="character doctor" style="left:510px;top:220px">
          <div class="marker">?</div><div class="name">住院醫師</div>
          <div class="head"></div><div class="body"></div>
        </div>
        <div class="warp-hint" style="left:150px; top:250px;">⬅️ 護理站</div>
        <div class="warp-hint" style="right:100px; top:250px;">往復健區 ➡️</div>
      </div>

      <div class="room-container" id="room-rehab">
        <div class="object machine" style="left:300px;top:160px">
            <div class="machine-label">rTMS 儀器</div>
        </div>
        <div class="character therapist" style="left:380px;top:220px">
          <div class="marker">!</div><div class="name">復健治療師</div>
          <div class="head"></div><div class="body"></div>
        </div>
        <div class="warp-hint" style="left:150px; top:250px;">⬅️ 往病房</div>
      </div>

      <div class="character player" id="player" style="left:350px;top:300px">
        <div class="name">玩家</div>
        <div class="head"></div><div class="body"></div>
      </div>
    </div>

    <div class="dialogMask" id="dialogMask">
      <div class="dialogBox">
        <h3 id="dialogTitle">名稱</h3>
        <p id="dialogText">對話內容...</p>
        <button class="closeBtn" onclick="document.getElementById('dialogMask').style.display='none'">關閉</button>
      </div>
    </div>

    <div class="controlsWrap">
      <div class="joystick">
        <button class="up" data-dx="0" data-dy="-20">▲</button>
        <button class="down" data-dx="0" data-dy="20">▼</button>
        <button class="left" data-dx="-20" data-dy="0">◀</button>
        <button class="right" data-dx="20" data-dy="0">▶</button>
      </div>
      <button class="interactBtn" onclick="interact()">互動 ✋</button>
    </div>
  </div>
</div>

<script>
// --- 響應式縮放 ---
function resizeGame() {
  const scene = document.getElementById('scene');
  const gameWorld = document.getElementById('gameWorld');
  const scale = Math.min(scene.clientWidth / 860, (scene.clientHeight * 0.7) / 500, 1.1);
  gameWorld.style.transform = `translate(-50%, -50%) scale(${scale})`;
}
window.addEventListener('resize', resizeGame);
resizeGame();

// --- 遊戲狀態與地圖邏ッジ ---
const state = {
  x: 350, y: 300,
  room: 'station' // 當前房間
};

const roomSettings = {
  station: { class: 'floor-station', minX: 150, maxX: 750, npc: 'nurse' },
  ward:    { class: 'floor-ward',    minX: 150, maxX: 750, npc: 'doctor' },
  rehab:   { class: 'floor-rehab',   minX: 150, maxX: 750, npc: 'therapist' }
};

const player = document.getElementById('player');
const floorPlane = document.getElementById('floorPlane');
const miniHint = document.getElementById('miniHint');

// 切換房間函數
function switchRoom(roomId, spawnX = 350) {
  state.room = roomId;
  state.x = spawnX;
  
  // 更新導覽列 UI
  document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector(`.nav-btn[onclick="switchRoom('${roomId}')"]`).classList.add('active');

  // 更新場景顯示
  document.querySelectorAll('.room-container').forEach(room => room.classList.remove('active'));
  document.getElementById('room-' + roomId).classList.add('active');
  
  // 換地板顏色
  floorPlane.className = 'floorPlane ' + roomSettings[roomId].class;

  // 更新提示
  const hints = {
    station: '💬 提示：這裡是護理站，掌握病患動態的中樞。',
    ward: '💬 提示：一般中風病房，觀察病患復原狀況。',
    rehab: '💬 提示：復健區，進行 rTMS 等進階神經復健。'
  };
  miniHint.innerText = hints[roomId];

  updatePlayer();
}

// --- 移動與互動邏輯 ---
function updatePlayer() {
  player.style.left = state.x + 'px';
  player.style.top = state.y + 'px';
  checkWarp();
}

function move(dx, dy) {
  if(document.getElementById('dialogMask').style.display === 'flex') return;
  const limits = roomSettings[state.room];
  state.x = Math.max(limits.minX, Math.min(limits.maxX, state.x + dx));
  state.y = Math.max(140, Math.min(400, state.y + dy));
  updatePlayer();
}

// 邊界傳送判定
function checkWarp() {
  if (state.room === 'station' && state.x > 700) switchRoom('ward', 200); // 往右切換到病房
  else if (state.room === 'ward' && state.x < 200) switchRoom('station', 650); // 往左回護理站
  else if (state.room === 'ward' && state.x > 700) switchRoom('rehab', 200); // 往右到復健區
  else if (state.room === 'rehab' && state.x < 200) switchRoom('ward', 650); // 往左回病房
}

// 互動系統
function interact() {
  // 簡易判定：若目前在該房間，就觸發該房間專屬 NPC 的對話
  const mask = document.getElementById('dialogMask');
  const title = document.getElementById('dialogTitle');
  const text = document.getElementById('dialogText');

  if (state.room === 'station') {
    title.innerText = '護理長';
    text.innerText = '急性中風病人剛從加護病房轉出來，請多留意生命徵象。另外，01 病房的醫師在找你。';
  } else if (state.room === 'ward') {
    title.innerText = '住院醫師';
    text.innerText = '病人目前的肢體無力狀況稍微穩定了，我打算安排他下午去復健區評估。';
  } else if (state.room === 'rehab') {
    title.innerText = '復健治療師';
    text.innerText = '我們這裡配備了 rTMS (重複性經顱磁刺激) 儀器，針對部分中風後遺症的患者，搭配傳統復健能有不錯的刺激神經效果喔！目前雖然無健保給付，但詢問度很高。';
  }
  
  mask.style.display = 'flex';
}

// 綁定搖桿與鍵盤
document.querySelectorAll('.joystick button').forEach(btn => {
  btn.addEventListener('click', () => move(Number(btn.dataset.dx), Number(btn.dataset.dy)));
});

window.addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();
  if(k==='arrowup' || k==='w') move(0, -20);
  if(k==='arrowdown' || k==='s') move(0, 20);
  if(k==='arrowleft' || k==='a') move(-20, 0);
  if(k==='arrowright' || k==='d') move(20, 0);
  if(e.code==='Space') interact();
});
</script>
</body>
</html>
