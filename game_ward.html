<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>腦脈先鋒｜11G 全區真實還原</title>
<style>
:root{
  --bg:#0c1218; --sky1:#1a2a3a; --sky2:#2a4054;
  --gold:#f3ca70; --text:#f5f9ff;
  --safe-top:max(8px, env(safe-area-inset-top));
  --safe-bottom:max(10px, env(safe-area-bottom));
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);font-family:"PingFang TC","Noto Sans TC",sans-serif;color:var(--text)}

.app{position:relative;width:100%;height:100%;overflow:hidden;background:#111a22;}
.topbar{
  position:absolute;left:0;right:0;top:0;z-index:30;
  padding:0 12px; padding-top:var(--safe-top); height:calc(48px + var(--safe-top));
  background:linear-gradient(180deg,rgba(34,58,84,.96),rgba(16,32,49,.92));
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(243,202,112,.18);
}
.brand{font-size:15px;font-weight:900;}
.hudChip{background:rgba(0,0,0,.4);padding:4px 10px;border-radius:12px;font-size:12px;font-weight:bold;border:1px solid rgba(243,202,112,.3);}

.scene{position:absolute;inset:0;top:calc(48px + var(--safe-top));overflow:hidden;}

/* 鏡頭容器：負責平移畫面 */
.camera { position: absolute; left: 0; top: 0; width: 100%; height: 100%; transition: transform 0.1s linear; }

/* 遊戲大地圖：擴大至 2400x2000 以容納真實比例 */
.game-world {
  position: absolute; left: 0; top: 0;
  width: 2400px; height: 2000px;
  background-color: #333; 
}

/* 走廊基底 (整個大三角形區域) */
.floor-corridor {
  position: absolute; left: 0; top: 0; width: 100%; height: 100%;
  background: #fffcf2; /* 走廊亮色 */
  background-image: radial-gradient(rgba(0,0,0,0.05) 2px, transparent 2px); background-size: 30px 30px;
}

/* --- 建築牆面實體 (無法行走的區域) --- */
/* 1. 右側病房區 (11G01 - 11G10) */
.ward-right {
  position: absolute; left: 1800px; top: 100px; width: 400px; height: 1400px;
  background: #d2b376; border-left: 8px solid #a68b56; box-shadow: -10px 0 20px rgba(0,0,0,0.1);
  background-image: repeating-linear-gradient(0deg, transparent, transparent 136px, rgba(0,0,0,0.3) 136px, rgba(0,0,0,0.3) 140px);
}
.ward-right::before { content: "11G06 病房"; position: absolute; left: 20px; top: 620px; font-weight: bold; color: rgba(0,0,0,0.5); font-size: 24px; }

/* 2. 下側設施區 (電梯、護理站後方) */
.ward-bottom {
  position: absolute; left: 400px; top: 1500px; width: 1800px; height: 400px;
  background: #d2b376; border-top: 8px solid #a68b56; box-shadow: 0 -10px 20px rgba(0,0,0,0.1);
  display: flex; align-items: flex-start; padding: 20px 100px; gap: 200px;
  font-weight: bold; color: rgba(0,0,0,0.5); font-size: 28px;
}

/* 3. 左斜側病房區 (11G11 - 11G23) 利用 clip-path 切出完美斜邊 */
.ward-diag {
  position: absolute; left: 0; top: 0; width: 1800px; height: 1500px;
  background: #d2b376;
  /* 座標：裁切出左上角區域。對角線為 x+y=2100 */
  clip-path: polygon(0 0, 1800px 0, 1800px 300px, 600px 1500px, 0 1500px);
}
/* 斜邊牆壁的立體感與房門分隔 */
.ward-diag-border {
  position: absolute; left: 0; top: 0; width: 1800px; height: 1500px; pointer-events: none;
  background: repeating-linear-gradient(-45deg, transparent, transparent 146px, rgba(0,0,0,0.2) 146px, rgba(0,0,0,0.2) 150px);
  clip-path: polygon(0 0, 1800px 0, 1800px 300px, 600px 1500px, 0 1500px);
}
/* 畫一條斜線當作牆壁厚度 */
.diag-wall-line {
  position: absolute; left: 590px; top: 1490px; width: 1720px; height: 8px; background: #a68b56;
  transform-origin: left top; transform: rotate(-45deg); box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

/* 4. 中央粉紅護理站 (核心障礙物) */
.nursing-station {
  position: absolute; left: 1200px; top: 900px; width: 300px; height: 300px;
  background: #ebc6c9; box-shadow: 10px 10px 30px rgba(0,0,0,0.2);
  /* 裁切出直角三角形 */
  clip-path: polygon(100% 0, 100% 100%, 0 100%);
}
.nursing-station-labels {
  position: absolute; left: 1350px; top: 1080px; 
  font-weight: 900; color: #8c565b; font-size: 32px; letter-spacing: 4px; pointer-events: none;
}

/* --- 地板綠色逃生/巡房動線 --- */
.escape-route {
  position: absolute; left: 0; top: 0; width: 100%; height: 100%; pointer-events: none;
}

/* 角色與物件 */
.object { position: absolute; box-shadow: 0 8px 15px rgba(0,0,0,0.3); border-radius:8px;}
.rtms { width: 70px; height: 90px; background: linear-gradient(180deg,#eef2f5,#90a6b8); border: 4px solid #fff; left: 1000px; top: 1380px; }
.rtms::after { content:"rTMS"; position:absolute; top:-26px; left:50%; transform:translateX(-50%); font-size:14px; background:#222; color:#fff; padding:4px 8px; border-radius:4px; font-weight:bold;}
.elevator { width: 120px; height: 60px; background: #999; border: 4px solid #666; left: 1600px; top: 1500px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:bold;}

.character{position:absolute;width:56px;height:80px;transform:translate(-50%,-100%);z-index:10; cursor:pointer; transition: transform 0.1s;}
.character:active{transform:translate(-50%,-95%) scale(0.95);}
.marker{position:absolute;left:50%;top:-40px;transform:translateX(-50%);padding:2px 10px;border-radius:999px;background:linear-gradient(180deg,#ffe59c,#f0b94b);color:#2b2108;font-weight:900;animation:bob 1.2s infinite; font-size:18px; pointer-events:none; border:2px solid #fff;}
.name{position:absolute;left:50%;top:-10px;transform:translateX(-50%);padding:2px 8px;border-radius:999px;background:rgba(15,24,35,.85);font-size:12px;color:var(--gold); white-space:nowrap; pointer-events:none; font-weight:bold;}
.head{position:absolute;left:50%;top:14px;transform:translateX(-50%);width:36px;height:36px;border-radius:50%;background:#f1c8a0;}
.body{position:absolute;left:50%;top:44px;transform:translateX(-50%);width:32px;height:36px;border-radius:14px;}
.shadow{position:absolute;bottom:0;left:50%;transform:translate(-50%, 5px);width:40px;height:14px;background:rgba(0,0,0,0.4);border-radius:50%;z-index:-1;}

.player .body{background:linear-gradient(180deg,#fff,#dfeff9)}
.nurse .body{background:linear-gradient(180deg,#ffb6c1,#e58e9b)} 
.doctor .body{background:linear-gradient(180deg,#fff,#ccc)} 
.tech .body{background:linear-gradient(180deg,#8ce260,#54b53d)} 

@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}
.click-ripple { position: absolute; width: 40px; height: 40px; border: 3px solid var(--gold); border-radius: 50%; transform: translate(-50%, -50%) scale(0); opacity: 1; pointer-events: none; z-index: 5; animation: ripple 0.5s ease-out forwards; }
.click-error { border-color: #ff4757; } /* 點到牆壁的紅色錯誤波紋 */
@keyframes ripple { 100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; } }

/* UI */
.miniHint{ position:absolute;left:50%;top:16px;transform:translateX(-50%);z-index:23; background:rgba(15,24,35,.85);border:1px solid rgba(243,202,112,.4);border-radius:999px;padding:12px 24px; font-size:15px; font-weight:bold; color:#fff; text-align:center; white-space:nowrap; box-shadow: 0 6px 15px rgba(0,0,0,0.4); pointer-events:none; }
.dialogMask{position:absolute;inset:0;z-index:40;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.4); padding-bottom:calc(20px + var(--safe-bottom));}
.dialogBox{width:92%;max-width:500px;background:linear-gradient(180deg,#1e364f, #142538);border-radius:18px;padding:24px;border:2px solid var(--gold);color:#fff; box-shadow:0 20px 40px rgba(0,0,0,0.6);}
.dialogBox h3{margin:0 0 12px 0; color:var(--gold); font-size:22px;}
.dialogBox p{font-size:17px; line-height:1.6; margin-bottom:20px; color:#e0edf9;}
.closeBtn{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(180deg,#f3ca70,#d1a23a);color:#4a3505;font-weight:900;font-size:18px;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">🏥 11G 全區地圖導覽</div>
    <div class="hudChip">🪙 120</div>
  </div>

  <div class="scene" id="scene">
    <div class="miniHint" id="miniHint">👆 點擊走廊移動，試著沿著綠線繞一圈</div>

    <div class="camera" id="camera">
      <div class="game-world" id="gameWorld">
        
        <div class="floor-corridor"></div>

        <svg class="escape-route">
          <polygon points="1650,600 1650,1350 900,1350" fill="none" stroke="rgba(46, 204, 113, 0.4)" stroke-width="12" stroke-linejoin="round"/>
        </svg>

        <div class="ward-diag"></div>
        <div class="ward-diag-border"></div>
        <div class="diag-wall-line"></div>
        
        <div class="ward-right"></div>
        <div class="ward-bottom">
          <span>客用電梯</span>
          <span>配膳室</span>
        </div>

        <div class="nursing-station"></div>
        <div class="nursing-station-labels">護理站</div>

        <div class="object rtms"></div>
        <div class="elevator">客梯區</div>

        <div class="character nurse" id="npc-nurse" style="left:1400px;top:1150px">
          <div class="shadow"></div><div class="marker">!</div><div class="name">護理長</div>
          <div class="head"></div><div class="body"></div>
        </div>

        <div class="character doctor" id="npc-doctor" style="left:1750px;top:800px">
          <div class="shadow"></div><div class="marker">?</div><div class="name">神內醫師</div>
          <div class="head"></div><div class="body"></div>
        </div>

        <div class="character tech" id="npc-tech" style="left:1200px;top:850px">
          <div class="shadow"></div><div class="marker">...</div><div class="name">復健師</div>
          <div class="head"></div><div class="body"></div>
        </div>

        <div class="character player" id="player" style="left:1650px;top:1400px">
          <div class="shadow"></div><div class="name">玩家</div>
          <div class="head"></div><div class="body"></div>
        </div>
      </div>
    </div>

    <div class="dialogMask" id="dialogMask">
      <div class="dialogBox">
        <h3 id="dialogTitle">名稱</h3>
        <p id="dialogText">對話內容...</p>
        <button class="closeBtn" onclick="closeDialog()">繼續</button>
      </div>
    </div>
  </div>
</div>

<script>
// --- 核心狀態 ---
const player = document.getElementById('player');
const camera = document.getElementById('camera');
const gameWorld = document.getElementById('gameWorld');
const scene = document.getElementById('scene');

let state = { x: 1650, y: 1400 }; 
let target = { x: 1650, y: 1400 };
let speed = 8; // 配合大尺寸地圖，調快移動速度
let isMoving = false;
let autoInteractNpcId = null;

// 設定點擊 NPC 時，玩家應該走到的「合法走廊位置」(避免卡在牆內)
const npcWalkTargets = {
  'npc-nurse': { x: 1550, y: 1250 }, // 護理站轉角走廊
  'npc-doctor': { x: 1650, y: 800 }, // 右側走廊
  'npc-tech': { x: 1250, y: 950 }    // 斜邊走廊
};

// 對話資料
const dialogData = {
  'npc-nurse': { title: '護理長', text: '你看見地上的綠色動線了嗎？這是 11G 病房的巡房主幹道，左邊斜坡區是 11G11 到 11G23 病房。' },
  'npc-doctor': { title: '神內醫師', text: '11G06 的病人剛做完取栓手術，麻煩等一下幫我用 FAST 評估表確認他的臉部有沒有不對稱。' },
  'npc-tech': { title: '復健師', text: '我在這區測試新進的 rTMS 儀器路線，這長長的斜坡走廊很適合讓輕症中風病人練習走路復健。' }
};

// --- 攝影機跟隨 ---
function updateCamera() {
  const screenW = scene.clientWidth;
  const screenH = scene.clientHeight;
  const camX = (screenW / 2) - state.x;
  const camY = (screenH / 2) - state.y;
  camera.style.transform = `translate(${camX}px, ${camY}px)`;
}

// --- 核心碰撞偵測 (數學邏輯對應平面圖) ---
function canMoveTo(x, y) {
  const r = 30; // 玩家碰撞半徑
  
  // 1. 外圍牆壁限制 (不能走出走廊)
  if (x + r > 1800) return false; // 右牆 (11G01-11G10)
  if (y + r > 1500) return false; // 下牆
  if (x + y - r < 2100) return false; // 左斜牆 (11G11-11G23)

  // 2. 中央護理站限制 (不能穿過粉紅區域)
  // 護理站邊界：x < 1500 且 y < 1200 且 x+y > 2400
  if (x - r < 1500 && y - r < 1200 && x + y + r > 2400) {
      return false;
  }
  return true;
}

// --- 遊戲主迴圈 ---
function gameLoop() {
  const dx = target.x - state.x;
  const dy = target.y - state.y;
  const dist = Math.hypot(dx, dy);

  if (dist > speed) {
    const stepX = state.x + (dx / dist) * speed;
    const stepY = state.y + (dy / dist) * speed;

    // 分離 X 與 Y 軸的碰撞測試，實現「貼牆滑行」的流暢手感
    if (canMoveTo(stepX, state.y)) state.x = stepX;
    if (canMoveTo(state.x, stepY)) state.y = stepY;

    player.style.left = state.x + 'px';
    player.style.top = state.y + 'px';
    isMoving = true;
    updateCamera();
  } else if (isMoving) {
    isMoving = false;
    if (autoInteractNpcId) {
      triggerDialog(autoInteractNpcId);
      autoInteractNpcId = null;
    }
  }
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
updateCamera();

// --- 點擊移動與互動 ---
gameWorld.addEventListener('pointerdown', (e) => {
  if (document.getElementById('dialogMask').style.display === 'flex') return;
  if (e.target.closest('.character')) return; 

  const rect = gameWorld.getBoundingClientRect();
  const clickX = e.clientX - rect.left;
  const clickY = e.clientY - rect.top;
  
  // 檢查玩家點擊的地方是否合法 (不能點在牆壁或護理站內)
  if (!canMoveTo(clickX, clickY)) {
    createRipple(clickX, clickY, true); // 顯示錯誤波紋
    document.getElementById('miniHint').innerText = '❌ 這裡有障礙物，請點擊走廊地板';
    return;
  }

  target.x = clickX;
  target.y = clickY;
  autoInteractNpcId = null;
  createRipple(target.x, target.y, false);
  document.getElementById('miniHint').innerText = '🏃 前往目的地...';
});

document.querySelectorAll('.character:not(.player)').forEach(npc => {
  npc.addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    if (document.getElementById('dialogMask').style.display === 'flex') return;

    // 取得預設的合法會合點，避免玩家卡在牆壁進不去
    const walkTarget = npcWalkTargets[npc.id];
    target.x = walkTarget.x;
    target.y = walkTarget.y; 
    autoInteractNpcId = npc.id;
    
    createRipple(target.x, target.y, false);
    document.getElementById('miniHint').innerText = `🚶 走向 ${dialogData[npc.id].title}...`;
  });
});

// --- UI 控制 ---
function triggerDialog(npcId) {
  const data = dialogData[npcId];
  document.getElementById('dialogTitle').innerText = data.title;
  document.getElementById('dialogText').innerText = data.text;
  document.getElementById('dialogMask').style.display = 'flex';
  document.getElementById('miniHint').innerText = '💬 對話中...';
}

function closeDialog() {
  document.getElementById('dialogMask').style.display = 'none';
  document.getElementById('miniHint').innerText = '👆 點擊走廊移動，試著沿著綠線繞一圈';
}

function createRipple(x, y, isError) {
  const ripple = document.createElement('div');
  ripple.className = 'click-ripple' + (isError ? ' click-error' : '');
  ripple.style.left = x + 'px';
  ripple.style.top = y + 'px';
  gameWorld.appendChild(ripple);
  setTimeout(() => ripple.remove(), 500);
}

window.addEventListener('resize', updateCamera);
</script>
</body>
</html>
