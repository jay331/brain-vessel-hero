<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>腦脈先鋒｜11G 全區真實還原</title>
<style>
:root{
  --bg:#0c1218; --sky1:#1a2a3a; --sky2:#2a4054;
  --gold:#f3ca70; --text:#f5f9ff;
  --safe-top:max(8px, env(safe-area-inset-top));
  --safe-bottom:max(10px, env(safe-area-bottom));
  --corridor-w: 120px; /* 定義統一的走廊寬度 */
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);font-family:"PingFang TC","Noto Sans TC",sans-serif;color:var(--text)}

.app{position:relative;width:100%;height:100%;overflow:hidden;background:#111a22;}
.topbar{
  position:absolute;left:0;right:0;top:0;z-index:30;
  padding:0 12px; padding-top:var(--safe-top); height:calc(48px + var(--safe-top));
  background:linear-gradient(180deg,rgba(34,58,84,.96),rgba(16,32,49,.92));
  display:flex;align-items:center;justify-content:space-between;
}

.scene{position:absolute;inset:0;top:calc(48px + var(--safe-top));overflow:hidden;}
.camera { position: absolute; left: 0; top: 0; width: 100%; height: 100%; }
.game-world { position: absolute; left: 0; top: 0; width: 2000px; height: 1800px; background-color: #333; }

/* 1. 走廊基底 */
.floor-base {
  position: absolute; left: 100px; top: 100px; width: 1500px; height: 1300px;
  background: #fffcf2; 
  clip-path: polygon(0 1300px, 1500px 1300px, 1500px 0, 1100px 0, 0 1100px);
}

/* 2. 外部牆壁（病房區） */
/* 右側病房 (設有房門) */
.ward-right {
  position: absolute; left: 1600px; top: 100px; width: 300px; height: 1300px;
  background: #d2b376; border-left: 8px solid #a68b56;
  display: flex; flex-direction: column;
}
.room-right { 
  flex: 1; border-bottom: 2px solid rgba(0,0,0,0.1); position:relative;
  display:flex; align-items:center; padding-left:15px; font-weight:bold; color:#7d612e;
}
.door-right { position:absolute; left:-8px; top:25%; height:50%; width:8px; background:#f9f5eb; }

/* 下方設施區 */
.ward-bottom {
  position: absolute; left: 100px; top: 1400px; width: 1800px; height: 300px;
  background: #d2b376; border-top: 8px solid #a68b56;
  display: flex; align-items: flex-start;
}
.elevator-hall { 
  position:absolute; right:0; top:0; width:450px; height:100%; background:#b8c6d1; 
  display:flex; align-items:center; justify-content:center; color:#2a4054; font-weight:900; font-size:24px;
}

/* 3. 中央護理站 (三角形中空) */
.ns-floor {
  position: absolute; left: 650px; top: 700px; width: 500px; height: 450px;
  background: #f8e5e7; clip-path: polygon(100% 0, 100% 100%, 0 100%);
}
/* 桌子（外圍障礙物） */
.ns-desk-v { position:absolute; left:1150px; top:700px; width:20px; height:450px; background:#d4a3a7; border-radius:10px; }
.ns-desk-h { position:absolute; left:650px; top:1150px; width:500px; height:20px; background:#d4a3a7; border-radius:10px; }
/* 斜邊桌（留出入口） */
.ns-desk-diag { 
  position:absolute; left:650px; top:1150px; width:670px; height:20px; 
  background:#d4a3a7; border-radius:10px; transform-origin:left bottom; transform:rotate(-42deg);
}

/* 角色 */
.character{position:absolute;width:44px;height:64px;transform:translate(-50%,-100%);z-index:10;}
.name{position:absolute;left:50%;top:-10px;transform:translateX(-50%);padding:2px 6px;border-radius:999px;background:rgba(15,24,35,.82);font-size:10px;color:var(--gold);white-space:nowrap;}
.head{position:absolute;left:50%;top:10px;transform:translateX(-50%);width:28px;height:28px;border-radius:50%;background:#f1c8a0;}
.body{position:absolute;left:50%;top:34px;transform:translateX(-50%);width:26px;height:30px;border-radius:10px;}
.player .body{background:linear-gradient(180deg,#fff,#dfeff9)}
.nurse .body{background:linear-gradient(180deg,#ffb6c1,#e58e9b)}

/* UI */
.miniHint{ position:absolute;left:50%;top:16px;transform:translateX(-50%);z-index:23; background:rgba(0,0,0,0.8); border-radius:999px;padding:10px 20px; font-size:14px; color:#fff;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar"><div class="brand">🏥 11G 病房真實探索版</div></div>
  <div class="scene" id="scene">
    <div class="miniHint">👆 滑動以移動 (已調慢速)。電梯在右下角起點。</div>
    <div class="camera" id="camera">
      <div class="game-world" id="gameWorld">
        <div class="floor-base"></div>
        
        <div class="ward-right">
          <div class="room-right">11G09 <div class="door-right"></div></div>
          <div class="room-right">11G08 <div class="door-right"></div></div>
          <div class="room-right">11G07 <div class="door-right"></div></div>
          <div class="room-right">11G06 <div class="door-right"></div></div>
          <div class="room-right">11G05 <div class="door-right"></div></div>
          <div class="room-right">11G03 <div class="door-right"></div></div>
          <div class="room-right">11G02 <div class="door-right"></div></div>
          <div class="room-right">11G01 <div class="door-right"></div></div>
        </div>

        <div class="ward-bottom">
          <div class="elevator-hall">🛗 電梯大廳 (起點)</div>
        </div>

        <div class="ns-floor"></div>
        <div class="ns-desk-v"></div>
        <div class="ns-desk-h"></div>
        <div class="ns-desk-diag"></div>

        <div class="character nurse" style="left:1000px;top:1000px"><div class="name">護理師</div><div class="head"></div><div class="body"></div></div>
        <div class="character player" id="player" style="left:1600px;top:1450px"><div class="name">玩家</div><div class="head"></div><div class="body"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
const player = document.getElementById('player');
const camera = document.getElementById('camera');
const gameWorld = document.getElementById('gameWorld');
const scene = document.getElementById('scene');

let state = { x: 1600, y: 1450 }; // 起點在右下電梯大廳外
let target = { x: 1600, y: 1450 };
let speed = 5; // 調慢的人物速度
let isMoving = false;

function updateCamera() {
  const camX = (scene.clientWidth / 2) - state.x;
  const camY = (scene.clientHeight / 2) - state.y;
  camera.style.transform = `translate(${camX}px, ${camY}px)`;
}

// --- 碰撞偵測 (包含可進入病房的門) ---
function canMoveTo(x, y) {
  // 1. 允許進入右側病房 (x > 1600) 的門檻
  if (x > 1600 && x < 1850) {
      if (y > 100 && y < 1400) return true; 
  }
  // 2. 護理站內部 (三角形內)
  if (x > 680 && x < 1120 && y > 750 && y < 1120 && (x + y > 1800)) return true;

  // 3. 走廊限制
  if (x > 100 && x < 1600 && y > 100 && y < 1400) {
      if (x + y < 1100) return false; // 左上牆
      return true;
  }
  // 4. 下方設施與電梯大廳
  if (y >= 1400 && y < 1650 && x > 100 && x < 2000) return true;

  return false;
}

function gameLoop() {
  const dx = target.x - state.x;
  const dy = target.y - state.y;
  const dist = Math.hypot(dx, dy);

  if (dist > speed) {
    const stepX = state.x + (dx / dist) * speed;
    const stepY = state.y + (dy / dist) * speed;
    if (canMoveTo(stepX, state.y)) state.x = stepX;
    if (canMoveTo(state.x, stepY)) state.y = stepY;
    player.style.left = state.x + 'px';
    player.style.top = state.y + 'px';
    updateCamera();
  }
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

let isDragging = false;
let startTouch = { x: 0, y: 0 };

scene.addEventListener('pointerdown', (e) => {
  isDragging = true;
  startTouch.x = e.clientX;
  startTouch.y = e.clientY;
});

window.addEventListener('pointermove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - startTouch.x;
  const dy = e.clientY - startTouch.y;
  target.x = state.x + dx;
  target.y = state.y + dy;
});

window.addEventListener('pointerup', () => { isDragging = false; });
window.addEventListener('resize', updateCamera);
updateCamera();
</script>
</body>
</html>
