<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>腦脈先鋒｜滑動操控 11G 全區</title>
<style>
:root{
  --bg:#0c1218; --sky1:#1a2a3a; --sky2:#2a4054;
  --gold:#f3ca70; --text:#f5f9ff;
  --safe-top:max(8px, env(safe-area-inset-top));
  --safe-bottom:max(10px, env(safe-area-bottom));
}
/* 加上 touch-action: none 防止手機瀏覽器跟著滑動 */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);font-family:"PingFang TC","Noto Sans TC",sans-serif;color:var(--text)}

.app{position:relative;width:100%;height:100%;overflow:hidden;background:#111a22;}
.topbar{
  position:absolute;left:0;right:0;top:0;z-index:30;
  padding:0 12px; padding-top:var(--safe-top); height:calc(48px + var(--safe-top));
  background:linear-gradient(180deg,rgba(34,58,84,.96),rgba(16,32,49,.92));
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(243,202,112,.18);
}
.brand{font-size:15px;font-weight:900;}
.hudChip{background:rgba(0,0,0,.4);padding:4px 10px;border-radius:12px;font-size:12px;font-weight:bold;border:1px solid rgba(243,202,112,.3);}

.scene{position:absolute;inset:0;top:calc(48px + var(--safe-top));overflow:hidden;}

/* 鏡頭容器 */
.camera { position: absolute; left: 0; top: 0; width: 100%; height: 100%; }

/* 遊戲大地圖 (2400x2000) */
.game-world {
  position: absolute; left: 0; top: 0;
  width: 2400px; height: 2000px;
  background-color: #333; 
}

/* --- 1. 整個病房的大三角走廊基底 --- */
/* 對應平面圖：左上角斜邊、右側垂直、下方水平 */
.floor-corridor {
  position: absolute; left: 200px; top: 100px; width: 1800px; height: 1600px;
  background: #fffcf2; 
  background-image: radial-gradient(rgba(0,0,0,0.05) 2px, transparent 2px); background-size: 30px 30px;
  /* 裁切成直角三角形 (左下角是直角) */
  clip-path: polygon(1800px 0, 1800px 1600px, 0 1600px);
  box-shadow: inset 0 0 50px rgba(0,0,0,0.1);
}

/* --- 2. 右側病房區 (11G01 - 11G10) --- */
.ward-right {
  position: absolute; left: 2000px; top: 100px; width: 300px; height: 1600px;
  background: #d2b376; border-left: 8px solid #a68b56; 
  display: flex; flex-direction: column;
}
.room-right { flex: 1; border-bottom: 2px solid rgba(0,0,0,0.2); display: flex; align-items: center; padding-left: 20px; font-weight: 900; color: rgba(0,0,0,0.4); font-size: 20px; }

/* --- 3. 下側電梯與設施區 --- */
.ward-bottom {
  position: absolute; left: 200px; top: 1700px; width: 1800px; height: 250px;
  background: #d2b376; border-top: 8px solid #a68b56;
  display: flex; align-items: center; justify-content: space-around;
}
.facility { background: #e3cca0; padding: 20px 40px; border-radius: 12px; font-weight: 900; font-size: 24px; color: #8c7344; border: 4px solid #c9ae7e; }
.elevator-hall { background: #b8c6d1; color: #2a4054; border-color: #92a9bc; }

/* --- 4. 左側斜邊病房區 (11G11 - 11G23) --- */
/* 利用旋轉的矩形貼在斜邊上 */
.ward-diag {
  position: absolute; left: -250px; top: 100px; width: 2300px; height: 250px;
  background: #d2b376; border-bottom: 8px solid #a68b56;
  transform-origin: left top; transform: rotate(41.6deg); /* 對應 1600/1800 的角度 */
  display: flex;
}
.room-diag { flex: 1; border-right: 2px solid rgba(0,0,0,0.2); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 20px; font-weight: 900; color: rgba(0,0,0,0.4); font-size: 20px; }

/* --- 5. 中空的三角護理站 --- */
/* 護理站內部地板 */
.nursing-station-floor {
  position: absolute; left: 1100px; top: 900px; width: 600px; height: 500px;
  background: #f8e5e7;
  clip-path: polygon(600px 0, 600px 500px, 0 500px); /* 也是一個小直角三角形 */
}
/* 護理站的環形桌子 (三個邊的長條形障礙物) */
/* 右邊垂直桌 */
.desk-right { position: absolute; left: 1670px; top: 900px; width: 30px; height: 400px; background: #d4a3a7; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
/* 下邊水平桌 (留有出入口開口) */
.desk-bottom-1 { position: absolute; left: 1100px; top: 1370px; width: 200px; height: 30px; background: #d4a3a7; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
.desk-bottom-2 { position: absolute; left: 1450px; top: 1370px; width: 220px; height: 30px; background: #d4a3a7; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
/* 斜邊桌子 */
.desk-diag { position: absolute; left: 1120px; top: 900px; width: 750px; height: 30px; background: #d4a3a7; border-radius: 10px; transform-origin: left top; transform: rotate(39.8deg); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

.nursing-label { position: absolute; left: 1400px; top: 1150px; font-weight: 900; color: #b87c82; font-size: 36px; letter-spacing: 10px; }

/* 地板巡房動線 (綠線) */
.escape-route { position: absolute; left: 0; top: 0; width: 100%; height: 100%; pointer-events: none; }

/* 角色與標記 */
.character{position:absolute;width:60px;height:84px;transform:translate(-50%,-100%);z-index:10; cursor:pointer;}
.marker{position:absolute;left:50%;top:-40px;transform:translateX(-50%);padding:2px 10px;border-radius:999px;background:linear-gradient(180deg,#ffe59c,#f0b94b);color:#2b2108;font-weight:900;animation:bob 1.2s infinite; font-size:18px; pointer-events:none; border:2px solid #fff;}
.name{position:absolute;left:50%;top:-10px;transform:translateX(-50%);padding:2px 8px;border-radius:999px;background:rgba(15,24,35,.85);font-size:12px;color:var(--gold); white-space:nowrap; pointer-events:none; font-weight:bold;}
.head{position:absolute;left:50%;top:14px;transform:translateX(-50%);width:36px;height:36px;border-radius:50%;background:#f1c8a0;}
.body{position:absolute;left:50%;top:44px;transform:translateX(-50%);width:32px;height:36px;border-radius:14px;}
.shadow{position:absolute;bottom:0;left:50%;transform:translate(-50%, 5px);width:40px;height:14px;background:rgba(0,0,0,0.4);border-radius:50%;z-index:-1;}

.player .body{background:linear-gradient(180deg,#fff,#dfeff9)}
.nurse .body{background:linear-gradient(180deg,#ffb6c1,#e58e9b)} 
.doctor .body{background:linear-gradient(180deg,#fff,#ccc)} 
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}

/* UI */
.miniHint{ position:absolute;left:50%;top:16px;transform:translateX(-50%);z-index:23; background:rgba(15,24,35,.85);border:1px solid rgba(243,202,112,.4);border-radius:999px;padding:12px 24px; font-size:15px; font-weight:bold; color:#fff; text-align:center; white-space:nowrap; box-shadow: 0 6px 15px rgba(0,0,0,0.4); pointer-events:none; }
.dialogMask{position:absolute;inset:0;z-index:40;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.4); padding-bottom:calc(20px + var(--safe-bottom));}
.dialogBox{width:92%;max-width:500px;background:linear-gradient(180deg,#1e364f, #142538);border-radius:18px;padding:24px;border:2px solid var(--gold);color:#fff; box-shadow:0 20px 40px rgba(0,0,0,0.6);}
.dialogBox h3{margin:0 0 12px 0; color:var(--gold); font-size:22px;}
.dialogBox p{font-size:17px; line-height:1.6; margin-bottom:20px; color:#e0edf9;}
.closeBtn{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(180deg,#f3ca70,#d1a23a);color:#4a3505;font-weight:900;font-size:18px;}

/* 虛擬搖桿視覺反饋 */
.joystick-base { position: absolute; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); display: none; z-index: 50;}
.joystick-knob { position: absolute; width: 40px; height: 40px; background: rgba(243,202,112,0.8); border-radius: 50%; left: 50%; top: 50%; transform: translate(-50%, -50%); }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">🏥 11G 全區地圖導覽</div>
    <div class="hudChip">🪙 120</div>
  </div>

  <div class="scene" id="scene">
    <div class="miniHint" id="miniHint">👆 按住螢幕滑動來移動，單點人物對話</div>
    
    <div class="joystick-base" id="joystickBase"><div class="joystick-knob" id="joystickKnob"></div></div>

    <div class="camera" id="camera">
      <div class="game-world" id="gameWorld">
        
        <div class="floor-corridor"></div>
        
        <svg class="escape-route">
          <polygon points="1850,1650 1850,250 400,1650" fill="none" stroke="rgba(46, 204, 113, 0.4)" stroke-width="12" stroke-linejoin="round"/>
        </svg>

        <div class="ward-diag">
          <div class="room-diag">11G11</div><div class="room-diag">11G12</div><div class="room-diag">11G13</div>
          <div class="room-diag">11G15</div><div class="room-diag">11G16</div><div class="room-diag">11G17</div>
          <div class="room-diag">11G18</div><div class="room-diag">11G19</div><div class="room-diag">11G20</div>
          <div class="room-diag">11G21</div><div class="room-diag">11G22</div><div class="room-diag">11G23</div>
        </div>
        
        <div class="ward-right">
          <div class="room-right">11G10 病房</div><div class="room-right">11G09 病房</div>
          <div class="room-right">11G08 病房</div><div class="room-right">11G07 病房</div>
          <div class="room-right">11G06 病房</div><div class="room-right">11G05 病房</div>
          <div class="room-right">11G03 病房</div><div class="room-right">11G02 病房</div>
          <div class="room-right">11G01 病房</div>
        </div>

        <div class="ward-bottom">
          <div class="facility">逃生梯 No.45</div>
          <div class="facility">庫房 / 空調室</div>
          <div class="facility elevator-hall">🛗 客用 / 病床電梯</div>
          <div class="facility">配膳室</div>
        </div>

        <div class="nursing-station-floor"></div>
        <div class="nursing-label">護理站</div>
        <div class="desk-right" id="obs-desk-1"></div>
        <div class="desk-bottom-1" id="obs-desk-2"></div>
        <div class="desk-bottom-2" id="obs-desk-3"></div> <div class="desk-diag" id="obs-desk-4"></div>

        <div class="character nurse" id="npc-nurse" style="left:1500px;top:1250px">
          <div class="shadow"></div><div class="marker">!</div><div class="name">護理長</div>
          <div class="head"></div><div class="body"></div>
        </div>
        
        <div class="character doctor" id="npc-doctor" style="left:1880px;top:850px">
          <div class="shadow"></div><div class="marker">?</div><div class="name">神內醫師</div>
          <div class="head"></div><div class="body"></div>
        </div>

        <div class="character player" id="player" style="left:1500px;top:1650px">
          <div class="shadow"></div><div class="name">玩家</div>
          <div class="head"></div><div class="body"></div>
        </div>

      </div>
    </div>

    <div class="dialogMask" id="dialogMask">
      <div class="dialogBox">
        <h3 id="dialogTitle">名稱</h3>
        <p id="dialogText">對話內容...</p>
        <button class="closeBtn" onclick="closeDialog()">繼續</button>
      </div>
    </div>
  </div>
</div>

<script>
// --- 核心狀態 ---
const player = document.getElementById('player');
const camera = document.getElementById('camera');
const scene = document.getElementById('scene');
const joystickBase = document.getElementById('joystickBase');
const joystickKnob = document.getElementById('joystickKnob');

let state = { x: 1500, y: 1650 }; // 玩家座標 (電梯大廳外)
let velocity = { x: 0, y: 0 };    // 玩家移動速度向量
let speed = 9;                    // 最大跑速

// 對話資料
const dialogData = {
  'npc-nurse': { title: '護理長', text: '你現在進入護理站內部了！從我們背後這個小出入口進出很方便。我們平常都在這裡監控 11G 所有病房的動態。' },
  'npc-doctor': { title: '神內醫師', text: '11G06 的病患剛做完 rTMS 療程，幫我去留意一下他的手部力氣有沒有改善。對了，你知道 FAST 評估表怎麼做嗎？' }
};

// --- 攝影機跟隨 ---
function updateCamera() {
  const screenW = scene.clientWidth;
  const screenH = scene.clientHeight;
  const camX = (screenW / 2) - state.x;
  const camY = (screenH / 2) - state.y;
  camera.style.transform = `translate(${camX}px, ${camY}px)`;
}

// --- 碰撞偵測 (滑動操控的靈魂：獨立 XY 軸判定) ---
// 這裡將牆壁和護理站桌子定義為實體方塊
const obstacles = [
  { x: 2000, y: 0, w: 400, h: 1700 }, // 右牆 (11G01-11G10)
  { x: 0, y: 1700, w: 2400, h: 300 }, // 下牆 (電梯區)
  // 護理站的實體桌子 (透過粗略的矩形邊界來擋人)
  { x: 1670, y: 900, w: 30, h: 400 }, // 右桌
  { x: 1100, y: 1370, w: 200, h: 30 }, // 下桌左段
  { x: 1450, y: 1370, w: 220, h: 30 }  // 下桌右段 (1300~1450 是出入口缺口)
];

function canMoveTo(x, y) {
  const r = 25; // 玩家碰撞半徑
  
  // 1. 左斜邊大牆壁判斷 (斜率方程式 y = 0.88x - 176) -> 簡化為：不能跑到斜線左上方
  // 對應：1800寬, 1600高 的直角三角形。
  if ( (1600 - (y - 100)) > (x - 200) * (1600/1800) ) return false;
  if (x - r < 200) return false;

  // 2. 護理站斜邊桌子判斷
  // 近似斜線方程式，限制不能穿越斜邊桌子
  if (x > 1100 && x < 1670 && Math.abs((y - 900) - (x - 1100)*(500/600)) < 30) return false;

  // 3. 檢查矩形障礙物 (右牆、下牆、護理站直桌)
  for (let obs of obstacles) {
    if (x + r > obs.x && x - r < obs.x + obs.w &&
        y + r > obs.y && y - r < obs.y + obs.h) {
      return false; 
    }
  }
  return true;
}

// --- 遊戲主迴圈 ---
function gameLoop() {
  if (velocity.x !== 0 || velocity.y !== 0) {
    // 獨立驗證 X 和 Y，實現超滑順的「貼牆滑行」
    const nextX = state.x + velocity.x;
    const nextY = state.y + velocity.y;

    if (canMoveTo(nextX, state.y)) state.x = nextX;
    if (canMoveTo(state.x, nextY)) state.y = nextY;

    player.style.left = state.x + 'px';
    player.style.top = state.y + 'px';
    updateCamera();
  }
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
updateCamera();

// --- 觸控與滑動虛擬搖桿系統 ---
let isDragging = false;
let startTouch = { x: 0, y: 0 };
let currentTouch = { x: 0, y: 0 };
let isJustTap = true; // 用來區分是「滑動」還是「單點互動」

scene.addEventListener('pointerdown', (e) => {
  if (document.getElementById('dialogMask').style.display === 'flex') return;
  if (e.target.closest('.character')) return; // 點到 NPC 交給 NPC 處理

  isDragging = true;
  isJustTap = true;
  startTouch.x = e.clientX;
  startTouch.y = e.clientY;

  // 顯示虛擬搖桿在手指按下的地方
  joystickBase.style.left = startTouch.x + 'px';
  joystickBase.style.top = startTouch.y + 'px';
  joystickBase.style.display = 'block';
  joystickKnob.style.transform = `translate(-50%, -50%)`;
});

window.addEventListener('pointermove', (e) => {
  if (!isDragging) return;
  
  currentTouch.x = e.clientX;
  currentTouch.y = e.clientY;
  
  const dx = currentTouch.x - startTouch.x;
  const dy = currentTouch.y - startTouch.y;
  const dist = Math.hypot(dx, dy);

  // 滑動超過 10px 才算移動，避免手抖誤判
  if (dist > 10) {
    isJustTap = false;
    document.getElementById('miniHint').innerText = '🏃 跑動中...';
    
    // 計算移動向量
    const maxDrag = 50; // 搖桿拉到最滿的距離
    const force = Math.min(dist, maxDrag) / maxDrag;
    velocity.x = (dx / dist) * speed * force;
    velocity.y = (dy / dist) * speed * force;

    // 更新搖桿 UI
    const knobX = (dx / dist) * Math.min(dist, 40);
    const knobY = (dy / dist) * Math.min(dist, 40);
    joystickKnob.style.transform = `translate(calc(-50% + ${knobX}px), calc(-50% + ${knobY}px))`;
  }
});

window.addEventListener('pointerup', () => {
  isDragging = false;
  velocity.x = 0;
  velocity.y = 0;
  joystickBase.style.display = 'none';
  if(!isJustTap) document.getElementById('miniHint').innerText = '👆 按住螢幕滑動來移動，單點人物對話';
});

// --- NPC 單點互動 ---
document.querySelectorAll('.character:not(.player)').forEach(npc => {
  npc.addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    if (document.getElementById('dialogMask').style.display === 'flex') return;

    // 計算玩家跟 NPC 的距離，太遠不能對話
    const npcX = parseInt(npc.style.left);
    const npcY = parseInt(npc.style.top);
    const dist = Math.hypot(state.x - npcX, state.y - npcY);

    if (dist < 150) { // 在 150px 範圍內才能對話
      const data = dialogData[npc.id];
      document.getElementById('dialogTitle').innerText = data.title;
      document.getElementById('dialogText').innerText = data.text;
      document.getElementById('dialogMask').style.display = 'flex';
      velocity.x = 0; velocity.y = 0; // 對話時強迫停止移動
    } else {
      document.getElementById('miniHint').innerText = '❌ 距離太遠了，請滑動走近一點再點擊';
    }
  });
});

function closeDialog() {
  document.getElementById('dialogMask').style.display = 'none';
  document.getElementById('miniHint').innerText = '👆 按住螢幕滑動來移動，單點人物對話';
}

window.addEventListener('resize', updateCamera);
</script>
</body>
</html>
