<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>中風照護團隊｜手機精簡版</title>
<style>
  :root{
    --bg1:#eef7ff;
    --bg2:#dceeff;
    --text:#17314f;
    --muted:#6d829c;
    --accent:#2f80ed;
    --accent2:#73c7ff;
    --ok:#139b6b;
    --bad:#d95353;
    --shadow:0 18px 42px rgba(34,82,135,.15);
  }

  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
  }

  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at 18% 8%, rgba(115,199,255,.35), transparent 24%),
      radial-gradient(circle at 88% 0%, rgba(47,128,237,.16), transparent 28%),
      linear-gradient(180deg,var(--bg1),var(--bg2));
  }

  body{
    display:flex;
    justify-content:center;
    align-items:center;
  }

  .app{
    width:min(100vw, 480px);
    height:100vh;
    max-height:980px;
    position:relative;
    overflow:hidden;
  }

  .main{
    position:absolute;
    inset:0;
    padding:8px 10px 12px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  .stage{
    flex:1;
    min-height:0;
    position:relative;
    overflow:hidden;
  }

  .track{
    height:100%;
    display:flex;
    touch-action:pan-y;
    transition:transform .28s ease;
  }

  .slide{
    flex:0 0 100%;
    min-width:100%;
    height:100%;
    padding:2px;
    display:flex;
  }

  .card{
    width:100%;
    height:100%;
    background:linear-gradient(180deg,#ffffff,#f7fbff);
    border-radius:30px;
    box-shadow:var(--shadow);
    padding:12px 12px 12px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    position:relative;
  }

  .card-bg{
    position:absolute;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    border-radius:30px;
  }

  .blob1,.blob2,.blob3{
    position:absolute;
    border-radius:50%;
    filter:blur(8px);
    opacity:.8;
  }

  .blob1{ width:180px; height:180px; left:-30px; top:-24px; }
  .blob2{ width:130px; height:130px; right:-15px; top:86px; }
  .blob3{ width:150px; height:150px; right:16px; bottom:-44px; }

  .illustration-zone{
    flex:1;
    min-height:0;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }

  .art-frame{
    width:min(86vw, 360px);
    height:min(84vw, 350px);
    max-width:360px;
    max-height:350px;
    min-width:250px;
    min-height:240px;
    border-radius:34px;
    background:linear-gradient(180deg, rgba(255,255,255,.88), rgba(255,255,255,.58));
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,.9),
      0 20px 36px rgba(34,82,135,.10);
    backdrop-filter:blur(3px);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
  }

  .sparkle{
    position:absolute;
    inset:0;
    pointer-events:none;
    opacity:.75;
  }

  .sparkle:before,
  .sparkle:after{
    content:"";
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    background:rgba(255,255,255,.95);
    filter:blur(1px);
  }

  .sparkle:before{ top:24px; left:28px; }
  .sparkle:after{ right:28px; top:46px; }

  svg.character{
    width:96%;
    height:96%;
    overflow:visible;
  }

  .info-card{
    background:rgba(255,255,255,.9);
    border-radius:22px;
    padding:12px 14px;
    box-shadow:0 10px 24px rgba(39,90,150,.08);
    min-height:108px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:6px;
  }

  .info-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
  }

  .info-label{
    font-size:11px;
    font-weight:900;
    letter-spacing:1px;
    color:#6b84a2;
    flex:1;
  }

  .score-chip{
    background:#edf5ff;
    color:#355372;
    border-radius:999px;
    padding:6px 10px;
    font-size:11px;
    font-weight:900;
    white-space:nowrap;
    box-shadow:0 4px 10px rgba(39,90,150,.08);
  }

  .info-main{
    font-size:18px;
    font-weight:900;
    color:#163152;
    line-height:1.4;
  }

  .info-sub{
    font-size:14px;
    line-height:1.5;
    color:#2b4767;
    min-height:21px;
  }

  .info-card.ok{
    background:rgba(19,155,107,.12);
  }

  .info-card.ok .info-sub{
    color:#0f7a56;
  }

  .info-card.bad{
    background:rgba(217,83,83,.12);
  }

  .info-card.bad .info-sub{
    color:#b33939;
  }

  .info-card.win{
    background:rgba(47,128,237,.14);
  }

  .info-card.win .info-sub{
    color:#1d58a3;
  }

  .dots{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:7px;
    padding:0;
  }

  .dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:rgba(47,128,237,.22);
    transition:.2s;
  }

  .dot.active{
    width:24px;
    border-radius:999px;
    background:#2f80ed;
  }

  .bottom{
    display:flex;
    gap:10px;
  }

  .btn{
    border:none;
    border-radius:18px;
    padding:14px 14px;
    font-size:16px;
    font-weight:900;
    cursor:pointer;
    box-shadow:0 12px 26px rgba(39,90,150,.12);
  }

  .btn-main{
    flex:1;
    color:#fff;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
  }

  .btn-soft{
    width:84px;
    color:#31506e;
    background:rgba(255,255,255,.86);
  }

  .nav{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:42px;
    height:42px;
    border:none;
    border-radius:50%;
    background:rgba(255,255,255,.95);
    color:#20466f;
    font-size:24px;
    font-weight:900;
    box-shadow:0 10px 24px rgba(39,90,150,.12);
    z-index:5;
    cursor:pointer;
  }

  .nav.left{ left:6px; }
  .nav.right{ right:6px; }

  .overlay{
    position:absolute;
    inset:0;
    background:rgba(11,28,51,.38);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    opacity:0;
    pointer-events:none;
    transition:.24s;
    z-index:20;
  }

  .overlay.show{
    opacity:1;
    pointer-events:auto;
  }

  .modal{
    width:100%;
    max-width:360px;
    background:linear-gradient(180deg,#ffffff,#f5fbff);
    border-radius:28px;
    padding:24px 20px 18px;
    text-align:center;
    box-shadow:0 26px 60px rgba(0,0,0,.22);
  }

  .modal-icon{
    font-size:58px;
    margin-bottom:8px;
  }

  .modal-title{
    font-size:28px;
    font-weight:900;
    color:#163152;
  }

  .modal-text{
    margin-top:8px;
    color:#5d7898;
    font-size:15px;
    line-height:1.6;
  }

  .modal .btn{
    width:100%;
    margin-top:16px;
  }

  @media (max-height:760px){
    .main{ padding:6px 8px 10px; gap:7px; }
    .card{ padding:10px 10px 10px; }
    .art-frame{
      width:min(82vw, 310px);
      height:min(78vw, 300px);
      min-width:228px;
      min-height:220px;
    }
    .info-main{ font-size:16px; }
    .info-sub{ font-size:13px; }
    .btn{ padding:12px 13px; font-size:15px; }
  }

  @media (max-height:680px){
    .art-frame{
      width:min(76vw, 270px);
      height:min(72vw, 260px);
      min-width:210px;
      min-height:198px;
    }
    .info-card{
      min-height:96px;
      padding:10px 12px;
    }
    .info-main{ font-size:15px; }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="main">
      <div class="stage">
        <button class="nav left" id="prevBtn">‹</button>
        <button class="nav right" id="nextBtn">›</button>
        <div class="track" id="track"></div>
      </div>

      <div class="info-card" id="infoCard">
        <div class="info-top">
          <div class="info-label" id="infoLabel">人物展示</div>
          <div class="score-chip" id="scoreChip">連續答對 0/3</div>
        </div>
        <div class="info-main" id="infoMain">滑動認識不同職類</div>
        <div class="info-sub" id="infoSub">目前是預習模式，可以左右滑動看看每個人的工作。</div>
      </div>

      <div class="dots" id="dots"></div>

      <div class="bottom">
        <button class="btn btn-soft" id="resetBtn">重來</button>
        <button class="btn btn-main" id="mainBtn">開始測驗</button>
      </div>
    </div>

    <div class="overlay" id="winOverlay">
      <div class="modal">
        <div class="modal-icon">🎉</div>
        <div class="modal-title">過關成功</div>
        <div class="modal-text">
          你已經連續答對 3 題，認識中風照護團隊了。
        </div>
        <button class="btn btn-main" id="continueBtn">繼續挑戰</button>
      </div>
    </div>
  </div>

<script>
(() => {
