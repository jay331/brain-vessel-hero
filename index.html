<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>腦脈先鋒</title>

<style>
:root{
  --bg:#060912; --panel:rgba(10,14,28,.86); --line:rgba(255,255,255,.12);
  --text:#eaf2ff; --muted:rgba(234,242,255,.72);
  --accent:#00ffe5; --good:#3dff8e; --warn:#ffd166; --bad:#ff4d6d;
}

html,body{
  margin:0; 
  height: 100dvh; 
  background:var(--bg); color:var(--text);
  font-family:"PingFang TC","Noto Sans TC",system-ui,-apple-system,sans-serif;
  overflow:hidden;
}
*{box-sizing:border-box}
button{font-family:inherit}

/* ===== Layout ===== */
.app{height:100%; display:flex; flex-direction:column;}

header{
  padding:10px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px;
  background:linear-gradient(180deg, rgba(10,14,28,.95), rgba(10,14,28,.65));
  border-bottom:1px solid var(--line);
  z-index: 100;
  flex-shrink: 0;
}
.brand{min-width:0}
.brand .t{font-weight:1000; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.brand .s{font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}

.hud{display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end}
.chip{
  padding:7px 12px; border-radius:999px; background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.10); color:var(--muted); font-size:12px
}
.chip strong{color:var(--text)}

.btn{
  appearance:none; border:0; cursor:pointer; padding:12px 14px; border-radius:14px;
  font-weight:1000; background:rgba(255,255,255,.05); color:var(--text);
  border:1px solid rgba(255,255,255,.15); font-size:14px;
  transition: transform 0.1s, filter 0.1s;
}
.btn:active{ transform: scale(0.96); }
.btn.primary{
  background:linear-gradient(180deg, rgba(0,255,229,.18), rgba(0,255,229,.06));
  border:1px solid rgba(0,255,229,.35);
  box-shadow:0 10px 24px rgba(0,255,229,.08)
}
.btn.secondary{background:rgba(255,255,255,.06)}
.btn.danger{
  background:linear-gradient(180deg, rgba(255,77,109,.18), rgba(255,77,109,.06));
  border:1px solid rgba(255,77,109,.32)
}

.wrap{
  flex:1; min-height:0; display:flex; align-items:center; justify-content:center;
  padding: 0; 
}

/* ★ 重點修正：背景由 .stage 的 class 精準控制切換 */
.stage{
  position:relative; width: 100%; height: 100%;
  overflow:hidden;
  background:
    url('assets/bg_base.png') center/cover no-repeat,
    radial-gradient(circle at 40% 12%, rgba(255,209,102,.10), rgba(0,0,0,0) 55%),
    radial-gradient(circle at 70% 35%, rgba(0,255,229,.10), rgba(0,0,0,0) 60%),
    linear-gradient(180deg, #0a1021, #070a12);
  display: flex;
  flex-direction: column;
}
.stage.is-home {
  background: url('assets/bg_home_mockup.png') center/cover no-repeat;
}
.stage.is-home .vignette { display: none; }

@media (min-width: 481px) {
  .wrap { padding: 24px; }
  .stage {
    max-width: 440px; 
    max-height: 850px;
    border-radius: 28px;
    border: 1px solid rgba(255,255,255,.15);
    box-shadow: 0 26px 80px rgba(0,0,0,.65);
  }
}

.vignette{position:absolute; inset:0; background:radial-gradient(circle at 50% 35%, rgba(0,0,0,0), rgba(0,0,0,.55) 78%); pointer-events:none;}

.content{
  position:absolute; inset:0; display:flex; flex-direction:column; padding:16px;
  z-index: 10;
  overflow-y: auto; /* 讓整體內容可以滑動 */
}

/* ★ 重點修正：畫面排版改為「自然堆疊」，消除詭異空白 */
.screen {
  flex: 0 0 auto; /* 不強制撐開，由內容決定高度 */
  display: none; flex-direction: column; 
  gap: 16px; /* 統一且固定的間距 */
}
.screen.show{ display:flex; }

.topTalk{
  display:flex; gap:12px; align-items:flex-start; padding:14px; border-radius:18px;
  background:var(--panel); border:1px solid rgba(255,255,255,.12);
  flex-shrink: 0;
}
.avatar{
  width:64px; height:64px; border-radius:16px; background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.10); overflow:hidden; flex:0 0 auto;
}
.avatar img{width:100%; height:100%; object-fit:cover;}
.talk{min-width:0; padding-top: 2px;}
.talk .who{font-weight:1000; font-size:15px; letter-spacing: 0.5px;}
.talk .say{margin-top:6px; color:var(--muted); font-size:13.5px; line-height:1.65;}

.midPanel{
  padding:14px; border-radius:18px; background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08); 
}
.midPanel h2{margin:0 0 10px; font-size:16px; color:var(--accent);}
.bullet{margin:0; padding-left:18px; color:var(--muted); font-size:13.5px; line-height:1.65;}
.bullet li{margin:8px 0;}

/* 底部列自然跟隨在內容下方 */
.bottomBar{
  display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap;
  padding:14px; border-radius:18px; background:rgba(10,14,28,.85); border:1px solid rgba(255,255,255,.15);
  flex-shrink: 0;
}
.icons{display:flex; gap:10px; align-items:center; width: 100%;}
.actions{display:flex; gap:10px; flex-wrap:wrap; justify-content:space-between; width: 100%;}
.actions .btn { flex: 1; text-align: center; } 

.toast{
  position:absolute; left:50%; bottom:20px; transform:translateX(-50%);
  padding:12px 16px; border-radius:14px; background:rgba(10,14,28,.95);
  border:1px solid rgba(255,255,255,.15); box-shadow:0 18px 45px rgba(0,0,0,.65);
  font-size:13px; display:none; z-index:50; max-width:min(92vw,400px); text-align:center;
}
.toast.show{display:block; animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
@keyframes popUp { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }

/* ===== GAME OVERLAY ===== */
.gameOverlay{ position:fixed; inset:0; display:none; background:#000; z-index:2000; flex-direction:column; }
.gameTop{
  padding:8px 12px; display:flex; align-items:center; justify-content:space-between; gap:8px;
  background:linear-gradient(180deg, rgba(10,14,28,.95), rgba(10,14,28,.75));
  border-bottom:1px solid rgba(255,255,255,.12); z-index:20;
}
#gameFrame{ flex:1; border:0; width:100%; height:100%; background:#000; }
.gameTop .meta{ min-width:0; flex:1; }
.gameTop .meta .h{ font-weight:900; font-size:14px; line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.gameTopRight{ display:flex; align-items:center; gap:8px; flex-shrink:0; }
.miniChip{ padding:6px 10px; border-radius:999px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); color:var(--muted); font-size:12px; }
.miniChip strong{ color:var(--text); }
.miniBtn{ appearance:none; border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.1); color:var(--text); border-radius:999px; padding:7px 12px; font-size:12px; font-weight:900; cursor:pointer; }

/* ===== HOME ===== */
#scrHome{
  flex: 1 1 auto; /* 首頁特別設定：讓按鈕推到最下面 */
  justify-content: flex-end;
  padding-bottom: max(8vh, 30px); 
}
#scrHome .homeBtns{ display:flex; gap:18px; justify-content:center; z-index:9999; }
#scrHome .homeBtns button{
  flex:1; height:min(14vh, 120px); border-radius:18px;
  background: rgba(255,255,255,0.01); border: 0; cursor:pointer;
  -webkit-tap-highlight-color: transparent;
}
#scrHome .homeBtns button:active{ background: rgba(255,255,255,0.1); }

/* ===== LIST ===== */
#scrList .listBtn{
  font-size: 16px; font-weight: 800; text-align: left; padding: 18px 20px;
  border-radius: 18px; color: #eaf2ff;
  background: linear-gradient(180deg, rgba(20,30,55,.75), rgba(10,15,30,.85));
  border: 1px solid rgba(255,255,255,.18);
  box-shadow: 0 8px 22px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.12);
}

/* ===== CASE & BRIEF ===== */
#scrCase .iconTile{
  flex: 1; aspect-ratio: 1/1; max-height: 100px;
  border-radius:18px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.12);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
  cursor:pointer; position:relative;
}
#scrCase .iconTile img{ width:50%; height:50%; object-fit: contain; }
#scrCase .iconTile.locked{ opacity:.3; cursor:not-allowed; filter: grayscale(1); }
#scrCase .iconTile.active{ outline:2px solid rgba(0,255,229,.6); background:rgba(0,255,229,.1); }
#scrCase .iconTile .badge{ position:absolute; right:6px; top:6px; padding:3px 6px; border-radius:999px; background:var(--accent); color:#000; font-size:10px; font-weight:900; display:none; }
#scrCase .iconTile.ready .badge{ display:block; }
#scrCase .iconTile .lbl{ font-size: 13px; font-weight: 800; }

#scrCase .caseTitleCard{
  width:100%; border: 1px solid rgba(0,255,229,.25); border-radius: 18px; padding: 16px;
  display:flex; align-items:center; justify-content: space-between;
  background: linear-gradient(180deg, rgba(0,255,229,.25), rgba(10,14,28,.86));
}
#scrCase #caseHintTitle{ font-size: 16px; font-weight: 900; }

#scrBrief #briefTitle{
  margin: 0 0 12px 0; padding: 12px; font-size: 16px; font-weight: 900; text-align: center;
  background: linear-gradient(180deg, rgba(0,255,229,.25), rgba(10,14,28,.9));
  border: 1px solid rgba(0,255,229,.35); border-radius: 16px;
}
.full-width-btn { width: 100%; text-align: center; font-size: 15px; padding: 14px;}

@keyframes fadeIn { from { opacity: 0; transform: translateY(-10px);} to { opacity: 1; transform: translateY(0);} }

/* ★ 展開時才顯示下方區塊的邏輯 */
#scrBrief #briefDetail { display:none; }
#scrBrief .bottomBar { display:none; }
#scrBrief #briefDetail.open { display:block; animation: fadeIn 0.25s ease; }
#scrBrief #briefDetail.open ~ .bottomBar { display:flex; animation: fadeIn 0.25s ease; }

#scrCase .caseTaskWrap { display:none; flex-direction: column; gap: 16px; }
#scrCase .bottomBar { display:none; }
#scrCase.taskOpen .caseTaskWrap { display:flex; animation: fadeIn 0.25s ease; }
#scrCase.taskOpen .bottomBar { display:flex; animation: fadeIn 0.25s ease; }

/* 排行榜表格 */
.rankTable{width:100%; border-collapse:collapse; margin-top:8px;}
.rankTable th, .rankTable td{ border-bottom:1px solid rgba(255,255,255,.08); padding:10px 6px; font-size:13px; color:var(--muted); text-align:left;}
.rankTable th{color:rgba(234,242,255,.85); font-weight:1000;}

@supports(padding:max(0px)){
  header{padding-top:max(10px, env(safe-area-inset-top));}
  .content{padding-bottom:max(16px, env(safe-area-inset-bottom));}
  .toast{bottom:calc(20px + env(safe-area-inset-bottom));}
}
</style>
</head>

<body>
<div class="app">
<header>
  <div class="brand">
    <div class="t" id="titleLine">腦脈先鋒</div>
    <div class="s" id="subLine" style="display:none"></div>
  </div>
  <div class="hud">
    <div class="chip">總積分：<strong id="caseScore">0</strong></div>
    <button class="btn secondary" style="padding: 8px 12px; font-size: 12px;" id="btnHome">首頁</button>
    <button class="btn danger" style="padding: 8px 12px; font-size: 12px;" id="btnReset">重置</button>
  </div>
</header>

<div class="wrap">
  <div class="stage is-home">
    <div class="content">

      <section class="screen show" id="scrHome">
        <div class="homeBtns" aria-label="首頁模式選擇">
          <button type="button" id="btnMissionMode" aria-label="任務模式"></button>
          <button type="button" id="btnListMode" aria-label="挑戰模式"></button>
        </div>
      </section>

      <section class="screen" id="scrList">
        <div class="topTalk" style="align-items: center;">
          <div class="avatar"><img src="assets/nurse_card.png" alt=""></div>
          <div class="talk">
            <div class="who" style="font-size: 18px;">挑戰模式清單</div>
            <div class="say" style="margin-top: 2px;">選擇關卡進行獨立訓練</div>
          </div>
        </div>
        <div class="midPanel">
          <div style="display:flex;flex-direction:column;gap:12px">
            <button class="btn primary listBtn" onclick="startListGame('race')">1. 黃金送醫（競速）</button>
            <button class="btn primary listBtn" onclick="startListGame('shoot')">2. 血管再通治療 (消消樂)</button>
            <button class="btn primary listBtn" onclick="startListGame('match-l1')">3. 衛教方塊 Lv1</button>
            <button class="btn primary listBtn" onclick="startListGame('match-l2')">4. 衛教方塊 Lv2</button>
          </div>
        </div>
        <div class="bottomBar">
          <div class="actions"><button class="btn secondary full-width-btn" onclick="goHome()">返回首頁</button></div>
        </div>
      </section>

      <section class="screen" id="scrCase">
        <div class="topTalk">
          <div class="avatar" style="width: 80px; height: 80px;"><img src="assets/doctor_card.png" alt=""></div>
          <div class="talk">
            <div class="who" id="caseTitleLine">醫師｜病情說明</div>
            <div class="say" id="doctorLine">（載入中…）</div>
          </div>
        </div>

        <button id="btnToggleCaseTask" class="btn secondary full-width-btn" type="button" aria-expanded="false">
          查看當前任務目標 ▾
        </button>

        <div class="caseTaskWrap">
          <div class="midPanel" style="padding:0; background:transparent; border:none;">
            <div id="caseTitleCard" class="caseTitleCard">
              <span id="caseHintTitle">任務</span>
            </div>
          </div>
        </div>

        <div class="bottomBar">
          <div style="width: 100%; font-size: 13px; color: var(--accent); font-weight: bold; margin-bottom: 8px;">選擇執行人員：</div>
          <div class="icons" id="roleIcons" style="width: 100%; justify-content: space-between;">
            <div class="iconTile" id="tileEMT"><span class="badge">GO</span><img src="assets/emt_card.png" alt=""><div class="lbl">EMT</div></div>
            <div class="iconTile locked" id="tileTEAM"><span class="badge">GO</span><img src="assets/team_card.png" alt=""><div class="lbl">取栓</div></div>
            <div class="iconTile locked" id="tileNURSE"><span class="badge">GO</span><img src="assets/nurse_card.png" alt=""><div class="lbl">護理</div></div>
          </div>
        </div>
      </section>

      <section class="screen" id="scrBrief">
        <div class="topTalk">
          <div class="avatar" style="width: 80px; height: 80px;"><img id="briefAvatar" src="assets/emt_card.png" alt=""></div>
          <div class="talk">
            <div class="who" id="briefWho">—</div>
            <div class="say" id="briefLine">—</div>
          </div>
        </div>

        <button id="btnToggleBrief" class="btn secondary full-width-btn" aria-expanded="false" type="button">
          展開詳細指引 ▾
        </button>

        <div class="midPanel" id="briefDetail">
          <h2 id="briefTitle">任務目標</h2>
          <ul class="bullet" id="briefBullets"></ul>
        </div>

        <div class="bottomBar">
          <div class="actions">
            <button class="btn secondary" id="btnBriefBack" type="button">返回</button>
            <button class="btn primary" id="btnStartTask" type="button">開始執行</button>
          </div>
        </div>
      </section>

      <section class="screen" id="scrRoleComplete">
        <div class="topTalk" style="align-items: center;">
          <div class="avatar" style="width: 70px; height: 70px;"><img id="rcAvatar" src="assets/emt_card.png" alt=""></div>
          <div class="talk">
            <div class="who" id="rcWho">✅ 任務完成</div>
            <div class="say" id="rcLine">—</div>
          </div>
        </div>

        <div class="midPanel">
          <h2 style="color:var(--accent); font-size: 16px;">本段結算</h2>
          <ul class="bullet" id="rcBullets" style="font-size: 14px;"></ul>
        </div>

        <div class="bottomBar">
          <div class="actions">
            <button class="btn secondary" id="btnRetryRole" type="button">刷分重來</button>
            <button class="btn primary" id="btnFinishRole" type="button">推進主線</button>
          </div>
        </div>
      </section>

      <section class="screen" id="scrCaseComplete">
        <div class="topTalk" style="align-items: center;">
          <div class="avatar" style="width: 70px; height: 70px;"><img src="assets/doctor_card.png" alt=""></div>
          <div class="talk">
            <div class="who">✅ 總任務完成</div>
            <div class="say">你已完美結束本次的急救護理流程！</div>
          </div>
        </div>

        <div class="midPanel">
          <h2 style="color:var(--accent);">本次成績</h2>
          <ul class="bullet" id="caseResultBullets"></ul>

          <h2 style="margin-top:24px; padding-top:16px; border-top:1px solid rgba(255,255,255,0.1);">🏆 本機排行榜</h2>
          <table class="rankTable" id="rankTable">
            <thead><tr><th>#</th><th>玩家</th><th>分數</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>

        <div class="bottomBar">
          <div class="actions">
            <button class="btn secondary full-width-btn" id="btnReplayCase" type="button">再挑戰一次</button>
          </div>
        </div>
      </section>

      <div class="toast" id="toast">—</div>
      <div class="vignette"></div>
    </div>
  </div>
</div>

<div class="gameOverlay" id="gameOverlay">
  <div class="gameTop">
    <div class="meta">
      <div class="h" id="gameTitle">挑戰模式</div>
    </div>
    <div class="gameTopRight">
      <div class="miniChip">耗時/積分 <strong id="stageTime">—</strong></div>
      <button class="miniBtn" id="btnExitGame" type="button">退出</button>
    </div>
  </div>
  <iframe id="gameFrame" title="遊戲" allowfullscreen></iframe>
</div>

<script>
const KEY_RANK='BVP_MAIN_RANK_V1';

const GAME_FILES = {
  'race': 'game_race_lev1.html',
  'match-l1': 'game_match_lev1.html',
  'match-l2': 'game_match_lev2.html',
  'shoot': 'game_shoot_lev1.html',
};

const caseState = {
  caseScore: 0,
  currentRole: 'EMT',
  unlocked: { EMT:true, TEAM:false, NURSE:false },
  completed: { EMT:false, TEAM:false, NURSE:false },
  activeRole: null,
  lastPerf: null,
  isListMode: false
};

const ui = {
  stage: qs('.stage'),
  subLine: qs('#subLine'), caseScore: qs('#caseScore'), toast: qs('#toast'),
  scrHome: qs('#scrHome'), scrList: qs('#scrList'), scrCase: qs('#scrCase'),
  scrBrief: qs('#scrBrief'), scrRoleComplete: qs('#scrRoleComplete'), scrCaseComplete: qs('#scrCaseComplete'),

  btnMissionMode: qs('#btnMissionMode'), btnListMode: qs('#btnListMode'),
  btnHome: qs('#btnHome'), btnReset: qs('#btnReset'),

  doctorLine: qs('#doctorLine'), caseHintTitle: qs('#caseHintTitle'),
  tileEMT: qs('#tileEMT'), tileTEAM: qs('#tileTEAM'), tileNURSE: qs('#tileNURSE'),

  briefAvatar: qs('#briefAvatar'), briefWho: qs('#briefWho'), briefLine: qs('#briefLine'),
  briefTitle: qs('#briefTitle'), briefBullets: qs('#briefBullets'),
  btnBriefBack: qs('#btnBriefBack'), btnStartTask: qs('#btnStartTask'),

  rcAvatar: qs('#rcAvatar'), rcWho: qs('#rcWho'), rcLine: qs('#rcLine'),
  rcBullets: qs('#rcBullets'), btnRetryRole: qs('#btnRetryRole'), btnFinishRole: qs('#btnFinishRole'),

  caseResultBullets: qs('#caseResultBullets'), rankTable: qs('#rankTable tbody'), btnReplayCase: qs('#btnReplayCase'),

  gameOverlay: qs('#gameOverlay'), gameFrame: qs('#gameFrame'), gameTitle: qs('#gameTitle'),
  stageTime: qs('#stageTime'), btnExitGame: qs('#btnExitGame'),

  btnToggleBrief: qs('#btnToggleBrief'), briefDetail: qs('#briefDetail'),
};

window.goHome = goHome;
window.startListGame = startListGame;

bind();
renderHud();
goHome();

function requestFullscreenSafe(){
  const el = document.documentElement;
  if(document.fullscreenElement) return;
  try{
    if(el.requestFullscreen){ el.requestFullscreen(); }
    else if(el.webkitRequestFullscreen){ el.webkitRequestFullscreen(); }
    else if(el.msRequestFullscreen){ el.msRequestFullscreen(); }
  }catch(e){}
}

function bind(){
  document.addEventListener('pointerdown', ()=>{ requestFullscreenSafe(); }, { once:true });

  ui.btnMissionMode.onclick = ()=>{ requestFullscreenSafe(); startMission(); };
  ui.btnListMode.onclick = ()=>{ requestFullscreenSafe(); caseState.isListMode=true; ui.subLine.textContent='挑戰模式'; show('list'); };
  ui.btnHome.onclick = goHome;
  ui.btnReset.onclick = resetAll;

  ui.tileEMT.onclick = ()=>openRole('EMT');
  ui.tileTEAM.onclick = ()=>openRole('TEAM');
  ui.tileNURSE.onclick = ()=>openRole('NURSE');

  ui.btnBriefBack.onclick = ()=>show('case');
  ui.btnStartTask.onclick = ()=>startRoleGame(caseState.activeRole);
  ui.btnRetryRole.onclick = ()=>showBrief(caseState.activeRole);
  ui.btnFinishRole.onclick = finishRole;
  ui.btnReplayCase.onclick = ()=>{ resetCaseOnly(); startMission(); };

  ui.btnExitGame.onclick = ()=>{
    closeGame();
    if(caseState.isListMode){ show('list'); toast('已返回清單'); } 
    else { show('brief'); toast('已返回任務指示'); }
  };

  if(ui.btnToggleBrief && ui.briefDetail){
    ui.btnToggleBrief.onclick = ()=>{
      const open = ui.briefDetail.classList.toggle('open');
      ui.btnToggleBrief.setAttribute('aria-expanded', open ? 'true' : 'false');
      ui.btnToggleBrief.textContent = open ? '收合詳細指引 ▴' : '展開詳細指引 ▾';
    };
  }

  const btnToggleCaseTask = document.getElementById('btnToggleCaseTask');
  if(btnToggleCaseTask){
    btnToggleCaseTask.onclick = ()=>{
      const scr = ui.scrCase;
      const open = scr.classList.toggle('taskOpen');
      btnToggleCaseTask.setAttribute('aria-expanded', open ? 'true' : 'false');
      btnToggleCaseTask.textContent = open ? '隱藏當前任務 ▴' : '查看當前任務目標 ▾';
    };
  }

  ui.gameOverlay.addEventListener('pointerdown', ()=>{ focusGameFrame(); });
}

function focusGameFrame(){
  ui.gameFrame.setAttribute('tabindex','0');
  ui.gameFrame.focus({ preventScroll:true });
  try{ ui.gameFrame.contentWindow.focus(); }catch(e){}
}

function resetAll(){
  if(!confirm('確定要重置進度與排行榜嗎？')) return;
  resetCaseOnly(); localStorage.removeItem(KEY_RANK); renderHud(); goHome(); toast('已重置');
}

function resetCaseOnly(){
  caseState.caseScore=0; caseState.currentRole='EMT';
  caseState.unlocked={EMT:true,TEAM:false,NURSE:false}; caseState.completed={EMT:false,TEAM:false,NURSE:false};
  caseState.activeRole=null; caseState.lastPerf=null; caseState.isListMode=false;
}

function goHome(){ ui.subLine.textContent='首頁：選擇模式'; show('home'); }

function show(which){
  [ui.scrHome,ui.scrList,ui.scrCase,ui.scrBrief,ui.scrRoleComplete,ui.scrCaseComplete].forEach(x=>x.classList.remove('show'));
  ({ home:ui.scrHome, list:ui.scrList, case:ui.scrCase, brief:ui.scrBrief, roleComplete:ui.scrRoleComplete, caseComplete:ui.scrCaseComplete }[which]).classList.add('show');

  // ★ 背景切換：只有在首頁時才掛上 .is-home 顯示房間圖，其他時候露出 bg_base
  if(which === 'home') {
    ui.stage.classList.add('is-home');
  } else {
    ui.stage.classList.remove('is-home');
  }

  if(which==='brief' && ui.briefDetail && ui.btnToggleBrief){
    ui.briefDetail.classList.remove('open');
    ui.btnToggleBrief.setAttribute('aria-expanded','false');
    ui.btnToggleBrief.textContent='展開詳細指引 ▾';
  }

  if(which==='case'){
    ui.scrCase.classList.remove('taskOpen');
    const btn = document.getElementById('btnToggleCaseTask');
    if(btn){ btn.setAttribute('aria-expanded','false'); btn.textContent = '查看當前任務目標 ▾'; }
  }
}

function startMission(){
  requestFullscreenSafe(); updateCaseTitle(); caseState.isListMode=false; ui.subLine.textContent='任務模式';
  ui.doctorLine.textContent='一位45歲男性病人，下午2:30在公司上班時，被同事發現右側手腳無力、語言表達困難。高度懷疑急性缺血性中風。';
  renderCaseDoctor(); show('case'); toast('任務開始：請點擊下方 EMT 進入第一關');
}

function renderHud(){ ui.caseScore.textContent = String(caseState.caseScore); }

function renderCaseDoctor(){
  setTile(ui.tileEMT,  canClickRole('EMT'));
  setTile(ui.tileTEAM, canClickRole('TEAM'));
  setTile(ui.tileNURSE,canClickRole('NURSE'));

  if(caseState.currentRole==='EMT'){ ui.caseHintTitle.textContent='【 任務1 】協助院前送醫'; } 
  else if(caseState.currentRole==='TEAM'){ ui.doctorLine.textContent='病人已順利到院。需要取栓團隊立即介入。'; ui.caseHintTitle.textContent='【 任務2 】協助取栓治療'; } 
  else if(caseState.currentRole==='NURSE'){ ui.doctorLine.textContent='已完成再通治療。接下來需要護理衛教與照護建議。'; ui.caseHintTitle.textContent='【 任務3 】協助護理衛教'; }
}

function setTile(tile, clickable){
  tile.classList.toggle('locked', !clickable); tile.classList.toggle('ready', clickable); tile.classList.toggle('active', clickable);
}
function canClickRole(role){ return caseState.currentRole===role; }
function openRole(role){ if(!canClickRole(role)) return toast('請依序完成任務'); caseState.activeRole = role; showBrief(role); }

function showBrief(role){
  const cfg = roleCfg(role);
  ui.briefAvatar.src = cfg.avatar; ui.briefWho.textContent = cfg.who; ui.briefLine.textContent = cfg.line; ui.briefTitle.textContent = cfg.title;
  ui.briefBullets.innerHTML=''; cfg.bullets.forEach(b=>{ const li=document.createElement('li'); li.textContent=b; ui.briefBullets.appendChild(li); });
  show('brief');
}

function startRoleGame(role){
  requestFullscreenSafe(); const cfg = roleCfg(role);
  ui.btnExitGame.textContent = caseState.isListMode ? '退出' : '中斷並退出';
  if(!GAME_FILES[cfg.gameId]){ toast('遊戲檔案不存在'); return; }
  caseState.lastPerf=null; ui.gameTitle.textContent = cfg.who;
  ui.gameFrame.onload = () => { focusGameFrame(); };
  ui.gameFrame.src = GAME_FILES[cfg.gameId]; ui.gameOverlay.style.display='flex'; setTimeout(focusGameFrame, 50);
  toast('遊戲開始！通關後自動結算');
}

function closeGame(){ ui.gameFrame.src=''; ui.gameOverlay.style.display='none'; }

function startListGame(gameId){
  requestFullscreenSafe(); caseState.isListMode=true; ui.btnExitGame.textContent='退出'; ui.gameTitle.textContent='挑戰模式'; ui.stageTime.textContent='—';
  ui.gameFrame.onload = () => { focusGameFrame(); }; ui.gameFrame.src = GAME_FILES[gameId]; ui.gameOverlay.style.display='flex'; setTimeout(focusGameFrame, 50);
  toast('挑戰開始！隨時可點右上角退出');
}

window.addEventListener('message',(e)=>{
  const d=e.data; if(!d || typeof d!=='object') return;
  if(d.type!=='GAME_CLEAR' && d.type!=='GAME_RESULT') return;

  if(caseState.isListMode){ toast('通關完成！'); return; }

  const role = caseState.activeRole; if(!role){ toast('發生錯誤：未指定任務'); return; }

  const cfg = roleCfg(role); const time = (typeof d.time==='number') ? Math.round(d.time) : null;
  ui.stageTime.textContent = time!=null ? `${time}s` : '完成';
  const rawScore = (typeof d.score==='number') ? d.score : null;

  if(role==='NURSE'){
    if(rawScore===null){ closeGame(); show('brief'); toast('未取得分數，請試一次'); return; }
    if(rawScore < 1500){ closeGame(); show('brief'); toast('未達標：分數需大於 1500'); return; }
  }

  const perf = { timeSec: time, score: rawScore, raw:d }; const reward = cfg.reward(perf);
  caseState.lastPerf = { role, perf, reward }; closeGame(); showRoleComplete(cfg, perf, reward);
});

function showRoleComplete(cfg, perf, reward){
  ui.rcAvatar.src = cfg.avatar; ui.rcWho.textContent = `✅ ${cfg.who}`; ui.rcLine.textContent = cfg.completeLine(perf);
  ui.rcBullets.innerHTML=''; cfg.completeBullets(perf, reward).forEach(s=>{ const li=document.createElement('li'); li.innerHTML=s; ui.rcBullets.appendChild(li); });
  show('roleComplete');
}

function finishRole(){
  const last = caseState.lastPerf; if(!last){ toast('尚未完成此任務'); return; }
  caseState.caseScore += last.reward.score; renderHud();

  if(last.role==='EMT'){ caseState.completed.EMT=true; caseState.currentRole='TEAM'; caseState.unlocked.TEAM=true; } 
  else if(last.role==='TEAM'){ caseState.completed.TEAM=true; caseState.currentRole='NURSE'; caseState.unlocked.NURSE=true; } 
  else if(last.role==='NURSE'){ caseState.completed.NURSE=true; caseState.currentRole='DONE'; finalizeCase(); return; }

  caseState.activeRole=null; caseState.lastPerf=null; renderCaseDoctor(); show('case'); toast('已解鎖下一階段');
}

function finalizeCase(){
  const entry = { name:'腦脈先鋒', score: caseState.caseScore, ts: Date.now() };
  const rank = loadRank(); rank.push(entry); rank.sort((a,b)=>b.score-a.score || a.ts-b.ts);
  const top = rank.slice(0,10); saveRank(top);

  ui.caseResultBullets.innerHTML='';
  addRes(`<strong style="color:var(--accent);font-size:18px;">總得分：${caseState.caseScore}</strong>`);
  addRes('✅ 完成流程：EMT → 取栓 → 護理');

  ui.rankTable.innerHTML='';
  top.forEach((r,i)=>{
    const tr=document.createElement('tr');
    if(i===0) tr.style.color = 'var(--warn)';
    tr.innerHTML = `<td>${i+1}</td><td>${esc(r.name)}</td><td>${r.score}</td>`;
    ui.rankTable.appendChild(tr);
  });
  show('caseComplete');
}

function addRes(t){ const li=document.createElement('li'); li.innerHTML=t; ui.caseResultBullets.appendChild(li); }

function roleCfg(role){
  if(role==='EMT'){
    return {
      avatar:'assets/emt_card.png', who:'EMT｜院前送醫',
      line:'病患需要在最短時間內送到可以取栓的醫院。你要安全、快速地把病人送到院。',
      title:'目標: 避開障礙物，盡速送醫',
      bullets:[ '🎯 最短時間安全抵達（Time is brain）', '⚠️ 碰撞會延遲時間', '🎮 點擊螢幕左右切換車道', '⚡ 點擊發射震波清除前方障礙' ],
      gameId:'race', gameDesc:'黃金送醫（競速）',
      reward:(p)=>{ const t = (p.timeSec==null)? 999 : p.timeSec; return { score: Math.max(40, Math.round(200 - t)) }; },
      completeLine:(p)=> p.timeSec!=null ? `順利到院！耗時 ${p.timeSec}s。` : '順利到院！',
      completeBullets:(p,r)=>[ `⏱ 到院耗時：<strong>${p.timeSec!=null ? p.timeSec+'s' : '—'}</strong>`, `⭐ 獲得積分：<strong>+${r.score}</strong>` ]
    };
  }
  if(role==='TEAM'){
    return {
      avatar:'assets/team_card.png', who:'取栓團隊｜血管再通',
      line:'影像顯示疑似大血管阻塞。你需要完成取栓處置，讓血流恢復。',
      title:'目標: 清除血栓',
      bullets:[ '🎯 點擊相連的血栓方塊進行消除', '🧠 達成指定分數以完成手術' ],
      gameId:'shoot', gameDesc:'血管再通治療',
      reward:(p)=>({ score: 160 }), completeLine:(p)=>'手術成功，血管已再通！',
      completeBullets:(p,r)=>[ '✅ 血管再通率：TICI 3', `⭐ 獲得積分：<strong>+${r.score}</strong>` ]
    };
  }
  return {
    avatar:'assets/nurse_card.png', who:'護理師｜預防與衛教',
    line:'預防勝於治療。完成衛教任務，強化預防觀念與照護行為。',
    title:'目標: 衛教消消樂',
    bullets:[ '🎯 分數達 1500 以上', '🧾 滑動方塊達成三個連線消除' ],
    gameId:'match-l1', gameDesc:'衛教消消樂 Lv1',
    reward:(p)=>({ score: 140 }), completeLine:(p)=>`衛教任務完成！`,
    completeBullets:(p,r)=>[ `✅ 最終分數：${p.score}`, `⭐ 獲得積分：<strong>+${r.score}</strong>` ]
  };
}

function loadRank(){ try{ const raw = localStorage.getItem(KEY_RANK); const arr = raw ? JSON.parse(raw) : []; return Array.isArray(arr) ? arr : []; }catch(_){ return []; } }
function saveRank(arr){ localStorage.setItem(KEY_RANK, JSON.stringify(arr)); }
function toast(msg){ ui.toast.textContent=msg; ui.toast.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>ui.toast.classList.remove('show'),2000); }
function qs(s){ return document.querySelector(s); }
function esc(s){ return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#39;"); }
function updateCaseTitle(){ const el = document.getElementById('caseTitleLine'); if(el) el.textContent = '醫師｜病情說明'; }
</script>
</body>
</html>
