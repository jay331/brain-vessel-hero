<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes">
<title>腦脈先鋒 - 雙軌訓練系統</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {  --bg-dark: #14110f; --gold-primary: #d4af37; --gold-dim: #8b7322;  --panel-bg: rgba(26, 22, 18, 0.85);   --text-main: #f4ecd8; --text-muted: #a99d82;  --accent-red: #d32f2f; --accent-blue: #29b6f6; --good: #3dff8e; --beginner-accent: #4fc3f7;}
html, body { margin: 0; height: 100dvh; background: #000; color: var(--text-main); font-family: "PingFang TC", sans-serif; overflow: hidden; }
* { box-sizing: border-box; }
button { font-family: inherit; cursor: pointer; user-select: none; }
input, select { font-family: inherit; background: rgba(0,0,0,0.6); border: 1px solid var(--gold-dim); color: #fff; padding: 10px; border-radius: 6px; font-size: 14px; width: 100%; outline:none;}
input[type="checkbox"] { width: auto; }
.app { height: 100%; display: flex; flex-direction: column; }

/* ===== HUD & 共用佈局 ===== */
header { padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(180deg, rgba(20,15,10,0.9), rgba(0,0,0,0.5)); border-bottom: 1px solid var(--gold-dim); z-index: 100; flex-shrink: 0; backdrop-filter: blur(4px); }
.player-info { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px; border-radius: 8px; transition: background 0.2s; background: rgba(0,0,0,0.4); border: 1px solid rgba(212,175,55,0.3); min-width: 0; flex-shrink: 1; }
.player-info:active { background: rgba(255,255,255,0.1); }
.avatar-wrap { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--gold-primary); background: #000; overflow: hidden; position: relative; flex-shrink: 0; }
.avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }
.avatar-wrap::after { content: '⚙️'; position: absolute; bottom: -2px; right: -2px; font-size: 10px; background: rgba(0,0,0,0.7); border-radius: 50%; padding: 2px; }
.player-text-wrap { display: flex; flex-direction: column; justify-content: center; align-items: flex-start; gap: 2px; overflow: hidden; }
.player-name { font-size: 13px; font-weight: 900; color: var(--gold-primary); text-shadow: 1px 1px 2px #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px; }
.level-badge { background: var(--accent-blue); color: #000; font-size: 11px; font-weight: 900; padding: 1px 6px; border-radius: 4px; border: 1px solid #fff; white-space: nowrap; }
.resources { display: flex; flex-direction: row; align-items: center; gap: 6px; flex-shrink: 0; }
.res-item { display: flex; align-items: center; gap: 4px; font-weight: 900; font-size: 13px; color: var(--text-main); background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 99px; border: 1px solid var(--gold-dim); box-shadow: 0 2px 5px rgba(0,0,0,0.5); white-space: nowrap; }
.green-coin { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; background: linear-gradient(180deg, #3dff8e, #0eb855); border-radius: 50%; color: #000; font-size: 11px; font-weight: 900; border: 1px solid #fff; }

.wrap { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; }
.stage { position: relative; width: 100%; height: 100%; overflow: hidden; display: flex; flex-direction: column; background: radial-gradient(circle at 50% 30%, rgba(212, 175, 55, 0.1), rgba(0,0,0,0.95)), linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.98)), url('https://images.unsplash.com/photo-1551076805-e1869033e561?q=80&w=800&auto=format&fit=crop') center/cover no-repeat; }
@media (min-width: 481px) { .wrap { padding: 20px; background: #111; } .stage { max-width: 414px; max-height: 896px; border-radius: 16px; border: 2px solid var(--gold-dim); box-shadow: 0 0 30px rgba(212,175,55,0.2); } }
.screen { position: absolute; inset: 0; display: none; flex-direction: column; z-index: 10; padding: 16px; overflow-y: auto; padding-bottom: 90px; }
.screen.show { display: flex; }

/* ===== 元件 ===== */
.center-title { text-align: center; font-size: 20px; font-weight: 900; color: var(--gold-primary); text-shadow: 0 0 10px rgba(212, 175, 55, 0.5), 2px 2px 4px #000; margin-bottom: 16px; letter-spacing: 1px; border-bottom: 1px solid var(--gold-dim); padding-bottom: 10px; background: rgba(0,0,0,0.5); border-radius: 8px; cursor: pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
.panel { background: var(--panel-bg); border: 2px solid var(--gold-dim); border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 10px 20px rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
.panel h2 { color: var(--gold-primary); margin: 0 0 16px 0; text-align: center; border-bottom: 1px dashed var(--gold-dim); padding-bottom: 10px; }
.btn { padding: 14px; border-radius: 6px; font-weight: 900; font-size: 16px; text-align: center; background: linear-gradient(180deg, #4a4030, #2a2218); color: var(--text-main); border: 1px solid var(--gold-dim); width: 100%; cursor:pointer; }
.btn:active { transform: scale(0.98); }

/* ===== 各項清單與 UI ===== */
.boss-banner { background: linear-gradient(90deg, rgba(180,30,30,0.9), rgba(100,10,10,0.95)); border: 2px solid #ff5252; border-radius: 8px; padding: 16px; text-align: center; margin-bottom: 20px; cursor: pointer; }
.boss-banner h3 { margin: 0; color: #fff; font-size: 18px; }
.boss-banner p { margin: 6px 0 0; font-size: 13px; color: #ffdada; }
.boss-banner.locked { filter: grayscale(100%); opacity: 0.8; pointer-events: none; border-color: #555; }
.role-card { display: flex; align-items: center; gap: 16px; padding: 10px; background: linear-gradient(90deg, rgba(42,36,30,0.95) 0%, rgba(26,22,18,0.9) 100%); border: 1px solid var(--gold-dim); border-radius: 8px; position: relative; cursor: pointer; margin-bottom: 12px;}
.role-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--gold-primary); border-radius: 8px 0 0 8px; }
.role-avatar { width: 60px; height: 60px; border-radius: 6px; border: 2px solid var(--gold-dim); background: #111; display:flex; align-items:center; justify-content:center; font-size:30px; }
.role-info { flex: 1; }
.role-name { font-size: 18px; font-weight: 900; color: var(--gold-primary); margin: 0 0 4px 0; }
.role-task { font-size: 13px; color: var(--text-muted); font-weight: bold; margin: 0; }
.subtask-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-radius: 8px; border: 1px solid var(--gold-dim); font-weight: bold; font-size: 15px; margin-bottom: 10px; }
.subtask-item.completed { background: rgba(61, 255, 142, 0.15); border-color: var(--good); color: var(--good); }
.subtask-item.active { background: rgba(212, 175, 55, 0.25); border-color: var(--gold-primary); color: #fff; cursor: pointer; }
.subtask-item.locked { background: rgba(0, 0, 0, 0.6); border-color: #444; color: #666; pointer-events: none; }
.pokedex-tabs { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; padding-bottom: 10px; margin-bottom: 10px; }
.tab-btn { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--gold-dim); background: rgba(0,0,0,0.8); color: var(--text-muted); font-weight: bold; font-size: 13px; cursor: pointer;}
.tab-btn.active { background: var(--gold-primary); color: #000; border-color: #fff; }
.card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; overflow-y: auto; padding: 4px; }
.card-item { aspect-ratio: 3 / 4; border-radius: 8px; border: 2px solid var(--gold-dim); background: linear-gradient(180deg, #2a241e, #111); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: pointer; padding: 8px; text-align: center; }
.card-item.locked { filter: grayscale(100%); opacity: 0.5; border-color: #444; background: #111; cursor: not-allowed; }
.card-item.hidden-card { border-color: var(--accent-blue); background: linear-gradient(180deg, #0a192f, #000); }

/* 底部導覽列 */
.bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; height: 75px; background: linear-gradient(180deg, rgba(42,34,24,0.95), rgba(17,14,12,0.95)); border-top: 2px solid var(--gold-dim); display: flex; justify-content: space-around; align-items: center; z-index: 100; padding: 0 5px; }
.nav-item { color: var(--text-muted); font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; width: 55px; text-align: center; }
.nav-item.active { color: var(--gold-primary); }
.nav-main { width: 65px; height: 65px; background: radial-gradient(circle, #f9d976, #b8860b); border-radius: 50%; border: 4px solid #1a1612; transform: translateY(-15px); display: flex; align-items: center; justify-content: center; color: #000; font-size: 15px; }
.nav-main.beginner { background: radial-gradient(circle, #81d4fa, #0277bd); }

/* 彈出視窗 Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; padding: 20px; z-index:5000;}
.modal-content { background: linear-gradient(180deg, #1f1b17, #0a0806); border: 2px solid var(--gold-primary); border-radius: 12px; width: 100%; max-width: 360px; padding: 24px; position: relative; text-align: center; }
.close-btn { position: absolute; top: 12px; right: 12px; background: transparent; border: none; color: var(--text-muted); font-size: 20px; z-index: 10; cursor:pointer;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="player-info" onclick="document.getElementById('profileModal').style.display='flex'">
      <div class="avatar-wrap"><img id="hudAvatar" src="https://i.pravatar.cc/150?img=11"></div>
      <div class="player-text-wrap">
        <div class="player-name" id="uiPlayerName">急救新星</div>
        <div class="level-badge" id="uiLevel" style="background:var(--gold-primary);">進階版</div>
      </div>
    </div>
    <div class="resources">
      <div class="res-item" id="hudCasesWrap"><span class="icon">👤</span> <span id="uiCases" style="color:#fff;">0 / 3125</span></div>
      <div class="res-item"><span class="green-coin">$</span> <span id="uiCoins" style="color:#fff;">38219</span></div>
    </div>
  </header>

  <div class="wrap">
    <div class="stage">
      
      <section class="screen show" id="scrHome">
        <div class="center-title" onclick="toggleMode()">
          <span id="mainTitleText">醫療指揮中心</span>
          <span style="font-size:14px; color:#ccc;">🔄 切換</span>
        </div>
        <div class="boss-banner locked" id="bossBanner" onclick="alert('綜合驗收模擬！')">
          <h3 id="bossTitleText">🚨 神內醫師 - 個案綜合驗收</h3>
          <p id="bossStatusText">需五位角色皆通關一項任務以解鎖</p>
        </div>
        <div class="role-list" id="roleListContainer"></div>
      </section>

      <section class="screen" id="scrRoleDetail" style="background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);">
        <div class="panel">
          <h2 id="detailTitle" style="margin-top:0;">任務詳情</h2>
          <div class="subtask-list" id="subtaskListContainer"></div>
        </div>
        <button class="btn" style="margin-top: auto;" onclick="showScreen('scrHome')">⬅ 返回主畫面</button>
      </section>

      <section class="screen" id="scrPokedex" style="background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);">
        <div class="panel" style="flex: 1; display: flex; flex-direction: column; overflow: hidden; border-color: var(--gold-primary);">
          <h2 style="color: var(--gold-primary); margin-top:0;">健康卡匣庫</h2>
          <div class="pokedex-tabs" id="pokedexTabs">
            <button class="tab-btn active" onclick="renderDexCards('beg', this)">初階卡</button>
            <button class="tab-btn" onclick="renderDexCards('adv', this)">進階卡</button>
            <button class="tab-btn" onclick="renderDexCards('hidden', this)">隱藏卡</button>
            <button class="tab-btn" id="tabCardGameBtn" style="display:none; background:var(--good); color:#000; border-color:#fff; font-weight:900;" onclick="launchFreeCellGame()">🃏 終極對戰</button>
          </div>
          <div class="card-grid" id="cardGrid"></div>
        </div>
      </section>
      
      <section class="screen" id="scrCaseDex" style="background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);">
        <div class="panel" style="flex: 1; display: flex; flex-direction: column; overflow: hidden; border-color: var(--gold-primary);">
          <h2 id="caseDexTitle" style="color: var(--gold-primary); margin-top:0; border-bottom: none;">圖鑑紀錄</h2>
          <div id="caseDexList" style="flex: 1; overflow-y: auto; padding-right: 4px; color:#fff;">(資料庫連線中...)</div>
        </div>
      </section>

      <section class="screen" id="scrStrokeScale" style="background: rgba(0,0,0,0.9); backdrop-filter: blur(8px);">
        <div class="panel" style="flex: 1; display: flex; flex-direction: column; overflow: hidden; border-color: var(--accent-blue);">
          <h2 style="color: var(--accent-blue); margin: 0 0 10px 0;">腦中風自評量表</h2>
          <div style="flex:1; overflow-y:auto; color:#fff; text-align:center; padding-top:20px;">
            (自評量表與名片功能已儲存於系統中，隨時可擴充)
          </div>
        </div>
      </section>

      <nav class="bottom-nav">
        <div class="nav-item" id="navPokedex" onclick="showScreen('scrPokedex'); renderDexCards('beg', document.getElementById('pokedexTabs').children[0]);">
          <div style="font-size:22px;">🗂️</div><span style="font-size:12px;">卡匣</span>
        </div>
        <div class="nav-item" id="navCaseDex" onclick="showScreen('scrCaseDex');">
          <div style="font-size:22px;" id="navCaseIcon">📁</div><span style="font-size:12px;" id="navCaseText">圖鑑</span>
        </div>
        <div class="nav-item nav-main" id="navHome" onclick="showScreen('scrHome')">任務</div>
        <div class="nav-item" id="navScale" onclick="showScreen('scrStrokeScale');">
          <div style="font-size:22px;">📋</div><span style="font-size:12px;">量表</span>
        </div>
      </nav>

    </div>
  </div>
</div>

<div class="game-overlay" id="gameOverlay" style="display:none; position:fixed; inset:0; background:#000; z-index:9999; flex-direction:column;">
  <div style="padding:10px; background:linear-gradient(180deg, #222, #000); display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--gold-dim);">
    <span id="gameTitle" style="color:var(--gold-primary); font-weight:bold; font-size:16px;">系統載入中...</span>
    <button class="btn" style="padding: 4px 10px; width:auto; font-size:12px; border-color:var(--text-muted); color:var(--text-muted);" onclick="closeGameIframe()">關閉視窗</button>
  </div>
  <iframe id="gameFrame" style="flex:1; border:none; width:100%; height:100%; background:#111;"></iframe>
</div>

<div class="modal-overlay" id="profileModal" style="z-index:5000;">
  <div class="modal-content">
    <h3 style="color:var(--gold-primary); margin: 0 0 16px 0; font-size: 22px;">腦脈先鋒 登錄</h3>
    <div style="margin-bottom:15px; text-align:left;">
      <label style="color:var(--gold-primary); font-size:13px; font-weight:bold;">輸入玩家暱稱 (輸入 ILoveFemh 解鎖全功能)</label>
      <input type="text" id="inputNickname" value="" placeholder="請輸入名字..." maxlength="15" style="margin-top:5px;">
    </div>
    <div style="display:flex; flex-direction:column; gap:12px;">
      <button class="btn" style="background: linear-gradient(180deg, #4fc3f7, #0288d1); color:#000; border-color:#b3e5fc;" onclick="saveProfile('beginner')">🔰 進入新手訓練 (病患/家屬)</button>
      <button class="btn" style="background: linear-gradient(180deg, #d4af37, #8b7322); color:#000; border-color:#f9d976;" onclick="saveProfile('advanced')">⚕️ 進入指揮中心 (醫療人員)</button>
    </div>
  </div>
</div>

<script>
// ==========================================
// 全域與資料區 (完整還原無刪減)
// ==========================================
let playerState = { mode: "beginner", coins: 0, name: "測試員", taskScoresBeg: new Map(), taskScoresAdv: new Map(), completedCasesAdv: new Map() };
const SAVE_KEY = 'BrainPioneer_SaveData_v16';

const ROLES_DATA_BEG = [
  { id: 'beg_id', name: '中風辨識', subtitle: '及早發現', icon: '🧠', totalTasks: 5, currentTask: 1, dailyAttempts: 5, subTasks: ['1. 辨識臉部不對稱 (F)', '2. 測試手臂無力 (A)', '3. 聆聽說話清晰度 (S)', '4. 記下發作時間 (T)', '5. 撥打119與就醫準備'] },
  { id: 'beg_hosp', name: '住院須知', subtitle: '急性期', icon: '🏥', totalTasks: 5, currentTask: 1, dailyAttempts: 5, subTasks: ['1. 認識腦部影像檢查', '2. 抽血與點滴的目的', '3. 防跌倒與床欄安全', '4. 吞嚥測試與安全飲食', '5. 認識您的醫療團隊'] },
  { id: 'beg_care', name: '基礎照護', subtitle: '病房起居', icon: '🤲', totalTasks: 5, currentTask: 1, dailyAttempts: 5, subTasks: ['1. 協助翻身與拍背', '2. 管路(鼻胃管/尿管)注意', '3. 協助安全上下床技巧', '4. 患側先穿/健側先脫', '5. 輪椅與助行器認識'] },
  { id: 'beg_rehab', name: '復健入門', subtitle: '早期活動', icon: '💪', totalTasks: 5, currentTask: 1, dailyAttempts: 5, subTasks: ['1. 床上被動關節活動', '2. 良姿位擺位原則', '3. 床邊坐站平衡練習', '4. 預防關節攣縮變形', '5. 鼓勵日常使用患側'] },
  { id: 'beg_home', name: '返家準備', subtitle: '長期抗戰', icon: '🏡', totalTasks: 5, currentTask: 1, dailyAttempts: 5, subTasks: ['1. 認識中風危險因子', '2. 規律服藥不擅自停藥', '3. 居家環境安全防跌', '4. 血壓與血糖居家量測', '5. 申請長照2.0資源'] }
];

const ROLES_DATA_ADV = [
  { id: 'role_emt', name: 'EMT', subtitle: '院前識別', icon: '🚑', totalTasks: 5, currentTask: 1, dailyAttempts: 5, subTasks: ['1. 基礎駕駛與鳴笛', '2. 閃避車流考驗', '3. 惡劣天候救援', '4. 複雜路口判斷', '5. 極限護送抵達'] },
  { id: 'role_dr', name: '取栓專家', subtitle: '血管再通', icon: '🩺', totalTasks: 5, currentTask: 1, dailyAttempts: 5, subTasks: ['1. 導管基礎操作', '2. 尋找阻塞點', '3. 突破血栓阻礙', '4. 支架釋放技巧', '5. 完美血流再通'] },
  { id: 'role_nurse', name: '護理師', subtitle: '急診護理', icon: '💉', totalTasks: 5, currentTask: 1, dailyAttempts: 5, subTasks: ['1. 生命徵象監測', '2. FAST指標辨識', '3. 抽血與給藥準備', '4. 突發狀況排除', '5. 高壓急診調度'] },
  { id: 'role_pt', name: '復健師', subtitle: '復健訓練', icon: '🦾', totalTasks: 5, currentTask: 1, dailyAttempts: 5, subTasks: ['1. 關節活動度評估', '2. 翻身與坐起訓練', '3. 站立平衡考驗', '4. 步態矯正與行走', '5. 日常生活功能重建'] },
  { id: 'role_diet', name: '營養師', subtitle: '健康飲食', icon: '🥗', totalTasks: 5, currentTask: 1, dailyAttempts: 5, subTasks: ['1. 認識地中海飲食', '2. 挑選優質蛋白質', '3. 避開高鈉陷阱', '4. 吞嚥困難餐食', '5. 個人化菜單設計'] }
];

function getActiveRoles() { return playerState.mode === 'beginner' ? ROLES_DATA_BEG : ROLES_DATA_ADV; }
function getActiveTaskScores() { return playerState.mode === 'beginner' ? playerState.taskScoresBeg : playerState.taskScoresAdv; }
function id(elId) { return document.getElementById(elId); }

function saveProfile(mode) {
  const name = id('inputNickname').value;
  if (!name) { alert("請輸入暱稱"); return; }
  playerState.name = name; playerState.mode = mode;
  if(name === 'ILoveFemh') {
    playerState.coins = 99999;
    for(let i=0; i<25; i++) { playerState.taskScoresBeg.set(`t_${i}`, 1000); playerState.taskScoresAdv.set(`t_${i}`, 1000); }
    alert("🔓 開發者模式啟動：已解鎖全部卡牌與新接龍對戰！");
  }
  id('profileModal').style.display = 'none'; updateModeUI();
}

function toggleMode() { playerState.mode = playerState.mode === 'beginner' ? 'advanced' : 'beginner'; updateModeUI(); }

function updateModeUI() {
  const isBeg = playerState.mode === 'beginner';
  id('mainTitleText').textContent = isBeg ? '新手訓練中心' : '醫療指揮中心';
  id('uiLevel').textContent = isBeg ? '初階版' : '進階版';
  id('uiLevel').style.background = isBeg ? 'var(--beginner-accent)' : 'var(--accent-blue)';
  id('navHome').className = isBeg ? 'nav-item nav-main beginner' : 'nav-item nav-main';
  id('hudCasesWrap').style.display = isBeg ? 'none' : 'flex';
  id('uiPlayerName').textContent = playerState.name;
  id('uiCoins').textContent = playerState.coins.toLocaleString();
  renderHomeRoles(); showScreen('scrHome');
}

function showScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('show')); id(screenId).classList.add('show');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (screenId === 'scrPokedex') id('navPokedex').classList.add('active');
  if (screenId === 'scrHome') id('navHome').classList.add('active');
  if (screenId === 'scrRoleDetail') document.querySelector('.bottom-nav').style.display = 'none';
  else document.querySelector('.bottom-nav').style.display = 'flex';
}

function renderHomeRoles() {
  const container = id('roleListContainer'); container.innerHTML = '';
  getActiveRoles().forEach(role => {
    container.innerHTML += `<div class="role-card" onclick="openRoleDetail('${role.id}')"><div class="role-avatar">${role.icon}</div><div class="role-info"><h3 class="role-name">${role.name}</h3><p class="role-task">${role.subtitle}</p></div><div class="role-status">▶</div></div>`;
  });
}

function openRoleDetail(roleId) {
  const role = getActiveRoles().find(r => r.id === roleId);
  id('detailTitle').textContent = `${role.name} - 任務詳情`;
  id('subtaskListContainer').innerHTML = role.subTasks.map((st, i) => `<div class="subtask-item active" onclick="playTask('${role.id}', ${i})"><span>${st}</span><span>▶ 挑戰</span></div>`).join('');
  showScreen('scrRoleDetail');
}

// ==========================================
// 🚀 核心功能：呼叫各類小遊戲 Iframe
// ==========================================
function playTask(roleId, taskIndex) {
  const role = getActiveRoles().find(r => r.id === roleId);
  id('gameTitle').textContent = `${role.name} - 任務 ${taskIndex+1}`;
  id('gameFrame').src = `about:blank`; // 您可以替換為真實的 game_race.html 等
  id('gameOverlay').style.display = 'flex';
  
  // 測試用：過幾秒鐘自動模擬過關 (真實情況由 iframe postMessage 觸發)
  setTimeout(() => {
    id('gameFrame').contentWindow.document.write('<h2 style="color:white; text-align:center; padding-top:50px;">遊戲運行中... (測試版)</h2>');
  }, 500);
}

function closeGameIframe() {
  id('gameOverlay').style.display = 'none';
  id('gameFrame').src = '';
}

// 監聽 iframe 傳回來的過關訊息
window.addEventListener('message', (event) => {
  if (event.data && event.data.type === 'GAME_CLEAR') {
    playerState.coins += (event.data.coins || 0);
    id('uiCoins').textContent = playerState.coins.toLocaleString();
    closeGameIframe();
    alert(`🎉 恭喜通關！獲得 ${event.data.coins || 0} 健康幣！`);
  }
  if (event.data && event.data.type === 'GAME_QUIT') {
    closeGameIframe();
  }
});

function renderDexCards(tab, btnEl) {
  Array.from(id('pokedexTabs').children).forEach(t => t.classList.remove('active')); btnEl.classList.add('active');
  const isMaster = playerState.taskScoresBeg.size >= 25 && playerState.taskScoresAdv.size >= 25;
  id('tabCardGameBtn').style.display = isMaster ? 'inline-block' : 'none';
  
  const grid = id('cardGrid'); grid.innerHTML = '';
  if (tab === 'hidden') {
    grid.innerHTML += `<div class="card-item hidden-card" onclick="alert('亞東中風中心')"><div class="card-icon">🏥</div><div class="card-title" style="color:#4fc3f7">亞東中風中心</div></div>`;
  } else {
    let sourceData = tab === 'beg' ? ROLES_DATA_BEG : ROLES_DATA_ADV;
    sourceData.forEach(role => {
      role.subTasks.forEach((st, idx) => {
        grid.innerHTML += `<div class="card-item"><div class="card-icon">${role.icon}</div><div class="card-title">${st.substring(3)}</div></div>`;
      });
    });
  }
}

// ★ 呼叫獨立的新接龍 HTML ★
function launchFreeCellGame() {
  id('gameTitle').textContent = '🃏 腦脈新接龍 (全螢幕模式)';
  id('gameFrame').src = 'game_freecell.html'; // 呼叫另一個檔案
  id('gameOverlay').style.display = 'flex';
}

window.onload = () => { id('profileModal').style.display = 'flex'; };
</script>
</body>
</html>
