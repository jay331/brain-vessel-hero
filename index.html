<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>腦脈先鋒</title>

<style>
:root{
  --bg:#060912; --panel:rgba(10,14,28,.86); --line:rgba(255,255,255,.12);
  --text:#eaf2ff; --muted:rgba(234,242,255,.72);
  --accent:#00ffe5; --good:#3dff8e; --warn:#ffd166; --bad:#ff4d6d;
}

html,body{
  margin:0; 
  height: 100dvh; 
  background:var(--bg); color:var(--text);
  font-family:"PingFang TC","Noto Sans TC",system-ui,-apple-system,sans-serif;
  overflow:hidden;
}
*{box-sizing:border-box}
button{font-family:inherit}

/* ===== Layout ===== */
.app{height:100%; display:flex; flex-direction:column;}

header{
  padding:10px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px;
  background:linear-gradient(180deg, rgba(10,14,28,.95), rgba(10,14,28,.65));
  border-bottom:1px solid var(--line);
  z-index: 100;
  flex-shrink: 0;
}
.brand{min-width:0}
.brand .t{font-weight:1000; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.brand .s{font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}

.hud{display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end}
.chip{
  padding:7px 12px; border-radius:999px; background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.10); color:var(--muted); font-size:12px
}
.chip strong{color:var(--text)}

.btn{
  appearance:none; border:0; cursor:pointer; padding:12px 14px; border-radius:14px;
  font-weight:1000; background:rgba(255,255,255,.05); color:var(--text);
  border:1px solid rgba(255,255,255,.15); font-size:14px;
  transition: transform 0.1s, filter 0.1s;
}
.btn:active{ transform: scale(0.96); }
.btn.primary{
  background:linear-gradient(180deg, rgba(0,255,229,.18), rgba(0,255,229,.06));
  border:1px solid rgba(0,255,229,.35);
  box-shadow:0 10px 24px rgba(0,255,229,.08)
}
.btn.secondary{background:rgba(255,255,255,.06)}
.btn.danger{
  background:linear-gradient(180deg, rgba(255,77,109,.18), rgba(255,77,109,.06));
  border:1px solid rgba(255,77,109,.32)
}

.wrap{
  flex:1; min-height:0; display:flex; align-items:center; justify-content:center;
  padding: 0; 
}

.stage{
  position:relative; width: 100%; height: 100%;
  overflow:hidden;
  background:
    url('assets/bg_base.png') center/cover no-repeat,
    radial-gradient(circle at 40% 12%, rgba(255,209,102,.10), rgba(0,0,0,0) 55%),
    radial-gradient(circle at 70% 35%, rgba(0,255,229,.10), rgba(0,0,0,0) 60%),
    linear-gradient(180deg, #0a1021, #070a12);
  display: flex;
  flex-direction: column;
}
.stage.is-home {
  background: url('assets/bg_home_mockup.png') center/cover no-repeat;
}
.stage.is-home .vignette { display: none; }

@media (min-width: 481px) {
  .wrap { padding: 24px; }
  .stage {
    max-width: 440px; 
    max-height: 850px;
    border-radius: 28px;
    border: 1px solid rgba(255,255,255,.15);
    box-shadow: 0 26px 80px rgba(0,0,0,.65);
  }
}

.vignette{position:absolute; inset:0; background:radial-gradient(circle at 50% 35%, rgba(0,0,0,0), rgba(0,0,0,.55) 78%); pointer-events:none;}

.content{
  position:absolute; inset:0; display:flex; flex-direction:column; padding:16px;
  z-index: 10;
  overflow-y: auto; 
}

.screen {
  flex: 0 0 auto; 
  display: none; flex-direction: column; 
  gap: 16px; 
}
.screen.show{ display:flex; }

.topTalk{
  display:flex; gap:12px; align-items:flex-start; padding:14px; border-radius:18px;
  background:var(--panel); border:1px solid rgba(255,255,255,.12);
  flex-shrink: 0;
}
.avatar{
  width:64px; height:64px; border-radius:16px; background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.10); overflow:hidden; flex:0 0 auto;
}
.avatar img{width:100%; height:100%; object-fit:cover;}
.talk{min-width:0; padding-top: 2px;}
.talk .who{font-weight:1000; font-size:15px; letter-spacing: 0.5px;}
.talk .say{margin-top:6px; color:var(--muted); font-size:13.5px; line-height:1.65;}

.midPanel{
  padding:14px; border-radius:18px; background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08); 
}
.midPanel h2{margin:0 0 10px; font-size:16px; color:var(--accent);}
.bullet{margin:0; padding-left:18px; color:var(--muted); font-size:13.5px; line-height:1.65;}
.bullet li{margin:8px 0;}

.bottomBar{
  display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap;
  padding:14px; border-radius:18px; background:rgba(10,14,28,.85); border:1px solid rgba(255,255,255,.15);
  flex-shrink: 0;
  margin-top: auto; 
}
.icons{display:flex; gap:10px; align-items:center; width: 100%;}
.actions{display:flex; gap:10px; flex-wrap:wrap; justify-content:space-between; width: 100%;}
.actions .btn { flex: 1; text-align: center; } 

.toast{
  position:absolute; left:50%; bottom:20px; transform:translateX(-50%);
  padding:12px 16px; border-radius:14px; background:rgba(10,14,28,.95);
  border:1px solid rgba(255,255,255,.15); box-shadow:0 18px 45px rgba(0,0,0,.65);
  font-size:13px; display:none; z-index:50; max-width:min(92vw,400px); text-align:center;
}
.toast.show{display:block; animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
@keyframes popUp { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }

/* ===== GAME OVERLAY ===== */
.gameOverlay{ position:fixed; inset:0; display:none; background:#000; z-index:2000; flex-direction:column; }
.gameTop{
  padding:8px 12px; display:flex; align-items:center; justify-content:space-between; gap:8px;
  background:linear-gradient(180deg, rgba(10,14,28,.95), rgba(10,14,28,.75));
  border-bottom:1px solid rgba(255,255,255,.12); z-index:20;
}
#gameFrame{ flex:1; border:0; width:100%; height:100%; background:#000; }
.gameTop .meta{ min-width:0; flex:1; }
.gameTop .meta .h{ font-weight:900; font-size:14px; line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.gameTopRight{ display:flex; align-items:center; gap:8px; flex-shrink:0; }
.miniChip{ padding:6px 10px; border-radius:999px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); color:var(--muted); font-size:12px; }
.miniChip strong{ color:var(--text); }
.miniBtn{ appearance:none; border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.1); color:var(--text); border-radius:999px; padding:7px 12px; font-size:12px; font-weight:900; cursor:pointer; }

/* ===== HOME ===== */
#scrHome{
  position:relative;
  background: url('assets/bg_home_mockup.png') center/cover no-repeat;
  margin: -16px; 
  height: calc(100% + 32px);
  flex-direction: column; justify-content: flex-end;
  padding-bottom: max(8vh, 50px); 
}
#scrHome .homeBtns{ display:flex; gap:18px; justify-content:center; padding:0 8%; z-index:9999; }
#scrHome .homeBtns button{
  flex:1; height:min(14vh, 120px); border-radius:18px;
  background: rgba(255,255,255,0.01); border: 0; cursor:pointer;
  -webkit-tap-highlight-color: transparent;
}
#scrHome .homeBtns button:active{ background: rgba(255,255,255,0.1); }

/* ===== CASE & BRIEF ===== */
#scrCase .iconTile{
  flex: 1; aspect-ratio: 1/1; max-height: 100px;
  border-radius:18px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.12);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
  cursor:pointer; position:relative;
  transition: all 0.2s;
}
#scrCase .iconTile img{ width:50%; height:50%; object-fit: contain; }
/* 移除 locked 特效以方便測試 */
#scrCase .iconTile.active{ outline:2px solid rgba(0,255,229,.6); background:rgba(0,255,229,.1); transform: scale(1.05); }
#scrCase .iconTile .lbl{ font-size: 13px; font-weight: 800; }

#scrCase .caseTitleCard{
  width:100%; border: 1px solid rgba(0,255,229,.25); border-radius: 18px; padding: 12px 16px;
  display:flex; align-items:center; justify-content: space-between;
  background: linear-gradient(180deg, rgba(0,255,229,.25), rgba(10,14,28,.86));
}
#scrCase #caseHintTitle{ font-size: 15px; font-weight: 900; line-height: 1.4; color: #fff;}

/* ★ 動態任務按鈕列表 */
#subTaskContainer { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; padding-right: 4px; }
.subTaskBtn {
    width: 100%; text-align: left; padding: 16px; 
    font-size: 14px; font-weight: 800; border-radius: 12px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
    color: var(--text); display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; transition: all 0.1s;
}
.subTaskBtn:active { background: rgba(255,255,255,0.1); transform: scale(0.98); }
/* 方便測試：移除 locked 的滑鼠阻擋，但可以保留顏色差異 */
.subTaskBtn.locked { opacity: 0.8; }
.subTaskBtn.completed { border-color: var(--good); background: rgba(61, 255, 142, 0.1); }

#scrBrief #briefTitle{
  margin: 0 0 12px 0; padding: 12px; font-size: 16px; font-weight: 900; text-align: center;
  background: linear-gradient(180deg, rgba(0,255,229,.25), rgba(10,14,28,.9));
  border: 1px solid rgba(0,255,229,.35); border-radius: 16px;
}
.full-width-btn { width: 100%; text-align: center; font-size: 15px; padding: 14px;}

@keyframes fadeIn { from { opacity: 0; transform: translateY(-10px);} to { opacity: 1; transform: translateY(0);} }

/* 排行榜表格 */
.rankTable{width:100%; border-collapse:collapse; margin-top:8px;}
.rankTable th, .rankTable td{ border-bottom:1px solid rgba(255,255,255,.08); padding:10px 6px; font-size:13px; color:var(--muted); text-align:left;}
.rankTable th{color:rgba(234,242,255,.85); font-weight:1000;}

@supports(padding:max(0px)){
  header{padding-top:max(10px, env(safe-area-inset-top));}
  .content{padding-bottom:max(16px, env(safe-area-inset-bottom));}
  .toast{bottom:calc(20px + env(safe-area-inset-bottom));}
}
</style>
</head>

<body>
<div class="app">
<header>
  <div class="brand">
    <div class="t" id="titleLine">腦脈先鋒</div>
    <div class="s" id="subLine" style="display:none"></div>
  </div>
  <div class="hud">
    <div class="chip">總積分：<strong id="caseScore">0</strong></div>
    <button class="btn secondary" style="padding: 8px 12px; font-size: 12px;" id="btnHome">首頁</button>
  </div>
</header>

<div class="wrap">
  <div class="stage is-home" id="mainStage">
    <div class="content">

      <section class="screen show" id="scrHome">
        <div class="homeBtns" aria-label="首頁模式選擇">
          <button type="button" id="btnMissionMode" aria-label="任務模式"></button>
          <button type="button" id="btnListMode" aria-label="快捷清單"></button>
        </div>
      </section>

      <section class="screen" id="scrCase">
        <div class="topTalk">
          <div class="avatar" style="width: 80px; height: 80px;"><img id="doctorAvatar" src="assets/doctor_card.png" alt=""></div>
          <div class="talk">
            <div class="who" id="caseTitleLine">總部｜任務指派</div>
            <div class="say" id="doctorLine">請選擇要進行的訓練或救援模塊。</div>
          </div>
        </div>

        <div class="midPanel" style="padding:12px; background:transparent; border:none; display:flex; flex-direction:column; flex:1; min-height:0;">
          <div id="caseTitleCard" class="caseTitleCard">
            <span id="caseHintTitle">選擇關卡</span>
          </div>
          
          <div id="subTaskContainer"></div>
        </div>

        <div class="bottomBar">
          <div class="icons" id="roleIcons" style="width: 100%; justify-content: space-between;">
            <div class="iconTile active" id="tileEMT"><img src="assets/emt_card.png" alt=""><div class="lbl">任務一: 賽車</div></div>
            <div class="iconTile" id="tileTEAM"><img src="assets/team_card.png" alt=""><div class="lbl">任務二: 取栓</div></div>
            <div class="iconTile" id="tileNURSE"><img src="assets/nurse_card.png" alt=""><div class="lbl">任務三: 護理</div></div>
          </div>
        </div>
      </section>

      <section class="screen" id="scrBrief">
        <div class="topTalk">
          <div class="avatar" style="width: 80px; height: 80px;"><img id="briefAvatar" src="assets/emt_card.png" alt=""></div>
          <div class="talk">
            <div class="who" id="briefWho">—</div>
            <div class="say" id="briefLine">—</div>
          </div>
        </div>

        <div class="midPanel" id="briefDetail">
          <h2 id="briefTitle">任務目標</h2>
          <ul class="bullet" id="briefBullets"></ul>
        </div>

        <div class="bottomBar">
          <div class="actions">
            <button class="btn secondary" id="btnBriefBack" type="button">返回選單</button>
            <button class="btn primary" id="btnStartTask" type="button">開始執行</button>
          </div>
        </div>
      </section>

      <section class="screen" id="scrRoleComplete">
        <div class="topTalk" style="align-items: center;">
          <div class="avatar" style="width: 70px; height: 70px;"><img id="rcAvatar" src="assets/emt_card.png" alt=""></div>
          <div class="talk">
            <div class="who" id="rcWho">✅ 任務完成</div>
            <div class="say" id="rcLine">—</div>
          </div>
        </div>

        <div class="midPanel">
          <h2 style="color:var(--accent); font-size: 16px;">本段結算</h2>
          <ul class="bullet" id="rcBullets" style="font-size: 14px;"></ul>
        </div>

        <div class="bottomBar">
          <div class="actions">
            <button class="btn secondary" id="btnRetryRole" type="button">刷分重來</button>
            <button class="btn primary" id="btnFinishRole" type="button">返回關卡清單</button>
          </div>
        </div>
      </section>

      <div class="toast" id="toast">—</div>
      <div class="vignette"></div>
    </div>
  </div>
</div>

<div class="gameOverlay" id="gameOverlay">
  <div class="gameTop">
    <div class="meta">
      <div class="h" id="gameTitle">執行任務</div>
    </div>
    <div class="gameTopRight">
      <div class="miniChip">耗時/分數 <strong id="stageTime">—</strong></div>
      <button class="miniBtn" id="btnExitGame" type="button">中斷退出</button>
    </div>
  </div>
  <iframe id="gameFrame" title="遊戲" allowfullscreen></iframe>
</div>

<script>
// ==========================================
// 核心設定與資料結構
// ==========================================
const KEY_RANK='BVP_MAIN_RANK_V2';

// ★ 遊戲引擎與檔案映射
const GAME_FILES = {
  'race_engine': 'game_race.html', 
  'match-l1': 'game_match_lev1.html',
  'match-l2': 'game_match_lev2.html',
  'shoot': 'game_shoot_lev1.html',
};

// ★ 所有模塊的關卡定義
const TASKS_DATA = {
    'EMT': {
        title: '任務一：駕駛與極限救援',
        desc: '包含基礎陸運、認路盲盒、全地形變形，以及三項極限挑戰模式。',
        levels: [
            { id: 'EMT_1', name: '1. 新手教學 (單純陸運)', isChallenge: false },
            { id: 'EMT_2', name: '2. 認路考驗 (字牌+變天)', isChallenge: false },
            { id: 'EMT_3', name: '3. 全地形救援 (變形+變天)', isChallenge: false },
            { id: 'EMT_4', name: '4. 最遠距離挑戰 (無盡極速)', isChallenge: true },
            { id: 'EMT_5', name: '5. 最快速度挑戰 (純競速)', isChallenge: true },
            { id: 'EMT_6', name: '6. 舒服兜風賽 (音樂盲盒)', isChallenge: true }
        ]
    },
    'TEAM': {
        title: '任務二：取栓團隊',
        desc: '進行血管再通治療，幫助病人恢復腦部血流。',
        levels: [
            { id: 'TEAM_1', name: '1. 血管再通治療 (消消樂)', isChallenge: false }
        ]
    },
    'NURSE': {
        title: '任務三：護理衛教',
        desc: '完成衛教任務，強化病人的預防觀念與照護行為。',
        levels: [
            { id: 'NURSE_1', name: '1. 衛教方塊 Lv1', isChallenge: false },
            { id: 'NURSE_2', name: '2. 衛教方塊 Lv2', isChallenge: false }
        ]
    }
};

// 狀態管理
const caseState = {
  caseScore: 0,
  activeModule: 'EMT', // 當前選中的大標籤 (EMT, TEAM, NURSE)
  activeLevelId: null, // 當前準備執行的關卡 ID
  lastPerf: null
};

// 安全獲取 DOM 元素
function id(elementId) { return document.getElementById(elementId); }

// ==========================================
// 綁定事件與初始化
// ==========================================
window.onload = () => {
    document.addEventListener('pointerdown', requestFullscreenSafe, { once:true });

    // 主選單
    id('btnMissionMode').onclick = startMission;
    id('btnListMode').onclick = startMission; // 統一導向同一個介面，因為全部都解鎖了
    id('btnHome').onclick = goHome;

    // 模塊切換標籤 (底部按鈕)
    id('tileEMT').onclick = () => switchModule('EMT');
    id('tileTEAM').onclick = () => switchModule('TEAM');
    id('tileNURSE').onclick = () => switchModule('NURSE');

    // 遊戲流程
    id('btnBriefBack').onclick = () => show('case');
    id('btnStartTask').onclick = startRoleGame;
    id('btnRetryRole').onclick = () => showBrief(caseState.activeLevelId);
    id('btnFinishRole').onclick = finishRole;

    // 退出遊戲
    id('btnExitGame').onclick = () => {
        id('gameOverlay').style.display='none';
        id('gameFrame').src='';
        show('case'); toast('已中斷任務');
    };

    id('gameOverlay').addEventListener('pointerdown', focusGameFrame);

    id('caseScore').textContent = "0";
    goHome();
};

// ==========================================
// 畫面切換邏輯
// ==========================================
function requestFullscreenSafe(){
  const el = document.documentElement;
  if(document.fullscreenElement) return;
  try{
    if(el.requestFullscreen){ el.requestFullscreen(); }
    else if(el.webkitRequestFullscreen){ el.webkitRequestFullscreen(); }
  }catch(e){}
}

function goHome(){ id('subLine').textContent='首頁：選擇模式'; show('home'); }

function show(which){
  ['scrHome','scrList','scrCase','scrBrief','scrRoleComplete','scrCaseComplete'].forEach(x=>{
      const el = id(x);
      if(el) el.classList.remove('show');
  });
  
  const targetMap = {home:'scrHome', case:'scrCase', brief:'scrBrief', roleComplete:'scrRoleComplete'};
  const target = id(targetMap[which]);
  if(target) target.classList.add('show');

  if(which === 'home') id('mainStage').classList.add('is-home');
  else id('mainStage').classList.remove('is-home');
}

function toast(msg){ 
    const el = id('toast');
    el.textContent = msg; el.classList.add('show'); 
    clearTimeout(el._t); el._t = setTimeout(()=>el.classList.remove('show'), 2000); 
}

// ==========================================
// 模塊與關卡渲染 (清單)
// ==========================================
function startMission(){
  requestFullscreenSafe(); id('subLine').textContent='任務清單';
  switchModule(caseState.activeModule); // 渲染當前選中的模塊
  show('case'); 
}

function switchModule(moduleName) {
    caseState.activeModule = moduleName;
    
    // 更新底部標籤 UI
    ['EMT', 'TEAM', 'NURSE'].forEach(m => {
        id('tile' + m).classList.toggle('active', m === moduleName);
    });

    // 更新頂部文字
    const data = TASKS_DATA[moduleName];
    id('caseHintTitle').textContent = data.title;
    id('doctorLine').textContent = data.desc;
    
    // 渲染子關卡按鈕
    const container = id('subTaskContainer');
    container.innerHTML = '';
    
    data.levels.forEach(level => {
        const btn = document.createElement('button');
        // 全部解鎖方便測試
        btn.className = `subTaskBtn`; 
        // 區分主線與挑戰的圖示
        const icon = level.isChallenge ? '🔥' : '▶';
        btn.innerHTML = `${level.name} <span>${icon}</span>`;
        btn.onclick = () => showBrief(level.id);
        container.appendChild(btn);
    });
}

// ==========================================
// 任務簡報與啟動
// ==========================================
function getLevelConfig(levelId) {
  const configs = {
    // 賽車 6 關
    'EMT_1': { avatar:'assets/emt_card.png', who:'新手上路', line:'熟悉車輛操作。沒有干擾，請在 50 秒內把車開到醫院。', title:'目標: 安全抵達', bullets:[ '🎯 距離 3500m，時限 50 秒', '🎮 點擊螢幕左右切換車道', '📢 點擊發射音波震碎前方障礙' ], gameId:'race_engine', modeParam: 'case1', reward:(p)=>{ const t = (p.timeSec==null)? 999 : p.timeSec; return { score: Math.max(10, Math.round(100 - t)) }; } },
    'EMT_2': { avatar:'assets/emt_card.png', who:'認路與變天', line:'加入字牌考驗與極端天氣！收集「亞東醫院」字牌。', title:'目標: 收集字牌並抵達', bullets:[ '🎯 距離 3500m，時限 75 秒', '👀 選對字牌可通過，選錯將倒車', '❓ 紫色盲盒會引發天氣變化' ], gameId:'race_engine', modeParam: 'case2', reward:(p)=>{ const t = (p.timeSec==null)? 999 : p.timeSec; return { score: Math.max(20, Math.round(150 - t)) }; } },
    'EMT_3': { avatar:'assets/emt_card.png', who:'全地形救援', line:'通往醫院的道路崩塌了，準備啟動海空變形模式！', title:'目標: 克服全地形', bullets:[ '🎯 距離 5000m，時限 90 秒', '🚁 穿越傳送門改變載具型態' ], gameId:'race_engine', modeParam: 'case3', reward:(p)=>{ const t = (p.timeSec==null)? 999 : p.timeSec; return { score: Math.max(30, Math.round(200 - t)) }; } },
    'EMT_4': { avatar:'assets/emt_card.png', who:'最遠距離挑戰', line:'無盡的道路，速度會越來越快，看你能撐多遠！', title:'目標: 生存與極速', bullets:[ '🎯 沒有終點，直到撞毀為止', '⚠️ 速度會隨著時間不斷提升' ], gameId:'race_engine', modeParam: 'ch_farthest', reward:(p)=>({score: 50}) },
    'EMT_5': { avatar:'assets/emt_card.png', who:'最快速度挑戰', line:'純粹的競速！用最短的時間跑完 3500m！', title:'目標: 極速抵達', bullets:[ '🎯 距離 3500m，越快越好', '⛔ 撞車會嚴重延誤時間' ], gameId:'race_engine', modeParam: 'ch_fastest', reward:(p)=>({score: 50}) },
    'EMT_6': { avatar:'assets/emt_card.png', who:'舒服兜風賽', line:'海陸空變形加上音樂盲盒，享受這趟旅程吧！', title:'目標: 享受音樂', bullets:[ '🎯 距離 5000m', '🎵 撞擊盲盒可切換不同曲風的音樂' ], gameId:'race_engine', modeParam: 'ch_music', reward:(p)=>({score: 50}) },
    // 取栓
    'TEAM_1': { avatar:'assets/team_card.png', who:'血管再通', line:'影像顯示大血管阻塞。請完成取栓處置，恢復血流。', title:'目標: 清除血栓', bullets:[ '🎯 點擊相連的血栓方塊進行消除', '🧠 達成指定分數以完成手術' ], gameId:'shoot', reward:(p)=>({ score: 160 }) },
    // 護理
    'NURSE_1': { avatar:'assets/nurse_card.png', who:'預防與衛教 Lv1', line:'預防勝於治療。完成衛教任務，強化預防觀念。', title:'目標: 衛教消消樂', bullets:[ '🎯 分數達 1500 以上', '🧾 滑動方塊達成三個連線消除' ], gameId:'match-l1', reward:(p)=>({ score: 140 }) },
    'NURSE_2': { avatar:'assets/nurse_card.png', who:'進階照護 Lv2', line:'更具挑戰性的衛教任務，需要更高的專注力。', title:'目標: 進階消消樂', bullets:[ '🎯 分數達 3000 以上', '🧾 運用特殊道具達成連線' ], gameId:'match-l2', reward:(p)=>({ score: 200 }) }
  };
  let res = configs[levelId];
  res.completeLine = (p) => `關卡 ${res.who} 已完成！`;
  res.completeBullets = (p,r) => p.timeSec!=null ? [`⏱ 耗時：<strong>${p.timeSec}s</strong>`,`⭐ 獲得積分：<strong>+${r.score}</strong>`] : [`⭐ 獲得積分：<strong>+${r.score}</strong>`];
  return res;
}

function showBrief(levelId){
  caseState.activeLevelId = levelId;
  const cfg = getLevelConfig(levelId);
  id('briefAvatar').src = cfg.avatar; id('briefWho').textContent = cfg.who; 
  id('briefLine').textContent = cfg.line; id('briefTitle').textContent = cfg.title;
  id('briefBullets').innerHTML = cfg.bullets.map(b=>`<li>${b}</li>`).join('');
  show('brief');
}

function focusGameFrame(){
  const frame = id('gameFrame');
  frame.setAttribute('tabindex','0'); frame.focus({ preventScroll:true });
  try{ frame.contentWindow.focus(); }catch(e){}
}

function startRoleGame(){
  requestFullscreenSafe(); 
  const cfg = getLevelConfig(caseState.activeLevelId);
  
  caseState.lastPerf = null; 
  id('gameTitle').textContent = cfg.who;
  id('stageTime').textContent = '—';
  
  id('gameFrame').onload = () => focusGameFrame();
  
  // ★ 判斷是否為賽車引擎，附加網址參數
  if (cfg.gameId === 'race_engine') {
      id('gameFrame').src = `${GAME_FILES[cfg.gameId]}?mode=${cfg.modeParam}`;
  } else {
      id('gameFrame').src = GAME_FILES[cfg.gameId]; 
  }
  
  id('gameOverlay').style.display='flex'; setTimeout(focusGameFrame, 50);
  toast('載入關卡中...');
}

// ==========================================
// 遊戲結算通訊
// ==========================================
window.addEventListener('message', (e) => {
  const d = e.data; 
  if(!d || typeof d!=='object') return;
  if(d.type!=='GAME_CLEAR' && d.type!=='GAME_FAILED') return;

  const cfg = getLevelConfig(caseState.activeLevelId);

  if (d.type === 'GAME_FAILED') {
      id('gameFrame').src=''; id('gameOverlay').style.display='none';
      toast(`任務失敗：${d.reason || '未達標'}`);
      show('brief'); 
      return;
  }

  // GAME_CLEAR
  const time = (typeof d.time==='number') ? Math.round(d.time) : null;
  const rawScore = (typeof d.score==='number') ? d.score : null;

  // 特殊判定: 護理分數限制
  if(caseState.activeModule === 'NURSE'){
    if(rawScore===null){ id('gameOverlay').style.display='none'; show('brief'); toast('未取得分數'); return; }
    let target = caseState.activeLevelId === 'NURSE_1' ? 1500 : 3000;
    if(rawScore < target){ id('gameOverlay').style.display='none'; show('brief'); toast(`未達標：需要 ${target} 分`); return; }
  }

  id('gameFrame').src=''; id('gameOverlay').style.display='none';

  const perf = { timeSec: time, score: rawScore, raw:d }; 
  const reward = cfg.reward(perf);
  caseState.lastPerf = { levelId: caseState.activeLevelId, perf, reward }; 
  
  showRoleComplete(cfg, perf, reward);
});

function showRoleComplete(cfg, perf, reward){
  id('rcAvatar').src = cfg.avatar; 
  id('rcWho').textContent = `✅ 過關！`; 
  id('rcLine').textContent = cfg.completeLine(perf);
  id('rcBullets').innerHTML = cfg.completeBullets(perf, reward).map(s=>`<li>${s}</li>`).join('');
  show('roleComplete');
}

function finishRole(){
  const last = caseState.lastPerf; 
  if(!last) return;
  
  caseState.caseScore += last.reward.score; 
  id('caseScore').textContent = String(caseState.caseScore);

  caseState.activeLevelId = null; 
  caseState.lastPerf = null; 
  
  // 回到任務清單畫面
  switchModule(caseState.activeModule);
  show('case'); 
  toast('已記錄成績！');
}

</script>
