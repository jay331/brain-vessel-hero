<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes">
<title>腦脈先鋒 - 雙軌訓練系統</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {  --bg-dark: #14110f; --gold-primary: #d4af37; --gold-dim: #8b7322;  --panel-bg: rgba(26, 22, 18, 0.85);   --text-main: #f4ecd8; --text-muted: #a99d82;  --accent-red: #d32f2f; --accent-blue: #29b6f6; --good: #3dff8e; --beginner-accent: #4fc3f7;}
html, body { margin: 0; height: 100dvh; background: #000; color: var(--text-main); font-family: "PingFang TC", sans-serif; overflow: hidden; }
* { box-sizing: border-box; }
button { font-family: inherit; cursor: pointer; user-select: none; }
input, select { font-family: inherit; background: rgba(0,0,0,0.6); border: 1px solid var(--gold-dim); color: #fff; padding: 8px; border-radius: 6px; font-size: 14px; width: 100%; outline:none;}
input[type="checkbox"] { width: auto; }
.app { height: 100%; display: flex; flex-direction: column; }

/* ===== HUD ===== */
header { padding: 6px 10px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(180deg, rgba(20,15,10,0.9), rgba(0,0,0,0.5)); border-bottom: 1px solid var(--gold-dim); z-index: 100; flex-shrink: 0; backdrop-filter: blur(4px); }
.player-info { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px; border-radius: 8px; transition: background 0.2s; background: rgba(0,0,0,0.4); border: 1px solid rgba(212,175,55,0.3); min-width: 0; flex-shrink: 1; }
.player-info:active { background: rgba(255,255,255,0.1); }
.avatar-wrap { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--gold-primary); background: #000; overflow: hidden; position: relative; flex-shrink: 0; }
.avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }
.avatar-wrap::after { content: '⚙️'; position: absolute; bottom: -2px; right: -2px; font-size: 10px; background: rgba(0,0,0,0.7); border-radius: 50%; padding: 2px; }
.player-text-wrap { display: flex; flex-direction: column; justify-content: center; align-items: flex-start; gap: 2px; overflow: hidden; }
.player-name { font-size: 13px; font-weight: 900; color: var(--gold-primary); text-shadow: 1px 1px 2px #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px; }
.level-badge { background: var(--accent-blue); color: #000; font-size: 10px; font-weight: 900; padding: 1px 4px; border-radius: 4px; border: 1px solid #fff; transition: transform 0.3s; white-space: nowrap; }
.resources { display: flex; flex-direction: row; align-items: center; gap: 4px; flex-shrink: 0; }
.res-item { display: flex; align-items: center; gap: 4px; font-weight: 900; font-size: 12px; color: var(--text-main); background: rgba(0,0,0,0.6); padding: 4px 6px; border-radius: 99px; border: 1px solid var(--gold-dim); box-shadow: 0 2px 5px rgba(0,0,0,0.5); white-space: nowrap; }
.green-coin { display: inline-flex; align-items: center; justify-content: center; width: 14px; height: 14px; background: linear-gradient(180deg, #3dff8e, #0eb855); border-radius: 50%; color: #000; font-size: 10px; font-weight: 900; border: 1px solid #fff; }

/* ===== 佈局與背景 ===== */
.wrap { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; }
.stage { position: relative; width: 100%; height: 100%; overflow: hidden; display: flex; flex-direction: column; background: radial-gradient(circle at 50% 30%, rgba(212, 175, 55, 0.1), rgba(0,0,0,0.95)), linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.98)), url('https://images.unsplash.com/photo-1551076805-e1869033e561?q=80&w=800&auto=format&fit=crop') center/cover no-repeat; }
@media (min-width: 481px) { .wrap { padding: 20px; background: #111; } .stage { max-width: 414px; max-height: 896px; border-radius: 16px; border: 2px solid var(--gold-dim); box-shadow: 0 0 30px rgba(212,175,55,0.2); } }
.screen { position: absolute; inset: 0; display: none; flex-direction: column; z-index: 10; padding: 10px; overflow-y: auto; padding-bottom: 80px; }
.screen.show { display: flex; }
/* 全螢幕模式 (隱藏上下列時，放寬螢幕邊距) */
.screen.full-view { padding-top: 15px; padding-bottom: 15px; }

#scrHome { padding-top: 10px; }

/* ===== 元件 ===== */
.center-title { text-align: center; font-size: 16px; font-weight: 900; color: var(--gold-primary); text-shadow: 0 0 10px rgba(212, 175, 55, 0.5), 2px 2px 4px #000; margin-bottom: 8px; letter-spacing: 1px; border-bottom: 1px solid var(--gold-dim); padding-bottom: 6px; background: rgba(0,0,0,0.5); border-radius: 8px; cursor: pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
.center-title:active { background: rgba(255,255,255,0.1); }
.panel { background: var(--panel-bg); border: 2px solid var(--gold-dim); border-radius: 12px; padding: 12px; margin-bottom: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
.panel h2 { color: var(--gold-primary); margin: 0 0 10px 0; font-size: 16px; text-align: center; border-bottom: 1px dashed var(--gold-dim); padding-bottom: 6px; }
.btn-group { display: flex; gap: 8px; flex-direction: column; }
.btn { padding: 12px; border-radius: 6px; font-weight: 900; font-size: 15px; text-align: center; background: linear-gradient(180deg, #4a4030, #2a2218); color: var(--text-main); border: 1px solid var(--gold-dim); width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.4); transition: transform 0.1s;}
.btn:active { transform: scale(0.98); }
.btn-danger { background: linear-gradient(180deg, #d32f2f, #9a0007); color: #fff; border: 1px solid #ff6666; }
.btn-success { background: linear-gradient(180deg, #3dff8e, #0eb855); color: #000; border: 1px solid #afffcd; box-shadow: 0 0 15px rgba(61,255,142,0.4); }

/* ===== 任務列表與 Boss (改為舒壓藍色) ===== */
.boss-banner { background: linear-gradient(90deg, rgba(16, 55, 94, 0.9), rgba(8, 28, 48, 0.95)); border: 1px solid var(--accent-blue); border-radius: 8px; padding: 10px; text-align: center; margin-bottom: 10px; cursor: pointer; box-shadow: 0 4px 10px rgba(41, 182, 246, 0.2); transition: filter 0.3s; }
.boss-banner h3 { margin: 0; color: #81d4fa; font-size: 15px; text-shadow: 1px 1px 2px #000; }
.boss-banner p { margin: 4px 0 0; font-size: 11px; color: #e0f7fa; }
.boss-banner.locked { filter: grayscale(100%); opacity: 0.8; pointer-events: none; border-color: #555; box-shadow: none; }

/* 壓縮主頁任務清單高度以防捲動 */
.role-list { display: flex; flex-direction: column; gap: 6px; }
.role-card { display: flex; align-items: center; gap: 12px; padding: 6px 12px; background: linear-gradient(90deg, rgba(42,36,30,0.95) 0%, rgba(26,22,18,0.9) 100%); border: 1px solid var(--gold-dim); border-radius: 8px; position: relative; cursor: pointer; margin-bottom: 0px;}
.role-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--gold-primary); border-radius: 8px 0 0 8px; }
.role-avatar { width: 40px; height: 40px; border-radius: 6px; border: 2px solid var(--gold-dim); background: #111; display:flex; align-items:center; justify-content:center; font-size:22px; }
.role-info { flex: 1; }
.role-name { font-size: 15px; font-weight: 900; color: var(--gold-primary); margin: 0 0 2px 0; text-shadow: 1px 1px 2px #000; }
.role-task { font-size: 11px; color: var(--text-muted); font-weight: bold; margin: 0; }
.role-status { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 16px; }

.subtask-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.subtask-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-radius: 8px; border: 1px solid var(--gold-dim); font-weight: bold; font-size: 14px; transition: all 0.2s; }
.subtask-item.completed { background: rgba(61, 255, 142, 0.15); border-color: var(--good); color: var(--good); }
.subtask-item.active { background: rgba(212, 175, 55, 0.25); border-color: var(--gold-primary); color: #fff; cursor: pointer; box-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
.subtask-item.locked { background: rgba(0, 0, 0, 0.6); border-color: #444; color: #666; pointer-events: none; }
.task-stat { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--gold-dim); border-radius: 6px; margin-bottom: 12px; }

/* ===== 排行榜、圖鑑、量表共用 ===== */
.pokedex-tabs { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; padding-bottom: 8px; margin-bottom: 8px; }
.tab-btn { padding: 4px 10px; border-radius: 16px; border: 1px solid var(--gold-dim); background: rgba(0,0,0,0.8); color: var(--text-muted); font-weight: bold; font-size: 12px; transition: all 0.2s; cursor:pointer;}
.tab-btn.active { background: var(--gold-primary); color: #000; border-color: #fff; box-shadow: 0 0 10px rgba(212,175,55,0.5); }
.card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; overflow-y: auto; padding: 4px; }
.card-item { aspect-ratio: 3 / 4; border-radius: 8px; border: 2px solid var(--gold-dim); background: linear-gradient(180deg, #2a241e, #111); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: pointer; transition: transform 0.1s; padding: 6px; text-align: center; }
.card-icon { font-size: 24px; margin-bottom: 4px; }
.card-title { font-size: 10px; font-weight: bold; color: var(--text-main); line-height: 1.2; }
.card-item.locked { filter: grayscale(100%); opacity: 0.5; border-color: #444; background: #111; cursor: not-allowed; }
.card-item.hidden-card { border-color: var(--accent-blue); background: linear-gradient(180deg, #0a192f, #000); box-shadow: 0 0 15px rgba(41,182,246,0.3); }

.case-dex-item { background: rgba(255,255,255,0.05); border: 1px solid var(--gold-dim); border-radius: 8px; padding: 10px; margin-bottom: 8px; display: flex; flex-direction: column; gap: 6px; }
.case-dex-id { color: var(--gold-primary); font-weight: 900; font-size: 15px; border-bottom: 1px dashed rgba(212,175,55,0.3); padding-bottom: 4px; display: flex; justify-content: space-between; }
.case-score-badge { color: var(--good); font-size: 12px; font-weight: bold; background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 4px; }
.case-dex-details { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-main); flex-wrap: wrap; gap: 4px; }
.case-dex-role { display: flex; align-items: center; gap: 4px; background: rgba(0,0,0,0.5); padding: 2px 4px; border-radius: 4px; font-size: 10px;}
.lb-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: rgba(255,255,255,0.1); border: 1px solid var(--gold-dim); border-radius: 8px; margin-bottom:8px;}

/* 底部導覽列 */
.bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; height: 75px; background: linear-gradient(180deg, rgba(42,34,24,0.95), rgba(17,14,12,0.95)); border-top: 2px solid var(--gold-dim); display: flex; justify-content: space-around; align-items: center; z-index: 100; box-shadow: 0 -4px 15px rgba(0,0,0,0.8); backdrop-filter: blur(5px); padding: 0 5px; }
.nav-item { color: var(--text-muted); font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; transition: color 0.2s; width: 55px; text-align: center; }
.nav-item.active { color: var(--gold-primary); }
.nav-main { width: 60px; height: 60px; background: radial-gradient(circle, #f9d976, #b8860b); border-radius: 50%; border: 4px solid #1a1612; transform: translateY(-15px); display: flex; align-items: center; justify-content: center; color: #000; font-size: 14px; box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); transition: background 0.3s;}
.nav-main.beginner { background: radial-gradient(circle, #81d4fa, #0277bd); box-shadow: 0 0 15px rgba(41, 182, 246, 0.4); }

/* 中風名片樣式 (壓縮) */
.business-card { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); border-radius: 12px; padding: 15px; color: #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.5); border: 1px solid #4fc3f7; position: relative; overflow: hidden; margin-top: 5px;}
.business-card::after { content: '🏥'; position: absolute; right: -10px; bottom: -20px; font-size: 80px; opacity: 0.1; }
.bc-title { font-size: 16px; font-weight: bold; border-bottom: 2px solid rgba(255,255,255,0.3); padding-bottom: 6px; margin-bottom: 10px; display:flex; justify-content:space-between;}
.bc-row { display: flex; margin-bottom: 6px; font-size: 13px;}
.bc-label { width: 70px; color: #b3e5fc; font-weight:bold; }
.bc-val { flex: 1; font-weight:bold; text-shadow: 1px 1px 2px #000;}
.tag-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px;}
.tag { background: rgba(0,0,0,0.5); border: 1px solid #4fc3f7; padding: 2px 6px; border-radius: 10px; font-size: 10px; }
.profile-input-group { display: flex; flex-direction: column; gap: 4px; text-align: left; margin-bottom: 10px; }
.profile-input-group label { color: var(--gold-primary); font-size: 12px; font-weight: bold; }

/* 中風量表精靈與趨勢 UI (壓縮) */
.wizard-container { display: flex; flex-direction: column; height: 100%; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.wizard-header { font-size: 16px; color: var(--accent-blue); font-weight: bold; margin-bottom: 12px; text-align: center; line-height: 1.3; }
.wizard-progress { font-size: 11px; color: var(--text-muted); text-align: center; margin-bottom: 6px; }
.wizard-option { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.6); border: 1px solid var(--accent-blue); padding: 12px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }
.wizard-option:active { transform: scale(0.98); background: rgba(41, 182, 246, 0.2); }
.wizard-option .icon { font-size: 20px; flex-shrink: 0; width: 26px; text-align: center; }
.wizard-option .text { font-size: 13px; color: #fff; line-height: 1.3; }
.trend-card { background: rgba(0,0,0,0.6); border: 1px solid #444; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
.health-dist-box { margin-bottom: 10px; }
.health-dist-title { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-main); margin-bottom: 4px; }
.health-dist-bar-bg { width: 100%; height: 6px; background: #222; border-radius: 3px; overflow: hidden; }
.health-dist-bar-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }

/* Modal 彈出視窗 */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; padding: 15px; z-index:5000;}
.modal-content { background: linear-gradient(180deg, #1f1b17, #0a0806); border: 2px solid var(--gold-primary); border-radius: 12px; width: 100%; max-width: 360px; padding: 20px; position: relative; box-shadow: 0 0 30px rgba(212,175,55,0.5); text-align: center; max-height: 90vh; overflow-y:auto; }
.close-btn { position: absolute; top: 10px; right: 10px; background: transparent; border: none; color: var(--text-muted); font-size: 20px; z-index: 10; cursor:pointer;}
</style>
</head>
<body>
<div class="app">
  <header id="mainHeader">
    <div class="player-info" onclick="document.getElementById('profileModal').style.display='flex'">
      <div class="avatar-wrap"><img id="hudAvatar" src="https://i.pravatar.cc/150?img=11"></div>
      <div class="player-text-wrap">
        <div class="player-name" id="uiPlayerName">急救新星</div>
        <div class="level-badge" id="uiLevel" style="background:var(--gold-primary);">進階版</div>
      </div>
    </div>
    <div class="resources">
      <div class="res-item" id="hudCasesWrap"><span class="icon">👤</span> <span id="uiCases" style="color:#fff;">0 / 3125</span></div>
      <div class="res-item"><span class="green-coin">$</span> <span id="uiCoins" style="color:#fff;">38219</span></div>
    </div>
  </header>

  <div class="wrap">
    <div class="stage">
      
      <section class="screen show" id="scrHome">
        <div class="center-title" onclick="toggleMode()" title="點擊切換模式">
          <span id="mainTitleText">醫療指揮中心</span>
          <span style="font-size:12px; color:#ccc;">🔄 切換</span>
        </div>
        <div class="boss-banner locked" id="bossBanner" onclick="openBossPrep()">
          <h3 id="bossTitleText">🚨 神內醫師 - 個案綜合驗收</h3>
          <p id="bossStatusText">需五位角色皆通關一項任務以解鎖</p>
        </div>
        <div class="role-list" id="roleListContainer"></div>
      </section>

      <section class="screen" id="scrRoleDetail" style="background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);">
        <div class="panel" style="flex:1; display:flex; flex-direction:column;">
          <h2 id="detailTitle" style="margin-top:0;">任務詳情</h2>
          <div class="subtask-list" id="subtaskListContainer" style="flex:1; overflow-y:auto;"></div>
          <div class="task-stat" style="margin-bottom:0;">
            <span class="label">剩餘挑戰機會</span>
            <span class="value" id="detailAttempts">OOOOO</span>
          </div>
        </div>
        <div class="panel" id="rescuePanel" style="border-color: var(--accent-red); display: none;">
          <h3 style="color: #ffaaaa; margin:0 0 10px 0; text-align:center; font-size:14px;">⚠️ 今日機會已用盡</h3>
          <div class="btn-group">
            <button class="btn" style="padding:10px; border-color: var(--good); color: var(--good);" onclick="readEduCard()">📖 閱讀衛教 (+3次)</button>
            <button class="btn" style="padding:10px; border-color: var(--gold-primary); color: var(--gold-primary);" onclick="buyAttempt()"><span class="green-coin" style="width:14px;height:14px;font-size:10px;margin-right:4px;">$</span> 100 健康幣 (+3次)</button>
          </div>
        </div>
        <button class="btn" style="margin-top: auto; flex-shrink:0;" onclick="showScreen('scrHome')">⬅ 返回主畫面</button>
      </section>

      <section class="screen" id="scrPokedex" style="background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);">
        <div class="panel" style="flex: 1; display: flex; flex-direction: column; overflow: hidden; border-color: var(--gold-primary); margin-bottom: 10px;">
          <h2 style="color: var(--gold-primary); margin:0 0 10px 0; border-bottom: none;">健康卡匣庫</h2>
          <div class="pokedex-tabs" id="pokedexTabs">
            <button class="tab-btn active" onclick="renderDexCards('beg', this)">初階卡</button>
            <button class="tab-btn" onclick="renderDexCards('adv', this)">進階卡</button>
            <button class="tab-btn" onclick="renderDexCards('hidden', this)">隱藏卡</button>
            <button class="tab-btn" id="tabCardGameBtn" style="display:none; background:var(--good); color:#000; border-color:#fff; font-weight:900;" onclick="launchFreeCellGame()">🃏 終極對戰</button>
          </div>
          <div class="card-grid" id="cardGrid"></div>
        </div>
        <button class="btn" style="margin-top: auto; flex-shrink:0;" onclick="showScreen('scrHome')">⬅ 返回首頁</button>
      </section>
      
      <section class="screen" id="scrCaseDex" style="background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);">
        <div class="panel" style="flex: 1; display: flex; flex-direction: column; overflow: hidden; border-color: var(--gold-primary); margin-bottom: 10px;">
          <h2 id="caseDexTitle" style="color: var(--gold-primary); margin-top:0; border-bottom: none;">圖鑑紀錄</h2>
          <div id="caseDexList" style="flex: 1; overflow-y: auto; padding-right: 4px;"></div>
        </div>
        <button class="btn" style="margin-top: auto; flex-shrink:0;" onclick="showScreen('scrHome')">⬅ 返回首頁</button>
      </section>

      <section class="screen" id="scrLeaderboard" style="background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);">
        <div class="panel" style="flex: 1; display: flex; flex-direction: column; overflow: hidden; border-color: var(--gold-primary); margin-bottom: 10px;">
          <h2 style="color: var(--gold-primary); margin:top:0; border-bottom: none;">全院排行榜</h2>
          <div id="lbListTotal" style="display: flex; flex-direction: column; gap: 8px; overflow-y: auto; padding-right: 4px;"></div>
        </div>
        <button class="btn" style="margin-top: auto; flex-shrink:0;" onclick="showScreen('scrHome')">⬅ 返回首頁</button>
      </section>

      <section class="screen" id="scrStrokeCard" style="background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);">
        <div class="panel" style="flex: 1; display: flex; flex-direction: column; overflow: hidden; border-color: var(--beginner-accent); margin-bottom: 10px;">
          <h2 style="color: var(--beginner-accent); margin-top:0; border-bottom: 1px dashed rgba(79, 195, 247, 0.3);">我的中風名片</h2>
          <p style="font-size:11px; color:var(--text-muted); text-align:center; margin-top:-8px; margin-bottom:8px;">記錄您的重要資訊，方便就醫與照護交接</p>
          <div style="flex:1; overflow-y:auto; padding-right:4px;">
            <div id="scDisplayMode" style="display:none;">
              <div class="business-card" id="bcView"></div>
              <button class="btn" style="margin-top: 12px; background:transparent; border:1px solid #4fc3f7; color:#4fc3f7;" onclick="toggleScEdit(true)">✏️ 編輯名片資訊</button>
            </div>

const SAVE_KEY = 'BrainPioneer_SaveData_v17'; // 更新存檔避免衝突

function saveGameData() {
  const dataToSave = {
    hasSetup: playerState.hasSetup, name: playerState.name, avatar: playerState.avatar, mode: playerState.mode, coins: playerState.coins, 
    bossUnlockedBeg: playerState.bossUnlockedBeg, bossUnlockedAdv: playerState.bossUnlockedAdv,
    completedCasesBeg: Array.from(playerState.completedCasesBeg.entries()), completedCasesAdv: Array.from(playerState.completedCasesAdv.entries()),
    taskScoresBeg: Array.from(playerState.taskScoresBeg.entries()), taskScoresAdv: Array.from(playerState.taskScoresAdv.entries()),
    scaleRecords: playerState.scaleRecords, strokeCard: playerState.strokeCard,
    roleProgressBeg: ROLES_DATA_BEG.map(r => ({ id: r.id, currentTask: r.currentTask, dailyAttempts: r.dailyAttempts })),
    roleProgressAdv: ROLES_DATA_ADV.map(r => ({ id: r.id, currentTask: r.currentTask, dailyAttempts: r.dailyAttempts }))
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(dataToSave));
}

function loadGameData() {
  const savedJSON = localStorage.getItem(SAVE_KEY);
  if (savedJSON) {
    try {
      const parsed = JSON.parse(savedJSON);
      playerState.hasSetup = parsed.hasSetup || false;
      if(parsed.name) playerState.name = parsed.name;
      if(parsed.avatar) playerState.avatar = parsed.avatar;
      if(parsed.mode) playerState.mode = parsed.mode;
      if(parsed.coins !== undefined) playerState.coins = parsed.coins;
      if(parsed.strokeCard) playerState.strokeCard = parsed.strokeCard;
      if(parsed.scaleRecords) playerState.scaleRecords = parsed.scaleRecords;
      
      if(parsed.completedCasesBeg) playerState.completedCasesBeg = new Map(parsed.completedCasesBeg);
      if(parsed.completedCasesAdv) playerState.completedCasesAdv = new Map(parsed.completedCasesAdv);
      if(parsed.taskScoresBeg) playerState.taskScoresBeg = new Map(parsed.taskScoresBeg);
      if(parsed.taskScoresAdv) playerState.taskScoresAdv = new Map(parsed.taskScoresAdv);
      
      if (parsed.roleProgressBeg) parsed.roleProgressBeg.forEach(rp => { const r = ROLES_DATA_BEG.find(x => x.id === rp.id); if(r) { r.currentTask = rp.currentTask; r.dailyAttempts = rp.dailyAttempts; }});
      if (parsed.roleProgressAdv) parsed.roleProgressAdv.forEach(rp => { const r = ROLES_DATA_ADV.find(x => x.id === rp.id); if(r) { r.currentTask = rp.currentTask; r.dailyAttempts = rp.dailyAttempts; }});
      return true;
    } catch(e) { console.error('讀檔失敗', e); }
  }
  return false;
}

// ⭐️ 核心：負責開關全螢幕模式
function showScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('show')); 
  const target = id(screenId);
  target.classList.add('show');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  
  if (screenId === 'scrPokedex') id('navPokedex').classList.add('active');
  if (screenId === 'scrCaseDex') id('navCaseDex').classList.add('active');
  if (screenId === 'scrLeaderboard' || screenId === 'scrStrokeCard') id('navLeaderboard').classList.add('active');
  if (screenId === 'scrStrokeScale') id('navScale').classList.add('active');
  
  // 如果是首頁，顯示上方與下方導覽列
  if (screenId === 'scrHome') {
    id('navHome').classList.add('active');
    id('mainHeader').style.display = 'flex';
    id('mainNav').style.display = 'flex';
    target.classList.remove('full-view');
  } else {
    // 不是首頁 -> 全部進入全螢幕！
    id('mainHeader').style.display = 'none';
    id('mainNav').style.display = 'none';
    target.classList.add('full-view');
  }
}

function updateHUD() { 
  id('uiCoins').textContent = playerState.coins.toLocaleString(); 
  id('uiCases').textContent = `${playerState.completedCasesAdv.size} / 3125`; 
  id('uiPlayerName').textContent = playerState.name; 
  checkBossUnlock();
}

function renderHomeRoles() {
  const container = id('roleListContainer'); container.innerHTML = '';
  getActiveRoles().forEach(role => {
    const isCompleted = role.currentTask > role.totalTasks;
    const progressText = isCompleted ? '✅ 全部通關' : `進度 ${role.currentTask - 1}/${role.totalTasks}`;
    const card = document.createElement('div'); card.className = 'role-card';
    card.onclick = () => { activeRoleId = role.id; openRoleDetail(role.id); };
    card.innerHTML = `<div class="role-avatar">${role.icon}</div><div class="role-info"><h3 class="role-name">${role.name}</h3><p class="role-task">${role.subtitle} | ${progressText}</p></div><div class="role-status">${isCompleted ? '🟢' : '▶'}</div>`;
    container.appendChild(card);
  });
}

function openRoleDetail(roleId) { 
  const role = getActiveRoles().find(r => r.id === roleId);
  id('detailTitle').textContent = `${role.name} - 任務詳情`;
  const container = id('subtaskListContainer'); container.innerHTML = '';
  for(let i=0; i<role.totalTasks; i++) {
    let statusClass = 'locked', icon = '🔒', action = '';
    if (i+1 < role.currentTask) { statusClass = 'completed'; icon = '✅'; action = `onclick="playTask(${i})"`; }
    else if (i+1 === role.currentTask) { statusClass = 'active'; icon = '▶ 點擊挑戰'; action = `onclick="playTask(${i})"`; }
    if (role.currentTask > role.totalTasks) { statusClass = 'active'; icon = '▶ 再次複習'; action = `onclick="playTask(${i})"`;}
    container.innerHTML += `<div class="subtask-item ${statusClass}" ${action}><span>${role.subTasks[i]}</span><span>${icon}</span></div>`;
  }
  let attemptStr = ''; for(let i=0; i<role.dailyAttempts; i++) attemptStr += '🟢';
  id('detailAttempts').textContent = attemptStr || '無';
  id('rescuePanel').style.display = role.dailyAttempts <= 0 ? 'block' : 'none';
  showScreen('scrRoleDetail'); 
}

// 🚀 負責呼叫 iframe 遊戲
function playTask(taskIndex) {
  const role = getActiveRoles().find(r => r.id === activeRoleId);
  if (role.dailyAttempts <= 0) { alert("今日機會已用盡！"); return; }
  
  const gameId = `${role.id}_${taskIndex}`;
  const gameUrl = GAME_URLS[gameId];

  if (gameUrl) {
    role.dailyAttempts--; saveGameData(); updateHUD(); openRoleDetail(activeRoleId);
    currentGameInfo = { id: gameId, role: role, taskIndex: taskIndex };
    id('gameTitle').textContent = `${role.name} - ${role.subTasks[taskIndex].substring(3)}`;
    id('gameFrame').src = gameUrl;
    id('gameOverlay').style.display = 'flex';
  } else {
    role.dailyAttempts--;
    if(confirm(`[系統演練] 尚未綁定遊戲檔案，進入模擬演練：\n【${role.subTasks[taskIndex]}】\n\n按下「確定」代表順利過關！`)) {
      handleGameClear(1000); 
    } else {
      alert(`❌ 挑戰失敗，扣除 1 次機會。再接再厲！`);
      saveGameData(); updateHUD(); openRoleDetail(activeRoleId);
    }
  }
}

function forceQuitGame() {
  if (confirm("確定要緊急撤退嗎？(已經扣除的挑戰機會不會歸還)")) {
    id('gameOverlay').style.display = 'none'; id('gameFrame').src = ''; currentGameInfo = null; openRoleDetail(activeRoleId);
  }
}

function closeGameIframe() {
  id('gameOverlay').style.display = 'none'; id('gameFrame').src = '';
}

function handleGameClear(score) {
  const info = currentGameInfo || { id: `${activeRoleId}_0`, role: getActiveRoles().find(r => r.id === activeRoleId), taskIndex: 0 };
  getActiveTaskScores().set(info.id, score); 
  playerState.coins += 50;
  if (info.role.currentTask === info.taskIndex + 1) info.role.currentTask++;
  saveGameData(); updateHUD(); openRoleDetail(activeRoleId);
  alert(`🎉 任務成功！得分：${score} 分\n獲得 50 健康幣，並解鎖了對應的【健康卡匣】！`);
}

// 接收遊戲回傳結果
window.addEventListener('message', (event) => {
  if (event.data && event.data.type === 'GAME_CLEAR') {
    closeGameIframe(); 
    
    // 如果是新接龍傳來的 (沒有 currentGameInfo)
    if (!currentGameInfo && event.data.coins) {
      playerState.coins += event.data.coins;
      updateHUD(); saveGameData();
      alert(`🎉 恭喜破關腦脈新接龍！\n獲得 ${event.data.coins} 健康幣！`);
      return;
    }
    
    handleGameClear(event.data.score || 1000); 
    currentGameInfo = null;
  } else if (event.data && event.data.type === 'GAME_OVER') {
    closeGameIframe(); alert('❌ 任務失敗，請再接再厲！'); currentGameInfo = null; openRoleDetail(activeRoleId);
  }
});

function checkBossUnlock() {
  const isUnlocked = getActiveRoles().every(r => r.currentTask > 1);
  const banner = id('bossBanner');
  if (isUnlocked) { banner.classList.remove('locked'); id('bossStatusText').textContent = '🟢 已解鎖 (點擊進入驗收)'; } 
  else { banner.classList.add('locked'); id('bossStatusText').textContent = '需五位角色皆通關一項任務以解鎖'; }
}

function openBossPrep() { 
  if(!getActiveRoles().every(r => r.currentTask > 1)) return;
  let possibleCombos = []; let maxIndices = getActiveRoles().map(role => Math.min(role.currentTask - 1, 5));
  function generate(currentIndex, currentCombo) {
    if (currentIndex === 5) { possibleCombos.push(currentCombo); return; }
    for (let i = 1; i <= maxIndices[currentIndex]; i++) { generate(currentIndex + 1, currentCombo + i.toString()); }
  }
  generate(0, "");
  const completed = getActiveCompletedCases();
  let newCombos = possibleCombos.filter(c => !completed.has(c));
  let selectedComboStr = newCombos.length > 0 ? newCombos[Math.floor(Math.random() * newCombos.length)] : possibleCombos[Math.floor(Math.random() * possibleCombos.length)];
  if (confirm(`🚨 系統警報 🚨\n即將執行連續 5 項任務的綜合演練...\n本次目標編號：#C-${selectedComboStr}\n\n按「確定」模擬順利過關！`)) {
    if (Math.floor(800 + Math.random() * 200) > (completed.get(selectedComboStr) || 0)) completed.set(selectedComboStr, Math.floor(800 + Math.random() * 200));
    playerState.coins += 500; saveGameData(); updateHUD();
    alert(`🏆 完美救援！個案演練 ${selectedComboStr} 成功！\n獲得 500 健康幣！快去圖鑑查看吧。`);
  } else { alert(`🚨 失誤過多，演練失敗。`); }
}

function startScaleWizard() { currentQIndex = 0; currentAnswers = {}; renderWizardQuestion(); }
function renderWizardQuestion() {
  const container = id('wizardContent'); const q = scaleQuestions[currentQIndex]; container.style.animation = 'none'; container.offsetHeight; container.style.animation = 'fadeIn 0.3s ease';
  let html = `<div class="wizard-progress">第 ${currentQIndex + 1} / ${scaleQuestions.length} 題</div><div class="wizard-header">${q.title}</div>`;
  if (q.type === 'choice') { q.options.forEach(opt => { html += `<div class="wizard-option" onclick="handleOptionSelect('${q.id}', ${opt.val})"><div class="icon">${opt.icon}</div><div class="text">${opt.text}</div></div>`; }); } else if (q.type === 'slider') { html += `<div style="background:rgba(0,0,0,0.6); padding:20px; border-radius:8px; border:1px solid var(--accent-blue); text-align:center; margin-bottom: 20px;"><div style="font-size:36px; font-weight:bold; color:var(--good); margin-bottom:10px;" id="vasValDisplay">80%</div><input type="range" id="vasSlider" min="0" max="100" value="80" style="width:100%; height:8px; border-radius:4px; appearance:none; background:#444; outline:none;" oninput="document.getElementById('vasValDisplay').innerText=this.value+'%'"><div style="display:flex; justify-content:space-between; color:var(--text-muted); font-size:12px; margin-top:8px;"><span>0 (最差)</span><span>100 (最健康)</span></div></div><button class="btn" style="background:var(--accent-blue); color:#000;" onclick="handleSliderSelect()">確認儲存</button>`; }
  container.innerHTML = html;
}
function handleOptionSelect(qId, val) { currentAnswers[qId] = val; nextQuestion(); }
function handleSliderSelect() { currentAnswers['vas'] = parseInt(id('vasSlider').value); nextQuestion(); }
function nextQuestion() { currentQIndex++; if (currentQIndex < scaleQuestions.length) setTimeout(() => { renderWizardQuestion(); }, 150); else finishScaleWizard(); }
function finishScaleWizard() {
  const todayDateStr = new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' });
  const newRecord = { id: Date.now(), date: todayDateStr, mrs: currentAnswers.mrs, eqSum: currentAnswers.eq1+currentAnswers.eq2+currentAnswers.eq3+currentAnswers.eq4+currentAnswers.eq5, vas: currentAnswers.vas };
  const existingIndex = playerState.scaleRecords.findIndex(r => r.date === todayDateStr);
  if (existingIndex !== -1) { playerState.scaleRecords[existingIndex] = newRecord; alert("💾 今日評估紀錄已成功更新覆蓋！"); } else { playerState.scaleRecords.unshift(newRecord); playerState.coins += 100; updateHUD(); alert("💾 評估已完成儲存！\n🎉 感謝定期追蹤，獲得 100 健康幣！"); }
  saveGameData(); switchScaleTab('list');
}

function renderScaleList() {

  playerState.scaleRecords.forEach(record => {
    const mrsHealthPct = Math.max(5, ((6 - record.mrs) / 6) * 100); const eqHealthPct = Math.max(5, ((25 - record.eqSum) / 20) * 100); const vasHealthPct = Math.max(5, record.vas);
    const getBarColor = (pct) => pct >= 80 ? 'var(--good)' : (pct >= 50 ? '#ffd166' : 'var(--accent-red)');
    container.innerHTML += `<div class="trend-card"><div class="trend-date-header">📅 記錄日期：${record.date}</div><div class="health-dist-box"><div class="health-dist-title"><span>mRS 失能狀態 (級數:${record.mrs})</span><span style="color:${getBarColor(mrsHealthPct)}; font-weight:bold;">康復度 ${Math.round(mrsHealthPct)}%</span></div><div class="health-dist-bar-bg"><div class="health-dist-bar-fill" style="width:${mrsHealthPct}%; background:${getBarColor(mrsHealthPct)};"></div></div></div><div class="health-dist-box"><div class="health-dist-title"><span>EQ-5D-5L 總分 (${record.eqSum}/25)</span><span style="color:${getBarColor(eqHealthPct)}; font-weight:bold;">健康度 ${Math.round(eqHealthPct)}%</span></div><div class="health-dist-bar-bg"><div class="health-dist-bar-fill" style="width:${eqHealthPct}%; background:${getBarColor(eqHealthPct)};"></div></div></div><div class="health-dist-box" style="margin-bottom:0;"><div class="health-dist-title"><span>EQ VAS 整體自評自覺度 (${record.vas}分)</span><span style="color:${getBarColor(vasHealthPct)}; font-weight:bold;">${record.vas}%</span></div><div class="health-dist-bar-bg"><div class="health-dist-bar-fill" style="width:${vasHealthPct}%; background:${getBarColor(vasHealthPct)};"></div></div></div></div>`;
  });
  setTimeout(() => { document.querySelectorAll('.health-dist-bar-fill').forEach(bar => { const w = bar.style.width; bar.style.width = '0%'; setTimeout(() => { bar.style.width = w; }, 50); }); }, 100);
}

function renderScaleChart() {
  const chartContainer = id('chartContainer'); if (playerState.scaleRecords.length === 0) { chartContainer.innerHTML = '<p style="text-align:center; color:var(--text-muted); margin-top:30px;">尚無足夠紀錄繪製趨勢圖。</p>'; return; }
  chartContainer.innerHTML = `<div class="chart-container" style="display:block; margin: 0;"><h3 style="color:#fff; font-size:14px; margin:0 0 10px 0; text-align:center;">長期復原趨勢分析</h3><canvas id="trendChart" width="100" height="60"></canvas></div>`;
  const chartData = [...playerState.scaleRecords].reverse(); const ctx = id('trendChart').getContext('2d'); if (trendChartInstance) trendChartInstance.destroy();
  trendChartInstance = new Chart(ctx, { type: 'line', data: { labels: chartData.map(r => r.date.substring(5)), datasets: [{ label: 'mRS 康復度', data: chartData.map(r => Math.max(5, ((6 - r.mrs) / 6) * 100)), borderColor: '#3dff8e', backgroundColor: 'rgba(61,255,142,0.1)', borderWidth: 2, fill: true }, { label: 'EQ 健康度', data: chartData.map(r => Math.max(5, ((25 - r.eqSum) / 20) * 100)), borderColor: '#29b6f6', backgroundColor: 'rgba(41,182,246,0.1)', borderWidth: 2, fill: true }, { label: 'VAS 自覺度', data: chartData.map(r => Math.max(5, r.vas)), borderColor: '#ffd166', backgroundColor: 'rgba(255,209,102,0.1)', borderWidth: 2, fill: true }]}, options: { responsive: true, interaction: { mode: 'index', intersect: false }, scales: { y: { min: 0, max: 100, ticks: { color: '#a99d82' }, grid: { color: 'rgba(255,255,255,0.1)' } }, x: { ticks: { color: '#a99d82' }, grid: { display: false } } }, plugins: { legend: { labels: { color: '#f4ecd8' }, position: 'top' } } } });
}
</script>
</body>
