<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes">
<title>腦脈先鋒 - 雙軌訓練系統</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* ===== 動態主題變數 ===== */
body.mode-advanced {
  --theme-primary: #d4af37;
  --theme-dim: #8b7322;
  --theme-bg: rgba(212, 175, 55, 0.1);
  --theme-panel: rgba(26, 22, 18, 0.85);
  --theme-grad: linear-gradient(90deg, rgba(42,36,30,0.95), rgba(26,22,18,0.9));
  --btn-text: #000;
  --btn-shadow: none;
}
body.mode-beginner {
  --theme-primary: #1e88e5; 
  --theme-dim: #0d47a1;
  --theme-bg: rgba(30, 136, 229, 0.15);
  --theme-panel: rgba(10, 20, 35, 0.9);
  --theme-grad: linear-gradient(90deg, rgba(13,71,161,0.8), rgba(10,20,35,0.95));
  --btn-text: #fff;
  --btn-shadow: 1px 1px 2px rgba(0,0,0,0.8);
}

:root { --good: #3dff8e; --text-main: #f4ecd8; --text-muted: #a99d82; --accent-red: #d32f2f; }
html, body { margin: 0; height: 100dvh; background: #000; color: var(--text-main); font-family: "PingFang TC", sans-serif; overflow: hidden; }
* { box-sizing: border-box; }
button { font-family: inherit; cursor: pointer; user-select: none; }
input, select { font-family: inherit; background: rgba(0,0,0,0.6); border: 1px solid var(--theme-dim); color: #fff; padding: 8px; border-radius: 6px; font-size: 14px; width: 100%; outline:none;}
input[type="checkbox"] { width: auto; }
.app { height: 100%; display: flex; flex-direction: column; }

/* ===== HUD 標題列 ===== */
header { padding: 4px 8px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(180deg, rgba(0,0,0,0.9), rgba(0,0,0,0.5)); border-bottom: 1px solid var(--theme-dim); z-index: 100; flex-shrink: 0; backdrop-filter: blur(4px); }
.player-info { display: flex; align-items: center; gap: 8px; }
.avatar-wrap { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--theme-primary); background: #000; overflow: hidden; position: relative; cursor: pointer;}
.avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }
.player-text-wrap { display: flex; flex-direction: column; justify-content: center; gap: 2px; }
.player-name { font-size: 11px; font-weight: bold; color: #fff; }
.level-badge { background: var(--theme-primary); color: var(--btn-text); font-size: 11px; font-weight: 900; padding: 2px 6px; border-radius: 4px; cursor: pointer; box-shadow: 0 0 8px var(--theme-bg); display:inline-flex; align-items:center; gap:4px; text-shadow: var(--btn-shadow);}
.level-badge:active { transform: scale(0.95); }
.resources { display: flex; flex-direction: row; align-items: center; gap: 4px; flex-shrink: 0; }
.res-item { display: flex; align-items: center; gap: 4px; font-weight: 900; font-size: 11px; background: rgba(0,0,0,0.6); padding: 4px 6px; border-radius: 99px; border: 1px solid var(--theme-dim); box-shadow: 0 2px 5px rgba(0,0,0,0.5); white-space: nowrap; }
.green-coin { display: inline-flex; align-items: center; justify-content: center; width: 12px; height: 12px; background: linear-gradient(180deg, #3dff8e, #0eb855); border-radius: 50%; color: #000; font-size: 9px; }

/* ===== 佈局與背景 ===== */
.wrap { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; }
.stage { position: relative; width: 100%; height: 100%; overflow: hidden; display: flex; flex-direction: column; background: radial-gradient(circle at 50% 30%, var(--theme-bg), rgba(0,0,0,0.95)), linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.98)), url('https://images.unsplash.com/photo-1551076805-e1869033e561?q=80&w=800&auto=format&fit=crop') center/cover no-repeat; }
@media (min-width: 481px) { .wrap { padding: 20px; background: #111; } .stage { max-width: 414px; max-height: 896px; border-radius: 16px; border: 2px solid var(--theme-dim); box-shadow: 0 0 30px var(--theme-bg); } }

/* 畫面切換控制 */
.screen { position: absolute; inset: 0; display: none; flex-direction: column; z-index: 10; padding: 10px; overflow-y: auto; padding-bottom: 80px; }
.screen.show { display: flex; }
.screen.full-view { padding-top: 10px; padding-bottom: 10px; z-index: 200; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }

/* ===== 元件 ===== */
.panel { background: var(--theme-panel); border: 1px solid var(--theme-dim); border-radius: 10px; padding: 12px; margin-bottom: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; flex: 1;}
.panel h2 { color: var(--theme-primary); margin: 0 0 10px 0; font-size: 16px; text-align: center; border-bottom: 1px dashed var(--theme-dim); padding-bottom: 6px; flex-shrink: 0;}
.btn { padding: 12px; border-radius: 6px; font-weight: 900; font-size: 15px; text-align: center; background: linear-gradient(180deg, #444, #222); color: #fff; border: 1px solid #666; width: 100%; cursor:pointer; flex-shrink: 0;}
.btn:active { transform: scale(0.95); }

/* ===== 主畫面 (動態高度等比例均分，絕對不捲動) ===== */
#scrHome { padding: 6px 8px 75px 8px; justify-content: center; overflow: hidden; display: flex; flex-direction: column; gap: 6px; } 

.role-list { display: flex; flex-direction: column; gap: 6px; margin: 0; flex: 5;} /* 佔據 5 份空間 */

.role-card { display: flex; align-items: center; gap: 10px; padding: 0 12px; background: var(--theme-grad); border: 1px solid var(--theme-dim); border-radius: 8px; position: relative; cursor: pointer; flex: 1;} /* 自動彈性撐高 */
.role-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--theme-primary); border-radius: 8px 0 0 8px; }
.role-avatar { width: 38px; height: 38px; border-radius: 6px; border: 1px solid var(--theme-dim); background: #000; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink: 0;}
.role-info { flex: 1; display: flex; flex-direction: column; justify-content: center;}
.role-name { font-size: 15px; font-weight: 900; color: var(--theme-primary); margin: 0 0 2px 0; text-shadow: 1px 1px 2px #000; line-height: 1.2;}
.role-task { font-size: 11px; color: #fff; font-weight: bold; margin: 0; opacity: 1; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); line-height: 1.2;}
.role-status { font-size: 16px; color: var(--theme-primary); flex-shrink: 0;}

.boss-banner { background: var(--theme-panel); border: 2px solid var(--theme-primary); border-radius: 8px; padding: 0; display:flex; flex-direction: column; justify-content: center; text-align: center; margin: 0; cursor: pointer; box-shadow: 0 0 10px var(--theme-bg); flex: 1;} /* 佔據 1 份空間 */
.boss-banner h3 { margin: 0; color: var(--theme-primary); font-size: 15px; }
.boss-banner p { margin: 2px 0 0; font-size: 11px; color: #ccc; }
.boss-banner.locked { filter: grayscale(100%); opacity: 0.6; border-color: #555; box-shadow: none; pointer-events: none;}

/* 任務詳情內頁 */
.subtask-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; overflow-y:auto; flex:1;}
.subtask-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-radius: 8px; border: 1px solid var(--theme-dim); font-weight: bold; font-size: 14px; transition: all 0.2s; flex-shrink: 0;}
.subtask-item.completed { background: rgba(61, 255, 142, 0.1); border-color: var(--good); color: var(--good); }
.subtask-item.active { background: linear-gradient(135deg, var(--theme-primary), var(--theme-dim)); border: 2px solid #fff; color: var(--btn-text); text-shadow: var(--btn-shadow); cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5), 0 0 15px var(--theme-primary); transform: scale(1.02); z-index:2; }
.subtask-item.locked { background: rgba(0, 0, 0, 0.6); border-color: #333; color: #666; pointer-events: none; }
.task-stat { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(0,0,0,0.5); border-radius: 6px; margin-bottom: 10px; font-size:13px; border: 1px solid var(--theme-dim); flex-shrink: 0;}

/* ===== 卡匣共用 ===== */
.pokedex-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 6px; flex-wrap: nowrap; scrollbar-width: none; justify-content:center; flex-shrink: 0;}
.pokedex-tabs::-webkit-scrollbar { display: none; }
.tab-btn { flex-shrink: 0; padding: 6px 12px; border-radius: 20px; border: 1px solid var(--theme-dim); background: rgba(0,0,0,0.8); color: #ccc; font-weight: bold; font-size: 12px; cursor:pointer;}
.tab-btn.active { background: var(--theme-primary); color: var(--btn-text); border-color: #fff; text-shadow: var(--btn-shadow); box-shadow: 0 0 10px rgba(212,175,55,0.5); }
.card-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; overflow-y: auto; padding: 2px; align-content: flex-start;}
.card-item { aspect-ratio: 3 / 4; border-radius: 6px; border: 1px solid var(--theme-dim); background: linear-gradient(180deg, #2a241e, #111); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; text-align: center; padding:4px;}
.card-icon { font-size: 20px; margin-bottom: 2px; }
.card-title { font-size: 9px; font-weight: bold; line-height: 1.2; padding:0 2px;}
.card-item.locked { filter: grayscale(100%); opacity: 0.3; }

/* ===== 極簡個案與排行榜 ===== */
.case-dex-item { background: rgba(0,0,0,0.4); border: 1px solid var(--theme-dim); border-radius: 8px; padding: 8px 12px; margin-bottom: 6px; display: flex; flex-direction: row; justify-content: space-between; align-items: center; cursor:pointer; flex-shrink: 0;}
.case-dex-id { color: var(--theme-primary); font-weight: bold; font-size: 14px; }
.case-score-badge { color: var(--good); font-size: 11px; font-weight: bold; background: transparent; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--good);}
.lb-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: rgba(0,0,0,0.4); border: 1px solid var(--theme-dim); border-radius: 8px; margin-bottom:6px; flex-shrink: 0;}

/* ===== 中風名片 ===== */
.business-card { background: linear-gradient(135deg, var(--theme-dim), #000); border-radius: 12px; padding: 15px; color: #fff; box-shadow: 0 8px 16px rgba(0,0,0,0.8); position: relative; overflow: hidden; border: 1px solid var(--theme-primary); flex-shrink: 0;}
.business-card::after { content: '🏥'; position: absolute; right: -10px; bottom: -20px; font-size: 80px; opacity: 0.05; }
.bc-title { font-size: 15px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 6px; margin-bottom: 10px; display:flex; justify-content:space-between; color:var(--theme-primary);}
.bc-row { display: flex; margin-bottom: 6px; font-size: 12px;}
.bc-label { width: 70px; color: #ccc; }
.bc-val { flex: 1; font-weight:bold; }
.tag-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px;}
.tag { background: rgba(0,0,0,0.5); border: 1px solid var(--theme-primary); padding: 2px 6px; border-radius: 10px; font-size: 10px; }

/* ===== 量表精靈 ===== */
.wizard-header { font-size: 15px; color: var(--theme-primary); font-weight: bold; margin-bottom: 8px; text-align: center; }
.wizard-option { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.6); border: 1px solid var(--theme-dim); padding: 10px 12px; border-radius: 8px; margin-bottom: 6px; cursor: pointer; flex-shrink: 0;}
.wizard-option:active { background: var(--theme-bg); }
.wizard-option .icon { font-size: 18px; width: 22px; text-align: center; }
.wizard-option .text { font-size: 13px; color: #fff; }
.trend-card { background: rgba(0,0,0,0.5); border: 1px solid var(--theme-dim); border-radius: 8px; padding: 10px; margin-bottom: 8px; flex-shrink: 0;}

/* 底部導覽列 */
.bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; height: 65px; background: rgba(10,10,10,0.95); border-top: 1px solid #333; display: flex; justify-content: space-around; align-items: center; z-index: 100; backdrop-filter: blur(5px); }
.nav-item { color: #888; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; width: 50px; }
.nav-item.active { color: var(--theme-primary); }
.nav-main { width: 55px; height: 55px; background: var(--theme-dim); border-radius: 50%; border: 3px solid #000; transform: translateY(-10px); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; box-shadow: 0 0 15px rgba(0,0,0,0.5);}

/* 彈出視窗 */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 5000; padding: 15px;}
.modal-content { background: var(--theme-panel); border: 1px solid var(--theme-primary); border-radius: 12px; width: 100%; max-width: 320px; padding: 20px; position: relative; text-align: center; max-height: 90vh; overflow-y:auto; }
.close-btn { position: absolute; top: 10px; right: 10px; background: transparent; border: none; color: #aaa; font-size: 18px; cursor:pointer;}
</style>
</head>
<body class="mode-beginner">
<div class="app">
  <header id="mainHeader">
    <div class="player-info">
      <div class="avatar-wrap" onclick="document.getElementById('profileModal').style.display='flex'"><img id="hudAvatar" src="https://i.pravatar.cc/150?img=11"></div>
      <div class="player-text-wrap">
        <div class="player-name" id="uiPlayerName">急救新星</div>
        <div class="level-badge" id="uiLevel" onclick="toggleMode()">初階版 🔄</div>
      </div>
    </div>
    <div class="resources">
      <div class="res-item" id="hudCasesWrap" style="display:none;"><span class="icon">👤</span> <span id="uiCases" style="color:#fff;">0</span></div>
      <div class="res-item"><span class="green-coin">$</span> <span id="uiCoins" style="color:#fff;">38219</span></div>
    </div>
  </header>

  <div class="wrap">
    <div class="stage">
      
      <section class="screen show" id="scrHome">
        <div class="role-list" id="roleListContainer"></div>
        <div class="boss-banner locked" id="bossBanner" onclick="openBossPrep()">
          <h3 id="bossTitleText">🛡️ 居家演練 - 綜合情境驗收</h3>
          <p id="bossStatusText">需五位角色皆通關一項任務以解鎖</p>
        </div>
      </section>

      <section class="screen" id="scrRoleDetail">
        <div class="panel">
          <h2 id="detailTitle">任務詳情</h2>
          <div class="subtask-list" id="subtaskListContainer"></div>
          <div class="task-stat">
            <span>剩餘機會</span> <span id="detailAttempts" style="color:var(--good)">OOOOO</span>
          </div>
        </div>
        <button class="btn" onclick="showScreen('scrHome')">⬅ 返回主畫面</button>
      </section>

      <section class="screen" id="scrPokedex">
        <div class="panel">
          <div style="display:none; justify-content:center; margin-bottom:8px; flex-shrink:0;" id="cardGameWrap">
            <button class="btn btn-success" id="tabCardGameBtn" style="padding:10px; font-size:14px; width:100%; border:none; box-shadow:0 0 10px rgba(61,255,142,0.4);" onclick="launchFreeCellGame()">🃏 卡牌挑戰</button>
          </div>
          <div class="pokedex-tabs" id="pokedexTabs">
            <button class="tab-btn active" onclick="renderDexCards('beg', this)">初階卡</button>
            <button class="tab-btn" onclick="renderDexCards('adv', this)">進階卡</button>
            <button class="tab-btn" onclick="renderDexCards('hidden', this)">隱藏卡</button>
          </div>
          <div class="card-grid" id="cardGrid"></div>
        </div>
        <button class="btn" onclick="showScreen('scrHome')">⬅ 返回首頁</button>
      </section>
      
      <section class="screen" id="scrCaseDex">
        <div class="panel">
          <h2 id="caseDexTitle">個案圖鑑</h2>
          <div id="caseDexList" style="flex: 1; overflow-y: auto;"></div>
        </div>
        <button class="btn" onclick="showScreen('scrHome')">⬅ 返回首頁</button>
      </section>

      <section class="screen" id="scrLeaderboard">
        <div class="panel">
          <h2 style="color: var(--theme-primary); margin-top:0; border-bottom: none;">全院排行榜</h2>
          <div class="pokedex-tabs" id="lbTabs">
            <button class="tab-btn active" onclick="renderTotalScoreLeaderboard('cases', this)">救治個案數</button>
            <button class="tab-btn" onclick="renderTotalScoreLeaderboard('adv', this)">進階任務</button>
            <button class="tab-btn" onclick="renderTotalScoreLeaderboard('beg', this)">初階任務</button>
          </div>
          <div id="lbListTotal" style="flex: 1; overflow-y: auto; padding-right: 4px;"></div>
        </div>
        <button class="btn" onclick="showScreen('scrHome')">⬅ 返回首頁</button>
      </section>

      <section class="screen" id="scrStrokeCard">
        <div class="panel">
          <h2>我的中風名片</h2>
          <div style="flex:1; overflow-y:auto;">
            <div id="scDisplayMode" style="display:none;">
              <div class="business-card" id="bcView"></div>
              <button class="btn" style="margin-top: 15px; background:transparent; border:1px solid var(--theme-primary); color:var(--theme-primary);" onclick="toggleScEdit(true)">✏️ 編輯名片資訊</button>
            </div>
            <div id="scEditMode">
              <div style="font-size:12px; color:#aaa; margin-bottom:10px;">記錄重要資訊，方便就醫交接</div>
              <input type="date" id="scDate" style="margin-bottom:8px;">
              <select id="scType" style="margin-bottom:8px;"><option value="" disabled selected>中風類型...</option><option value="缺血性中風 (腦梗塞)">缺血性中風 (腦梗塞)</option><option value="出血性中風 (腦溢血)">出血性中風 (腦溢血)</option><option value="暫時性腦缺血 (TIA)">暫時性腦缺血 (TIA)</option></select>
              <input type="text" id="scLocation" placeholder="阻塞/出血部位 (選填)" style="margin-bottom:8px;">
              <div style="display:grid; grid-template-columns: 1fr 1fr; gap:6px; font-size:12px; color:#fff; background:rgba(0,0,0,0.4); padding:10px; border-radius:6px; border:1px solid #444;">
                <label><input type="checkbox" name="scRisk" value="高血壓"> 高血壓</label><label><input type="checkbox" name="scRisk" value="糖尿病"> 糖尿病</label><label><input type="checkbox" name="scRisk" value="高血脂"> 高血脂</label><label><input type="checkbox" name="scRisk" value="心房顫動"> 心房顫動</label><label><input type="checkbox" name="scRisk" value="抽菸"> 抽菸</label><label><input type="checkbox" name="scRisk" value="家族病史"> 家族病史</label>
              </div>
              <button class="btn" style="background:var(--theme-primary); color:var(--btn-text); text-shadow:var(--btn-shadow); border:none; margin-top:12px;" onclick="saveStrokeCard()">💾 儲存名片</button>
            </div>
          </div>
        </div>
        <button class="btn" onclick="showScreen('scrHome')">⬅ 返回首頁</button>
      </section>

      <section class="screen" id="scrStrokeScale">
        <div class="panel">
          <h2>中風自評量表追蹤</h2>
          <div class="pokedex-tabs" style="justify-content: center;">
            <button class="tab-btn" id="btnScaleForm" onclick="switchScaleTab('form')">開始評估</button>
            <button class="tab-btn" id="btnScaleList" onclick="switchScaleTab('list')">填寫紀錄</button>
            <button class="tab-btn" id="btnScaleTrend" onclick="switchScaleTab('trend')">變化趨勢</button>
          </div>
          <div id="scaleFormView" style="overflow-y:auto; flex:1;"><div id="wizardContent" class="wizard-container"></div></div>
          <div id="scaleListView" style="display:none; overflow-y:auto; flex:1;"><div id="trendListContainer"></div></div>
          <div id="scaleTrendView" style="display:none; overflow-y:auto; flex:1;"><div id="chartContainer"></div></div>
        </div>
        <button class="btn" onclick="showScreen('scrHome')">⬅ 返回首頁</button>
      </section>

      <nav class="bottom-nav" id="mainNav">
        <div class="nav-item" id="navPokedex" onclick="showScreen('scrPokedex'); renderDexCards(playerState.mode === 'beginner' ? 'beg' : 'adv', document.getElementById('pokedexTabs').children[playerState.mode === 'beginner' ? 0 : 1]);">
          <div style="font-size:20px;">🗂️</div><span style="font-size:10px;">健康卡匣</span>
        </div>
        <div class="nav-item" id="navCaseDex" onclick="showScreen('scrCaseDex'); renderCaseDex();">
          <div style="font-size:20px;">📁</div><span style="font-size:10px;" id="navCaseText">圖鑑</span>
        </div>
        <div class="nav-item nav-main" id="navHome" onclick="showScreen('scrHome')">任務</div>
        <div class="nav-item" id="navLeaderboard" onclick="navBtn4Action()">
          <div style="font-size:20px;">📇</div><span style="font-size:10px;" id="navLbText">名片</span>
        </div>
        <div class="nav-item" id="navScale" onclick="navScaleAction()">
          <div style="font-size:20px;">📋</div><span style="font-size:10px;">自評量表</span>
        </div>
      </nav>

    </div>
  </div>
</div>

<div class="game-overlay" id="gameOverlay" style="display:none; position:fixed; inset:0; background:#000; z-index:9999; flex-direction:column;">
  <div style="padding:10px; background:linear-gradient(180deg, #222, #000); display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #444;">
    <span id="gameTitle" style="color:#fff; font-weight:bold; font-size:14px;">遊戲載入中...</span>
    <button class="btn" style="padding: 4px 10px; width:auto; font-size:11px; background:transparent; color:#aaa; border-color:#555;" onclick="closeGameIframe()">✖ 關閉</button>
  </div>

function id(elId) { return document.getElementById(elId); }

const SAVE_KEY = 'BrainPioneer_SaveData_v30';

function saveGameData() {
  const dataToSave = {
    hasSetup: playerState.hasSetup, name: playerState.name, avatar: playerState.avatar, mode: playerState.mode, coins: playerState.coins, 
    completedCasesBeg: Array.from(playerState.completedCasesBeg.entries()), completedCasesAdv: Array.from(playerState.completedCasesAdv.entries()),
    taskScoresBeg: Array.from(playerState.taskScoresBeg.entries()), taskScoresAdv: Array.from(playerState.taskScoresAdv.entries()),
    scaleRecords: playerState.scaleRecords, strokeCard: playerState.strokeCard,
    roleProgressBeg: ROLES_DATA_BEG.map(r => ({ id: r.id, currentTask: r.currentTask, dailyAttempts: r.dailyAttempts })),
    roleProgressAdv: ROLES_DATA_ADV.map(r => ({ id: r.id, currentTask: r.currentTask, dailyAttempts: r.dailyAttempts }))
  };
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(dataToSave)); } catch(e) {}
}

function loadGameData() {
  try {
    const savedJSON = localStorage.getItem(SAVE_KEY);
    if (savedJSON) {
      const parsed = JSON.parse(savedJSON);
      playerState.hasSetup = parsed.hasSetup || false;
      if(parsed.name) playerState.name = parsed.name;
      if(parsed.avatar) playerState.avatar = parsed.avatar;
      if(parsed.mode) playerState.mode = parsed.mode;
      if(parsed.coins !== undefined) playerState.coins = parsed.coins;
      if(parsed.strokeCard) playerState.strokeCard = parsed.strokeCard;
      if(parsed.scaleRecords) playerState.scaleRecords = parsed.scaleRecords;
      
      if(parsed.completedCasesBeg) playerState.completedCasesBeg = new Map(parsed.completedCasesBeg);
      if(parsed.completedCasesAdv) playerState.completedCasesAdv = new Map(parsed.completedCasesAdv);
      if(parsed.taskScoresBeg) playerState.taskScoresBeg = new Map(parsed.taskScoresBeg);
      if(parsed.taskScoresAdv) playerState.taskScoresAdv = new Map(parsed.taskScoresAdv);
      
      if (parsed.roleProgressBeg) parsed.roleProgressBeg.forEach(rp => { const r = ROLES_DATA_BEG.find(x => x.id === rp.id); if(r) { r.currentTask = rp.currentTask; r.dailyAttempts = rp.dailyAttempts; }});
      if (parsed.roleProgressAdv) parsed.roleProgressAdv.forEach(rp => { const r = ROLES_DATA_ADV.find(x => x.id === rp.id); if(r) { r.currentTask = rp.currentTask; r.dailyAttempts = rp.dailyAttempts; }});
      return true;
    }
  } catch(e) {}
  return false;
}

function saveProfile(selectedMode) {
  try {
    const nameInput = id('inputNickname').value.trim();

    playerState.name = nameInput; playerState.mode = selectedMode; playerState.avatar = id('previewAvatar').src; playerState.hasSetup = true;
    
    if (nameInput === "ILoveFemh") {
      playerState.coins = 99999;
      ROLES_DATA_BEG.forEach(r => { r.currentTask = 6; r.subTasks.forEach((st, i) => playerState.taskScoresBeg.set(`${r.id}_${i}`, 1000)); });
      ROLES_DATA_ADV.forEach(r => { r.currentTask = 6; r.subTasks.forEach((st, i) => playerState.taskScoresAdv.set(`${r.id}_${i}`, 1000)); });

      alert("🔓 開發者模式啟動：已解鎖全部任務、圖鑑與新接龍對戰！");

    saveGameData(); updateModeUI(); id('profileModal').style.display = 'none';

function handleGameClear(score) {
  const info = currentGameInfo;
  if(!info) return;
  getActiveTaskScores().set(info.id, score); 
  playerState.coins += 50;
  if (info.role.currentTask === info.taskIndex + 1) info.role.currentTask++;
  saveGameData(); updateHUD(); openRoleDetail(activeRoleId);
  alert(`🎉 任務成功！得分：${score} 分\n獲得 50 健康幣，並解鎖對應卡片！`);
  currentGameInfo = null;
}

window.addEventListener('message', (event) => {
  if (event.data && event.data.type === 'GAME_CLEAR') {
    closeGameIframe(); 
    if (!currentGameInfo && event.data.coins) {
      playerState.coins += event.data.coins; updateHUD(); saveGameData();
      alert(`🎉 恭喜破關腦脈新接龍！\n獲得 ${event.data.coins} 健康幣！`); return;
    }
    handleGameClear(event.data.score || 1000); 
  } else if (event.data && event.data.type === 'GAME_OVER') {
    closeGameIframe(); alert('❌ 任務失敗，請再接再厲！'); currentGameInfo = null; openRoleDetail(activeRoleId);
  }
});

function openBossPrep() { 
  if(!getActiveRoles().every(r => r.currentTask > 1)) return;
  let possibleCombos = []; let maxIndices = getActiveRoles().map(role => Math.min(role.currentTask - 1, 5));
  function generate(currentIndex, currentCombo) {
    if (currentIndex === 5) { possibleCombos.push(currentCombo); return; }
    for (let i = 1; i <= maxIndices[currentIndex]; i++) { generate(currentIndex + 1, currentCombo + i.toString()); }
  }
  generate(0, "");
  const completed = getActiveCompletedCases();
  let newCombos = possibleCombos.filter(c => !completed.has(c));
  let selectedComboStr = newCombos.length > 0 ? newCombos[Math.floor(Math.random() * newCombos.length)] : possibleCombos[Math.floor(Math.random() * possibleCombos.length)];
  if (confirm(`🚨 系統警報 🚨\n即將執行連續 5 項任務的綜合演練...\n本次目標編號：#C-${selectedComboStr}\n\n按「確定」模擬順利過關！`)) {
    if (Math.floor(800 + Math.random() * 200) > (completed.get(selectedComboStr) || 0)) completed.set(selectedComboStr, Math.floor(800 + Math.random() * 200));
    playerState.coins += 500; saveGameData(); updateHUD();
    alert(`🏆 完美救援！個案演練 ${selectedComboStr} 成功！\n獲得 500 健康幣！`);
  } else { alert(`🚨 失誤過多，演練失敗。`); }
}

    id('scDisplayMode').style.display = 'block'; id('scEditMode').style.display = 'none';
    const sc = playerState.strokeCard; let risksHTML = sc.risks.map(r => `<span class="tag">${r}</span>`).join('');
    id('bcView').innerHTML = `<div class="bc-title"><span>📝 專屬識別卡</span></div><div class="bc-row"><span class="bc-label">姓名</span><span class="bc-val">${playerState.name}</span></div><div class="bc-row"><span class="bc-label">發病日期</span><span class="bc-val">${sc.date || '未填寫'}</span></div><div class="bc-row"><span class="bc-label">中風類型</span><span class="bc-val">${sc.type || '未填寫'}</span></div><div class="bc-row"><span class="bc-label">影響部位</span><span class="bc-val">${sc.location || '未填寫'}</span></div><div style="margin-top:8px; border-top:1px dashed rgba(255,255,255,0.2); padding-top:6px;"><span style="font-size:11px; color:#b3e5fc;">我的危險因子：</span><div class="tag-list">${risksHTML || '<span style="font-size:11px;color:#aaa">無紀錄</span>'}</div></div>`;
  } else { toggleScEdit(true); }
}
function toggleScEdit(show) {
  id('scDisplayMode').style.display = show ? 'none' : 'block'; id('scEditMode').style.display = show ? 'block' : 'none';
  if(show && playerState.strokeCard) { id('scDate').value = playerState.strokeCard.date || ''; id('scType').value = playerState.strokeCard.type || ''; id('scLocation').value = playerState.strokeCard.location || ''; document.querySelectorAll('input[name="scRisk"]').forEach(cb => { cb.checked = playerState.strokeCard.risks.includes(cb.value); }); }
}
function saveStrokeCard() {
  playerState.strokeCard = { date: id('scDate').value, type: id('scType').value, location: id('scLocation').value, risks: Array.from(document.querySelectorAll('input[name="scRisk"]:checked')).map(cb => cb.value) };
  saveGameData(); alert('名片儲存成功！'); renderStrokeCard();
}

function switchScaleTab(tabId) {
  ['btnScaleForm', 'btnScaleList', 'btnScaleTrend'].forEach(idName => { id(idName).classList.remove('active'); id(idName).style.background = 'rgba(0,0,0,0.8)'; id(idName).style.color = 'var(--text-muted)'; });
  id('scaleFormView').style.display = 'none'; id('scaleListView').style.display = 'none'; id('scaleTrendView').style.display = 'none';
  if (tabId === 'form') { id('btnScaleForm').classList.add('active'); id('btnScaleForm').style.background = 'var(--theme-primary)'; id('btnScaleForm').style.color = 'var(--btn-text)'; id('btnScaleForm').style.textShadow = 'var(--btn-shadow)'; id('scaleFormView').style.display = 'block'; startScaleWizard(); } 
  else if (tabId === 'list') { id('btnScaleList').classList.add('active'); id('btnScaleList').style.background = 'var(--theme-primary)'; id('btnScaleList').style.color = 'var(--btn-text)'; id('btnScaleList').style.textShadow = 'var(--btn-shadow)'; id('scaleListView').style.display = 'block'; renderScaleList(); } 
  else { id('btnScaleTrend').classList.add('active'); id('btnScaleTrend').style.background = 'var(--theme-primary)'; id('btnScaleTrend').style.color = 'var(--btn-text)'; id('btnScaleTrend').style.textShadow = 'var(--btn-shadow)'; id('scaleTrendView').style.display = 'block'; renderScaleChart(); }
}

function startScaleWizard() { currentQIndex = 0; currentAnswers = {}; renderWizardQuestion(); }
function renderWizardQuestion() {
  const container = id('wizardContent'); const q = scaleQuestions[currentQIndex]; container.style.animation = 'none'; container.offsetHeight; container.style.animation = 'fadeIn 0.3s ease';
  let html = `<div class="wizard-header">${q.title}</div>`;
  if (q.type === 'choice') { q.options.forEach(opt => { html += `<div class="wizard-option" onclick="handleOptionSelect('${q.id}', ${opt.val})"><div class="icon">${opt.icon}</div><div class="text">${opt.text}</div></div>`; }); } else if (q.type === 'slider') { html += `<div style="background:rgba(0,0,0,0.6); padding:15px; border-radius:8px; border:1px solid var(--theme-dim); text-align:center; margin-bottom: 15px;"><div style="font-size:28px; font-weight:bold; color:var(--good); margin-bottom:8px;" id="vasValDisplay">80</div><input type="range" id="vasSlider" min="0" max="100" value="80" style="width:100%; height:6px; border-radius:3px; appearance:none; background:#444; outline:none;" oninput="document.getElementById('vasValDisplay').innerText=this.value"><div style="display:flex; justify-content:space-between; color:var(--text-muted); font-size:11px; margin-top:8px;"><span>0 (最差)</span><span>100 (最健康)</span></div></div><button class="btn" style="background:var(--theme-primary); color:var(--btn-text); text-shadow:var(--btn-shadow);" onclick="handleSliderSelect()">確認儲存</button>`; }
  container.innerHTML = html;
}
function handleOptionSelect(qId, val) { currentAnswers[qId] = val; nextQuestion(); }
function handleSliderSelect() { currentAnswers['vas'] = parseInt(id('vasSlider').value); nextQuestion(); }
function nextQuestion() { currentQIndex++; if (currentQIndex < scaleQuestions.length) setTimeout(() => { renderWizardQuestion(); }, 150); else finishScaleWizard(); }
function finishScaleWizard() {
  const todayDateStr = new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' });
  const newRecord = { id: Date.now(), date: todayDateStr, mrs: currentAnswers.mrs, eqSum: currentAnswers.eq1+currentAnswers.eq2+currentAnswers.eq3+currentAnswers.eq4+currentAnswers.eq5, vas: currentAnswers.vas };
  const existingIndex = playerState.scaleRecords.findIndex(r => r.date === todayDateStr);
  if (existingIndex !== -1) { playerState.scaleRecords[existingIndex] = newRecord; alert("💾 今日評估紀錄已成功更新覆蓋！"); } else { playerState.scaleRecords.unshift(newRecord); playerState.coins += 100; updateHUD(); alert("💾 評估已完成儲存！\n🎉 感謝定期追蹤，獲得 100 健康幣！"); }
  saveGameData(); switchScaleTab('list');
}

function renderScaleList() {
  const container = id('trendListContainer'); container.innerHTML = '';
  if (playerState.scaleRecords.length === 0) { container.innerHTML = '<p style="text-align:center; color:var(--text-muted); margin-top:30px;">尚無紀錄，請點擊「開始評估」。</p>'; return; }
  playerState.scaleRecords.forEach(record => {
    const mrsHealthPct = Math.max(5, ((6 - record.mrs) / 6) * 100); const eqHealthPct = Math.max(5, ((25 - record.eqSum) / 20) * 100); const vasHealthPct = Math.max(5, record.vas);
    const getBarColor = (pct) => pct >= 80 ? 'var(--good)' : (pct >= 50 ? '#ffd166' : 'var(--accent-red)');
    container.innerHTML += `<div class="trend-card"><div style="font-size:13px; color:var(--theme-primary); font-weight:bold; border-bottom:1px dashed #555; padding-bottom:4px; margin-bottom:8px;">📅 記錄日期：${record.date}</div><div class="health-dist-box"><div class="health-dist-title"><span>mRS 失能狀態 (級數:${record.mrs})</span><span style="color:${getBarColor(mrsHealthPct)}; font-weight:bold;">康復度 ${Math.round(mrsHealthPct)}%</span></div><div class="health-dist-bar-bg"><div class="health-dist-bar-fill" style="width:${mrsHealthPct}%; background:${getBarColor(mrsHealthPct)};"></div></div></div><div class="health-dist-box"><div class="health-dist-title"><span>EQ-5D-5L 總分 (${record.eqSum}/25)</span><span style="color:${getBarColor(eqHealthPct)}; font-weight:bold;">健康度 ${Math.round(eqHealthPct)}%</span></div><div class="health-dist-bar-bg"><div class="health-dist-bar-fill" style="width:${eqHealthPct}%; background:${getBarColor(eqHealthPct)};"></div></div></div><div class="health-dist-box" style="margin-bottom:0;"><div class="health-dist-title"><span>EQ VAS 整體自評 (${record.vas}分)</span><span style="color:${getBarColor(vasHealthPct)}; font-weight:bold;">${record.vas}%</span></div><div class="health-dist-bar-bg"><div class="health-dist-bar-fill" style="width:${vasHealthPct}%; background:${getBarColor(vasHealthPct)};"></div></div></div></div>`;
  });
  setTimeout(() => { document.querySelectorAll('.health-dist-bar-fill').forEach(bar => { const w = bar.style.width; bar.style.width = '0%'; setTimeout(() => { bar.style.width = w; }, 50); }); }, 100);
}

function renderScaleChart() {
  const chartContainer = id('chartContainer'); if (playerState.scaleRecords.length === 0) { chartContainer.innerHTML = '<p style="text-align:center; color:var(--text-muted); margin-top:30px;">尚無足夠紀錄繪製趨勢圖。</p>'; return; }
  chartContainer.innerHTML = `<div style="background:rgba(0,0,0,0.5); border:1px solid var(--theme-dim); border-radius:8px; padding:10px;"><h3 style="color:#fff; font-size:13px; margin:0 0 10px 0; text-align:center;">長期復原趨勢分析</h3><canvas id="trendChart" width="100" height="60"></canvas></div>`;
  const chartData = [...playerState.scaleRecords].reverse(); const ctx = id('trendChart').getContext('2d'); if (trendChartInstance) trendChartInstance.destroy();
  trendChartInstance = new Chart(ctx, { type: 'line', data: { labels: chartData.map(r => r.date.substring(5)), datasets: [{ label: 'mRS 康復度', data: chartData.map(r => Math.max(5, ((6 - r.mrs) / 6) * 100)), borderColor: '#3dff8e', backgroundColor: 'rgba(61,255,142,0.1)', borderWidth: 2, fill: true }, { label: 'EQ 健康度', data: chartData.map(r => Math.max(5, ((25 - r.eqSum) / 20) * 100)), borderColor: '#29b6f6', backgroundColor: 'rgba(41,182,246,0.1)', borderWidth: 2, fill: true }, { label: 'VAS 自覺度', data: chartData.map(r => Math.max(5, r.vas)), borderColor: '#ffd166', backgroundColor: 'rgba(255,209,102,0.1)', borderWidth: 2, fill: true }]}, options: { responsive: true, interaction: { mode: 'index', intersect: false }, scales: { y: { min: 0, max: 100, ticks: { color: '#a99d82' }, grid: { color: 'rgba(255,255,255,0.1)' } }, x: { ticks: { color: '#a99d82' }, grid: { display: false } } }, plugins: { legend: { labels: { color: '#f4ecd8' }, position: 'top' } } } });
}
</script>
</body>
</html>
