<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>腦脈先鋒｜醫院探索 Demo 手機優先版</title>
<style>
:root{
  --bg:#0c1218;
  --sky1:#bfd6e8;
  --sky2:#9ab8cf;
  --ui:#223a54;
  --ui2:#355879;
  --ui3:#102031;
  --gold:#f3ca70;
  --gold2:#bf8e2f;
  --cream:#fff8e7;
  --wall:#f5f0e3;
  --floorA:#eef5fa;
  --floorB:#d9e8f2;
  --blue1:#7ea7c8;
  --blue2:#4f7da6;
  --green1:#8ce260;
  --green2:#54b53d;
  --red1:#ff9b90;
  --red2:#d65b57;
  --text:#f5f9ff;
  --muted:#d2dfeb;
  --shadow:0 12px 28px rgba(0,0,0,.28);
  --safe-top:max(8px, env(safe-area-inset-top));
  --safe-bottom:max(10px, env(safe-area-inset-bottom));
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;color:var(--text)}
button,input{font:inherit}

.app{position:relative;width:100%;height:100%;overflow:hidden;background:linear-gradient(180deg,var(--sky1),var(--sky2) 36%,#6e90ab 100%)}
.topbar{
  position:absolute;left:0;right:0;top:0;height:48px;z-index:30;
  display:flex;align-items:center;justify-content:space-between;padding:0 10px;
  padding-top:var(--safe-top);
  height:calc(48px + var(--safe-top));
  background:linear-gradient(180deg,rgba(34,58,84,.96),rgba(16,32,49,.92));
  box-shadow:0 4px 12px rgba(0,0,0,.22);
  border-bottom:1px solid rgba(243,202,112,.18);
}
.brand{display:flex;align-items:center;gap:8px;min-width:0;max-width:72%}
.brandIcon{
  width:30px;height:30px;border-radius:10px;display:grid;place-items:center;
  background:linear-gradient(180deg,#ffe39e,#e8b84d);color:#3a2b0e;font-size:17px;font-weight:900;
  box-shadow:inset 0 2px 0 rgba(255,255,255,.55),0 4px 10px rgba(0,0,0,.16)
}
.brandText{min-width:0}
.brandText .title{font-size:13px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brandText .sub{display:none}
.hud{display:flex;gap:6px;align-items:center}
.hudChip{
  padding:5px 8px;border-radius:999px;font-size:11px;font-weight:800;white-space:nowrap;
  background:rgba(7,16,26,.45);border:1px solid rgba(243,202,112,.22)
}

.scene{position:absolute;left:0;right:0;top:calc(48px + var(--safe-top));bottom:0;overflow:hidden}
.scene::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(circle at 50% 8%, rgba(255,255,255,.35), transparent 28%),linear-gradient(180deg,rgba(255,255,255,.07),transparent 32%);
  pointer-events:none;z-index:1
}

/* ===== 新增：動態縮放容器 ===== */
.game-world {
  position: absolute;
  left: 50%;
  top: 45%; /* 稍微往上偏，預留下方搖桿的空間 */
  width: 860px;
  height: 500px;
  transform: translate(-50%, -50%);
  transform-origin: center center;
  z-index: 2;
  transition: transform 0.2s ease-out; /* 縮放時更滑順 */
}

.floorPlane{
  position:absolute;left:50%;top:50%;width:760px;height:580px;transform:translate(-50%,-50%) rotateX(62deg) rotateZ(-45deg);
  border-radius:34px;
  background:
    linear-gradient(90deg, rgba(255,255,255,.09) 1px, transparent 1px) 0 0/56px 56px,
    linear-gradient(rgba(255,255,255,.09) 1px, transparent 1px) 0 0/56px 56px,
    linear-gradient(180deg,var(--floorA),var(--floorB));
  box-shadow:inset 0 0 90px rgba(255,255,255,.12), inset 0 -60px 110px rgba(0,0,0,.08), 0 36px 70px rgba(0,0,0,.2);
}
.floorDeco{
  position:absolute;left:50%;top:69%;transform:translateX(-50%);width:760px;height:110px;z-index:1;
  background:radial-gradient(circle at 50% 0%, rgba(0,0,0,.14), transparent 70%);
}

.stage{position:absolute;inset:0;z-index:3;transform:scale(1.12);transform-origin:center center}
.room{position:absolute;border-radius:22px;overflow:hidden;box-shadow:0 10px 16px rgba(0,0,0,.14)}
.room .floor{
  position:absolute;inset:0;
  background:
    linear-gradient(90deg, rgba(44,82,116,.05) 1px, transparent 1px) 0 0/28px 28px,
    linear-gradient(rgba(44,82,116,.05) 1px, transparent 1px) 0 0/28px 28px,
    linear-gradient(180deg,#eff6fb,#dcebf5);
}
.room .topWall,
.room .leftWall,
.room .rightWall{position:absolute;background:linear-gradient(180deg,#fffdf7,#ebe1cb)}
.room .topWall{left:0;right:0;top:0;height:16px;border-bottom:1px solid rgba(0,0,0,.05)}
.room .leftWall{left:0;top:0;bottom:0;width:16px;border-right:1px solid rgba(0,0,0,.05)}
.room .rightWall{right:0;top:0;bottom:0;width:16px;border-left:1px solid rgba(0,0,0,.04)}
.room .label{
  position:absolute;left:10px;top:7px;z-index:3;padding:3px 9px;border-radius:999px;
  background:rgba(22,40,63,.84);border:1px solid rgba(243,202,112,.34);font-size:11px;font-weight:900;color:#fff8e7
}
.door{
  position:absolute;width:18px;height:64px;border-radius:7px;background:linear-gradient(180deg,#8a5e3a,#5c381d);
  border:2px solid rgba(255,255,255,.24);box-shadow:0 6px 10px rgba(0,0,0,.16)
}

.object{position:absolute;border-radius:14px;box-shadow:0 8px 14px rgba(0,0,0,.14)}
.object.interactable{cursor:pointer}
.object.interactable:active{transform:scale(.98)}
.ctMachine{
  width:130px;height:104px;background:linear-gradient(180deg,#dce8f2,#bdd3e5);border:3px solid rgba(255,255,255,.85)
}
.ctMachine::before{
  content:"";position:absolute;left:18px;top:9px;width:74px;height:74px;border-radius:50%;
  background:radial-gradient(circle at 50% 48%, #2b3e50 0 22%, #f7fbfe 23% 46%, #6f99bc 47% 61%, #edf5fa 62% 100%);
}
.ctMachine::after{
  content:"";position:absolute;left:66px;top:48px;width:66px;height:18px;border-radius:8px;background:linear-gradient(180deg,#b0d0e8,#8ab7d6);
  box-shadow:0 2px 0 rgba(255,255,255,.45) inset;
}
.ctLabel{
  position:absolute;left:50%;bottom:6px;transform:translateX(-50%);font-size:11px;font-weight:900;color:#37516a;background:rgba(255,255,255,.84);padding:2px 8px;border-radius:999px
}
.monitor{width:62px;height:44px;background:linear-gradient(180deg,#334f6d,#23394f);border:3px solid rgba(255,255,255,.18)}
.monitor::after{content:"";position:absolute;left:12px;right:12px;top:7px;bottom:11px;border-radius:7px;background:linear-gradient(180deg,#0f1b25,#21394e)}
.desk{width:94px;height:56px;background:linear-gradient(180deg,#c8def0,#9ec0d9);border:3px solid rgba(255,255,255,.65)}
.cart{width:56px;height:48px;background:linear-gradient(180deg,#a0d7e5,#63aab8);border:3px solid rgba(255,255,255,.55)}
.poster{width:58px;height:34px;background:linear-gradient(180deg,#ffe59d,#ffc95f);border:3px solid rgba(255,255,255,.65)}
.bed{width:112px;height:54px;background:linear-gradient(180deg,#d4e4ef,#adc5d9);border:3px solid rgba(255,255,255,.75)}
.bed::before{content:"";position:absolute;right:8px;top:6px;width:26px;height:42px;border-radius:10px;background:linear-gradient(180deg,#7ca2c0,#587f9f)}

.character{
  position:absolute;width:58px;height:82px;transform:translate(-50%,-50%);z-index:8;
  filter:drop-shadow(0 8px 8px rgba(0,0,0,.24));
  cursor:pointer;
}
.character .marker{
  position:absolute;left:50%;top:-26px;transform:translateX(-50%);min-width:30px;height:30px;padding:0 8px;border-radius:999px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(180deg,#ffe59c,#f0b94b);color:#2b2108;font-weight:900;font-size:16px;
  border:2px solid rgba(255,255,255,.7);box-shadow:0 6px 12px rgba(0,0,0,.18);animation:bob 1.2s infinite
}
.character .marker.goal{background:linear-gradient(180deg,#9aef76,#59bb40);color:#0d2208}
.character .marker.hide{display:none}
.character .name{
  position:absolute;left:50%;top:-8px;transform:translateX(-50%);padding:3px 8px;border-radius:999px;white-space:nowrap;
  background:rgba(15,24,35,.82);border:1px solid rgba(243,202,112,.26);font-size:10px;font-weight:900
}
.character .hair{position:absolute;left:50%;top:8px;transform:translateX(-50%);width:34px;height:20px;border-radius:18px 18px 10px 10px;background:#7d4d31;z-index:2}
.character .head{position:absolute;left:50%;top:10px;transform:translateX(-50%);width:34px;height:34px;border-radius:50%;background:#f1c8a0;border:2px solid rgba(255,255,255,.7);z-index:1}
.character .body{position:absolute;left:50%;top:38px;transform:translateX(-50%);width:32px;height:38px;border-radius:13px;border:2px solid rgba(255,255,255,.75)}
.character .feet{position:absolute;left:50%;bottom:1px;transform:translateX(-50%);display:flex;gap:6px}
.character .feet::before,.character .feet::after{content:"";width:8px;height:10px;border-radius:4px;background:#4b3928}
.player .body{background:linear-gradient(180deg,#ffffff,#dfeff9)}
.nurse .body{background:linear-gradient(180deg,#f7fbff,#dce6f4)}
.doctor .body{background:linear-gradient(180deg,#7ae164,#4fb43c)}
.tech .body{background:linear-gradient(180deg,#87c6ff,#5a98d4)}
.player::after{content:"";position:absolute;left:50%;bottom:-10px;transform:translateX(-50%);width:54px;height:16px;border-radius:50%;background:rgba(243,202,112,.22)}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}

.missionBtn{
  position:absolute;right:10px;top:8px;z-index:25;border:none;border-radius:999px;padding:8px 12px;
  background:linear-gradient(180deg,#ffe59e,#efb949);color:#34270d;font-weight:900;box-shadow:0 8px 16px rgba(0,0,0,.2);
  cursor:pointer;
}
.missionPanel{
  position:absolute;right:10px;top:52px;z-index:25;width:200px;padding:11px;border-radius:16px;display:none;
  background:linear-gradient(180deg,rgba(34,58,84,.97),rgba(16,32,49,.95));box-shadow:0 10px 22px rgba(0,0,0,.24)
}
.missionTitle{font-size:13px;font-weight:900;color:var(--gold);margin-bottom:8px}
.task{font-size:12px;padding:7px 8px;margin-top:6px;border-radius:10px;background:rgba(255,255,255,.05)}
.task.done{background:rgba(110,219,89,.12);color:#dff7d8}

.miniHint{
  position:absolute;left:50%;top:8px;transform:translateX(-50%);z-index:23;max-width:min(86vw,280px);
  background:rgba(15,24,35,.78);border:1px solid rgba(243,202,112,.22);border-radius:999px;padding:8px 12px;
  box-shadow:0 6px 14px rgba(0,0,0,.16);text-align:center
}
.miniHint strong{display:block;color:var(--gold);font-size:11px;line-height:1.1}
.miniHint span{display:block;color:#e5eef7;font-size:11px;line-height:1.25;margin-top:2px}

.dialogMask,.rewardMask{
  position:absolute;inset:0;z-index:40;display:none;align-items:center;justify-content:center;padding:14px;background:rgba(8,13,19,.36)
}
.dialogBox,.rewardBox{
  width:min(92vw,460px);border-radius:24px;padding:14px;background:linear-gradient(180deg,#fbf5ea,#efe2c3 16%,#23405e 17%,#17314d 100%);
  box-shadow:0 18px 40px rgba(0,0,0,.28)
}
.dialogInner,.rewardInner{
  border-radius:18px;padding:12px;background:linear-gradient(180deg,#32597f,#203b59 85%,#17314d)
}
.dialogHead{display:flex;gap:10px;align-items:center;margin-bottom:10px}
.portrait{
  width:68px;height:68px;border-radius:18px;position:relative;background:linear-gradient(180deg,#c5e6ff,#79b4eb);border:3px solid rgba(255,255,255,.68);flex:0 0 auto
}
.portrait .phair{position:absolute;left:50%;top:10px;transform:translateX(-50%);width:32px;height:17px;border-radius:18px 18px 10px 10px;background:#7d4d31}
.portrait .phead{position:absolute;left:50%;top:13px;transform:translateX(-50%);width:32px;height:32px;border-radius:50%;background:#f1c8a0;border:2px solid rgba(255,255,255,.65)}
.portrait .pbody{position:absolute;left:50%;bottom:7px;transform:translateX(-50%);width:30px;height:18px;border-radius:12px;background:#fff;border:2px solid rgba(255,255,255,.65)}
.portrait.doctor .pbody{background:#67d654}
.dialogTitle{font-size:22px;font-weight:900;color:#fff6dd;line-height:1.1}
.dialogText{font-size:13px;line-height:1.6;color:#eaf2fa}
.choices{display:grid;gap:9px;margin-top:12px}
.choiceBtn,.closeBtn,.rewardBtn{
  border:none;border-radius:14px;padding:11px 13px;font-weight:900;box-shadow:0 6px 12px rgba(0,0,0,.18);cursor:pointer;
}
.choiceBtn{background:linear-gradient(180deg,#5d84ac,#426588);color:white;text-align:left}
.choiceBtn.correct{background:linear-gradient(180deg,#8ae462,#54b73e);color:#12260c}
.choiceBtn.wrong{background:linear-gradient(180deg,#ffaca4,#d76561);color:#3f1111}
.closeRow{display:flex;justify-content:flex-end;margin-top:10px}
.closeBtn{background:linear-gradient(180deg,#f8d98d,#efb748);color:#3a2b0d}
.rewardInner{padding:14px}
.rewardTitle{font-size:24px;font-weight:900;color:#fff3d0;text-align:center;margin-bottom:8px}
.rewardLayout{display:grid;grid-template-columns:1fr;gap:14px;align-items:center}
.card{
  height:182px;border-radius:22px;padding:10px;background:linear-gradient(180deg,#ffe8ad,#f0bc58);box-shadow:inset 0 2px 0 rgba(255,255,255,.58)
}
.cardInner{height:100%;border-radius:18px;position:relative;background:linear-gradient(180deg,#fffdf5,#e6f1f8);border:3px solid rgba(255,255,255,.7)}
.cardLabel{position:absolute;left:50%;top:10px;transform:translateX(-50%);font-size:20px;font-weight:900;color:#16334d;white-space:nowrap}
.card .miniCT{position:absolute;left:50%;top:54px;transform:translateX(-50%);width:92px;height:78px;border-radius:20px;background:linear-gradient(180deg,#dbe8f2,#bccfe1);border:3px solid rgba(255,255,255,.8)}
.card .miniCT::before{content:"";position:absolute;left:50%;top:10px;transform:translateX(-50%);width:50px;height:50px;border-radius:50%;background:radial-gradient(circle at 50% 48%, #2b3e50 0 24%, #f7fbfe 25% 46%, #6f99bc 47% 61%, #edf5fa 62% 100%)}
.card .miniCT::after{content:"absolute;left:50px;top:34px;width:44px;height:13px;border-radius:7px;background:linear-gradient(180deg,#b0d0e8,#8ab7d6)}
.rewardDesc{font-size:13px;line-height:1.65;color:#eaf2fa}
.rewardBtn{background:linear-gradient(180deg,#8ae462,#54b73e);color:#12260c;margin-top:12px;width:100%}
.rewardSecondary{background:linear-gradient(180deg,#f8d98d,#efb748);color:#3a2b0d;margin-top:8px;width:100%}

.controlsWrap{
  position:absolute;left:0;right:0;bottom:0;padding-bottom:calc(14px + var(--safe-bottom));z-index:24;pointer-events:none
}
.joystick{
  position:absolute;left:14px;bottom:calc(10px + var(--safe-bottom));width:116px;height:116px;border-radius:50%;
  background:rgba(10,17,24,.22);backdrop-filter:blur(4px);box-shadow:inset 0 2px 14px rgba(255,255,255,.08);pointer-events:auto
}
.joystick::after{content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.08)}
.joystick button{
  position:absolute;width:38px;height:38px;border-radius:50%;border:none;background:linear-gradient(180deg,#284766,#18314a);color:#fff;font-weight:900;
  box-shadow:0 6px 12px rgba(0,0,0,.22);cursor:pointer;
}
.joystick .up{left:39px;top:5px}
.joystick .down{left:39px;bottom:5px}
.joystick .left{left:5px;top:39px}
.joystick .right{right:5px;top:39px}
.interactBtn{
  position:absolute;right:18px;bottom:calc(22px + var(--safe-bottom));z-index:24;width:76px;height:76px;border-radius:50%;border:none;
  background:linear-gradient(180deg,#8ae462,#54b73e);color:#12260c;font-weight:900;font-size:16px;box-shadow:0 10px 18px rgba(0,0,0,.24);pointer-events:auto;cursor:pointer;
}
.interactBtn:active,.joystick button:active,.missionBtn:active{transform:scale(.97)}
.desktopHint{display:none}

@media (min-width: 768px){
  .topbar{height:52px;padding:0 12px;padding-top:var(--safe-top);height:calc(52px + var(--safe-top));}
  .brandText .sub{display:block;font-size:10px;color:#d4dfeb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .scene{top:calc(52px + var(--safe-top))}
  .miniHint{top:14px;max-width:min(70vw,420px)}
  .desktopHint{display:block;position:absolute;left:50%;bottom:8px;transform:translateX(-50%);z-index:18;font-size:11px;color:rgba(255,255,255,.82);padding:4px 10px;border-radius:999px;background:rgba(15,24,35,.28)}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="brandIcon">🏥</div>
      <div class="brandText">
        <div class="title">腦脈先鋒｜醫院探索</div>
        <div class="sub">CT 室任務原型</div>
      </div>
    </div>
    <div class="hud">
      <div class="hudChip">🪙 <span id="coinCount">120</span></div>
    </div>
  </div>

  <div class="scene" id="scene">
    <button class="missionBtn" id="missionBtn">任務</button>
    <div class="missionPanel" id="missionPanel">
      <div class="missionTitle">CT 室初探</div>
      <div class="task" id="task1">1. 找到 CT 掃描儀</div>
      <div class="task" id="task2">2. 與護理師對話</div>
      <div class="task" id="task3">3. 回答醫師問題</div>
    </div>

    <div class="miniHint" id="miniHint">
      <strong id="hintTitle">下一步</strong>
      <span id="hintText">先找頭上有「!」的護理師。</span>
    </div>

    <div class="game-world" id="gameWorld">
      <div class="floorPlane"></div>
      <div class="floorDeco"></div>

      <div class="stage">
        <div class="room" style="left:170px;top:128px;width:330px;height:232px">
          <div class="floor"></div>
          <div class="topWall"></div>
          <div class="leftWall"></div>
          <div class="label">CT 室</div>
        </div>
        <div class="door" style="left:484px;top:212px"></div>
        <div class="object ctMachine interactable" id="ctObject" style="left:204px;top:156px">
          <div class="ctLabel">CT</div>
        </div>
        <div class="object desk" style="left:365px;top:168px"></div>
        <div class="object monitor" style="left:397px;top:222px"></div>
        <div class="object cart" style="left:196px;top:276px"></div>
        <div class="object poster" style="left:418px;top:280px"></div>

        <div class="room" style="left:528px;top:126px;width:230px;height:238px">
          <div class="floor"></div>
          <div class="topWall"></div>
          <div class="rightWall"></div>
          <div class="label">閱片區</div>
        </div>
        <div class="object desk" style="left:560px;top:172px"></div>
        <div class="object monitor" style="left:660px;top:162px"></div>
        <div class="object bed" style="left:588px;top:274px"></div>
        <div class="object poster" style="left:688px;top:292px"></div>

        <div class="character player" id="player" style="left:530px;top:304px">
          <div class="marker hide" id="markerPlayer">•</div>
          <div class="name">玩家</div>
          <div class="hair"></div>
          <div class="head"></div>
          <div class="body"></div>
          <div class="feet"></div>
        </div>

        <div class="character nurse" id="nurseNpc" style="left:448px;top:254px">
          <div class="marker" id="markerNurse">!</div>
          <div class="name">護理師</div>
          <div class="hair"></div>
          <div class="head"></div>
          <div class="body"></div>
          <div class="feet"></div>
        </div>

        <div class="character doctor" id="doctorNpc" style="left:642px;top:238px">
          <div class="marker hide goal" id="markerDoctor">?</div>
          <div class="name">神經醫師</div>
          <div class="hair"></div>
          <div class="head"></div>
          <div class="body"></div>
          <div class="feet"></div>
        </div>

        <div class="character tech" id="techNpc" style="left:300px;top:238px">
          <div class="marker hide" id="markerTech">✓</div>
          <div class="name">放射師</div>
          <div class="hair"></div>
          <div class="head"></div>
          <div class="body"></div>
          <div class="feet"></div>
        </div>
      </div>
    </div>

    <div class="dialogMask" id="dialogMask">
      <div class="dialogBox">
        <div class="dialogInner">
          <div class="dialogHead">
            <div class="portrait" id="portraitBox">
              <div class="phair"></div>
              <div class="phead"></div>
              <div class="pbody"></div>
            </div>
            <div>
              <div class="dialogTitle" id="dialogTitle">護理師</div>
              <div class="dialogText" id="dialogText">急性中風患者到院後，通常會先安排腦部 CT，快速排除腦出血。</div>
            </div>
          </div>
          <div class="choices" id="choices"></div>
          <div class="closeRow"><button class="closeBtn" id="closeDialogBtn">關閉</button></div>
        </div>
      </div>
    </div>

    <div class="rewardMask" id="rewardMask">
      <div class="rewardBox">
        <div class="rewardInner">
          <div class="rewardTitle">任務完成！</div>
          <div class="rewardLayout">
            <div class="card">
              <div class="cardInner">
                <div class="cardLabel">CT 掃描儀</div>
                <div class="miniCT"></div>
              </div>
            </div>
            <div>
              <div class="rewardDesc">
                你已完成 CT 室初探，並解鎖一張設備圖鑑卡。<br>
                <b>用途：</b>急性中風病人到院後，常先以腦部 CT 快速排除出血，再決定後續溶栓或取栓策略。
              </div>
              <button class="rewardBtn" id="claimBtn">領取 +50 健康幣</button>
              <button class="closeBtn rewardSecondary" id="closeRewardBtn">繼續探索</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="controlsWrap">
      <div class="joystick">
        <button class="up" data-dx="0" data-dy="-16">▲</button>
        <button class="down" data-dx="0" data-dy="16">▼</button>
        <button class="left" data-dx="-16" data-dy="0">◀</button>
        <button class="right" data-dx="16" data-dy="0">▶</button>
      </div>
      <button class="interactBtn" id="interactBtn">互動</button>
    </div>
    <div class="desktopHint">桌機：WASD / 方向鍵移動，Space 互動</div>
  </div>
</div>

<script>
// ===== 新增：自動計算螢幕大小進行等比例縮放 =====
function resizeGame() {
  const scene = document.getElementById('scene');
  const gameWorld = document.getElementById('gameWorld');
  if(!scene || !gameWorld) return;
  
  const w = scene.clientWidth;
  const h = scene.clientHeight;
  
  // 基準大小 860x500，計算縮放比例 (保留下方搖桿高度)
  let scale = Math.min(w / 860, (h * 0.65) / 500);
  
  // 避免在電腦螢幕上放得太大
  if(scale > 1.1) scale = 1.1; 
  
  gameWorld.style.transform = `translate(-50%, -50%) scale(${scale})`;
}

// 監聽螢幕大小改變
window.addEventListener('resize', resizeGame);

const player = document.getElementById('player');
const nurseNpc = document.getElementById('nurseNpc');
const doctorNpc = document.getElementById('doctorNpc');
const techNpc = document.getElementById('techNpc');
const ctObject = document.getElementById('ctObject');
const missionBtn = document.getElementById('missionBtn');
const missionPanel = document.getElementById('missionPanel');
const hintTitle = document.getElementById('hintTitle');
const hintText = document.getElementById('hintText');
const dialogMask = document.getElementById('dialogMask');
const dialogTitle = document.getElementById('dialogTitle');
const dialogText = document.getElementById('dialogText');
const choices = document.getElementById('choices');
const closeDialogBtn = document.getElementById('closeDialogBtn');
const portraitBox = document.getElementById('portraitBox');
const rewardMask = document.getElementById('rewardMask');
const claimBtn = document.getElementById('claimBtn');
const closeRewardBtn = document.getElementById('closeRewardBtn');
const coinCount = document.getElementById('coinCount');
const markerNurse = document.getElementById('markerNurse');
const markerDoctor = document.getElementById('markerDoctor');
const markerTech = document.getElementById('markerTech');

const state = {
  x:530,
  y:304,
  coins:120,
  done:{ ct:false, nurse:false, quiz:false },
  rewardClaimed:false,
  rewardShown:false,
  near:null
};

const targets = {
  ct:{x:272,y:214,r:98,id:'ct'},
  nurse:{x:448,y:254,r:74,id:'nurse'},
  doctor:{x:642,y:238,r:74,id:'doctor'},
  tech:{x:300,y:238,r:68,id:'tech'}
};

if (window.parent !== window) {
    claimBtn.textContent = "完成任務並領取獎勵";
}

function clamp(v,min,max){ return Math.max(min, Math.min(max,v)); }
function dist(ax,ay,bx,by){ return Math.hypot(ax-bx, ay-by); }

function updatePlayer(){
  player.style.left = state.x + 'px';
  player.style.top = state.y + 'px';
  detectNear();
}

function move(dx,dy){
  if(dialogMask.style.display === 'flex' || rewardMask.style.display === 'flex') return;
  state.x = clamp(state.x + dx, 150, 720);
  state.y = clamp(state.y + dy, 140, 360);
  updatePlayer();
}

function detectNear(){
  let found = null;
  let minDist = Infinity;
  for(const key of Object.keys(targets)){
    const t = targets[key];
    const d = dist(state.x,state.y,t.x,t.y);
    if(d < t.r && d < minDist){
      found = key;
      minDist = d;
    }
  }
  state.near = found;
  updateHint();
}

function updateHint(){
  if(!state.near){
    hintTitle.textContent = '下一步';
    if(!state.done.nurse){
      hintText.textContent = '先找頭上有「!」的護理師';
    }else if(!state.done.ct){
      hintText.textContent = '再去點擊或靠近 CT 設備';
    }else if(!state.done.quiz){
      hintText.textContent = '最後找頭上有「?」的神經醫師';
    }else{
      hintText.textContent = '本區完成，可打開任務確認';
    }
    return;
  }
  if(state.near === 'nurse'){
    hintTitle.textContent = '護理師';
    hintText.textContent = '按互動聽取流程提示';
  }else if(state.near === 'ct'){
    hintTitle.textContent = 'CT 掃描儀';
    hintText.textContent = '按互動查看設備用途';
  }else if(state.near === 'doctor'){
    hintTitle.textContent = '神經醫師';
    hintText.textContent = '按互動回答問題';
  }else{
    hintTitle.textContent = '放射師';
    hintText.textContent = '按互動了解 CT 流程';
  }
}

function updateMission(){
  document.getElementById('task1').classList.toggle('done', state.done.ct);
  document.getElementById('task2').classList.toggle('done', state.done.nurse);
  document.getElementById('task3').classList.toggle('done', state.done.quiz);

  markerNurse.classList.toggle('hide', state.done.nurse);
  markerDoctor.classList.toggle('hide', !state.done.nurse || state.done.quiz);
  markerTech.classList.toggle('hide', !(state.done.ct && state.done.nurse && state.done.quiz));

  if(state.done.ct && state.done.nurse && state.done.quiz && !state.rewardShown){
    state.rewardShown = true;
    setTimeout(()=> rewardMask.style.display = 'flex', 220);
  }
}

function setPortrait(type){
  portraitBox.className = 'portrait' + (type === 'doctor' ? ' doctor' : '');
}

function openDialog(title,text,options=[],type='nurse'){
  setPortrait(type);
  dialogTitle.textContent = title;
  dialogText.textContent = text;
  choices.innerHTML = '';
  options.forEach(opt=>{
    const btn = document.createElement('button');
    btn.className = 'choiceBtn';
    btn.textContent = opt.label;
    btn.onclick = ()=> opt.action(btn);
    choices.appendChild(btn);
  });
  dialogMask.style.display = 'flex';
}

function closeDialog(){ dialogMask.style.display = 'none'; }

function interact(){
  if(!state.near) return;
  if(state.near === 'nurse'){
    state.done.nurse = true;
    updateMission();
    openDialog('護理師','急性中風患者到院後，通常會先安排腦部 CT，快速排除腦出血。接著再評估是否適合後續治療。',[
      {label:'知道了',action:()=>closeDialog()},
      {label:'再說一次重點',action:()=>{ dialogText.textContent = '重點是：快、準、先做 CT 排除出血，再進入下一步決策。'; }}
    ],'nurse');
  } else if(state.near === 'ct'){
    state.done.ct = true;
    updateMission();
    openDialog('CT 掃描儀','CT 是急性中風最重要的第一線影像設備之一，因為速度快，能先幫忙排除出血性中風。',[
      {label:'明白了',action:()=>closeDialog()}
    ],'tech');
  } else if(state.near === 'doctor'){
    openDialog('神經醫師','請回答：急性中風病人到院後，第一個重要影像檢查通常是什麼？',[
      {label:'A. MRI',action:(btn)=>{ btn.classList.add('wrong'); dialogText.textContent = 'MRI 很重要，但急性期第一線通常先做 CT，因為速度更快。'; }},
      {label:'B. CT',action:(btn)=>{ btn.classList.add('correct'); state.done.quiz = true; updateMission(); dialogText.textContent = '答對了。CT 是急性中風常見的第一個重要影像檢查。'; }},
      {label:'C. PET',action:(btn)=>{ btn.classList.add('wrong'); dialogText.textContent = '不是喔，PET 並不是急性中風第一線影像檢查。'; }}
    ],'doctor');
  } else if(state.near === 'tech'){
    openDialog('放射師','我們會協助病人進入 CT 室、確認姿勢與安全，再把影像上傳到閱片系統給醫師判讀。',[
      {label:'了解',action:()=>closeDialog()}
    ],'tech');
  }
}

missionBtn.onclick = ()=>{
  missionPanel.style.display = missionPanel.style.display === 'block' ? 'none' : 'block';
};
closeDialogBtn.onclick = closeDialog;
dialogMask.addEventListener('click',(e)=>{ if(e.target === dialogMask) closeDialog(); });
closeRewardBtn.onclick = ()=> rewardMask.style.display = 'none';

claimBtn.onclick = ()=>{
  if(state.rewardClaimed) return;
  state.rewardClaimed = true;
  claimBtn.textContent = '處理中...';
  
  if (window.parent !== window) {
    window.parent.postMessage({ type: 'GAME_CLEAR', score: 1000 }, '*');
  } else {
    state.coins += 50;
    coinCount.textContent = state.coins;
    claimBtn.textContent = '已領取';
  }
};

document.getElementById('interactBtn').onclick = interact;

Array.from(document.querySelectorAll('.joystick button')).forEach(btn=>{
  btn.addEventListener('click',()=> move(Number(btn.dataset.dx), Number(btn.dataset.dy)));
});

ctObject.addEventListener('click',()=>{ state.x = 344; state.y = 246; updatePlayer(); setTimeout(interact,90); });
nurseNpc.addEventListener('click',()=>{ state.x = 496; state.y = 282; updatePlayer(); setTimeout(interact,90); });
doctorNpc.addEventListener('click',()=>{ state.x = 612; state.y = 276; updatePlayer(); setTimeout(interact,90); });
techNpc.addEventListener('click',()=>{ state.x = 350; state.y = 270; updatePlayer(); setTimeout(interact,90); });

window.addEventListener('keydown',(e)=>{
  const k = e.key.toLowerCase();
  if(k==='arrowup' || k==='w') move(0,-16);
  if(k==='arrowdown' || k==='s') move(0,16);
  if(k==='arrowleft' || k==='a') move(-16,0);
  if(k==='arrowright' || k==='d') move(16,0);
  if(e.code==='Space'){ e.preventDefault(); interact(); }
});

// ===== 載入時觸發一次縮放 =====
resizeGame();
updatePlayer();
updateMission();
</script>
</body>
</html>
