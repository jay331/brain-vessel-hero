<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>5x5 單屏完美拖曳版 (邊界防護)</title>
<style>
  :root {
    --bg1: #0f172a;
    --bg2: #111827;
    --text: #f8fafc;
    --accent: #38bdf8;
    --tray-bg: rgba(30, 41, 59, 0.9);
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    background: linear-gradient(180deg, var(--bg1), var(--bg2));
    color: var(--text);
    font-family: "PingFang TC", "Noto Sans TC", system-ui, sans-serif;
  }

  .game-app {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 600px;
    margin: 0 auto;
  }

  .header {
    flex-shrink: 0;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    background: rgba(0,0,0,0.2);
  }

  .header h1 {
    margin: 0;
    font-size: 18px;
  }

  .controls {
    display: flex;
    gap: 8px;
    width: 100%;
    justify-content: center;
  }

  button {
    border: none;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 14px;
    font-weight: 700;
    background: var(--accent);
    color: #062033;
    cursor: pointer;
  }

  button.secondary {
    background: #334155;
    color: #fff;
  }

  .status {
    padding: 8px 12px;
    border-radius: 8px;
    background: #1e293b;
    font-size: 13px;
    font-weight: bold;
  }

  .board-area {
    flex-grow: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    min-height: 0;
    position: relative;
  }

  .board {
    position: relative;
  }

  .board-bg {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    overflow: hidden;
    background: #0b1220;
    border: 2px solid rgba(255,255,255,0.1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .board.hint .board-bg {
    background-image: var(--board-preview);
    background-size: 100% 100%;
    background-repeat: no-repeat;
  }

  .boardGrid {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.08) 1px, transparent 1px);
    background-size: calc(100% / 5) calc(100% / 5);
    opacity: 0.5;
  }

  .tray-area {
    flex-shrink: 0;
    height: 125px;
    background: var(--tray-bg);
    border-top: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    padding: 0 10px;
    overflow-x: auto;
    overflow-y: hidden;
    white-space: nowrap;
    gap: 8px;
    touch-action: pan-x; 
  }

  .tray-area::-webkit-scrollbar {
    display: none;
  }

  .piece {
    position: relative;
    flex-shrink: 0;
    user-select: none;
    touch-action: none;
    cursor: grab;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
  }

  .piece.floating {
    position: fixed !important;
    margin: 0 !important;
    cursor: grabbing;
    filter: drop-shadow(0 15px 20px rgba(0,0,0,0.6));
    opacity: 0.95; 
  }

  .piece.locked {
    position: absolute !important;
    cursor: default;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
  }

  .piece svg {
    display: block;
    overflow: visible;
  }

  .piece.correctPulse {
    animation: okpop .25s ease;
  }

  @keyframes okpop {
    0% { transform: scale(1); filter: brightness(1.5); }
    50% { transform: scale(1.05); filter: brightness(1.2); }
    100% { transform: scale(1); filter: brightness(1); }
  }

  .error-msg {
    color: #f87171;
    font-weight: bold;
    text-align: center;
    width: 100%;
  }
</style>
</head>
<body>
<div class="game-app">
  
  <header class="header">
    <h1>🧩 5x5 拼圖任務</h1>
    <div class="controls">
      <button id="btnShuffle">重新打亂</button>
      <button id="btnHint" class="secondary">提示</button>
      <div class="status" id="status">載入中...</div>
    </div>
  </header>

  <main class="board-area" id="boardArea">
    <div id="board" class="board">
      <div class="board-bg">
        <div class="boardGrid"></div>
      </div>
    </div>
  </main>

  <footer class="tray-area" id="tray"></footer>

</div>

<script>
(() => {
  const ROWS = 5;
  const COLS = 5;
  const TOTAL = ROWS * COLS;
  const IMG_SRC = "tms.png";

  const boardArea = document.getElementById("boardArea");
  const board = document.getElementById("board");
  const tray = document.getElementById("tray");
  const statusEl = document.getElementById("status");
  const btnShuffle = document.getElementById("btnShuffle");
  const btnHint = document.getElementById("btnHint");

  let BOARD_SIZE = 300;
  let CELL = 60;
  let TAB = 15;
  let SNAP = 25;
  let showHint = false;
  let highestZ = 1000;

  const pieces = [];
  const edgeMap = [];
  const image = new Image();

  image.onload = () => init();
  
  image.onerror = () => {
    statusEl.textContent = "載入失敗";
    board.innerHTML = `<div class="error-msg">找不到圖片 tms.png</div>`;
  };
  
  image.src = IMG_SRC;

  function init(){
    updateSizes();
    generateEdgeMap();
    buildPieces();
    scatterPieces();
    updateStatus();

    board.style.setProperty("--board-preview", `url("${IMG_SRC}")`);

    window.addEventListener("resize", () => {
      const oldBoard = BOARD_SIZE;
      updateSizes();
      rescalePieces(oldBoard, BOARD_SIZE);
    });

    btnShuffle.addEventListener("click", () => {
      pieces.forEach(p => p.el.dispatchEvent(new PointerEvent("pointercancel")));
      scatterPieces();
      updateStatus();
    });

    btnHint.addEventListener("click", () => {
      showHint = !showHint;
      board.classList.toggle("hint", showHint);
      btnHint.textContent = showHint ? "隱藏提示" : "提示";
    });
  }

  function updateSizes(){
    const maxWidth = boardArea.clientWidth - 20;
    const maxHeight = boardArea.clientHeight - 20;
    BOARD_SIZE = Math.min(maxWidth, maxHeight);
    
    board.style.width = BOARD_SIZE + "px";
    board.style.height = BOARD_SIZE + "px";

    CELL = BOARD_SIZE / COLS;
    TAB = Math.round(CELL * 0.22);
    SNAP = Math.max(20, CELL * 0.25);
  }

  function rescalePieces(oldBoard, newBoard){
    const scale = newBoard / oldBoard;
    
    pieces.forEach(p => {
      p.correctX = p.col * CELL - TAB;
      p.correctY = p.row * CELL - TAB;
      p.width = CELL + TAB * 2;
      p.height = CELL + TAB * 2;

      renderPieceSVG(p);

      if(p.locked){
        p.el.style.left = p.correctX + "px";
        p.el.style.top = p.correctY + "px";
      } else if (p.el.parentElement === board) {
        const currentX = parseFloat(p.el.style.left) || 0;
        const currentY = parseFloat(p.el.style.top) || 0;
        p.el.style.left = (currentX * scale) + "px";
        p.el.style.top = (currentY * scale) + "px";
      }
    });
  }

  function randSign(){
    return Math.random() > 0.5 ? 1 : -1;
  }

  function generateEdgeMap(){
    for(let r = 0; r < ROWS; r++){
      edgeMap[r] = [];
      for(let c = 0; c < COLS; c++){
        const top = r === 0 ? 0 : -edgeMap[r - 1][c].bottom;
        const left = c === 0 ? 0 : -edgeMap[r][c - 1].right;
        const right = c === COLS - 1 ? 0 : randSign();
        const bottom = r === ROWS - 1 ? 0 : randSign();
        edgeMap[r][c] = { top, right, bottom, left };
      }
    }
  }

  function buildPieces(){
    board.querySelectorAll(".piece").forEach(el => el.remove());
    tray.innerHTML = "";
    pieces.length = 0;

    for(let r = 0; r < ROWS; r++){
      for(let c = 0; c < COLS; c++){
        const id = r * COLS + c;
        const piece = {
          id,
          row: r,
          col: c,
          edges: edgeMap[r][c],
          width: CELL + TAB * 2,
          height: CELL + TAB * 2,
          correctX: c * CELL - TAB,
          correctY: r * CELL - TAB,
          locked: false,
          el: document.createElement("div")
        };

        piece.el.className = "piece";
        renderPieceSVG(piece);
        attachDrag(piece);

        pieces.push(piece);
      }
    }
  }

  function renderPieceSVG(piece){
    piece.el.style.width = (CELL + TAB * 2) + "px";
    piece.el.style.height = (CELL + TAB * 2) + "px";

    const path = makePiecePath(piece.edges, CELL, TAB);
    const uid = `clip_${piece.id}_${Math.random().toString(36).slice(2,10)}`;
    const viewW = CELL + TAB * 2;
    const viewH = CELL + TAB * 2;

    piece.el.innerHTML = `
<svg width="${viewW}" height="${viewH}" viewBox="0 0 ${viewW} ${viewH}" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <clipPath id="${uid}" clipPathUnits="userSpaceOnUse">
      <path d="${path}"></path>
    </clipPath>
  </defs>
  <path d="${path}" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.38)" stroke-width="1"></path>
  <image
    href="${IMG_SRC}" xlink:href="${IMG_SRC}"
    x="${-piece.col * CELL + TAB}" y="${-piece.row * CELL + TAB}"
    width="${BOARD_SIZE}" height="${BOARD_SIZE}"
    preserveAspectRatio="none" clip-path="url(#${uid})"></image>
  <path d="${path}" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="1.5"></path>
</svg>
`;
  }

  function makePiecePath(edges, cell, tab){
    const x0 = tab, y0 = tab;
    const x1 = tab + cell, y1 = tab + cell;
    const midX = tab + cell / 2, midY = tab + cell / 2;
    const knobW = cell * 0.22, knobH = tab * 0.95;

    function topSeg(type){
      if(type === 0) return `L ${x1} ${y0}`;
      const dir = -type;
      return `L ${midX - knobW} ${y0} C ${midX - knobW*0.55} ${y0}, ${midX - knobW*0.65} ${y0 + dir*knobH}, ${midX} ${y0 + dir*knobH} C ${midX + knobW*0.65} ${y0 + dir*knobH}, ${midX + knobW*0.55} ${y0}, ${midX + knobW} ${y0} L ${x1} ${y0}`;
    }
    function rightSeg(type){
      if(type === 0) return `L ${x1} ${y1}`;
      const dir = type;
      return `L ${x1} ${midY - knobW} C ${x1} ${midY - knobW*0.55}, ${x1 + dir*knobH} ${midY - knobW*0.65}, ${x1 + dir*knobH} ${midY} C ${x1 + dir*knobH} ${midY + knobW*0.65}, ${x1} ${midY + knobW*0.55}, ${x1} ${midY + knobW} L ${x1} ${y1}`;
    }
    function bottomSeg(type){
      if(type === 0) return `L ${x0} ${y1}`;
      const dir = type;
      return `L ${midX + knobW} ${y1} C ${midX + knobW*0.55} ${y1}, ${midX + knobW*0.65} ${y1 + dir*knobH}, ${midX} ${y1 + dir*knobH} C ${midX - knobW*0.65} ${y1 + dir*knobH}, ${midX - knobW*0.55} ${y1}, ${midX - knobW} ${y1} L ${x0} ${y1}`;
    }
    function leftSeg(type){
      if(type === 0) return `L ${x0} ${y0}`;
      const dir = -type;
      return `L ${x0} ${midY + knobW} C ${x0} ${midY + knobW*0.55}, ${x0 + dir*knobH} ${midY + knobW*0.65}, ${x0 + dir*knobH} ${midY} C ${x0 + dir*knobH} ${midY - knobW*0.65}, ${x0} ${midY - knobW*0.55}, ${x0} ${midY - knobW} L ${x0} ${y0}`;
    }
    return `M ${x0} ${y0} ${topSeg(edges.top)} ${rightSeg(edges.right)} ${bottomSeg(edges.bottom)} ${leftSeg(edges.left)} Z`;
  }

  function scatterPieces(){
    const shuffled = [...pieces].sort(() => Math.random() - 0.5);
    
    shuffled.forEach((p) => {
      p.locked = false;
      p.el.classList.remove("locked", "correctPulse", "floating");
      
      p.el.style.position = "";
      p.el.style.left = "";
      p.el.style.top = "";
      
      tray.appendChild(p.el);
    });
    tray.scrollLeft = 0;
  }

  function attachDrag(piece){
    let dragging = false;
    let offsetX = 0;
    let offsetY = 0;

    piece.el.addEventListener("pointerdown", (e) => {
      if(piece.locked || dragging) return;
      dragging = true;
      piece.el.setPointerCapture(e.pointerId);
      highestZ++;

      const rect = piece.el.getBoundingClientRect();
      offsetX = e.clientX - rect.left;
      offsetY = e.clientY - rect.top;

      piece.el.style.position = "fixed";
      piece.el.style.left = rect.left + "px";
      piece.el.style.top = rect.top + "px";
      piece.el.style.zIndex = highestZ;
      
      document.body.appendChild(piece.el);
      piece.el.classList.add("floating");
    });

    piece.el.addEventListener("pointermove", (e) => {
      if(!dragging) return;
      piece.el.style.left = (e.clientX - offsetX) + "px";
      piece.el.style.top = (e.clientY - offsetY) + "px";
    });

    function endDrag(e){
      if(!dragging) return;
      dragging = false;
      piece.el.classList.remove("floating");

      const boardRect = board.getBoundingClientRect();
      
      const pieceLeft = e.clientX - offsetX;
      const pieceTop = e.clientY - offsetY;
      
      // 取拼圖的中心點座標來判定
      const pieceCenterX = pieceLeft + piece.width / 2;
      const pieceCenterY = pieceTop + piece.height / 2;

      // ★ 判斷 1：檢查中心點是否在「拼圖板」範圍內
      const isOverBoard = (
        pieceCenterX >= boardRect.left &&
        pieceCenterX <= boardRect.right &&
        pieceCenterY >= boardRect.top &&
        pieceCenterY <= boardRect.bottom
      );

      if(isOverBoard){
        // 在拼圖板上放開
        const boardX = pieceLeft - boardRect.left;
        const boardY = pieceTop - boardRect.top;
        
        const dx = boardX - piece.correctX;
        const dy = boardY - piece.correctY;
        const dist = Math.hypot(dx, dy);

        if(dist < SNAP){
          lockPiece(piece); // 吸附成功
        } else {
          // 未吸附，允許留在板子上，但加上「完美貼邊限制 (Clamp)」
          // 確保拼圖不會超出邊界造成畫面凌亂或捲軸出現
          const minX = -TAB;
          const minY = -TAB;
          const maxX = board.clientWidth - piece.width + TAB;
          const maxY = board.clientHeight - piece.height + TAB;

          const clampedX = Math.min(Math.max(minX, boardX), maxX);
          const clampedY = Math.min(Math.max(minY, boardY), maxY);

          leaveOnBoard(piece, clampedX, clampedY); 
        }
      } else {
        // ★ 判斷 2：超出邊界或拉到下方零件區 -> 一律退回清單
        returnToTray(piece);
      }

      updateStatus();
    }

    piece.el.addEventListener("pointerup", endDrag);
    piece.el.addEventListener("pointercancel", endDrag);
  }

  function lockPiece(piece){
    piece.locked = true;
    board.appendChild(piece.el);
    
    piece.el.style.position = "absolute";
    piece.el.style.left = piece.correctX + "px";
    piece.el.style.top = piece.correctY + "px";
    piece.el.style.zIndex = 500 + piece.id;
    
    piece.el.classList.add("locked", "correctPulse");
    setTimeout(() => piece.el.classList.remove("correctPulse"), 260);
  }

  function leaveOnBoard(piece, x, y){
    board.appendChild(piece.el);
    piece.el.style.position = "absolute";
    piece.el.style.left = x + "px";
    piece.el.style.top = y + "px";
    piece.el.style.zIndex = highestZ;
  }

  function returnToTray(piece){
    piece.el.style.position = "";
    piece.el.style.left = "";
    piece.el.style.top = "";
    tray.appendChild(piece.el);
  }

  function updateStatus(){
    const done = pieces.filter(p => p.locked).length;
    statusEl.textContent = `進度 ${done} / ${TOTAL}`;
    if(done === TOTAL){
      statusEl.textContent = `🎉 任務完成！`;
      setTimeout(() => alert("🎉 太棒了！拼圖完成！"), 150);
    }
  }
})();
</script>
</body>
</html>
