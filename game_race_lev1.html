<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
<title>腦脈先鋒｜黃金送醫（三棲任務超長跑酷版）</title>

<style>
  :root{
    --bg:#07080b;
    --road1:#1b1f2a;
    --road2:#111521;
    --text:#e9edf7;
    --accent:#00ffcc;
    --warn:#ffd166;
    --danger:#ff4d4d;
    --shadow:0 12px 40px rgba(0,0,0,.55);
  }

  html,body{
    width:100%; height:100%;
    margin:0; padding:0; overflow:hidden; background:#000; color:var(--text);
    font-family:"PingFang TC","Noto Sans TC",system-ui,-apple-system,sans-serif;
    transition:background-color 1s ease;
  }
  body{ display:flex; justify-content:center; align-items:stretch; }

#speedHud{
  position:absolute;
  left:50%;
  bottom:-24px;
  transform:translateX(-50%);
  font-size:12px;
  font-weight:900;
  color:#fff;
  background:rgba(0,0,0,.55);
  border:1px solid rgba(255,255,255,.2);
  padding:2px 6px;
  border-radius:6px;
  white-space:nowrap;
  text-shadow:0 0 4px rgba(0,0,0,.8);
}

  #wrap{
    position:relative; width:100%; max-width:420px; height:100%;
    display:flex; flex-direction:column; user-select:none; -webkit-user-select:none; touch-action:manipulation;
  }

  #game{
    position:relative; flex:1; width:100%; min-height:0; border:1px solid rgba(255,255,255,.12);
    border-radius:18px; box-shadow:var(--shadow); overflow:hidden;
    background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,0));
  }

  #topHud{
    position:absolute; left:50%; top:10px; transform:translateX(-50%); z-index:12;
    padding:8px 12px; border-radius:14px; background:linear-gradient(180deg, rgba(10,15,25,.82), rgba(10,15,25,.55));
    border:1px solid rgba(255,255,255,.12); box-shadow:0 10px 22px rgba(0,0,0,.28);
    font-weight:900; letter-spacing:.3px; font-size:13px; white-space:nowrap; display:flex; align-items:center; gap:10px;
  }
  #topHud .num{ color:var(--accent); font-variant-numeric:tabular-nums; }
  #topHud.boosting .num{ filter:drop-shadow(0 0 10px rgba(0,255,204,.45)); }
  #timeHud{ opacity:.95; font-weight:900; }
  #timeHud b{ color:#fff; font-variant-numeric:tabular-nums; }

  #wordCollection{
    position:absolute; top:60px; left:50%; transform:translateX(-50%);
    display:flex; gap:8px; z-index:12;
  }
  #wordCollection.hidden{ display:none; }
  .word-slot{
    width:36px; height:36px; border-radius:8px;
    background:rgba(10,15,25,.8); border:2px solid rgba(255,255,255,.2);
    color:rgba(255,255,255,.2);
    display:flex; align-items:center; justify-content:center;
    font-size:20px; font-weight:900; transition:all .3s ease;
    box-shadow:0 4px 10px rgba(0,0,0,.5);
  }
  .word-slot.active{
    background:linear-gradient(180deg, #00ffcc, #00b38f); border-color:#00ffcc;
    color:#000; box-shadow:0 0 15px rgba(0,255,204,.8);
  }

  .road{
    position:absolute; inset:0; transition:background 1s ease;
    background:
      radial-gradient(800px 420px at 50% 20%, rgba(0,255,204,.08), transparent 60%),
      linear-gradient(180deg, var(--road1) 0%, var(--road2) 100%);
  }
  .road::before{
    content:""; position:absolute; inset:-10%; transition:background 1s ease;
    background:linear-gradient(90deg, rgba(0,0,0,0) 0%, rgba(255,255,255,.05) 30%, rgba(255,255,255,.03) 55%, rgba(0,0,0,0) 100%);
    transform:skewX(-12deg); animation:sweep 3.2s linear infinite; opacity:.55;
  }

  body.phase-sky .road{
    background:
      radial-gradient(800px 420px at 50% 20%, rgba(255,255,255,.2), transparent 60%),
      linear-gradient(180deg, #5dade2 0%, #2e86c1 100%);
  }
  body.phase-sky .road::before{
    background:linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.2) 30%, rgba(255,255,255,.1) 55%, rgba(255,255,255,0) 100%);
  }

  body.phase-sea .road{
    background:
      radial-gradient(800px 420px at 50% 20%, rgba(0,255,204,.1), transparent 60%),
      linear-gradient(180deg, #117a65 0%, #0b5345 100%);
  }
  body.phase-sea .road::before{
    background:linear-gradient(90deg, rgba(0,255,204,0) 0%, rgba(0,255,204,.15) 30%, rgba(0,255,204,.05) 55%, rgba(0,255,204,0) 100%);
  }

  @keyframes sweep{
    0%{ transform:translateX(-40%) skewX(-12deg); }
    100%{ transform:translateX(40%) skewX(-12deg); }
  }

  #lanes{ position:absolute; inset:0; pointer-events:none; opacity:.9; }
  .edge{
    position:absolute; top:0; bottom:0; width:4px; transition:background 1s ease;
    background:linear-gradient(180deg, rgba(255,255,255,.40), rgba(255,255,255,.16));
    box-shadow:0 0 10px rgba(255,255,255,.08);
  }
  .edge.left{ left:12%; }
  .edge.right{ right:12%; }
  .divider{
    position:absolute; top:0; bottom:0; width:4px; transition:background 1s ease;
    background:repeating-linear-gradient(180deg, rgba(255,255,255,.30) 0 28px, rgba(255,255,255,0) 28px 54px);
    opacity:.55; filter:drop-shadow(0 0 4px rgba(255,255,255,.06));
  }
  .divider.one{ left:36.5%; }
  .divider.two{ left:63.5%; }

  body.phase-sky .edge, body.phase-sky .divider{
    background:rgba(255,255,255,.4);
    border:1px dashed rgba(255,255,255,.6);
    box-shadow:0 0 10px rgba(255,255,255,.4);
    opacity:.6;
  }
  body.phase-sea .edge, body.phase-sea .divider{
    background:repeating-linear-gradient(180deg, rgba(0,255,204,.35) 0 20px, rgba(0,255,204,0) 20px 40px);
    box-shadow:0 0 10px rgba(0,255,204,.3);
    opacity:.6;
  }

  #weatherOverlay{ position:absolute; inset:0; pointer-events:none; z-index:8; transition:all 1s ease; opacity:0; }
  #weatherOverlay.fog{ opacity:1; background:rgba(230,240,250,.7); backdrop-filter:blur(4px); }
  #weatherOverlay.night{ opacity:1; background:radial-gradient(circle at 50% 85%, transparent 15%, rgba(0,0,0,.98) 60%); }
  #weatherOverlay.rain{ opacity:1; background:rgba(10,20,30,.4); }
  #weatherOverlay.rain::before{
    content:""; position:absolute; width:200%; height:200%; top:-50%; left:-50%;
    background-image:
      linear-gradient(transparent, rgba(255,255,255,.6) 10%, transparent 12%),
      linear-gradient(transparent, rgba(255,255,255,.4) 10%, transparent 12%);
    background-size:20px 100px, 35px 140px;
    background-position:0 0, 15px 50px;
    transform:rotate(15deg);
    animation:rainDrop .25s linear infinite;
    pointer-events:none;
  }
  @keyframes rainDrop{
    0%{ background-position:0 0, 15px 50px; }
    100%{ background-position:0 500px, 15px 750px; }
  }

  #eventText{
    position:absolute; top:35%; left:50%; transform:translate(-50%, -50%);
    z-index:50; color:#fff; font-size:34px; font-weight:1000; letter-spacing:2px;
    text-shadow:0 0 20px rgba(0,255,204,.9), 0 4px 10px rgba(0,0,0,.8);
    pointer-events:none; opacity:0; transition:opacity .3s ease; text-align:center; white-space:nowrap;
  }

  #transitionText{
    position:absolute; top:40%; left:50%; transform:translate(-50%, -50%);
    z-index:50; color:var(--accent); font-size:38px; font-weight:1000; letter-spacing:4px;
    text-shadow:0 0 20px rgba(0,255,204,.8), 0 4px 10px rgba(0,0,0,.8);
    pointer-events:none; opacity:0; transition:opacity .5s; text-align:center;
  }

  #finish{
    position:absolute; left:0; right:0; top:-38%; height:38%; display:flex; align-items:flex-end; justify-content:center; padding-bottom:14px;
    background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(230,236,255,.92));
    color:#0b1220; border-bottom:1px solid rgba(0,0,0,.12); z-index:6;
  }
  #finish .hospital{
    width:86%; height:72%; border-radius:16px;
    background:radial-gradient(120px 90px at 50% 35%, rgba(0,255,204,.25), transparent 55%), #fff;
    box-shadow:0 10px 30px rgba(0,0,0,.18);
    display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden;
  }
  #finish .door{
    position:absolute; bottom:10%; left:50%; transform:translateX(-50%);
    width:46%; height:26%; border-radius:14px;
    background:linear-gradient(180deg, rgba(11,18,32,.12), rgba(11,18,32,.04));
    border:1px solid rgba(11,18,32,.18); box-shadow:inset 0 0 0 2px rgba(255,255,255,.35);
  }
  #finish .sign{
    background:#0b1220; color:#fff; padding:10px 14px; border-radius:14px; font-size:16px; font-weight:900; letter-spacing:.4px;
    display:flex; align-items:center; gap:10px; box-shadow:0 8px 18px rgba(0,0,0,.20);
    opacity:0; transform:translateY(8px); transition:opacity .35s ease, transform .35s ease;
  }
  #finish.success .sign{ opacity:1; transform:translateY(0); }
  #finish .cross{
    width:24px; height:24px; border-radius:7px; background:var(--accent);
    display:grid; place-items:center; color:#00130f; font-weight:900;
  }

  #rail{
    position:absolute; right:10px; top:10px; width:52px; height:78%; z-index:10;
    display:flex; flex-direction:column; align-items:center; gap:10px; pointer-events:none;
  }
  .railPanel{
    width:52px; border-radius:16px; background:linear-gradient(180deg, rgba(10,15,25,.72), rgba(10,15,25,.40));
    border:1px solid rgba(255,255,255,.12); box-shadow:0 10px 22px rgba(0,0,0,.28); overflow:hidden;
  }
  #hospitalMark{ height:40px; display:grid; place-items:center; font-size:18px; }
  #trackBox{ flex:1; position:relative; }
  #trackLine{
    position:absolute; left:50%; top:10px; bottom:10px; width:4px; transform:translateX(-50%);
    background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.06)); border-radius:999px;
  }
  #miniAmb{
    position:absolute; left:50%; transform:translateX(-50%); bottom:10px; width:30px; height:30px;
    display:grid; place-items:center; border-radius:10px; background:rgba(0,255,204,.16);
    border:1px solid rgba(0,255,204,.35); box-shadow:0 10px 18px rgba(0,0,0,.25); font-size:18px; transition:bottom .2s linear;
  }
  #distanceText{
    position:absolute; left:50%; transform:translateX(-50%); bottom:10px; margin-bottom:-32px;
    font-size:11px; opacity:.85; background:rgba(10,15,25,.55); border:1px solid rgba(255,255,255,.10);
    padding:4px 6px; border-radius:10px; white-space:nowrap;
  }

  #player{ position:absolute; bottom:6%; z-index:7; transition:left 120ms ease; transform-origin:center; width:48px; height:78px; }
  #playerSkin{ width:100%; height:100%; position:relative; }

  #playerSkin.carTop{ border-radius:12px 12px 6px 6px; border:1px solid rgba(255,255,255,.3); box-shadow:0 12px 24px rgba(0,0,0,.6); }
  #playerSkin.carTop .body{ position:absolute; inset:0; border-radius:inherit; background:linear-gradient(180deg, #f0f4f8 0%, #cbd5e1 100%); }
  #playerSkin.carTop .glass{ position:absolute; left:6px; right:6px; top:12px; height:16px; border-radius:6px 6px 2px 2px; background:linear-gradient(180deg, #102a43, #334e68); border:2px solid #627d98; opacity:.95; }
  #playerSkin.carTop .lights{ position:absolute; left:8px; right:8px; top:2px; height:6px; display:flex; justify-content:space-between; gap:10px; opacity:1; }
  #playerSkin.carTop .lights span{ flex:1; border-radius:3px; background:#fff; box-shadow:0 -6px 12px rgba(255,255,255,.9); }
  #playerSkin.carTop .sirens{ position:absolute; left:8px; right:8px; top:8px; height:6px; border-radius:3px; background:linear-gradient(90deg, #e12d39 45%, #1992d4 55%); animation:sirenFlash .5s infinite alternate; z-index:3; }
  @keyframes sirenFlash{
    0%{ box-shadow:-12px 0 15px rgba(225,45,57,.8), 12px 0 0 rgba(25,146,212,0); }
    100%{ box-shadow:-12px 0 0 rgba(225,45,57,0), 12px 0 15px rgba(25,146,212,.8); }
  }
  #playerSkin.carTop::before{ content:""; position:absolute; left:50%; top:34px; bottom:8px; width:14px; transform:translateX(-50%); border-radius:4px; background:#e12d39; z-index:1; }
  #playerSkin.carTop::after{ content:"✚"; position:absolute; left:50%; top:44px; transform:translateX(-50%); font-size:12px; font-weight:1000; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.5); z-index:2; }
  #playerSkin.carTop .wheels{ position:absolute; left:-4px; right:-4px; top:14px; bottom:14px; pointer-events:none; }
  #playerSkin.carTop .wheels::before, #playerSkin.carTop .wheels::after{ content:""; position:absolute; top:0; bottom:0; width:6px; border-radius:4px; background:#102a43; box-shadow:inset 0 2px 4px rgba(0,0,0,.8); }
  #playerSkin.carTop .wheels::before{ left:0; }
  #playerSkin.carTop .wheels::after{ right:0; }

  #playerSkin.heliTop .tail{ position:absolute; left:22px; bottom:0; width:4px; height:35px; background:#ddd; }
  #playerSkin.heliTop .body{ position:absolute; left:12px; top:10px; width:24px; height:45px; border-radius:12px; background:linear-gradient(180deg, #ff4d4d, #d9102f); }
  #playerSkin.heliTop .cabin{ position:absolute; left:16px; top:16px; width:16px; height:14px; border-radius:8px 8px 4px 4px; background:#111; opacity:.8; }
  #playerSkin.heliTop .cross{ position:absolute; left:50%; top:38px; transform:translate(-50%, -50%); color:#fff; font-weight:bold; font-size:14px; z-index:3; }
  #playerSkin.heliTop .rotor{ position:absolute; left:-11px; top:30px; width:70px; height:6px; border-radius:3px; background:rgba(255,255,255,.9); animation:spinRotor .15s linear infinite; z-index:4; box-shadow:0 0 5px rgba(0,0,0,.2); }
  #playerSkin.heliTop .rotor::after{ content:""; position:absolute; left:32px; top:-32px; width:6px; height:70px; border-radius:3px; background:rgba(255,255,255,.9); box-shadow:0 0 5px rgba(0,0,0,.2); }
  @keyframes spinRotor{ 100%{ transform:rotate(360deg); } }

  #playerSkin.boatTop .wake{ position:absolute; left:0; right:0; bottom:-15px; height:30px; border-radius:50%; background:rgba(255,255,255,.6); filter:blur(4px); }
  #playerSkin.boatTop .hull{ position:absolute; left:6px; top:5px; width:36px; height:65px; border-radius:50% 50% 10% 10%; background:linear-gradient(180deg, #ff4d4d, #d9102f); border:2px solid rgba(255,255,255,.8); box-shadow:0 5px 10px rgba(0,0,0,.4); }
  #playerSkin.boatTop .cabin{ position:absolute; left:14px; top:25px; width:20px; height:20px; border-radius:6px; background:#111; border:2px solid #fff; opacity:.9; }
  #playerSkin.boatTop .cross{ position:absolute; left:50%; top:48px; transform:translate(-50%, -50%); color:#fff; font-weight:bold; font-size:12px; z-index:3; }

  @keyframes transformAnim{
    0%{ transform:scale(1) rotate(0deg); opacity:1; filter:drop-shadow(0 0 0 var(--accent)); }
    20%{ transform:scale(1.4) rotate(180deg); opacity:.8; filter:drop-shadow(0 0 20px var(--accent)); }
    50%{ transform:scale(.1) rotate(360deg); opacity:0; filter:drop-shadow(0 0 40px var(--accent)); }
    80%{ transform:scale(1.4) rotate(540deg); opacity:.8; filter:drop-shadow(0 0 20px var(--accent)); }
    100%{ transform:scale(1) rotate(720deg); opacity:1; filter:drop-shadow(0 0 0 var(--accent)); }
  }
  .transforming{ animation:transformAnim 4s cubic-bezier(.4,0,.2,1) forwards; }

  #player.flash-green{ filter:drop-shadow(0 0 20px rgba(0,255,204,1)) brightness(1.3); }
  #player.armed{ filter:drop-shadow(0 0 20px rgba(255,235,59,.8)) drop-shadow(0 0 10px rgba(255,152,0,.6)); }
  #player.jumping{ filter:drop-shadow(0 12px 20px rgba(122,168,255,.20)) drop-shadow(0 0 12px rgba(122,168,255,.18)); }
  #player.finishing{ transition:transform 600ms ease, top 600ms ease, left 250ms ease; filter:drop-shadow(0 0 18px rgba(0,255,204,.22)); }

  #ammoFloat{
    position:absolute; left:50%; top:-30px; transform:translateX(-50%);
    min-width:40px; height:24px; padding:0 8px; border-radius:999px; display:flex; align-items:center; justify-content:center;
    background:rgba(10,15,25,.95); color:#ffff00; font-size:14px; font-weight:1000; line-height:1;
    border:1px solid rgba(255,255,0,.8); text-shadow:0 0 5px rgba(255,255,0,.5); pointer-events:none; z-index:15;
  }
  #ammoFloat:not(.empty){ animation:ammoGlow 1.2s ease-in-out infinite alternate; }
  #ammoFloat.empty{ color:rgba(255,255,255,.4); border-color:rgba(255,255,255,.2); background:rgba(10,15,25,.8); box-shadow:none; text-shadow:none; }
  @keyframes ammoGlow{
    from{ box-shadow:0 4px 10px rgba(0,0,0,.4), 0 0 8px rgba(255,255,0,.6); }
    to{ box-shadow:0 4px 10px rgba(0,0,0,.4), 0 0 20px rgba(255,255,0,1); }
  }

  #missionBanner{
    position:absolute; left:50%; top:28%; transform:translateX(-50%);
    width:76%; max-width:none; z-index:100; text-align:center;
    background:transparent; border:none; box-shadow:none;
  }
  #missionTitle{
    color:var(--warn); font-size:18px; font-weight:1000; margin-bottom:10px; letter-spacing:.5px;
    text-shadow:0 2px 6px rgba(0,0,0,.9), 0 0 12px rgba(0,0,0,.7);
  }
  #missionDesc{
    font-size:22px; line-height:1.8; font-weight:900; color:#fff; text-align:center; white-space:normal;
    text-shadow:0 3px 6px rgba(0,0,0,.9), 0 0 10px rgba(0,0,0,.8);
    letter-spacing:1px;
  }
  #startMissionBtn{ font-size:16px; padding:12px 24px; }

  .gate{
    position:absolute; width:80px; height:80px; border-radius:16px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-size:16px; font-weight:900; color:#fff; text-shadow:0 2px 4px rgba(0,0,0,.8);
    box-shadow:0 10px 20px rgba(0,0,0,.5), inset 0 0 10px rgba(255,255,255,.5);
    z-index:8; animation:gateFloat 1s infinite alternate; text-align:center;
  }
  .gate.info-gate{ background:linear-gradient(180deg, #1f618d, #154360); border:2px solid #2980b9; padding:4px; }
  .gate.info-gate span{ font-size:15px; line-height:1.2; word-break:keep-all; }
  .gate.word{ background:linear-gradient(180deg, #1e88e5, #1565c0); border:2px solid #64b5f6; }
  .gate.mystery{ background:linear-gradient(180deg, #9b59b6, #4a235a); border:2px solid #d7bde2; }
  .gate.land{ background:linear-gradient(180deg, #ff7a59, #c62828); border:2px solid #ffb09c; }
  .gate.air{ background:linear-gradient(180deg, #5dade2, #21618c); border:2px solid #aed6f1; }
  .gate.sea{ background:linear-gradient(180deg, #48c9b0, #0e6251); border:2px solid #a2d9ce; }
  .gate .icon{ font-size:36px; margin-top:0; filter:drop-shadow(0 2px 2px rgba(0,0,0,.5)); }
  @keyframes gateFloat{
    0%{ transform:translateY(0); }
    100%{ transform:translateY(-8px); }
  }

  .npcCar{ position:absolute; width:48px; height:78px; border-radius:12px 12px 6px 6px; border:1px solid rgba(255,255,255,.15); box-shadow:0 -10px 20px rgba(0,0,0,.6); transform:rotate(180deg); }
  .npcCar .body{ position:absolute; inset:0; border-radius:inherit; background:linear-gradient(180deg, #566070 0%, #232b38 100%); }
  .npcCar .glass{ position:absolute; left:6px; right:6px; top:12px; height:16px; border-radius:6px 6px 2px 2px; background:linear-gradient(180deg, #1c262b, #37474f); border:2px solid #455a64; opacity:.95; }
  .npcCar .rear-glass{ position:absolute; left:8px; right:8px; bottom:8px; height:10px; border-radius:2px 2px 4px 4px; background:#1c262b; }
  .npcCar .lights{ position:absolute; left:8px; right:8px; top:2px; height:6px; display:flex; justify-content:space-between; gap:10px; opacity:1; }
  .npcCar .lights span{ flex:1; border-radius:3px; background:#fff; box-shadow:0 -6px 12px rgba(255,255,255,.7); }
  .npcCar .taillights{ position:absolute; left:8px; right:8px; bottom:2px; height:4px; display:flex; justify-content:space-between; gap:12px; opacity:.9; }
  .npcCar .taillights span{ flex:1; border-radius:2px; background:#ff5252; box-shadow:0 4px 8px rgba(255,82,82,.8); }
  .npcCar .wheels{ position:absolute; left:-4px; right:-4px; top:14px; bottom:14px; pointer-events:none; }
  .npcCar .wheels::before, .npcCar .wheels::after{ content:""; position:absolute; top:0; bottom:0; width:6px; border-radius:4px; background:#111; box-shadow:inset 0 2px 4px rgba(0,0,0,.8); }
  .npcCar .wheels::before{ left:0; }
  .npcCar .wheels::after{ right:0; }

  .npcBird{ position:absolute; width:48px; height:60px; transform:rotate(180deg); filter:drop-shadow(0 -15px 10px rgba(0,0,0,.4)); }
  .npcBird .body{ position:absolute; left:20px; top:12px; width:8px; height:35px; border-radius:4px 4px 8px 8px; background:#607D8B; }
  .npcBird .body::before{ content:""; position:absolute; left:-2px; top:-8px; width:12px; height:12px; border-radius:50%; background:#455A64; }
  .npcBird .wing{ position:absolute; top:20px; width:22px; height:14px; background:#78909C; animation:flap .3s ease-in-out infinite alternate; }
  .npcBird .wing.left{ right:50%; border-radius:100% 0 0 100%; transform-origin:right center; }
  .npcBird .wing.right{ left:50%; border-radius:0 100% 100% 100% 0; transform-origin:left center; }
  @keyframes flap{
    0%{ transform:scaleX(1); }
    100%{ transform:scaleX(.3); }
  }

  .npcDolphin{ position:absolute; width:48px; height:70px; animation:dolphinJump 1.5s infinite ease-in-out; }

function ensureAudio(){
  if(!audioCtx){
    const AC = window.AudioContext || window.webkitAudioContext;
    if(AC) audioCtx = new AC();
  }
  if(audioCtx && audioCtx.state === "suspended") audioCtx.resume().catch(()=>{});
  if(bgm && bgm.paused){
    bgm.volume = 0.3;
    bgm.play().catch(()=>{});
  }
}

function playTone(freq=440, dur=0.08, type="sine", volume=0.03){
  ensureAudio();
  if(!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}
function sfxShoot(){ playTone(900, 0.15, "triangle", 0.05); setTimeout(()=>playTone(700, 0.15, "triangle", 0.05), 150); }
function sfxHit(){ playTone(180, 0.12, "sawtooth", 0.04); setTimeout(()=>playTone(120, 0.14, "sawtooth", 0.03), 40); }
function sfxPickup(){ playTone(720, 0.05, "triangle", 0.025); setTimeout(()=>playTone(980, 0.06, "triangle", 0.02), 45); }
function sfxGoal(){ playTone(660, 0.10, "triangle", 0.03); setTimeout(()=>playTone(880, 0.12, "triangle", 0.03), 110); setTimeout(()=>playTone(1180, 0.14, "triangle", 0.028), 230); }

function clamp(n, a, b){ return Math.max(a, Math.min(b, n)); }
function rand(msMin, msMax){ return msMin + Math.random() * (msMax - msMin); }
function fmtSec(ms){ return (ms / 1000).toFixed(1); }

function hasAllHospitalWords(){
  return WORD_TARGETS.every((_, i) => {
    const slot = document.getElementById(`slot-${i}`);
    return slot && slot.textContent === WORD_TARGETS[i] && slot.classList.contains("active");
  });
}

function laneCenters(){
  let w = game.clientWidth;
  if(w === 0) w = Math.min(window.innerWidth, 420);
  const leftEdge = w * 0.12;
  const rightEdge = w * 0.88;
  const usable = rightEdge - leftEdge;
  const step = usable / 3;
  return [
    leftEdge + step * 0.5,
    leftEdge + step * 1.5,
    leftEdge + step * 2.5
  ];
}

function setPlayerLane(idx){
  lane = clamp(idx, 0, 2);

}

function updateRelativeDistance(prog){

  distanceText.textContent = "距離 " + Math.max(0, Math.round(100 - prog)) + "%";

function rectInflate(r, pad){
  return {
    left:r.left + pad,
    right:r.right - pad,
    top:r.top + pad,
    bottom:r.bottom - pad
  };
}

function hit(a, b){
  const ar0 = a.getBoundingClientRect();
  const br0 = b.getBoundingClientRect();
  const ar = rectInflate(ar0, COLLISION_PAD);
  const br = rectInflate(br0, COLLISION_PAD);
  return !(ar.right < br.left || ar.left > br.right || ar.bottom < br.top || ar.top > br.bottom);
}

function isTapOnPlayer(clientX, clientY){
  const r = player.getBoundingClientRect();
  const padding = 30;
  
  return clientX >= (r.left - padding) && 
         clientX <= (r.right + padding) && 
         clientY >= (r.top - padding) && 
         clientY <= (r.bottom + padding);
}

function countType(type){

function nearestTopInLane(ln, typeFilter){
  let minTop = Infinity;
  for(const e of entities){
    if(e.dead) continue;
    if(typeFilter && e.type !== typeFilter) continue;
    if(e.lane !== ln) continue;
    const t = e.el.offsetTop;
    if(t < minTop) minTop = t;
  }
  return minTop;
}

function laneSafeForHorizon(ln, horizonSec){
  const playerTop = player.offsetTop;
  for(const e of entities){
    if(e.dead || e.lane !== ln || (e.type !== "npc" && e.type !== "ob")) continue;
    const gap = playerTop - (e.el.offsetTop + e.el.offsetHeight);
    if(gap < -e.el.offsetHeight) continue;
    const fallSpeed = (e.type === "npc") ? (NPC_FALL_BASE * e.v) : OB_FALL;
    if(gap / fallSpeed <= horizonSec) return false;
  }
  return true;
}

function spawnNpcWaveSmart(){
  if(isSpawningGates || isSpawningMystery || isTransitioning) return false;

  const NPC_LANES = [0, 2];
  const safeLanesNow = NPC_LANES.filter(ln => laneSafeForHorizon(ln, SAFE_HORIZON_SEC));
  if(safeLanesNow.length === 0) return false;

  const wantTwo = Math.random() < WAVE_TWO_CAR_PROB;
  const count = wantTwo ? 2 : 1;

  let candidates = safeLanesNow.filter(
    ln => nearestTopInLane(ln, "npc") === Infinity || nearestTopInLane(ln, "npc") > SAME_LANE_MIN_GAP
  );

  if(candidates.length === 0) return false;

  const lanes = [];
  while(lanes.length < Math.min(count, candidates.length)){
    const pick = candidates[Math.floor(Math.random() * candidates.length)];
    if(!lanes.includes(pick)) lanes.push(pick);
  }

  lanes.forEach((ln, idx) => {
    const obj = makeNpcCar(ln);
    obj.el.style.top = (-150 - idx * SPAWN_STAGGER_Y) + "px";
    game.appendChild(obj.el);
    entities.push(obj);
  });

  return true;
}

    { duration:150, iterations:1 }
  );
}

function tryJump(now){
  if(over || finishing || !gameRunning || isTransitioning) return;
  if(now < pauseUntil || now < jumpUntil || now < lastJumpAt + JUMP_COOLDOWN_MS) return;
  lastJumpAt = now;
  jumpUntil = now + JUMP_DURATION_MS;
  player.classList.add("jumping");
  player.animate(
    [{ transform:`translateY(0px) scale(1)` }, { transform:`translateY(${-JUMP_HEIGHT_PX}px) scale(1.04)` }, { transform:`translateY(0px) scale(1)` }],
    { duration:JUMP_DURATION_MS, easing:"cubic-bezier(.2,.8,.2,1)", iterations:1 }
  );
}

function computeJumpLift(now){
  if(now >= jumpUntil) return 0;
  return Math.sin(Math.PI * clamp((now - (jumpUntil - JUMP_DURATION_MS)) / JUMP_DURATION_MS, 0, 1)) * JUMP_HEIGHT_PX;
}
function isJumping(now){ return now < jumpUntil; }

function formatMinSecFromMs(ms){
  const totalSec = Math.round(ms / 1000);
  const mm = Math.floor(totalSec / 60);

}

// ★★★ 遊戲結束(過關)結算與連動機制 ★★★
function gameEnd(){
  if(over) return;
  over = true;
  overlay.style.display = "flex";
  sfxGoal();

  lastRunTimeMs = elapsedMs;
  realTransportMs = elapsedMs * 10; 
  const targetMs = onsetToDoorTargetMin * 60 * 1000;
  const inTime = realTransportMs <= targetMs;

  // 1. 動態計算分數
  let baseScore = inTime ? 1000 : 500;
  let finalScore = Math.floor(baseScore + (maxSpeedKmh * 5) - (penaltyCount * 50));
  if (finalScore < 100) finalScore = 100; // 最低給 100 分

  resultTitle.textContent = inTime ? "✅ 及時到院！" : "⚠️ 未及時到院";
  resultText.innerHTML =
    `遊戲到院時間：${fmtSec(elapsedMs)} 秒<br>` +
    `真實換算時間：${formatMinSecFromMs(realTransportMs)}<br>` +
    `最快時速：${maxSpeedKmh} km/h<br>` +
    `拖延次數：${penaltyCount} 次<br>` +
    `<br><strong style="color:var(--accent); font-size:20px;">🎖️ 本次任務得分：${finalScore}</strong>`;

  // 隱藏單機版教學與排行榜，以防畫面太長
  if (isEmbedded) {
    document.getElementById("rankBox").style.display = "none";
    document.getElementById("instructionText").style.display = "none";
    
    // 將按鈕改為回傳分數給指揮中心
    restartBtn.textContent = "確認成績並返回";
    restartBtn.onclick = () => {
      window.parent.postMessage({ type: 'GAME_CLEAR', score: finalScore }, '*');
    };
  } else {
    document.getElementById("rankBox").style.display = "block";
    document.getElementById("instructionText").style.display = "none";
    
    const top10 = addRank(elapsedMs);
    renderRanks(top10);
    
    restartBtn.textContent = "再跑一次";
    restartBtn.onclick = reset;
  }
}

// ★★★ 遊戲失敗連動機制 ★★★
function gameFail(){
  if(over) return;
  over = true;
  overlay.style.display = "flex";
  sfxHit();
  document.getElementById("rankBox").style.display = "none";
  document.getElementById("instructionText").style.display = "none";
  resultTitle.textContent = "❌ 發生交通事故！";
  resultText.textContent = "不慎發生嚴重碰撞，運送失敗，請重新嘗試。";

  if (isEmbedded) {
    restartBtn.textContent = "任務失敗並返回";
    restartBtn.onclick = () => {
      window.parent.postMessage({ type: 'GAME_OVER' }, '*');
    };
  } else {
    restartBtn.textContent = "再試一次";
    restartBtn.onclick = reset;
  }
}

// 處理左下角強制重來按鈕 (中途放棄)
restartSmallBtn.onclick = () => {
  ensureAudio();
  if (isEmbedded) {
    if(confirm("確定要放棄當前任務嗎？(已扣除的機會將不會歸還)")) {
      window.parent.postMessage({ type: 'GAME_OVER' }, '*');
    }
  } else {
    reset();
  }
};

function tick(now){
  if(!gameRunning || over) return;

  const dt = Math.max(0, Math.min(0.03, (now - lastFrame) / 1000));
  lastFrame = now;
  elapsedMs = now - runStartAt;
timeNowEl.textContent = String(Math.floor(elapsedMs / 1000));

const realNowMs = elapsedMs * 10;
if(realTimeNowEl){
  realTimeNowEl.textContent = `(實際 ${formatMinSecFromMs(realNowMs)})`;
}
  jumpLift = computeJumpLift(now);
  player.style.transform = `translateY(${-jumpLift}px)`;

  if(now >= jumpUntil) player.classList.remove("jumping");

  if(boostStack <= 0){
    player.classList.remove("boosting");
    topHud.classList.remove("boosting");
  }else{
    player.classList.add("boosting");
    topHud.classList.add("boosting");
  }

  if(now < pauseUntil){
    penaltyBox.style.display = "block";
    penaltyBox.querySelector("strong").textContent = String(Math.ceil((pauseUntil - now) / 1000));
    requestAnimationFrame(tick);
    return;
  }else{
    penaltyBox.style.display = "none";
  }

  if(now >= weatherUntil && weatherOverlay.className !== ""){
    weatherOverlay.className = "";
  }

  speedRamp = speedRamp + SPEED_RAMP_PER_SEC * dt;
  const rampedSpeed = BASE_FORWARD_SPEED * (1 + speedRamp);
  const forwardMult = 1 + boostStack * BOOST_PER_STACK;
const currentSpeed = rampedSpeed * forwardMult;

const kmh = Math.round(currentSpeed * 22 + boostStack * 6);

if(kmh > maxSpeedKmh) maxSpeedKmh = kmh;
if(speedHud) speedHud.textContent = kmh + " km/h";

  distance += (rampedSpeed * forwardMult) * DIST_UNIT * dt;

  const left = Math.max(0, Math.ceil(GOAL_DISTANCE - distance));
  distLeftEl.textContent = String(left);

  const prog = clamp((distance / GOAL_DISTANCE) * 100, 0, 100);
  updateRelativeDistance(prog);

  if(hospitalUnlocked && prog > 92){
    finish.style.top = (-38 + 38 * ((prog - 92) / 8)) + "%";
  }
  if(hospitalUnlocked && distance >= GOAL_DISTANCE - 1200){
    finish.style.top = "10%";
  }

  if(distance >= GOAL_DISTANCE){
    if(hasAllHospitalWords()){
      enterHospitalAndWin();
      return;
    }else{
      distance = GOAL_DISTANCE - 60;
    }
  }

  if(finishing){
    requestAnimationFrame(tick);
    return;
  }

  if(!isSpawningGates && !isTransitioning){
    if(distance >= 500 && infoGateCount === 0){
      isSpawningGates = true;
      spawnInfoGates(0);
      infoGateCount = 1;
    }
    if(distance >= 1200 && infoGateCount === 1){
      isSpawningGates = true;
      spawnInfoGates(1);
      infoGateCount = 2;
    }
    if(distance >= 1900 && infoGateCount === 2){
      isSpawningGates = true;
      spawnInfoGates(2);
      infoGateCount = 3;
    }

if(distance >= 22000 && transportGateCount === 0 && firstPhaseWeatherDone){
  isSpawningGates = true;
  spawnTransportGates(false);
  transportGateCount = 1;
}

    if(distance >= 42000 && transportGateCount === 1){
      isSpawningGates = true;
      spawnTransportGates(false);
      transportGateCount = 2;
    }

    if(distance >= 62000 && transportGateCount === 2){
      isSpawningGates = true;
      spawnTransportGates(true);
      transportGateCount = 3;
    }

    if(distance >= 70500 && !phaseFlags.hospText){
  phaseFlags.hospText = true;
  triggerEventText("🏥 選擇後送醫院");
}

if(distance >= 71800 && wordCount === 0){
  isSpawningGates = true;
  spawnWordGates(0);
  wordCount = 1;
}
else if(distance >= 73200 && wordCount === 1){
  isSpawningGates = true;
  spawnWordGates(1);
  wordCount = 2;
}
else if(distance >= 74600 && wordCount === 2){
  isSpawningGates = true;
  spawnWordGates(2);
  wordCount = 3;
}
else if(distance >= 76000 && wordCount === 3){
  isSpawningGates = true;
  spawnWordGates(3);
  wordCount = 4;
}
  }

  if(isTransitioning){
    delaySpawns(now);
    if(now >= transitionSwapTime && !skinSwapped){
      skinSwapped = true;
      setPlayerSkin(nextPhaseTarget);
      setEnvironment(nextPhaseTarget);
      currentPhase = nextPhaseTarget;
    }
    if(now >= transitionUntil){
      isTransitioning = false;
      transitionTextEl.style.opacity = 0;
      playerSkin.classList.remove("transforming");
      delaySpawns(now);
    }
  }

  if(!isSpawningGates && !isSpawningMystery && !isTransitioning && preHospComplete && distance < 70500){
    if(distance >= 18000 && distance <= 18600 && mysteryCount === 0){
      isSpawningMystery = true;
      spawnMysteryGates();
      mysteryCount++;
    }
    else if(distance >= 50000 && distance <= 50600 && mysteryCount === 1){
      isSpawningMystery = true;
      spawnMysteryGates();
      mysteryCount++;
    }
    else{
      if(now >= nextWaveAt){
        const ok = spawnNpcWaveSmart();
        nextWaveAt = now + rand(WAVE_MIN_MS, WAVE_MAX_MS) + (ok ? 0 : 220);
      }
      if(now >= nextObAt){
        spawnObstacle();
        nextObAt = now + rand(OB_MIN_MS, OB_MAX_MS);
      }
      if(now >= nextBoostAt){
        spawnBoost();
        nextBoostAt = now + rand(BOOST_MIN_MS, BOOST_MAX_MS);
      }
      if(now >= nextAmmoAt){
        spawnAmmo();
        nextAmmoAt = now + rand(AMMO_MIN_MS, AMMO_MAX_MS);
      }
    }
  }

  const jumping = isJumping(now);

  for(let i = 0; i < entities.length; i++){
    const e = entities[i];
    if(e.dead) continue;

    const boostMult = 1 + boostStack * BOOST_PER_STACK;
    const enemySpeedMult = (1 + speedRamp * 0.7) * boostMult;
    const itemSpeedMult = (1 + speedRamp * 0.25) * boostMult;

    let speed = OB_FALL;
    if(e.type === "npc") speed = NPC_FALL_BASE * e.v * enemySpeedMult;
    else if(e.type === "ob") speed = OB_FALL * enemySpeedMult;
    else if(e.type === "boost") speed = BOOST_FALL * itemSpeedMult;
    else if(e.type === "ammo") speed = AMMO_FALL * itemSpeedMult;
    else if(e.type.includes("_gate")) speed = OB_FALL * 1.0;

    if(e.type !== "shock"){
      e.el.style.top = (e.el.offsetTop + speed * dt) + "px";
    }

    if(e.type !== "shock" && e.el.offsetTop > game.clientHeight + 160){
      e.dead = true;
     if(e.type === "mystery_gate"){
  markAllGatesDead("mystery_gate");
  isSpawningMystery = false;

  if(mysteryCount === 1){
    firstPhaseWeatherDone = true;
  }

  delaySpawns(now);
}else if(e.type === "transport_gate"){
        markAllGatesDead("transport_gate");
        isSpawningGates = false;
        delaySpawns(now);
      }else if(e.type === "info_gate"){
        hitWrongGate("info", now);
        markAllGatesDead("info_gate");
        isSpawningGates = false;
      }else if(e.type === "word_gate"){
        hitWrongGate("word", now);
        markAllGatesDead("word_gate");
        isSpawningGates = false;
      }
      continue;
    }

    if(e.type !== "shock" && hit(player, e.el)){
if(e.type === "mystery_gate"){
  sfxPickup();
  markAllGatesDead("mystery_gate");
  isSpawningMystery = false;

  const ev = MYSTERY_EVENTS[Math.floor(Math.random() * MYSTERY_EVENTS.length)];
  triggerMysteryEvent(ev, now);

  if(mysteryCount === 1){
    setTimeout(() => {
      firstPhaseWeatherDone = true;
    }, ev.duration);
  }

  delaySpawns(now);
}
      else if(e.type === "transport_gate"){
        sfxPickup();
        const cPh = e.targetPhase;
        const cTxt = "進入" + e.text;
        markAllGatesDead("transport_gate");
        isSpawningGates = false;
        startTransition(cPh, cTxt);
      }
else if(e.type === "info_gate"){
  if(e.isCorrect){
    sfxPickup();

    if(infoGateCount === 3){
      preHospComplete = true;
      triggerEventText("✅ 院前通報完成");
      nextWaveAt = now + 600;
      nextObAt = now + 1200;
      nextBoostAt = now + 1600;
      nextAmmoAt = now + 1800;
    }else{
      triggerEventText("✅ 通報正確");
    }

  }else{
    hitWrongGate("info", now);
  }

  markAllGatesDead("info_gate");
  isSpawningGates = false;
}
      else if(e.type === "word_gate"){
        if(e.isCorrect){
          sfxPickup();
          const slot = document.getElementById(`slot-${currentWordIndex}`);
          if(slot){
            slot.textContent = WORD_TARGETS[currentWordIndex];
            slot.classList.add("active");
          }

if(hasAllHospitalWords()){
  hospitalUnlocked = true;
  finish.style.top = "10%";
}else{
  triggerEventText("✅ 路線正確！");
}

          delaySpawns(now);
        }else{
          hitWrongGate("word", now);
        }
        markAllGatesDead("word_gate");
        isSpawningGates = false;
      }
      else if(e.type === "npc" || e.type === "ob"){
        if(!jumping){
          if(e.type === "npc"){
            gameFail();
            return;
          }else{
            e.dead = true;
            e.el.style.display = "none";
            speedRamp = 0;
            applyPenalty(now);
          }
        }
      }
      else if(e.type === "boost"){
        e.dead = true;
        e.el.style.display = "none";
        applyBoost();
        sfxPickup();
      }
      else if(e.type === "ammo"){
        e.dead = true;
        e.el.style.display = "none";
        ammo++;
        updateAmmoUI();
        sfxPickup();
      }
    }
  }

  for(let i = 0; i < entities.length; i++){
    const e = entities[i];
    if(e.dead || e.type !== "shock") continue;

    const age = now - e.born;
    const r = Math.min(SHOCK_MAX_RADIUS, 9 + (SHOCK_GROW_PX_PER_S * (age / 1000)));
    e.r = r;
    e.el.style.width = (r * 2) + "px";
    e.el.style.height = (r * 2) + "px";
    e.el.style.left = (e.cx - r) + "px";
    e.el.style.top = (e.cy - r) + "px";
    e.el.style.opacity = String(Math.max(0, 1 - age / SHOCK_LIFETIME_MS));

    for(let j = 0; j < entities.length; j++){
      const t = entities[j];
      if(t.dead || t.type !== "ob") continue;
      const ox = t.el.offsetLeft + t.el.offsetWidth / 2;
      const oy = t.el.offsetTop + t.el.offsetHeight / 2;
      if(Math.hypot(ox - e.cx, oy - e.cy) <= r + 18){
        t.dead = true;
        t.el.classList.add("shatter");
        setTimeout(() => { try{ t.el.remove(); }catch{} }, 260);
      }
    }

    if(age >= SHOCK_LIFETIME_MS){
      e.dead = true;
      e.el.style.display = "none";
    }
  }

  for(let i = entities.length - 1; i >= 0; i--){
    if(entities[i].dead){
      if(!entities[i].el.classList.contains("shatter")){
        try{ entities[i].el.remove(); }catch(err){}
      }
      entities.splice(i, 1);
    }
  }

  requestAnimationFrame(tick);
}

function moveLeft(){
  if(!gameRunning || performance.now() < pauseUntil || over || finishing || isTransitioning) return;
  setPlayerLane(lane - 1);
}
function moveRight(){
  if(!gameRunning || performance.now() < pauseUntil || over || finishing || isTransitioning) return;
  setPlayerLane(lane + 1);
}

document.addEventListener("keydown", e => {
  ensureAudio();
  if(e.repeat) return;
  if(e.key === "ArrowLeft") moveLeft();
  if(e.key === "ArrowRight") moveRight();
  if(e.key === "ArrowUp"){ e.preventDefault(); tryShock(performance.now()); }
  if(e.code === "Space"){ e.preventDefault(); tryJump(performance.now()); }
});

leftBtn.addEventListener("click", () => { ensureAudio(); moveLeft(); });
rightBtn.addEventListener("click", () => { ensureAudio(); moveRight(); });
shootBtn.addEventListener("click", () => { ensureAudio(); tryShock(performance.now()); });

let touchStartX = 0;
let touchStartY = 0;
let isCarTouch = false;
const SWIPE_THRESHOLD = 30;

game.addEventListener("touchstart", (e) => {
  ensureAudio();
  if(!gameRunning || over || finishing || performance.now() < pauseUntil || isTransitioning) return;
  const t = e.touches[0];
  if(!t) return;

  touchStartX = t.clientX;
  touchStartY = t.clientY;

  if(isTapOnPlayer(t.clientX, t.clientY)){
    e.preventDefault();
    isCarTouch = true;
    carLongPressTriggered = false;
    clearTimeout(carLongPressTimer);
    carLongPressTimer = setTimeout(() => {
      carLongPressTriggered = true;
      tryJump(performance.now());
    }, CAR_LONG_PRESS_MS);
    return;
  }

  isCarTouch = false;
  e.preventDefault(); 
}, { passive:false });

game.addEventListener("touchend", (e) => {
  clearTimeout(carLongPressTimer);
  const t = e.changedTouches[0];
  if(!t){ carLongPressTriggered = false; isCarTouch = false; return; }

  const deltaX = t.clientX - touchStartX;

  if(isCarTouch){
    e.preventDefault();
    if(!carLongPressTriggered && Math.abs(deltaX) < SWIPE_THRESHOLD){
      tryShock(performance.now());
    }
    carLongPressTriggered = false;
    isCarTouch = false;
    return;
  }

  carLongPressTriggered = false;

  if(Math.abs(deltaX) > SWIPE_THRESHOLD){
     if(deltaX > 0) moveRight();
     else moveLeft();
  } else {
     const rect = game.getBoundingClientRect();
     if(t.clientX - rect.left < rect.width / 2) moveLeft();
     else moveRight();
  }
}, { passive:false });

game.addEventListener("touchcancel", () => {
  clearTimeout(carLongPressTimer);
  carLongPressTriggered = false;
  isCarTouch = false;
});

document.addEventListener("pointerdown", ensureAudio, { once:true });
document.addEventListener("touchstart", ensureAudio, { once:true, passive:true });
document.addEventListener("keydown", ensureAudio, { once:true });

// 移除舊的 restartBtn 監聽器，因為我們在 gameEnd() 裡會動態綁定事件
// restartBtn.addEventListener("click", restart);

if(document.readyState === "loading"){
  document.addEventListener("DOMContentLoaded", () => setTimeout(reset, 50));
}else{
  setTimeout(reset, 50);
}
window.addEventListener("resize", () => setPlayerLane(lane));
</script>
