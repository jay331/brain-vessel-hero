<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
<title>腦脈先鋒｜黃金送醫（視覺強化版）</title>

<style>
  :root{
    --bg:#07080b;
    --road1:#1b1f2a;
    --road2:#111521;
    --text:#e9edf7;
    --accent:#00ffcc;
    --warn:#ffd166;
    --danger:#ff4d4d;
    --shadow:0 12px 40px rgba(0,0,0,.55);
  }

  html,body{
    height:100%; margin:0; overflow:hidden; background:#000; color:var(--text);
    font-family:"PingFang TC","Noto Sans TC",system-ui,-apple-system,sans-serif;
  }
  body{ display:flex; justify-content:center; align-items:stretch; }

  #wrap{
    position:relative; width:100%; max-width:420px; height:100vh; height:100dvh;
    display:flex; flex-direction:column; user-select:none; -webkit-user-select:none; touch-action:manipulation;
  }

  #game{
    position:relative; flex:1; width:100%; min-height:0; border:1px solid rgba(255,255,255,.12);
    border-radius:18px; box-shadow:var(--shadow); overflow:hidden;
    background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0));
  }

  #topHud{
    position:absolute; left:50%; top:10px; transform:translateX(-50%); z-index:12;
    padding:8px 12px; border-radius:14px; background:rgba(10,15,25,.8);
    border:1px solid rgba(255,255,255,.12); font-weight:900; font-size:13px; display:flex; gap:10px;
  }
  #topHud .num{ color:var(--accent); }

  .road{ position:absolute; inset:0; background: linear-gradient(180deg, var(--road1) 0%, var(--road2) 100%); }
  #lanes{ position:absolute; inset:0; pointer-events:none; }
  .edge{ position:absolute; top:0; bottom:0; width:4px; background:rgba(255,255,255,.2); }
  .edge.left{left:12%;} .edge.right{right:12%;}
  .divider{ position:absolute; top:0; bottom:0; width:4px; background:repeating-linear-gradient(180deg, rgba(255,255,255,.2) 0 28px, transparent 28px 54px); }
  .divider.one{left:36.5%;} .divider.two{left:63.5%;}

  /* --- 玩家造型優化 --- */
  #player{
    position:absolute; bottom:6%; z-index:10; transition:left 120ms ease;
    width:48px; height:78px; 
  }
  #playerSkin { width:100%; height:100%; position:relative; }
  
  .carTop { border-radius:14px; box-shadow:0 10px 20px rgba(0,0,0,0.4); }
  .carTop .body{ 
    position:absolute; inset:0; border-radius:14px; 
    background: linear-gradient(180deg, #ffffff 0%, #ccd5e0 100%); /* 前亮後暗區分前後 */
  }
  /* 前擋風玻璃 - 靠前 */
  .carTop .glass{ 
    position:absolute; left:8px; right:8px; top:12px; height:18px; 
    background: #222; border-radius:6px 6px 2px 2px; opacity:0.9;
  }
  /* 玩家車頭燈 */
  .carTop .headlights{
    position:absolute; left:6px; right:6px; top:2px; display:flex; justify-content:space-between;
  }
  .carTop .headlights span{
    width:10px; height:6px; background:#fff; border-radius:2px; 
    box-shadow: 0 -5px 10px #fff;
  }
  /* 十字標誌 */
  .carTop::after{ content:"✚"; position:absolute; left:50%; top:40px; transform:translateX(-50%); font-size:14px; color:#d9102f; z-index:2; }
  /* 警示燈 */
  .carTop .sirens{ 
    position:absolute; left:8px; right:8px; top:32px; height:6px; 
    background:linear-gradient(90deg, #ff4d4d, #00ffcc); animation:flash 0.5s infinite; 
  }

  /* --- 子彈數量移至上方 --- */
  #ammoFloat{
    position:absolute; left:50%; top:-30px; transform:translateX(-50%); 
    padding:2px 10px; border-radius:10px; background:var(--warn); color:#000;
    font-weight:900; font-size:12px; white-space:nowrap; z-index:15;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
  }

  /* --- 對手車輛多樣化 --- */
  .npcCar{ position:absolute; width:48px; height:78px; transform: rotate(180deg); } /* 轉向面對玩家 */
  .npcCar .body{ position:absolute; inset:0; border-radius:12px; }
  .npcCar .glass{ position:absolute; left:8px; right:8px; top:10px; height:15px; background:#111; border-radius:4px; }
  /* 對手燈光 */
  .npcCar .lights{ position:absolute; left:6px; right:6px; top:2px; display:flex; justify-content:space-between; }
  .npcCar .lights span{ width:8px; height:4px; background:#fff; border-radius:2px; opacity:0.8; }
  .npcCar .taillights{ position:absolute; left:6px; right:6px; bottom:4px; display:flex; justify-content:space-between; }
  .npcCar .taillights span{ width:8px; height:3px; background:#ff0000; border-radius:1px; box-shadow: 0 0 5px red; }

  @keyframes flash{ 0%,100%{opacity:0.4} 50%{opacity:1} }

  /* 其他元件 */
  .obstacle{ position:absolute; width:50px; height:50px; background:rgba(255,77,77,0.3); border:2px solid #ff4d4d; border-radius:10px; display:grid; place-items:center; }
  .obstacle::before{ content:"⛔"; font-size:24px; }
  .boost{ position:absolute; width:40px; height:40px; background:rgba(0,255,204,0.2); border:2px solid var(--accent); border-radius:50%; display:grid; place-items:center; color:var(--accent); font-weight:900; }
  .ammoPick{ position:absolute; width:40px; height:40px; background:rgba(255,209,102,0.2); border:2px solid var(--warn); border-radius:10px; display:grid; place-items:center; font-size:20px; }

  #overlay{ position:absolute; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.8); z-index:100; text-align:center; }
  button{ padding:12px 24px; border-radius:10px; border:none; background:var(--accent); color:#000; font-weight:900; cursor:pointer; }
  
  #controls{ margin-top:10px; display:flex; justify-content:center; gap:10px; }
</style>
</head>
<body>

<div id="wrap">
  <div id="game">
    <div class="road"></div>
    <div id="lanes">
      <div class="edge left"></div><div class="edge right"></div>
      <div class="divider one"></div><div class="divider two"></div>
    </div>
    
    <div id="topHud">
      距離 <span class="num" id="distLeft">3500</span>
      時間 <span class="num" id="timeNow">0</span>s
    </div>

    <div id="player">
      <div id="ammoFloat">⚡ 0</div>
      <div id="playerSkin" class="carTop">
        <div class="body"></div>
        <div class="glass"></div>
        <div class="headlights"><span></span><span></span></div>
        <div class="sirens"></div>
      </div>
    </div>

    <div id="overlay">
      <div>
        <h2 id="resTitle">遊戲結束</h2>
        <button onclick="reset()">重新開始</button>
      </div>
    </div>
  </div>

  <div id="controls">
    <button onclick="moveLeft()">⬅️ 左</button>
    <button onclick="tryShock()">⚡ 震波</button>
    <button onclick="moveRight()">右 ➡️</button>
  </div>
</div>

<script>
const game = document.getElementById("game");
const player = document.getElementById("player");
const ammoFloat = document.getElementById("ammoFloat");
const distLeftEl = document.getElementById("distLeft");
const timeNowEl = document.getElementById("timeNow");

let lane = 1;
let distance = 0;
let ammo = 3;
let entities = [];
let over = false;
let startTime = Date.now();
const GOAL = 3500;

const COLORS = [
  'linear-gradient(180deg, #2e86c1 0%, #1b4f72 100%)', // 藍
  'linear-gradient(180deg, #884ea0 0%, #512e5f 100%)', // 紫
  'linear-gradient(180deg, #d35400 0%, #873600 100%)', // 橘
  'linear-gradient(180deg, #283747 0%, #17202a 100%)', // 黑
  'linear-gradient(180deg, #cb4335 0%, #7b241c 100%)'  // 紅
];

function laneCenters() {
  const w = game.clientWidth;
  const edge = w * 0.12;
  const usable = w * 0.76;
  const step = usable / 3;
  return [edge + step*0.5, edge + step*1.5, edge + step*2.5];
}

function updateUI() {
  distLeftEl.textContent = Math.max(0, Math.floor(GOAL - distance));
  timeNowEl.textContent = Math.floor((Date.now() - startTime) / 1000);
  ammoFloat.textContent = `⚡ ${ammo}`;
  const centers = laneCenters();
  player.style.left = (centers[lane] - 24) + "px";
}

function spawn() {
  if(over) return;
  const randL = Math.floor(Math.random() * 3);
  const type = Math.random();
  let ent = { lane: randL, el: document.createElement("div") };
  
  if(type < 0.7) {
    ent.type = "npc";
    ent.el.className = "npcCar";
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
    ent.el.innerHTML = `<div class="body" style="background:${color}"></div><div class="glass"></div><div class="lights"><span></span><span></span></div><div class="taillights"><span></span><span></span></div>`;
  } else if(type < 0.85) {
    ent.type = "ob";
    ent.el.className = "obstacle";
  } else {
    ent.type = "ammo";
    ent.el.className = "ammoPick";
    ent.el.textContent = "⚡";
  }
  
  ent.el.style.left = (laneCenters()[randL] - 24) + "px";
  ent.el.style.top = "-100px";
  game.appendChild(ent.el);
  entities.push(ent);
}

function moveLeft() { if(lane > 0) lane--; updateUI(); }
function moveRight() { if(lane < 2) lane--; lane = (lane+1)%3; /* 簡化邏輯 */ lane = Math.min(2, Math.max(0, lane)); updateUI(); }
// 修正點擊
window.moveLeft = () => { if(lane > 0) lane--; updateUI(); };
window.moveRight = () => { if(lane < 2) lane++; updateUI(); };

function tryShock() {
  if(ammo <= 0) return;
  ammo--;
  updateUI();
  // 震波邏輯：清除畫面上所有障礙
  entities.forEach(e => {
    if(e.type === "npc" || e.type === "ob") {
      e.el.style.transform += " scale(1.5)";
      e.el.style.opacity = "0";
      setTimeout(() => e.el.remove(), 200);
    }
  });
  entities = entities.filter(e => e.type === "ammo");
}

function reset() {
  entities.forEach(e => e.el.remove());
  entities = [];
  distance = 0;
  ammo = 3;
  over = false;
  startTime = Date.now();
  document.getElementById("overlay").style.display = "none";
  updateUI();
}

function tick() {
  if(over) return;
  distance += 2;
  updateUI();

  if(distance >= GOAL) {
    over = true;
    document.getElementById("resTitle").textContent = "抵達醫院！";
    document.getElementById("overlay").style.display = "flex";
  }

  entities.forEach((ent, i) => {
    let top = parseInt(ent.el.style.top);
    top += 5;
    ent.el.style.top = top + "px";

    // 碰撞偵測
    const pRect = player.getBoundingClientRect();
    const eRect = ent.el.getBoundingClientRect();
    
    if(!(pRect.right < eRect.left || pRect.left > eRect.right || pRect.bottom < eRect.top || pRect.top > eRect.bottom)) {
      if(ent.type === "ammo") {
        ammo++;
        ent.el.remove();
        entities.splice(i, 1);
      } else {
        over = true;
        document.getElementById("resTitle").textContent = "發生車禍！";
        document.getElementById("overlay").style.display = "flex";
      }
    }

    if(top > game.clientHeight) {
      ent.el.remove();
      entities.splice(i, 1);
    }
  });

  if(Math.random() < 0.02) spawn();
  requestAnimationFrame(tick);
}

// 監聽鍵盤
document.addEventListener("keydown", e => {
  if(e.key === "ArrowLeft") moveLeft();
  if(e.key === "ArrowRight") moveRight();
  if(e.key === "ArrowUp") tryShock();
});

updateUI();
tick();
</script>
</body>
</html>
