<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
<title>腦脈先鋒｜黃金送醫（全俯視變形版＋自選路線）</title>

<style>
  :root{
    --bg:#07080b;
    --road1:#1b1f2a;
    --road2:#111521;
    --text:#e9edf7;
    --accent:#00ffcc;
    --warn:#ffd166;
    --danger:#ff4d4d;
    --shadow:0 12px 40px rgba(0,0,0,.55);
  }

  html,body{
    width: 100%; height: 100%; /* 強制滿版，防止 Flex 壓縮變黑畫面 */
    margin:0; padding:0; overflow:hidden; background:#000; color:var(--text);
    font-family:"PingFang TC","Noto Sans TC",system-ui,-apple-system,sans-serif;
    transition: background-color 1s ease;
  }
  body{ display:flex; justify-content:center; align-items:stretch; }

  #wrap{
    position:relative; width:100%; max-width:420px; height:100%;
    display:flex; flex-direction:column; user-select:none; -webkit-user-select:none; touch-action:manipulation;
  }

  #game{
    position:relative; flex:1; width:100%; min-height:0; border:1px solid rgba(255,255,255,.12);
    border-radius:18px; box-shadow:var(--shadow); overflow:hidden;
    background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,0));
  }

  #topHud{
    position:absolute; left:50%; top:10px; transform:translateX(-50%); z-index:12;
    padding:8px 12px; border-radius:14px; background:linear-gradient(180deg, rgba(10,15,25,.82), rgba(10,15,25,.55));
    border:1px solid rgba(255,255,255,.12); box-shadow:0 10px 22px rgba(0,0,0,.28);
    font-weight:900; letter-spacing:.3px; font-size:13px; white-space:nowrap; display:flex; align-items:center; gap:10px;
  }
  #topHud .num{ color:var(--accent); font-variant-numeric:tabular-nums; }
  #topHud.boosting .num{ filter:drop-shadow(0 0 10px rgba(0,255,204,.45)); }
  #timeHud{opacity:.95;font-weight:900;}
  #timeHud b{color:#fff;font-variant-numeric:tabular-nums;}

  /* --- 場景背景切換 --- */
  .road{ position:absolute; inset:0; transition: background 1s ease; background: radial-gradient(800px 420px at 50% 20%, rgba(0,255,204,.08), transparent 60%), linear-gradient(180deg, var(--road1) 0%, var(--road2) 100%); }
  .road::before{ content:""; position:absolute; inset:-10%; transition: background 1s ease; background:linear-gradient(90deg, rgba(0,0,0,0) 0%, rgba(255,255,255,.05) 30%, rgba(255,255,255,.03) 55%, rgba(0,0,0,0) 100%); transform:skewX(-12deg); animation:sweep 3.2s linear infinite; opacity:.55; }
  
  body.phase-sky .road { background: radial-gradient(800px 420px at 50% 20%, rgba(255,255,255,.2), transparent 60%), linear-gradient(180deg, #5dade2 0%, #2e86c1 100%); }
  body.phase-sky .road::before { background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.2) 30%, rgba(255,255,255,.1) 55%, rgba(255,255,255,0) 100%); }
  body.phase-sea .road { background: radial-gradient(800px 420px at 50% 20%, rgba(0,255,204,.1), transparent 60%), linear-gradient(180deg, #117a65 0%, #0b5345 100%); }
  body.phase-sea .road::before { background: linear-gradient(90deg, rgba(0,255,204,0) 0%, rgba(0,255,204,.15) 30%, rgba(0,255,204,.05) 55%, rgba(0,255,204,0) 100%); }

  @keyframes sweep{ 0%{transform:translateX(-40%) skewX(-12deg);} 100%{transform:translateX(40%) skewX(-12deg);} }

  #lanes{ position:absolute; inset:0; pointer-events:none; opacity:.9; }
  .edge{ position:absolute; top:0; bottom:0; width:4px; transition: background 1s ease; background:linear-gradient(180deg, rgba(255,255,255,.40), rgba(255,255,255,.16)); box-shadow:0 0 10px rgba(255,255,255,.08); }
  .edge.left{left:12%;} .edge.right{right:12%;}
  .divider{ position:absolute; top:0; bottom:0; width:4px; transition: background 1s ease; background:repeating-linear-gradient(180deg, rgba(255,255,255,.30) 0 28px, rgba(255,255,255,0) 28px 54px); opacity:.55; filter:drop-shadow(0 0 4px rgba(255,255,255,.06)); }
  .divider.one{left:36.5%;} .divider.two{left:63.5%;}

  body.phase-sky .edge, body.phase-sky .divider { background: rgba(255,255,255, 0.4); border: 1px dashed rgba(255,255,255, 0.6); box-shadow: 0 0 10px rgba(255,255,255,0.4); opacity: 0.6;}
  body.phase-sea .edge, body.phase-sea .divider { background: repeating-linear-gradient(180deg, rgba(0,255,204,.35) 0 20px, rgba(0,255,204,0) 20px 40px); box-shadow: 0 0 10px rgba(0,255,204,0.3); opacity: 0.6;}

  #finish{ position:absolute; left:0; right:0; top:-38%; height:38%; display:flex; align-items:flex-end; justify-content:center; padding-bottom:14px; background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(230,236,255,.92)); color:#0b1220; border-bottom:1px solid rgba(0,0,0,.12); z-index:6; }
  #finish .hospital{ width:86%; height:72%; border-radius:16px; background:radial-gradient(120px 90px at 50% 35%, rgba(0,255,204,.25), transparent 55%), #ffffff; box-shadow:0 10px 30px rgba(0,0,0,.18); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
  #finish .door{ position:absolute; bottom:10%; left:50%; transform:translateX(-50%); width:46%; height:26%; border-radius:14px; background:linear-gradient(180deg, rgba(11,18,32,.12), rgba(11,18,32,.04)); border:1px solid rgba(11,18,32,.18); box-shadow:inset 0 0 0 2px rgba(255,255,255,.35); }
  #finish .sign{ background:#0b1220; color:#fff; padding:10px 14px; border-radius:14px; font-size:16px; font-weight:900; letter-spacing:.4px; display:flex; align-items:center; gap:10px; box-shadow:0 8px 18px rgba(0,0,0,.20); opacity:0; transform:translateY(8px); transition:opacity .35s ease, transform .35s ease; }
  #finish.success .sign{ opacity:1; transform:translateY(0); }
  #finish .cross{ width:24px; height:24px; border-radius:7px; background:var(--accent); display:grid; place-items:center; color:#00130f; font-weight:900; }

  #rail{ position:absolute; right:10px; top:10px; width:52px; height:78%; z-index:10; display:flex; flex-direction:column; align-items:center; gap:10px; pointer-events:none; }
  .railPanel{ width:52px; border-radius:16px; background:linear-gradient(180deg, rgba(10,15,25,.72), rgba(10,15,25,.40)); border:1px solid rgba(255,255,255,.12); box-shadow:0 10px 22px rgba(0,0,0,.28); overflow:hidden; }
  #hospitalMark{ height:40px; display:grid; place-items:center; font-size:18px; }
  #trackBox{ flex:1; position:relative; }
  #trackLine{ position:absolute; left:50%; top:10px; bottom:10px; width:4px; transform:translateX(-50%); background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.06)); border-radius:999px; }
  #miniAmb{ position:absolute; left:50%; transform:translateX(-50%); bottom:10px; width:30px; height:30px; display:grid; place-items:center; border-radius:10px; background:rgba(0,255,204,.16); border:1px solid rgba(0,255,204,.35); box-shadow:0 10px 18px rgba(0,0,0,.25); font-size:18px; }
  #distanceText{ position:absolute; left:50%; transform:translateX(-50%); bottom:10px; margin-bottom:-32px; font-size:11px; opacity:.85; background:rgba(10,15,25,.55); border:1px solid rgba(255,255,255,.10); padding:4px 6px; border-radius:10px; white-space:nowrap; }

  #transitionText {
    position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
    z-index: 50; color: var(--accent); font-size: 38px; font-weight: 1000; letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(0,255,204,0.8), 0 4px 10px rgba(0,0,0,0.8);
    pointer-events: none; opacity: 0; transition: opacity 0.5s; text-align: center;
  }

  /* --- 玩家容器 --- */
  #player{
    position:absolute; bottom:6%; z-index:7; transition:left 120ms ease;
    transform-origin:center; width:48px; height:78px; 
  }
  #playerSkin { width: 100%; height: 100%; position: relative; }

  #playerSkin.carTop { border-radius:14px; border:1px solid rgba(255,255,255,.14); box-shadow:0 16px 26px rgba(0,0,0,.35); }
  #playerSkin.carTop .body{ position:absolute; inset:0; border-radius:14px; background: radial-gradient(26px 26px at 30% 20%, rgba(255,255,255,.95), rgba(255,255,255,0) 60%), linear-gradient(180deg, #ffffff 0%, #e8edf5 100%); }
  #playerSkin.carTop::before{ content:""; position:absolute; left:50%; top:26px; transform:translateX(-50%); width:14px; height:36px; border-radius:8px; background:linear-gradient(180deg, #ff4d4d 0%, #d9102f 100%); opacity:.96; z-index:1; }
  #playerSkin.carTop::after{ content:"✚"; position:absolute; left:50%; top:32px; transform:translateX(-50%); font-size:12px; font-weight:1000; color:#d9102f; z-index:2; }
  #playerSkin.carTop .glass{ position:absolute; left:9px; right:9px; top:12px; height:16px; border-radius:10px; background:linear-gradient(180deg, rgba(255,255,255,.8), rgba(255,255,255,.3)); border:1px solid rgba(255,255,255,.12); opacity:.92; }
  #playerSkin.carTop .lights{ position:absolute; left:9px; right:9px; top:4px; height:6px; display:flex; justify-content:space-between; gap:7px; opacity:.9; }
  #playerSkin.carTop .lights span{ flex:1; border-radius:4px; background:linear-gradient(180deg, #fff, rgba(255,255,255,.5)); box-shadow:0 -4px 10px rgba(255,255,255,.8); }
  #playerSkin.carTop .wheels{ position:absolute; left:4px; right:4px; top:16px; bottom:16px; pointer-events:none; }
  #playerSkin.carTop .wheels::before, #playerSkin.carTop .wheels::after{ content:""; position:absolute; top:0; bottom:0; width:7px; border-radius:9px; background:rgba(0,0,0,.35); }
  #playerSkin.carTop .wheels::before{left:0;} #playerSkin.carTop .wheels::after{right:0;}
  #playerSkin.carTop .sirens{ position:absolute; left:9px; right:9px; top:36px; height:10px; border-radius:6px; background:linear-gradient(90deg, rgba(0,255,204,.10), rgba(0,255,204,.92), rgba(0,255,204,.10)); filter:drop-shadow(0 0 10px rgba(0,255,204,.45)); animation:flash 0.7s linear infinite; opacity:.95; z-index:3; }

  #playerSkin.heliTop .tail { position: absolute; left: 22px; bottom: 0; width: 4px; height: 35px; background: #ddd; }
  #playerSkin.heliTop .body { position: absolute; left: 12px; top: 10px; width: 24px; height: 45px; border-radius: 12px; background: linear-gradient(180deg, #ff4d4d, #d9102f); }
  #playerSkin.heliTop .cabin { position: absolute; left: 16px; top: 16px; width: 16px; height: 14px; border-radius: 8px 8px 4px 4px; background: #111; opacity: 0.8; }
  #playerSkin.heliTop .cross { position: absolute; left: 50%; top: 38px; transform: translate(-50%, -50%); color: white; font-weight: bold; font-size: 14px; z-index: 3; }
  #playerSkin.heliTop .rotor { position: absolute; left: -11px; top: 30px; width: 70px; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.9); animation: spinRotor 0.15s linear infinite; z-index: 4; box-shadow: 0 0 5px rgba(0,0,0,0.2); }
  #playerSkin.heliTop .rotor::after { content: ""; position: absolute; left: 32px; top: -32px; width: 6px; height: 70px; border-radius: 3px; background: rgba(255,255,255,0.9); box-shadow: 0 0 5px rgba(0,0,0,0.2); }
  @keyframes spinRotor { 100% { transform: rotate(360deg); } }

  #playerSkin.boatTop .wake { position: absolute; left: 0; right: 0; bottom: -15px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.6); filter: blur(4px); }
  #playerSkin.boatTop .hull { position: absolute; left: 6px; top: 5px; width: 36px; height: 65px; border-radius: 50% 50% 10% 10%; background: linear-gradient(180deg, #ff4d4d, #d9102f); border: 2px solid rgba(255,255,255,0.8); box-shadow: 0 5px 10px rgba(0,0,0,0.4); }
  #playerSkin.boatTop .cabin { position: absolute; left: 14px; top: 25px; width: 20px; height: 20px; border-radius: 6px; background: #111; border: 2px solid #fff; opacity: 0.9; }
  #playerSkin.boatTop .cross { position: absolute; left: 50%; top: 48px; transform: translate(-50%, -50%); color: white; font-weight: bold; font-size: 12px; z-index: 3; }

  @keyframes transformAnim {
    0%   { transform: scale(1) rotate(0deg); opacity: 1; filter: drop-shadow(0 0 0px var(--accent)); }
    20%  { transform: scale(1.4) rotate(180deg); opacity: 0.8; filter: drop-shadow(0 0 20px var(--accent)); }
    50%  { transform: scale(0.1) rotate(360deg); opacity: 0; filter: drop-shadow(0 0 40px var(--accent)); }
    80%  { transform: scale(1.4) rotate(540deg); opacity: 0.8; filter: drop-shadow(0 0 20px var(--accent)); }
    100% { transform: scale(1) rotate(720deg); opacity: 1; filter: drop-shadow(0 0 0px var(--accent)); }
  }
  .transforming { animation: transformAnim 5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

  #player.boosting{ filter:drop-shadow(0 0 18px rgba(0,255,204,.35)); }
  #player.jumping{ filter:drop-shadow(0 12px 20px rgba(122,168,255,.20)) drop-shadow(0 0 12px rgba(122,168,255,.18)); }
  #player.finishing{ transition:transform 600ms ease, top 600ms ease, left 250ms ease; filter:drop-shadow(0 0 18px rgba(0,255,204,.22)); }
  @keyframes flash{ 0%{opacity:.25} 50%{opacity:1} 100%{opacity:.25} }

  #ammoFloat{
    position:absolute; left:50%; bottom:-24px; transform:translateX(-50%); min-width:38px; height:22px; padding:0 8px;
    border-radius:999px; display:flex; align-items:center; justify-content:center; background:rgba(255,209,102,.92); color:#1b1400; font-size:12px;
    font-weight:1000; line-height:1; box-shadow:0 6px 14px rgba(0,0,0,.28); border:1px solid rgba(255,255,255,.35); pointer-events:none; z-index:12;
  }
  #ammoFloat:not(.empty){ animation:ammoGlow 1.2s ease-in-out infinite alternate; }
  #ammoFloat.empty{ background:rgba(255,255,255,.22); color:rgba(255,255,255,.78); }
  @keyframes ammoGlow{ from{ box-shadow:0 6px 14px rgba(0,0,0,.28), 0 0 8px rgba(255,209,102,.4); } to{ box-shadow:0 6px 14px rgba(0,0,0,.28), 0 0 18px rgba(255,209,102,.8); } }

  /* --- 選擇傳送門 --- */
  .gate {
    position: absolute; width: 80px; height: 80px; border-radius: 16px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 900; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(255,255,255,0.5);
    z-index: 8; animation: gateFloat 1s infinite alternate;
  }
  .gate.land { background: linear-gradient(180deg, #ff7a59, #c62828); border: 2px solid #ffb09c; }
  .gate.air { background: linear-gradient(180deg, #5dade2, #21618c); border: 2px solid #aed6f1; }
  .gate.sea { background: linear-gradient(180deg, #48c9b0, #0e6251); border: 2px solid #a2d9ce; }
  .gate .icon { font-size: 26px; margin-top: 4px; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5)); }
  @keyframes gateFloat { 0% { transform: translateY(0); } 100% { transform: translateY(-8px); } }

  /* --- 敵人容器 --- */
  .npcCar{ 
    position:absolute; width:48px; height:78px; border-radius:14px; 
    border:1px solid rgba(255,255,255,.3); box-shadow:0 -10px 20px rgba(0,0,0,.6), 0 0 12px rgba(255,100,50,.5); 
    transform: rotate(180deg);
  }
  .npcCar .body{ background: radial-gradient(26px 26px at 30% 20%, rgba(255,255,255,.5), rgba(255,255,255,0) 60%), linear-gradient(180deg, #ff7a59 0%, #c62828 100%); border-radius:14px; }
  .npcCar .glass{ position:absolute; left:9px; right:9px; top:12px; height:16px; border-radius:10px; background:linear-gradient(180deg, rgba(255,255,255,.8), rgba(255,255,255,.3)); border:1px solid rgba(255,255,255,.5); opacity:.92; }
  .npcCar .lights{ position:absolute; left:9px; right:9px; top:4px; height:6px; display:flex; justify-content:space-between; gap:7px; opacity:.9; }
  .npcCar .lights span{ flex:1; border-radius:4px; background:linear-gradient(180deg, #fff, rgba(255,255,255,.5)); box-shadow:0 -4px 10px rgba(255,255,255,.8); }
  .npcCar .taillights{ position:absolute; left:9px; right:9px; bottom:4px; height:4px; display:flex; justify-content:space-between; gap:7px; opacity:.8; }
  .npcCar .taillights span{ flex:1; border-radius:4px; background:#ff4d4d; box-shadow:0 0 6px red; }
  .npcCar .wheels{ position:absolute; left:4px; right:4px; top:16px; bottom:16px; pointer-events:none; }
  .npcCar .wheels::before, .npcCar .wheels::after{ content:""; position:absolute; top:0; bottom:0; width:7px; border-radius:9px; background:rgba(0,0,0,.8); }
  .npcCar .wheels::before{left:0;} .npcCar .wheels::after{right:0;}

  .npcBird { position: absolute; width: 48px; height: 60px; transform: rotate(180deg); filter: drop-shadow(0 -15px 10px rgba(0,0,0,0.4)); }
  .npcBird .body { position: absolute; left: 20px; top: 12px; width: 8px; height: 35px; border-radius: 4px 4px 8px 8px; background: #607D8B; }
  .npcBird .body::before { content: ""; position: absolute; left: -2px; top: -8px; width: 12px; height: 12px; border-radius: 50%; background: #455A64; }
  .npcBird .wing { position: absolute; top: 20px; width: 22px; height: 14px; background: #78909C; animation: flap 0.3s ease-in-out infinite alternate; }
  .npcBird .wing.left { right: 50%; border-radius: 100% 0 0 100%; transform-origin: right center; }
  .npcBird .wing.right { left: 50%; border-radius: 0 100% 100% 0; transform-origin: left center; }
  @keyframes flap { 0% { transform: scaleX(1); } 100% { transform: scaleX(0.3); } }

  .npcDolphin { position: absolute; width: 48px; height: 70px; animation: dolphinJump 1.5s infinite ease-in-out; }
  .npcDolphin .body { position: absolute; left: 16px; top: 10px; width: 16px; height: 50px; border-radius: 50% 50% 10% 10%; background: #0091EA; }
  .npcDolphin .body::after { content: ""; position: absolute; left: 4px; top: -6px; width: 8px; height: 10px; border-radius: 50%; background: #00B0FF; } 
  .npcDolphin .fin { position: absolute; top: 25px; width: 14px; height: 8px; background: #0091EA; }
  .npcDolphin .fin.left { right: 32px; border-radius: 100% 0 0 100%; transform: rotate(-25deg); }
  .npcDolphin .fin.right { left: 32px; border-radius: 0 100% 100% 0; transform: rotate(25deg); }
  .npcDolphin .tail { position: absolute; left: 10px; bottom: -2px; width: 28px; height: 12px; background: #0091EA; border-radius: 50% 50% 0 0; }
  @keyframes dolphinJump {
      0%, 100% { transform: scale(0.85) rotate(180deg); filter: drop-shadow(0 -5px 5px rgba(0,0,0,0.2)); opacity: 0.7; }
      50% { transform: scale(1.15) rotate(180deg); filter: drop-shadow(0 -20px 15px rgba(0,0,0,0.4)); opacity: 1; }
  }

  .boost{ position:absolute; width:46px; height:46px; border-radius:14px; background:radial-gradient(22px 22px at 35% 35%, rgba(255,255,255,.25), rgba(255,255,255,0) 60%), linear-gradient(180deg, rgba(0,255,204,.22), rgba(0,255,204,.08)); border:1px solid rgba(0,255,204,.35); box-shadow:0 14px 24px rgba(0,0,0,.28), 0 0 18px rgba(0,255,204,.10); display:grid; place-items:center; }
  .boost::before{ content:">>"; font-weight:1000; letter-spacing:-2px; font-size:20px; color:rgba(0,255,204,.95); filter:drop-shadow(0 0 10px rgba(0,255,204,.28)); transform:translateY(-1px); }
  .ammoPick{ position:absolute; width:44px; height:44px; border-radius:14px; background:radial-gradient(20px 20px at 35% 35%, rgba(255,255,255,.22), rgba(255,255,255,0) 60%), linear-gradient(180deg, rgba(255,209,102,.22), rgba(255,209,102,.08)); border:1px solid rgba(255,209,102,.35); box-shadow:0 14px 24px rgba(0,0,0,.28), 0 0 18px rgba(255,209,102,.10); display:grid; place-items:center; font-size:18px; }
  .ammoPick::before{content:"⚡";}
  .obstacle{ position:absolute; width:54px; height:54px; border-radius:18px; background:radial-gradient(18px 18px at 35% 35%, rgba(255,255,255,.08), rgba(255,255,255,0) 60%), linear-gradient(180deg, rgba(255,77,77,.18), rgba(255,77,77,.06)); border:1px solid rgba(255,77,77,.25); box-shadow:0 16px 26px rgba(0,0,0,.38); display:grid; place-items:center; font-weight:1000; color:rgba(255,77,77,.92); }
  .obstacle::before{ content:"⛔"; font-size:22px; }
  .shock{ position:absolute; width:18px; height:18px; border-radius:999px; border:2px solid rgba(255,209,102,.95); box-shadow:0 0 18px rgba(255,209,102,.18); z-index:9; pointer-events:none; }
  .shatter{animation:shatter .28s ease-out forwards;}
  @keyframes shatter{ 0%{transform:scale(1);filter:brightness(1.1);} 100%{transform:scale(1.45);opacity:0;filter:brightness(1.8) blur(1px);} }
  #penalty{ position:absolute; left:50%; top:54%; transform:translate(-50%,-50%); padding:10px 12px; border-radius:14px; background:rgba(0,0,0,.55); border:1px solid rgba(255,255,255,.16); box-shadow:0 12px 30px rgba(0,0,0,.45); display:none; z-index:15; text-align:center; font-weight:900; letter-spacing:.3px; }
  #penalty strong{color:var(--warn);} #penalty .sub{ display:block; margin-top:4px; font-size:12px; opacity:.85; font-weight:700; }
  #controls{ margin-top:10px; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .btnRow{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  button{ border:none; border-radius:16px; padding:14px 12px; color:var(--text); background:linear-gradient(180deg, rgba(10,15,25,.85), rgba(10,15,25,.55)); border:1px solid rgba(255,255,255,.12); box-shadow:0 10px 22px rgba(0,0,0,.28); font-size:14px; font-weight:900; letter-spacing:.3px; }
  button:active{ transform:translateY(1px); box-shadow:0 6px 16px rgba(0,0,0,.30); }
  .accent{ border-color:rgba(0,255,204,.35); box-shadow:0 10px 22px rgba(0,255,204,.10), 0 10px 22px rgba(0,0,0,.28); }

  }

<body>
<audio id="bgm" src="assets/Midnight_Siren_Serenade.mp3" loop preload="auto"></audio>

<div id="wrap">
  <div id="game">
    <div class="road"></div>
    <div id="lanes">

    </div>

      <div id="trackBox" class="railPanel">

      </div>
    </div>
    <div id="penalty">⛔ 延誤 <strong>3</strong> 秒<span class="sub">（原地暫停，距離倒數不動）</span></div>

      <div id="ammoFloat">⚡0</div>

        <div class="small" style="margin-top:10px">桌機：← → 換車道、↑ 發射、Space 跳起｜手機：點左/右半邊移動、點車子發射、長按車子跳起</div>
      </div>

<script>
const isCaseMode = new URLSearchParams(location.search).get('mode') === 'case';
if(isCaseMode) document.body.classList.add('caseMode');

// 【變更總里程為 3500m】
const GOAL_DISTANCE = 3500;
const DIST_UNIT = 12;
const BASE_FORWARD_SPEED = 1.0;
const BOOST_MS = 3000;
const BOOST_FORWARD_MULT = 3.0;
const NPC_FALL_BASE = 235;
const NPC_FALL_MIN_MULT = 0.90;
const NPC_FALL_MAX_MULT = 1.40;
const OB_FALL = 205;
const OB_MIN_MS = 900;
const OB_MAX_MS = 1500;
const MAX_OB_ON_SCREEN = 2;
const BOOST_FALL = 190;
const BOOST_MIN_MS = 900;
const BOOST_MAX_MS = 1400;
const MAX_BOOST_ON_SCREEN = 2;
const AMMO_FALL = 190;
const AMMO_MIN_MS = 950;
const AMMO_MAX_MS = 1600;
const MAX_AMMO_ON_SCREEN = 2;
const SHOCK_MAX_RADIUS = 74;
const SHOCK_GROW_PX_PER_S = 520;
const SHOCK_LIFETIME_MS = 260;
const FIRE_COOLDOWN_MS = 240;
const JUMP_DURATION_MS = 620;
const JUMP_HEIGHT_PX = 112;
const JUMP_COOLDOWN_MS = 180;
const WAVE_MIN_MS = 520;
const WAVE_MAX_MS = 980;
const WAVE_TWO_CAR_PROB = 0.60;
const SAME_LANE_MIN_GAP = 240;
const SPAWN_STAGGER_Y = 70;
const SAFE_HORIZON_SEC = 1.0;
const COLLISION_PAD = 6;
const PENALTY_MS = 3000;
const FINISH_RUNIN_MS = 650;
const END_DELAY_MS = 2000;

const game = document.getElementById("game");
const player = document.getElementById("player");
const playerSkin = document.getElementById("playerSkin");
const transitionTextEl = document.getElementById("transitionText");
const finish = document.getElementById("finish");
const overlay = document.getElementById("overlay");
const resultTitle = document.getElementById("resultTitle");
const resultText = document.getElementById("resultText");
const restartBtn = document.getElementById("restartBtn");
const restartSmallBtn = document.getElementById("restartSmallBtn");
const miniAmb = document.getElementById("miniAmb");
const distanceText = document.getElementById("distanceText");
const penaltyBox = document.getElementById("penalty");
const topHud = document.getElementById("topHud");
const distLeftEl = document.getElementById("distLeft");
const ammoFloatEl = document.getElementById("ammoFloat");
const timeNowEl = document.getElementById("timeNow");
const rankListEl = document.getElementById("rankList");
const leftBtn = document.getElementById("leftBtn");
const rightBtn = document.getElementById("rightBtn");
const shootBtn = document.getElementById("shootBtn");
const bgm = document.getElementById("bgm");

let currentPhase = 1; 
let isTransitioning = false;
let isSpawningGates = false;
let transitionCount = 0;
let transitionUntil = 0;
let transitionSwapTime = 0;
let nextPhaseTarget = 1;
let skinSwapped = false;

const HTML_CAR = `<div class="body"></div><div class="glass"></div><div class="wheels"></div><div class="sirens"></div><div class="lights"><span></span><span></span></div>`;
const HTML_HELI = `<div class="tail"></div><div class="body"></div><div class="cabin"></div><div class="rotor"></div><div class="cross">✚</div>`;
const HTML_BOAT = `<div class="wake"></div><div class="hull"></div><div class="cabin"></div><div class="cross">✚</div>`;
const HTML_NPC_CAR = `<div class="body"></div><div class="glass"></div><div class="wheels"></div><div class="lights"><span></span><span></span></div><div class="taillights"><span></span><span></span></div>`;

let lane = 1;
let distance = 0;
let entities = [];
let over = false;
let finishing = false;
let lastFrame = performance.now();
let pauseUntil = 0;
let boostUntil = 0;
let ammo = 0;
let lastFireAt = 0;
let lastJumpAt = -99999;
let jumpUntil = 0;
let jumpLift = 0;
let carLongPressTimer = null;
let carLongPressTriggered = false;
let runStartAt = 0;
let elapsedMs = 0;
let nextWaveAt = 0;
let nextBoostAt = 0;
let nextObAt = 0;
let nextAmmoAt = 0;
let lastRunTimeMs = null;
let endScheduled = false;
let audioCtx = null;

function ensureAudio(){
  if(!audioCtx){
    const AC = window.AudioContext || window.webkitAudioContext;
    if(AC) audioCtx = new AC();
  }
  if(audioCtx && audioCtx.state === "suspended") audioCtx.resume().catch(()=>{});
  
  if(bgm && bgm.paused) {
      bgm.volume = 0.3; 
      bgm.play().catch(e => console.warn("背景音樂自動播放被阻擋：", e));
  }
}
function playTone(freq=440, dur=0.08, type="sine", volume=0.03){
  ensureAudio(); if(!audioCtx) return;
  const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + dur);
}
function sfxShoot(){ playTone(880, 0.05, "square", 0.025); setTimeout(()=>playTone(1180, 0.05, "square", 0.018), 35); }
function sfxHit(){ playTone(180, 0.12, "sawtooth", 0.04); setTimeout(()=>playTone(120, 0.14, "sawtooth", 0.03), 40); }
function sfxPickup(){ playTone(720, 0.05, "triangle", 0.025); setTimeout(()=>playTone(980, 0.06, "triangle", 0.02), 45); }
function sfxGoal(){ playTone(660, 0.10, "triangle", 0.03); setTimeout(()=>playTone(880, 0.12, "triangle", 0.03), 110); setTimeout(()=>playTone(1180, 0.14, "triangle", 0.028), 230); }

function clamp(n,a,b){ return Math.max(a, Math.min(b, n)); }
function rand(msMin, msMax){ return msMin + Math.random() * (msMax - msMin); }
function fmtSec(ms){ return (ms/1000).toFixed(1); }

function laneCenters(){
  let w = game.clientWidth; if (w === 0) w = Math.min(window.innerWidth, 420); 
  const leftEdge = w * 0.12; const rightEdge = w * 0.88;
  const usable = rightEdge - leftEdge; const step = usable / 3;
  return [ leftEdge + step*0.5, leftEdge + step*1.5, leftEdge + step*2.5 ];
}

function setPlayerLane(idx){
  lane = clamp(idx, 0, 2); const centers = laneCenters();
  player.style.left = (centers[lane] - 24) + "px"; 
}

function updateRelativeDistance(prog){
  const trackBox = miniAmb.parentElement; const boxH = trackBox.clientHeight || 200; 
  const minBottom = 10; const maxBottom = boxH - 10 - 30;
  miniAmb.style.bottom = (minBottom + (maxBottom - minBottom) * (prog / 100)) + "px";
  const remain = Math.max(0, Math.round(100 - prog));
  distanceText.textContent = "距離 " + remain + "%";
}

function rectInflate(r, pad){ return { left:r.left+pad, right:r.right-pad, top:r.top+pad, bottom:r.bottom-pad }; }
function hit(a,b){
  const ar0 = a.getBoundingClientRect(); const br0 = b.getBoundingClientRect();
  const ar = rectInflate(ar0, COLLISION_PAD); const br = rectInflate(br0, COLLISION_PAD);
  return !(ar.right < br.left || ar.left > br.right || ar.bottom < br.top || ar.top > br.bottom);
}
function isTapOnPlayer(clientX, clientY){
  const r = player.getBoundingClientRect();
  return clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom;
}
function countType(type){ return entities.filter(e => e.type === type).length; }
function nearestTopInLane(ln, typeFilter){
  let minTop = Infinity;
  for(const e of entities){
    if(typeFilter && e.type !== typeFilter) continue;
    if(e.lane !== ln) continue;
    const t = e.el.offsetTop; if(t < minTop) minTop = t;
  }
  return minTop;
}

function makeNpcCar(laneIndex){
  const el = document.createElement("div"); const centers = laneCenters();
  el.style.left = (centers[laneIndex] - 24) + "px"; el.style.top = "-150px";
  let vMult = NPC_FALL_MIN_MULT + Math.random() * (NPC_FALL_MAX_MULT - NPC_FALL_MIN_MULT);

  if (currentPhase === 1 || currentPhase === 4) {
    el.className = "npcCar";
    el.innerHTML = HTML_NPC_CAR;
  } else if (currentPhase === 2) {
    el.className = "npcBird"; el.innerHTML = `<div class="body"></div><div class="wing left"></div><div class="wing right"></div>`; vMult *= 1.2;
  } else if (currentPhase === 3) {
    el.className = "npcDolphin"; el.innerHTML = `<div class="tail"></div><div class="fin left"></div><div class="fin right"></div><div class="body"></div>`; vMult *= 1.1;
  }
  return { type:"npc", el, v:vMult, lane:laneIndex };
}

function makeBoost(laneIndex){
  const el = document.createElement("div"); el.className = "boost"; const centers = laneCenters(); const size = window.innerWidth <= 768 ? 40 : 46;
  el.style.left = (centers[laneIndex] - size / 2) + "px"; el.style.top = "-110px";
  return { type:"boost", el, lane:laneIndex };
}
function makeObstacle(){
  const el = document.createElement("div"); el.className = "obstacle"; const centers = laneCenters(); const size = window.innerWidth <= 768 ? 46 : 54;
  el.style.left = (centers[1] - size / 2) + "px"; el.style.top = "-120px";
  return { type:"ob", el, lane:1 };
}
function makeAmmo(laneIndex){
  const el = document.createElement("div"); el.className = "ammoPick"; const centers = laneCenters(); const size = window.innerWidth <= 768 ? 38 : 44;
  el.style.left = (centers[laneIndex] - size / 2) + "px"; el.style.top = "-110px";
  return { type:"ammo", el, lane:laneIndex };
}
function makeShock(now){
  const el = document.createElement("div"); el.className = "shock";
  const cx = player.offsetLeft + player.offsetWidth / 2; const cy = player.offsetTop + player.offsetHeight / 2;
  el.style.left = (cx - 9) + "px"; el.style.top = (cy - 9) + "px";
  return { type:"shock", el, born:now, r:9, cx, cy };
}

function laneUnsafeWithin(ln, horizonSec){
  const playerTop = player.offsetTop;
  for(const e of entities){
    if(e.lane !== ln) continue;
    if(e.type !== "npc" && e.type !== "ob") continue;
    const top = e.el.offsetTop; const h = e.el.offsetHeight;
    const gap = playerTop - (top + h); if(gap < -h) continue;
    const fallSpeed = (e.type === "npc") ? (NPC_FALL_BASE * e.v) : OB_FALL;
    const ttc = gap / fallSpeed; if(ttc <= horizonSec) return true;
  }
  return false;
}
function laneSafeForHorizon(ln, horizonSec){ return !laneUnsafeWithin(ln, horizonSec); }

function spawnNpcWaveSmart(){
  if(isTransitioning || isSpawningGates) return false;
  const safeLanesNow = [0,1,2].filter(ln => laneSafeForHorizon(ln, SAFE_HORIZON_SEC));
  if(safeLanesNow.length === 0) return false;
  const wantTwo = Math.random() < WAVE_TWO_CAR_PROB; const count = wantTwo ? 2 : 1;
  const reachable = [lane, lane-1, lane+1].filter(x => x >= 0 && x <= 2);
  const preferred = safeLanesNow.filter(ln => reachable.includes(ln));
  const keepLanePool = preferred.length ? preferred : safeLanesNow;
  const keepLane = keepLanePool[Math.floor(Math.random() * keepLanePool.length)];
  let candidates = [0,2].filter(ln => ln !== keepLane);
  candidates = candidates.filter(ln => { const t = nearestTopInLane(ln, "npc"); return (t === Infinity) || (t > SAME_LANE_MIN_GAP); });
  if(candidates.length === 0) return false;
  const actualCount = Math.min(count, candidates.length); const lanes = [];
  while(lanes.length < actualCount){
    const pick = candidates[Math.floor(Math.random() * candidates.length)];
    if(!lanes.includes(pick)) lanes.push(pick);
  }
  lanes.forEach((ln, idx)=>{
    const obj = makeNpcCar(ln); obj.el.style.top = (-150 - idx * SPAWN_STAGGER_Y) + "px";
    game.appendChild(obj.el); entities.push(obj);
  });
  return true;
}

function spawnObstacle(){
  if(isTransitioning || isSpawningGates || countType("ob") >= MAX_OB_ON_SCREEN) return;
  const t = nearestTopInLane(1, "ob"); if(!(t === Infinity || t > 230)) return;
  const obj = makeObstacle(); game.appendChild(obj.el); entities.push(obj);
}
function spawnBoost(){
  if(isTransitioning || isSpawningGates || countType("boost") >= MAX_BOOST_ON_SCREEN) return;
  const list = [0,1,2].filter(ln => laneSafeForHorizon(ln, 0.8)); if(!list.length) return;
  const ln = list[Math.floor(Math.random() * list.length)];
  const obj = makeBoost(ln); game.appendChild(obj.el); entities.push(obj);
}
function spawnAmmo(){
  if(isTransitioning || isSpawningGates || countType("ammo") >= MAX_AMMO_ON_SCREEN) return;
  const safe = [0,1,2].filter(ln => laneSafeForHorizon(ln, 0.8)); if(!safe.length) return;
  const ln = safe[Math.floor(Math.random() * safe.length)];
  const obj = makeAmmo(ln); game.appendChild(obj.el); entities.push(obj);
}

function spawnGates(isLast) {
  purgeEnemiesAndObstacles();
  let options = [];
  if (isLast) {
    options = [
      { ph: 1, txt: "陸運", cls: "land", icon: "🚑" },
      { ph: 1, txt: "陸運", cls: "land", icon: "🚑" },
      { ph: 1, txt: "陸運", cls: "land", icon: "🚑" }
    ];
    options.forEach((opt, idx) => opt.ln = idx);
  } else {
    options = [
      { ph: 1, txt: "陸運", cls: "land", icon: "🚑" },
      { ph: 2, txt: "空運", cls: "air", icon: "🚁" },
      { ph: 3, txt: "海運", cls: "sea", icon: "🚤" }
    ];
    options.sort(() => Math.random() - 0.5);
    options.forEach((opt, idx) => opt.ln = idx);
  }

  options.forEach(opt => {
    const el = document.createElement("div");
    el.className = "gate " + opt.cls;
    el.innerHTML = `<span>${opt.txt}</span><span class="icon">${opt.icon}</span>`;
    const centers = laneCenters();
    const size = window.innerWidth <= 768 ? 70 : 80;
    el.style.left = (centers[opt.ln] - size/2) + "px";
    el.style.top = "-200px";
    game.appendChild(el);
    entities.push({ type: "gate", el: el, lane: opt.ln, targetPhase: opt.ph, text: opt.txt });
  });
}

function applyPenalty(now){
  sfxHit(); pauseUntil = Math.max(pauseUntil, now + PENALTY_MS);
  penaltyBox.style.display = "block";
  penaltyBox.querySelector("strong").textContent = String(Math.ceil((pauseUntil - now) / 1000));
  game.animate([{ transform:"translateX(0)" }, { transform:"translateX(-6px)" }, { transform:"translateX(6px)" }, { transform:"translateX(0)" }], { duration:220, iterations:1 });
}
function applyBoost(now){
  boostUntil = Math.max(boostUntil, now + BOOST_MS);
  player.classList.add("boosting"); topHud.classList.add("boosting");
}
function updateAmmoUI(){
  shootBtn.textContent = ammo > 0 ? `⚡ 震波 (${ammo})` : "⚡ 震波";
  if(ammoFloatEl){ ammoFloatEl.textContent = `⚡${ammo}`; ammoFloatEl.classList.toggle("empty", ammo <= 0); }
}
function tryShock(now){
  if(over || finishing || isTransitioning) return;
  if(now < pauseUntil || ammo <= 0 || now - lastFireAt < FIRE_COOLDOWN_MS) return;
  ammo--; updateAmmoUI(); lastFireAt = now; sfxShoot();
  const s = makeShock(now); game.appendChild(s.el); entities.push(s);
  player.animate([{ transform:`translateY(${-jumpLift}px) scale(1)` }, { transform:`translateY(${-jumpLift}px) scale(1.02)` }, { transform:`translateY(${-jumpLift}px) scale(1)` }], { duration:150, iterations:1 });
}
function tryJump(now){
  if(over || finishing || isTransitioning) return;
  if(now < pauseUntil || now < jumpUntil || now < lastJumpAt + JUMP_COOLDOWN_MS) return;
  lastJumpAt = now; jumpUntil = now + JUMP_DURATION_MS; player.classList.add("jumping");
  player.animate([{ transform:`translateY(0px) scale(1)` }, { transform:`translateY(${-JUMP_HEIGHT_PX}px) scale(1.04)` }, { transform:`translateY(0px) scale(1)` }], { duration:JUMP_DURATION_MS, easing:"cubic-bezier(.2,.8,.2,1)", iterations:1 });
}
function computeJumpLift(now){
  if(now >= jumpUntil) return 0;
  const p = clamp((now - (jumpUntil - JUMP_DURATION_MS)) / JUMP_DURATION_MS, 0, 1);
  return Math.sin(Math.PI * p) * JUMP_HEIGHT_PX;
}
function isJumping(now){ return now < jumpUntil; }

function loadRanks(){ const RANK_KEY="brain_ambulance_top10_v2"; try{ const raw = localStorage.getItem(RANK_KEY); return raw ? JSON.parse(raw) : []; }catch{ return []; } }
function saveRanks(arr){ const RANK_KEY="brain_ambulance_top10_v2"; try{ localStorage.setItem(RANK_KEY, JSON.stringify(arr)); }catch{} }
function addRank(timeMs){ const arr = loadRanks(); arr.push({ t:timeMs, at:Date.now() }); arr.sort((a,b)=>a.t-b.t); const top10 = arr.slice(0,10); saveRanks(top10); return top10; }
function renderRanks(arr){
  rankListEl.innerHTML = "";
  if(!arr.length){ rankListEl.innerHTML = `<li><span>—</span><span>尚無紀錄</span></li>`; return; }
  arr.forEach((r, idx)=>{
    const li = document.createElement("li");
    if(lastRunTimeMs !== null && Math.abs(r.t - lastRunTimeMs) < 1) li.classList.add("rankMe");
    li.innerHTML = `<span>#${idx+1}</span><span>${fmtSec(r.t)} s</span>`; rankListEl.appendChild(li);
  });
}

function purgeAllEntities(){ for(const e of entities){ try{ e.el?.remove?.(); }catch{} } entities = []; }
function purgeEnemiesAndObstacles() {
  for(let i = entities.length - 1; i >= 0; i--){
    const e = entities[i];
    if(e.type === "npc" || e.type === "ob"){ try{ e.el.remove(); }catch{} entities.splice(i, 1); }
  }
}

function setPlayerSkin(phase) {
  if (phase === 1 || phase === 4) {
    playerSkin.className = "carTop"; playerSkin.innerHTML = HTML_CAR; miniAmb.textContent = "🚑";
  } else if (phase === 2) {
    playerSkin.className = "heliTop"; playerSkin.innerHTML = HTML_HELI; miniAmb.textContent = "🚁";
  } else if (phase === 3) {
    playerSkin.className = "boatTop"; playerSkin.innerHTML = HTML_BOAT; miniAmb.textContent = "🚤";
  }
}
function setEnvironment(phase) {
  if (phase === 1 || phase === 4) document.body.className = "";
  else if (phase === 2) document.body.className = "phase-sky";
  else if (phase === 3) document.body.className = "phase-sea";
}

function startTransition(targetPhase, text) {
  isTransitioning = true; nextPhaseTarget = targetPhase; const now = performance.now();
  transitionUntil = now + 5000; transitionSwapTime = now + 2500; skinSwapped = false;
  transitionTextEl.textContent = text; transitionTextEl.style.opacity = 1;
  playerSkin.classList.add("transforming"); purgeEnemiesAndObstacles();
}

function enterHospitalAndWin(){
  if(finishing || over) return;
  finishing = true; purgeAllEntities(); finish.style.top = "0%";
  const centers = laneCenters();
  player.classList.add("finishing"); player.style.left = (centers[1] - 24) + "px";
  const startTop = player.offsetTop; player.style.bottom = "auto"; player.style.top = startTop + "px";
  const t0 = performance.now();
  const step = (t)=>{
    const p = clamp((t - t0) / FINISH_RUNIN_MS, 0, 1);
    player.style.top = (startTop + (-90 - startTop) * (1 - Math.pow(1 - p, 3))) + "px";
    if(p < 1) requestAnimationFrame(step);
    else{ finish.classList.add("success"); if(!endScheduled){ endScheduled = true; setTimeout(()=> gameEnd(), END_DELAY_MS); } }
  };
  requestAnimationFrame(step);
}

function reset(){
  purgeAllEntities();
  distance = 0; over = false; finishing = false; endScheduled = false;
  pauseUntil = 0; boostUntil = 0; ammo = 0; lastFireAt = 0; lastJumpAt = -99999; jumpUntil = 0; jumpLift = 0;
  clearTimeout(carLongPressTimer); carLongPressTriggered = false;
  runStartAt = performance.now(); elapsedMs = 0; timeNowEl.textContent = "0";
  penaltyBox.style.display = "none"; player.classList.remove("boosting","finishing","jumping");
  topHud.classList.remove("boosting"); player.style.top = ""; player.style.bottom = "6%"; player.style.transform = "translateY(0px)";
  finish.style.top = "-38%"; finish.classList.remove("success"); overlay.style.display = "none";
  
  currentPhase = 1; isTransitioning = false; isSpawningGates = false; transitionCount = 0;
  transitionTextEl.style.opacity = 0;
  playerSkin.classList.remove("transforming"); setPlayerSkin(1); setEnvironment(1);

  setPlayerLane(1); updateRelativeDistance(0); distLeftEl.textContent = String(GOAL_DISTANCE);
  updateAmmoUI(); lastRunTimeMs = null; renderRanks(loadRanks()); lastFrame = performance.now();
  const now = performance.now(); nextWaveAt = now + rand(WAVE_MIN_MS, WAVE_MAX_MS); nextBoostAt = now + rand(BOOST_MIN_MS, BOOST_MAX_MS); nextObAt = now + rand(OB_MIN_MS, OB_MAX_MS); nextAmmoAt = now + rand(AMMO_MIN_MS, AMMO_MAX_MS);
}

function gameEnd(){
  if(over) return;
  over = true; overlay.style.display = "flex"; sfxGoal();
  lastRunTimeMs = elapsedMs; resultTitle.textContent = "✅ 成功抵達醫院！"; resultText.textContent = `到院時間：${fmtSec(elapsedMs)} 秒（越快越好）`;
  const top10 = addRank(elapsedMs); renderRanks(top10);
  try{ parent.postMessage({type:'GAME_CLEAR', game:'race', time:Math.floor(elapsedMs / 1000)}, '*'); }catch(e){}
}

function tick(now){
  if(over) return;
  const dt = Math.max(0, Math.min(0.03, (now - lastFrame) / 1000)); lastFrame = now;
  elapsedMs = now - runStartAt; timeNowEl.textContent = String(Math.floor(elapsedMs / 1000));
  jumpLift = computeJumpLift(now); player.style.transform = `translateY(${-jumpLift}px)`;
  if(now >= jumpUntil) player.classList.remove("jumping");
  if(now >= boostUntil){ player.classList.remove("boosting"); topHud.classList.remove("boosting"); }
  if(now < pauseUntil){
    penaltyBox.style.display = "block"; penaltyBox.querySelector("strong").textContent = String(Math.ceil((pauseUntil - now) / 1000));
    requestAnimationFrame(tick); return;
  }else penaltyBox.style.display = "none";

  const forwardMult = (now < boostUntil) ? BOOST_FORWARD_MULT : 1.0;
  distance += (BASE_FORWARD_SPEED * forwardMult) * DIST_UNIT * dt;
  const left = Math.max(0, Math.ceil(GOAL_DISTANCE - distance)); distLeftEl.textContent = String(left);
  const prog = clamp((distance / GOAL_DISTANCE) * 100, 0, 100); updateRelativeDistance(prog);
  if(prog > 88){ finish.style.top = (-38 + 38 * ((prog - 88) / 12)) + "%"; }
  if(distance >= GOAL_DISTANCE){ enterHospitalAndWin(); return; }
  if(finishing){ requestAnimationFrame(tick); return; }

  // 【階段里程與傳送門觸發邏輯】
  if (!isTransitioning && !isSpawningGates) {
    if (distance >= 1000 && transitionCount === 0) { isSpawningGates = true; spawnGates(false); }
    else if (distance >= 2000 && transitionCount === 1) { isSpawningGates = true; spawnGates(false); }
    else if (distance >= 3000 && transitionCount === 2) { isSpawningGates = true; spawnGates(true); }
  }

  // 過場動畫效果進行中
  if (isTransitioning) {
    nextWaveAt = now + 1000; nextObAt = now + 1000; nextBoostAt = now + 1000; nextAmmoAt = now + 1000;
    if (now >= transitionSwapTime && !skinSwapped) {
        skinSwapped = true; setPlayerSkin(nextPhaseTarget); setEnvironment(nextPhaseTarget); currentPhase = nextPhaseTarget;
    }
    if (now >= transitionUntil) {
        isTransitioning = false; transitionTextEl.style.opacity = 0; playerSkin.classList.remove("transforming");
    }
  }

  if(now >= nextWaveAt){ const ok = spawnNpcWaveSmart(); nextWaveAt = now + rand(WAVE_MIN_MS, WAVE_MAX_MS) + (ok ? 0 : 220); }
  if(now >= nextObAt){ spawnObstacle(); nextObAt = now + rand(OB_MIN_MS, OB_MAX_MS); }
  if(now >= nextBoostAt){ spawnBoost(); nextBoostAt = now + rand(BOOST_MIN_MS, BOOST_MAX_MS); }
  if(now >= nextAmmoAt){ spawnAmmo(); nextAmmoAt = now + rand(AMMO_MIN_MS, AMMO_MAX_MS); }

  const jumping = isJumping(now);
  for(let i = entities.length - 1; i >= 0; i--){
    const e = entities[i];

    if(e.type === "gate") {
      e.el.style.top = (e.el.offsetTop + OB_FALL * dt) + "px";
      if(hit(player, e.el) || (e.el.offsetTop + e.el.offsetHeight > player.offsetTop && Math.abs(e.lane - lane) < 0.5)) {
        sfxPickup(); 
        let chosenPhase = e.targetPhase;
        let chosenText = "進入" + e.text;
        
        for(let j = entities.length - 1; j >= 0; j--) {
          if(entities[j].type === "gate") {
            try{ entities[j].el.remove(); }catch{}
            entities.splice(j, 1);
          }
        }
        isSpawningGates = false;
        transitionCount++;
        startTransition(chosenPhase, chosenText);
        break; 
      }
      if(e.el.offsetTop > game.clientHeight + 160){ try{ e.el.remove(); }catch{} entities.splice(i,1); }
      continue;
    }

    if(e.type === "npc"){
      e.el.style.top = (e.el.offsetTop + (NPC_FALL_BASE * e.v) * dt) + "px";
      if(!jumping && hit(player, e.el)){ e.el.remove(); entities.splice(i,1); applyPenalty(now); break; }
      if(e.el.offsetTop > game.clientHeight + 160){ e.el.remove(); entities.splice(i,1); }
    }
    if(e.type === "ob"){
      e.el.style.top = (e.el.offsetTop + OB_FALL * dt) + "px";
      if(!jumping && hit(player, e.el)){ e.el.remove(); entities.splice(i,1); applyPenalty(now); break; }
      if(e.el.offsetTop > game.clientHeight + 160){ e.el.remove(); entities.splice(i,1); }
    }
    if(e.type === "boost"){
      e.el.style.top = (e.el.offsetTop + BOOST_FALL * dt) + "px";
      if(hit(player, e.el)){ e.el.remove(); entities.splice(i,1); applyBoost(now); sfxPickup(); continue; }
      if(e.el.offsetTop > game.clientHeight + 140){ e.el.remove(); entities.splice(i,1); }
    }
    if(e.type === "ammo"){
      e.el.style.top = (e.el.offsetTop + AMMO_FALL * dt) + "px";
      if(hit(player, e.el)){ e.el.remove(); entities.splice(i,1); ammo++; updateAmmoUI(); sfxPickup(); continue; }
      if(e.el.offsetTop > game.clientHeight + 140){ e.el.remove(); entities.splice(i,1); }
    }
    if(e.type === "shock"){
      const age = now - e.born; const r = Math.min(SHOCK_MAX_RADIUS, 9 + (SHOCK_GROW_PX_PER_S * (age / 1000)));
      e.r = r; e.el.style.width = (r * 2) + "px"; e.el.style.height = (r * 2) + "px"; e.el.style.left = (e.cx - r) + "px"; e.el.style.top = (e.cy - r) + "px"; e.el.style.opacity = String(Math.max(0, 1 - age / SHOCK_LIFETIME_MS));
      for(let j = entities.length - 1; j >= 0; j--){
        const t = entities[j]; if(t.type !== "ob") continue;
        const ox = t.el.offsetLeft + t.el.offsetWidth / 2; const oy = t.el.offsetTop + t.el.offsetHeight / 2;
        if(Math.hypot(ox - e.cx, oy - e.cy) <= r + 18){ t.el.classList.add("shatter"); setTimeout(()=>{ try{ t.el.remove(); }catch{} }, 260); entities.splice(j,1); }
      }
      if(age >= SHOCK_LIFETIME_MS){ e.el.remove(); entities.splice(i,1); }
    }
  }
  requestAnimationFrame(tick);
}

function moveLeft(){ if(performance.now() < pauseUntil || over || finishing || isTransitioning) return; setPlayerLane(lane - 1); }
function moveRight(){ if(performance.now() < pauseUntil || over || finishing || isTransitioning) return; setPlayerLane(lane + 1); }

document.addEventListener("keydown", e=>{
  ensureAudio(); if(e.repeat) return;
  if(e.key === "ArrowLeft") moveLeft(); if(e.key === "ArrowRight") moveRight();
  if(e.key === "ArrowUp"){ e.preventDefault(); tryShock(performance.now()); }
  if(e.code === "Space"){ e.preventDefault(); tryJump(performance.now()); }
});
leftBtn.addEventListener("click", ()=>{ ensureAudio(); moveLeft(); });
rightBtn.addEventListener("click", ()=>{ ensureAudio(); moveRight(); });
shootBtn.addEventListener("click", ()=>{ ensureAudio(); tryShock(performance.now()); });

game.addEventListener("touchstart", (e)=>{
  ensureAudio(); if(over || finishing) return; if(performance.now() < pauseUntil) return;
  const t = e.touches[0]; if(!t) return;
  if(isTapOnPlayer(t.clientX, t.clientY)){
    e.preventDefault(); carLongPressTriggered = false; clearTimeout(carLongPressTimer);
    carLongPressTimer = setTimeout(()=>{ carLongPressTriggered = true; tryJump(performance.now()); }, CAR_LONG_PRESS_MS); return;
  }
  const rect = game.getBoundingClientRect(); e.preventDefault();
  if(t.clientX - rect.left < rect.width / 2) moveLeft(); else moveRight();
}, { passive:false });

game.addEventListener("touchend", (e)=>{
  clearTimeout(carLongPressTimer); const t = e.changedTouches[0];
  if(!t){ carLongPressTriggered = false; return; }
  if(isTapOnPlayer(t.clientX, t.clientY)){ e.preventDefault(); if(!carLongPressTriggered) tryShock(performance.now()); }
  carLongPressTriggered = false;
}, { passive:false });

game.addEventListener("touchcancel", ()=>{ clearTimeout(carLongPressTimer); carLongPressTriggered = false; });
document.addEventListener("pointerdown", ensureAudio, { once:true });
document.addEventListener("touchstart", ensureAudio, { once:true, passive:true });
document.addEventListener("keydown", ensureAudio, { once:true });

function restart(){ reset(); requestAnimationFrame(tick); }
restartBtn.addEventListener("click", restart); restartSmallBtn.addEventListener("click", restart);

// 確保遊戲一定能啟動，解決部分環境 DOMContentLoaded 沒觸發的 bug
function initGame() {
    reset();
    requestAnimationFrame(tick);
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => setTimeout(initGame, 50));
} else {
    setTimeout(initGame, 50);
}
window.addEventListener("resize", ()=> setPlayerLane(lane));
</script>
</body>
</html>
