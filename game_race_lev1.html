<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
<title>腦脈先鋒｜黃金送醫（三車道・智慧生成）</title>

<style>
  :root{
    --bg:#07080b;
    --road1:#1b1f2a;
    --road2:#111521;
    --text:#e9edf7;
    --accent:#00ffcc;
    --warn:#ffd166;
    --danger:#ff4d4d;
    --shadow:0 12px 40px rgba(0,0,0,.55);

    --car-w:48px;
    --car-h:78px;
    --pickup-size:46px;
    --ammo-size:44px;
    --ob-size:54px;
  }
  html,body{
    height:100%; margin:0;
    background:radial-gradient(1200px 700px at 50% 0%, #111827 0%, var(--bg) 55%, #000 100%);
    color:var(--text);
    font-family:"PingFang TC","Noto Sans TC",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  body{display:flex; justify-content:center; align-items:flex-start; padding:14px 0;}
  #wrap{
    position:relative;
    width:min(380px, 96vw);
    user-select:none; -webkit-user-select:none;
    touch-action:none;
  }
  #game{
    position:relative;
    width:100%;
    aspect-ratio: 320 / 560;
    max-height: 78vh;
    border:1px solid rgba(255,255,255,.12);
    border-radius:18px;
    box-shadow:var(--shadow);
    overflow:hidden;
    background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,0));
  }

  /* 上方：距離 + 能量 + 時間（整數秒，文字） */
  #topHud{
    position:absolute; left:50%; top:10px;
    transform:translateX(-50%);
    z-index:12;
    padding:8px 12px;
    border-radius:14px;
    background:linear-gradient(180deg, rgba(10,15,25,.80), rgba(10,15,25,.55));
    border:1px solid rgba(255,255,255,.12);
    box-shadow:0 10px 22px rgba(0,0,0,.28);
    font-weight:900;
    letter-spacing:.3px;
    font-size:13px;
    white-space:nowrap;
    display:flex; align-items:center; gap:10px;
  }
  #topHud .num{
    color:var(--accent);
    font-variant-numeric: tabular-nums;
  }
  #topHud.boosting .num{filter:drop-shadow(0 0 10px rgba(0,255,204,.45));}
  #ammoHud{opacity:.92; font-weight:900;}
  #ammoHud b{color:var(--warn); font-variant-numeric: tabular-nums;}
  #timeHud{opacity:.92; font-weight:900;}
  #timeHud b{color:#fff; font-variant-numeric: tabular-nums;}

  .road{
    position:absolute; inset:0;
    background:
      radial-gradient(800px 420px at 50% 20%, rgba(0,255,204,.08), transparent 60%),
      linear-gradient(180deg, var(--road1) 0%, var(--road2) 100%);
  }
  .road::before{
    content:"";
    position:absolute; inset:-10%;
    background:linear-gradient(90deg, rgba(0,0,0,0) 0%, rgba(255,255,255,.05) 30%, rgba(255,255,255,.03) 55%, rgba(0,0,0,0) 100%);
    transform:skewX(-12deg);
    animation:sweep 3.2s linear infinite;
    opacity:.55;
  }
  @keyframes sweep{
    0%{transform:translateX(-40%) skewX(-12deg);}
    100%{transform:translateX(40%) skewX(-12deg);}
  }

  /* 三車道線 */
  #lanes{position:absolute; inset:0; pointer-events:none; opacity:.85;}
  .edge{position:absolute; top:0; bottom:0; width:3px; background:linear-gradient(180deg, rgba(255,255,255,.20), rgba(255,255,255,.08));}
  .edge.left{left:12%;}
  .edge.right{right:12%;}
  .divider{
    position:absolute; top:0; bottom:0; width:3px;
    background:repeating-linear-gradient(180deg, rgba(255,255,255,.16) 0 22px, rgba(255,255,255,0) 22px 56px);
    opacity:.25;
  }
  .divider.one{left:36.5%;}
  .divider.two{left:63.5%;}

  /* 終點：醫院 */
  #finish{
    position:absolute; left:0; right:0;
    top:-38%; height:38%;
    display:flex; align-items:flex-end; justify-content:center;
    padding-bottom:14px;
    background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(230,236,255,.92));
    color:#0b1220;
    border-bottom:1px solid rgba(0,0,0,.12);
    z-index:6;
  }
  #finish .hospital{
    width:86%; height:72%;
    border-radius:16px;
    background:radial-gradient(120px 90px at 50% 35%, rgba(0,255,204,.25), transparent 55%), #ffffff;
    box-shadow:0 10px 30px rgba(0,0,0,.18);
    display:flex; align-items:center; justify-content:center;
    position:relative;
    overflow:hidden;
  }
  #finish .door{
    position:absolute;
    bottom:10%;
    left:50%;
    transform:translateX(-50%);
    width:46%;
    height:26%;
    border-radius:14px;
    background:linear-gradient(180deg, rgba(11,18,32,.12), rgba(11,18,32,.04));
    border:1px solid rgba(11,18,32,.18);
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.35);
  }
  #finish .sign{
    background:#0b1220; color:#fff;
    padding:10px 14px; border-radius:14px;
    font-size:16px; font-weight:900; letter-spacing:.4px;
    display:flex; align-items:center; gap:10px;
    box-shadow:0 8px 18px rgba(0,0,0,.20);
    opacity:0;
    transform:translateY(8px);
    transition:opacity .35s ease, transform .35s ease;
  }
  #finish.success .sign{opacity:1; transform:translateY(0);}
  #finish .cross{
    width:24px; height:24px; border-radius:7px;
    background:var(--accent);
    display:grid; place-items:center;
    color:#00130f; font-weight:900;
  }

  /* 右側：相對距離 */
  #rail{
    position:absolute;
    right:10px; top:10px;
    width:52px; height:78%;
    z-index:10;
    display:flex; flex-direction:column; align-items:center;
    gap:10px;
    pointer-events:none;
  }
  .railPanel{
    width:52px;
    border-radius:16px;
    background:linear-gradient(180deg, rgba(10,15,25,.72), rgba(10,15,25,.40));
    border:1px solid rgba(255,255,255,.12);
    box-shadow:0 10px 22px rgba(0,0,0,.28);
    overflow:hidden;
  }
  #hospitalMark{height:40px; display:grid; place-items:center; font-size:18px;}
  #trackBox{flex:1; position:relative;}
  #trackLine{
    position:absolute; left:50%; top:10px; bottom:10px;
    width:4px; transform:translateX(-50%);
    background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.06));
    border-radius:999px;
  }
  #miniAmb{
    position:absolute; left:50%;
    transform:translateX(-50%);
    bottom:10px;
    width:30px; height:30px;
    display:grid; place-items:center;
    border-radius:10px;
    background:rgba(0,255,204,.16);
    border:1px solid rgba(0,255,204,.35);
    box-shadow:0 10px 18px rgba(0,0,0,.25);
    font-size:18px;
  }
  #distanceText{
    position:absolute; left:50%;
    transform:translateX(-50%);
    bottom:10px;
    margin-bottom:-32px;
    font-size:11px;
    opacity:.85;
    background:rgba(10,15,25,.55);
    border:1px solid rgba(255,255,255,.10);
    padding:4px 6px;
    border-radius:10px;
    white-space:nowrap;
  }

  /* 車（俯視） */
  .carTop{
    position:absolute;
    width:var(--car-w); height:var(--car-h);
    border-radius:14px;
    border:1px solid rgba(255,255,255,.14);
    display:block;
  }
  .carTop .body{position:absolute; inset:0; border-radius:14px;}
  .carTop .glass{
    position:absolute; left:9px; right:9px;
    top:10px; height:16px;
    border-radius:10px;
    background:linear-gradient(180deg, rgba(255,255,255,.35), rgba(255,255,255,.10));
    border:1px solid rgba(255,255,255,.12);
    opacity:.9;
  }
  .carTop .lights{
    position:absolute; left:9px; right:9px;
    bottom:9px; height:9px;
    display:flex; justify-content:space-between; gap:7px;
    opacity:.9;
  }
  .carTop .lights span{
    flex:1; border-radius:7px;
    background:linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,.18));
    filter:drop-shadow(0 0 10px rgba(255,255,255,.12));
  }
  .carTop .wheels{
    position:absolute; left:4px; right:4px;
    top:16px; bottom:16px;
    pointer-events:none;
  }
  .carTop .wheels::before,
  .carTop .wheels::after{
    content:"";
    position:absolute; top:0; bottom:0;
    width:7px; border-radius:9px;
    background:rgba(0,0,0,.35);
  }
  .carTop .wheels::before{left:0;}
  .carTop .wheels::after{right:0;}

  /* 玩家救護車（朝上） */
  #player{
    position:absolute;
    bottom:6%;
    z-index:5;
    transition:left 120ms ease;
    transform:rotate(180deg);
    transform-origin:center;
    box-shadow:0 16px 26px rgba(0,0,0,.35);
  }
  #player .body{
    background:
      radial-gradient(26px 26px at 30% 20%, rgba(255,255,255,.55), rgba(255,255,255,0) 60%),
      linear-gradient(180deg, #ff4d4d 0%, #e1162f 100%);
  }
  #player .sirens{
    position:absolute; left:9px; right:9px;
    top:32px; height:12px;
    border-radius:9px;
    background:linear-gradient(90deg, rgba(0,255,204,.10), rgba(0,255,204,.92), rgba(0,255,204,.10));
    filter:drop-shadow(0 0 10px rgba(0,255,204,.45));
    animation:flash 0.7s linear infinite;
    opacity:.95;
  }
  #player.boosting{filter:drop-shadow(0 0 18px rgba(0,255,204,.35));}
  #player.finishing{
    transition:transform 600ms ease, top 600ms ease, left 250ms ease;
    filter:drop-shadow(0 0 18px rgba(0,255,204,.22));
  }
  @keyframes flash{ 0%{opacity:.25} 50%{opacity:1} 100%{opacity:.25} }

  /* 對向來車 */
  .npcCar{
    position:absolute;
    width:var(--car-w); height:var(--car-h);
    border-radius:14px;
    border:1px solid rgba(255,255,255,.10);
    box-shadow:0 14px 24px rgba(0,0,0,.32);
  }
  .npcCar .body{
    background:
      radial-gradient(26px 26px at 30% 20%, rgba(255,255,255,.18), rgba(255,255,255,0) 60%),
      linear-gradient(180deg, #3b4252 0%, #1f2633 100%);
    border-radius:14px;
  }

  /* 加速道具 */
  .boost{
    position:absolute;
    width:var(--pickup-size); height:var(--pickup-size);
    border-radius:14px;
    background:
      radial-gradient(22px 22px at 35% 35%, rgba(255,255,255,.25), rgba(255,255,255,0) 60%),
      linear-gradient(180deg, rgba(0,255,204,.22), rgba(0,255,204,.08));
    border:1px solid rgba(0,255,204,.35);
    box-shadow:0 14px 24px rgba(0,0,0,.28), 0 0 18px rgba(0,255,204,.10);
    display:grid; place-items:center;
  }
  .boost::before{
    content:"»»";
    font-weight:1000;
    letter-spacing:-2px;
    font-size:20px;
    color:rgba(0,255,204,.95);
    filter:drop-shadow(0 0 10px rgba(0,255,204,.28));
    transform:translateY(-1px);
  }

  /* 能量補給 */
  .ammoPick{
    position:absolute;
    width:var(--ammo-size); height:var(--ammo-size);
    border-radius:14px;
    background:
      radial-gradient(20px 20px at 35% 35%, rgba(255,255,255,.22), rgba(255,255,255,0) 60%),
      linear-gradient(180deg, rgba(255,209,102,.22), rgba(255,209,102,.08));
    border:1px solid rgba(255,209,102,.35);
    box-shadow:0 14px 24px rgba(0,0,0,.28), 0 0 18px rgba(255,209,102,.10);
    display:grid; place-items:center;
    font-size:18px;
  }
  .ammoPick::before{ content:"⚡"; }

  /* 障礙物（中道） */
  .obstacle{
    position:absolute;
    width:var(--ob-size); height:var(--ob-size);
    border-radius:18px;
    background:
      radial-gradient(18px 18px at 35% 35%, rgba(255,255,255,.08), rgba(255,255,255,0) 60%),
      linear-gradient(180deg, rgba(255,77,77,.18), rgba(255,77,77,.06));
    border:1px solid rgba(255,77,77,.25);
    box-shadow:0 16px 26px rgba(0,0,0,.38);
    display:grid; place-items:center;
    font-weight:1000;
    color:rgba(255,77,77,.92);
  }
  .obstacle::before{ content:"⛔"; font-size:22px; }

  /* 震波 */
  .shock{
    position:absolute;
    width:18px; height:18px;
    border-radius:999px;
    border:2px solid rgba(255,209,102,.95);
    box-shadow:0 0 18px rgba(255,209,102,.18);
    z-index:9;
    pointer-events:none;
  }
  .shatter{animation:shatter .28s ease-out forwards;}
  @keyframes shatter{
    0%{transform:scale(1); filter:brightness(1.1);}
    100%{transform:scale(1.45); opacity:0; filter:brightness(1.8) blur(1px);}
  }

  /* 懲罰提示 */
  #penalty{
    position:absolute;
    left:50%; top:54%;
    transform:translate(-50%,-50%);
    padding:10px 12px;
    border-radius:14px;
    background:rgba(0,0,0,.55);
    border:1px solid rgba(255,255,255,.16);
    box-shadow:0 12px 30px rgba(0,0,0,.45);
    display:none;
    z-index:15;
    text-align:center;
    font-weight:900;
    letter-spacing:.3px;
  }
  #penalty strong{color:var(--warn);}
  #penalty .sub{display:block; margin-top:4px; font-size:12px; opacity:.85; font-weight:700;}

  /* 觸控提示 */
  #touchHint{
    position:absolute;
    left:50%;
    bottom:18px;
    transform:translateX(-50%);
    z-index:14;
    padding:10px 12px;
    border-radius:14px;
    background:rgba(10,15,25,.72);
    border:1px solid rgba(255,255,255,.12);
    box-shadow:0 10px 22px rgba(0,0,0,.28);
    font-size:12px;
    line-height:1.45;
    text-align:center;
    white-space:nowrap;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease;
  }
  #touchHint.show{opacity:1;}

  /* 底部控制 */
  #controls{margin-top:10px; display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .btnRow{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  button{
    border:none; border-radius:16px;
    padding:14px 12px;
    color:var(--text);
    background:linear-gradient(180deg, rgba(10,15,25,.85), rgba(10,15,25,.55));
    border:1px solid rgba(255,255,255,.12);
    box-shadow:0 10px 22px rgba(0,0,0,.28);
    font-size:14px; font-weight:900; letter-spacing:.3px;
  }
  button:active{transform:translateY(1px); box-shadow:0 6px 16px rgba(0,0,0,.30);}
  .accent{border-color:rgba(0,255,204,.35); box-shadow:0 10px 22px rgba(0,255,204,.10), 0 10px 22px rgba(0,0,0,.28);}
  .danger{border-color:rgba(255,77,77,.35);}
  .shoot{border-color:rgba(255,209,102,.35); box-shadow:0 10px 22px rgba(255,209,102,.10), 0 10px 22px rgba(0,0,0,.28);}

  /* 結果覆蓋層 */
  #overlay{
    position:absolute; inset:0;
    display:none;
    align-items:center; justify-content:center;
    background:rgba(0,0,0,.55);
    z-index:20;
  }
  #card{
    width:min(88%, 340px);
    border-radius:18px;
    background:linear-gradient(180deg, rgba(10,15,25,.90), rgba(10,15,25,.70));
    border:1px solid rgba(255,255,255,.14);
    box-shadow:var(--shadow);
    padding:16px 14px;
    text-align:center;
  }
  #card h2{margin:6px 0 8px; font-size:18px;}
  #card p{margin:0 0 12px; opacity:.9; font-size:13px; line-height:1.4;}
  #card .small{opacity:.8; font-size:12px;}

  /* 排行榜 */
  #rankBox{
    margin-top:10px;
    text-align:left;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.04);
    overflow:hidden;
  }
  #rankBox .head{
    padding:8px 10px;
    font-weight:900;
    font-size:12px;
    opacity:.95;
    background:rgba(0,0,0,.18);
    border-bottom:1px solid rgba(255,255,255,.10);
    display:flex; justify-content:space-between;
  }
  #rankList{
    list-style:none; margin:0; padding:0;
    max-height:190px; overflow:auto;
  }
  #rankList li{
    display:flex; justify-content:space-between; gap:10px;
    padding:7px 10px;
    font-size:12px;
    border-bottom:1px solid rgba(255,255,255,.06);
    font-variant-numeric: tabular-nums;
  }
  #rankList li:last-child{border-bottom:none;}
  .rankMe{background:rgba(0,255,204,.08);}

  /*CASEMODE_HIDE_LEADERBOARD*/
  body.caseMode .leaderboard, body.caseMode #leaderboard{display:none !important;}

  @media (max-width: 768px){
    #controls{
      display:none;
    }
  }
</style>
</head>

<body>
<div id="wrap">
  <div id="game">
    <div class="road"></div>

    <div id="lanes">
      <div class="edge left"></div>
      <div class="edge right"></div>
      <div class="divider one"></div>
      <div class="divider two"></div>
    </div>

    <div id="topHud" aria-live="polite">
      距離 <span class="num" id="distLeft">2000</span>
      <span id="ammoHud">⚡ <b id="ammoCount">0</b></span>
      <span id="timeHud">時間 <b id="timeNow">0</b>s</span>
    </div>

    <div id="finish">
      <div class="hospital">
        <div class="door"></div>
        <div class="sign"><span class="cross">✚</span> 到院成功</div>
      </div>
    </div>

    <div id="rail">
      <div id="hospitalMark" class="railPanel">🏥</div>
      <div id="trackBox" class="railPanel">
        <div id="trackLine"></div>
        <div id="miniAmb">🚑</div>
        <div id="distanceText">距離 100%</div>
      </div>
    </div>

    <div id="penalty">⛔ 延誤 <strong>3</strong> 秒<span class="sub">（原地暫停，距離倒數不動）</span></div>
    <div id="touchHint">左半邊：左移｜右半邊：右移｜雙指：震波</div>

    <div id="player" class="carTop">
      <div class="body"></div>
      <div class="glass"></div>
      <div class="wheels"></div>
      <div class="sirens"></div>
      <div class="lights"><span></span><span></span></div>
    </div>

    <div id="overlay">
      <div id="card">
        <h2 id="resultTitle">結果</h2>
        <p id="resultText">—</p>

        <div id="rankBox">
          <div class="head"><span>🏁 十大到院紀錄</span><span>越快越好</span></div>
          <ul id="rankList"></ul>
        </div>

        <button class="accent" id="restartBtn" style="margin-top:12px;">再跑一次</button>
        <div class="small" style="margin-top:10px">操作：桌機用 ⬅️➡️ / 空白鍵；手機用左半邊、右半邊換車道，雙指觸碰發射震波</div>
      </div>
    </div>
  </div>

  <div id="controls">
    <div class="btnRow">
      <button class="accent" id="leftBtn">⬅️ 左</button>
      <button class="accent" id="rightBtn">右 ➡️</button>
    </div>
    <div class="btnRow">
      <button class="shoot" id="shootBtn">⚡ 震波</button>
      <button class="danger" id="restartSmallBtn">重來</button>
    </div>
  </div>
</div>

<script>
const isCaseMode = new URLSearchParams(location.search).get('mode')==='case';
if(isCaseMode) document.body.classList.add('caseMode');

/* ===================== 參數 ===================== */
const GOAL_DISTANCE = 2000;
const DIST_UNIT = 12;

const BASE_FORWARD_SPEED = 1.0;
const BOOST_MS = 3000;
const BOOST_FORWARD_MULT = 3.0;

const NPC_FALL_BASE = 235;
const NPC_FALL_MIN_MULT = 0.90;
const NPC_FALL_MAX_MULT = 1.40;

const OB_FALL = 205;
const OB_MIN_MS = 900;
const OB_MAX_MS = 1500;
const MAX_OB_ON_SCREEN = 2;

const BOOST_FALL = 190;
const BOOST_MIN_MS = 900;
const BOOST_MAX_MS = 1400;
const MAX_BOOST_ON_SCREEN = 2;

const AMMO_FALL = 190;
const AMMO_MIN_MS = 950;
const AMMO_MAX_MS = 1600;
const MAX_AMMO_ON_SCREEN = 2;

const SHOCK_MAX_RADIUS = 74;
const SHOCK_GROW_PX_PER_S = 520;
const SHOCK_LIFETIME_MS = 260;
const FIRE_COOLDOWN_MS = 240;

const WAVE_MIN_MS = 520;
const WAVE_MAX_MS = 980;
const WAVE_TWO_CAR_PROB = 0.60;
const SAME_LANE_MIN_GAP = 240;
const SPAWN_STAGGER_Y = 70;
const SAFE_HORIZON_SEC = 1.0;
const COLLISION_PAD = 6;

const PENALTY_MS = 3000;

const FINISH_RUNIN_MS = 650;
const END_DELAY_MS = 2000;
/* ====================================================== */

const game = document.getElementById("game");
const player = document.getElementById("player");
const finish = document.getElementById("finish");
const touchHint = document.getElementById("touchHint");

const overlay = document.getElementById("overlay");
const resultTitle = document.getElementById("resultTitle");
const resultText = document.getElementById("resultText");
const restartBtn = document.getElementById("restartBtn");
const restartSmallBtn = document.getElementById("restartSmallBtn");

const miniAmb = document.getElementById("miniAmb");
const distanceText = document.getElementById("distanceText");
const penaltyBox = document.getElementById("penalty");
const topHud = document.getElementById("topHud");
const distLeftEl = document.getElementById("distLeft");

const ammoCountEl = document.getElementById("ammoCount");
const timeNowEl = document.getElementById("timeNow");

const rankListEl = document.getElementById("rankList");

const leftBtn = document.getElementById("leftBtn");
const rightBtn = document.getElementById("rightBtn");
const shootBtn = document.getElementById("shootBtn");

let lane = 1;
let distance = 0;
let entities = [];
let over = false;
let finishing = false;

let lastFrame = performance.now();
let pauseUntil = 0;
let boostUntil = 0;

let ammo = 0;
let lastFireAt = 0;
let touchLaneLock = 0;
let touchHintTimer = null;

// timer（顯示整數秒）
let runStartAt = 0;
let elapsedMs = 0;

// spawns
let nextWaveAt = 0;
let nextBoostAt = 0;
let nextObAt = 0;
let nextAmmoAt = 0;

// ranks
const RANK_KEY = "brain_ambulance_top10_v1";
let lastRunTimeMs = null;

// end delay handle
let endScheduled = false;

function clamp(n,a,b){ return Math.max(a, Math.min(b, n)); }
function rand(msMin, msMax){ return msMin + Math.random() * (msMax - msMin); }
function fmtSec(ms){ return (ms/1000).toFixed(1); }

function setCssVar(name, value){
  document.documentElement.style.setProperty(name, value);
}

function updateResponsiveSizes(){
  const w = game.clientWidth;
  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

  let carW = w * 0.12;
  let carH = carW * 1.625;

  if(isTouch && w <= 430){
    carW *= 0.88;
    carH *= 0.88;
  }

  carW = Math.max(38, Math.min(carW, 48));
  carH = Math.max(62, Math.min(carH, 78));

  const pickup = Math.max(34, Math.min(w * 0.115, 46));
  const ammo = Math.max(32, Math.min(w * 0.11, 44));
  const obstacle = Math.max(40, Math.min(w * 0.14, 54));

  setCssVar('--car-w', `${carW}px`);
  setCssVar('--car-h', `${carH}px`);
  setCssVar('--pickup-size', `${pickup}px`);
  setCssVar('--ammo-size', `${ammo}px`);
  setCssVar('--ob-size', `${obstacle}px`);
}

function getCarWidth(){ return player.offsetWidth || 48; }
function getBoostSize(){ return parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--pickup-size')) || 46; }
function getAmmoSize(){ return parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--ammo-size')) || 44; }
function getObstacleSize(){ return parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--ob-size')) || 54; }

function showTouchHint(){
  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  if(!isTouch) return;
  touchHint.classList.add('show');
  clearTimeout(touchHintTimer);
  touchHintTimer = setTimeout(()=> touchHint.classList.remove('show'), 2200);
}

function laneCenters(){
  const w = game.clientWidth;
  const leftEdge = w * 0.12;
  const rightEdge = w * 0.88;
  const usable = rightEdge - leftEdge;
  const step = usable / 3;
  return [ leftEdge + step*0.5, leftEdge + step*1.5, leftEdge + step*2.5 ];
}

function setPlayerLane(idx){
  lane = clamp(idx, 0, 2);
  const centers = laneCenters();
  player.style.left = (centers[lane] - player.offsetWidth/2) + "px";
}

function updateRelativeDistance(prog){
  const trackBox = miniAmb.parentElement;
  const boxH = trackBox.clientHeight;
  const minBottom = 10;
  const maxBottom = boxH - 10 - miniAmb.clientHeight;
  miniAmb.style.bottom = (minBottom + (maxBottom - minBottom) * (prog / 100)) + "px";
  const remain = Math.max(0, Math.round(100 - prog));
  distanceText.textContent = "距離 " + remain + "%";
}

function rectInflate(r, pad){
  return { left:r.left+pad, right:r.right-pad, top:r.top+pad, bottom:r.bottom-pad };
}

function hit(a,b){
  const ar0 = a.getBoundingClientRect();
  const br0 = b.getBoundingClientRect();
  const ar = rectInflate(ar0, COLLISION_PAD);
  const br = rectInflate(br0, COLLISION_PAD);
  return !(ar.right < br.left || ar.left > br.right || ar.bottom < br.top || ar.top > br.bottom);
}

function countType(type){ return entities.filter(e=>e.type===type).length; }

function nearestTopInLane(ln, typeFilter){
  let minTop = Infinity;
  for(const e of entities){
    if(typeFilter && e.type !== typeFilter) continue;
    if(e.lane !== ln) continue;
    const t = e.el.offsetTop;
    if(t < minTop) minTop = t;
  }
  return minTop;
}

/* ====== 生成 ====== */
function makeNpcCar(laneIndex){
  const el = document.createElement("div");
  el.className = "carTop npcCar";
  el.innerHTML = `<div class="body"></div><div class="glass"></div><div class="wheels"></div><div class="lights"><span></span><span></span></div>`;
  const mult = NPC_FALL_MIN_MULT + Math.random() * (NPC_FALL_MAX_MULT - NPC_FALL_MIN_MULT);
  const centers = laneCenters();
  const carW = getCarWidth();
  el.style.left = (centers[laneIndex] - carW/2) + "px";
  el.style.top = "-150px";
  return { type:"npc", el, v:mult, lane: laneIndex };
}

function makeBoost(laneIndex){
  const el = document.createElement("div");
  el.className = "boost";
  const centers = laneCenters();
  const size = getBoostSize();
  el.style.left = (centers[laneIndex] - size/2) + "px";
  el.style.top = "-110px";
  return { type:"boost", el, lane: laneIndex };
}

function makeObstacle(){
  const el = document.createElement("div");
  el.className = "obstacle";
  const centers = laneCenters();
  const size = getObstacleSize();
  el.style.left = (centers[1] - size/2) + "px";
  el.style.top = "-120px";
  return { type:"ob", el, lane: 1 };
}

function makeAmmo(laneIndex){
  const el = document.createElement("div");
  el.className = "ammoPick";
  const centers = laneCenters();
  const size = getAmmoSize();
  el.style.left = (centers[laneIndex] - size/2) + "px";
  el.style.top = "-110px";
  return { type:"ammo", el, lane: laneIndex };
}

function makeShock(now){
  const el = document.createElement("div");
  el.className = "shock";
  const cx = player.offsetLeft + player.offsetWidth/2;
  const cy = player.offsetTop + player.offsetHeight/2;
  el.style.left = (cx - 9) + "px";
  el.style.top = (cy - 9) + "px";
  return { type:"shock", el, born: now, r: 9, cx, cy };
}

/* 安全判定 */
function laneUnsafeWithin(ln, horizonSec){
  const playerTop = player.offsetTop;
  for(const e of entities){
    if(e.lane !== ln) continue;
    if(e.type !== "npc" && e.type !== "ob") continue;
    const top = e.el.offsetTop;
    const h = e.el.offsetHeight;
    const gap = playerTop - (top + h);
    if(gap < -h) continue;
    const fallSpeed = (e.type === "npc") ? (NPC_FALL_BASE * e.v) : OB_FALL;
    const ttc = gap / fallSpeed;
    if(ttc <= horizonSec) return true;
  }
  return false;
}
function laneSafeForHorizon(ln, horizonSec){ return !laneUnsafeWithin(ln, horizonSec); }

function spawnNpcWaveSmart(now){
  const safeLanesNow = [0,1,2].filter(ln => laneSafeForHorizon(ln, SAFE_HORIZON_SEC));
  if(safeLanesNow.length === 0) return false;

  const wantTwo = Math.random() < WAVE_TWO_CAR_PROB;
  const count = wantTwo ? 2 : 1;

  const reachable = [lane, lane-1, lane+1].filter(x=>x>=0 && x<=2);
  const preferred = safeLanesNow.filter(ln => reachable.includes(ln));
  const keepLanePool = preferred.length ? preferred : safeLanesNow;
  const keepLane = keepLanePool[Math.floor(Math.random() * keepLanePool.length)];

  let candidates = [0,2].filter(ln => ln !== keepLane);
  candidates = candidates.filter(ln => {
    const t = nearestTopInLane(ln, "npc");
    return (t === Infinity) || (t > SAME_LANE_MIN_GAP);
  });
  if(candidates.length === 0) return false;

  const actualCount = Math.min(count, candidates.length);
  const lanes = [];
  while(lanes.length < actualCount){
    const pick = candidates[Math.floor(Math.random()*candidates.length)];
    if(!lanes.includes(pick)) lanes.push(pick);
  }

  lanes.forEach((ln, idx)=>{
    const obj = makeNpcCar(ln);
    obj.el.style.top = (-150 - idx*SPAWN_STAGGER_Y) + "px";
    game.appendChild(obj.el);
    entities.push(obj);
  });

  const safeAfter = [0,1,2].some(ln => laneSafeForHorizon(ln, SAFE_HORIZON_SEC));
  if(!safeAfter){
    for(let i=entities.length-1; i>=0; i--){
      const e = entities[i];
      if(e.type==="npc" && lanes.includes(e.lane) && e.el.offsetTop < 0){
        e.el.remove(); entities.splice(i,1);
      }
    }
    return false;
  }
  return true;
}

function spawnObstacle(){
  if(countType("ob") >= MAX_OB_ON_SCREEN) return;
  const t = nearestTopInLane(1, "ob");
  if(!(t === Infinity || t > 230)) return;
  const obj = makeObstacle();
  game.appendChild(obj.el);
  entities.push(obj);
}

function spawnBoost(){
  if(countType("boost") >= MAX_BOOST_ON_SCREEN) return;
  const preferred = [0,2].filter(ln => laneSafeForHorizon(ln, 0.8));
  const fallback = [0,1,2].filter(ln => laneSafeForHorizon(ln, 0.8));
  const list = preferred.length ? preferred : (fallback.length ? fallback : [0,2,1]);
  const ln = list[Math.floor(Math.random()*list.length)];
  const obj = makeBoost(ln);
  game.appendChild(obj.el);
  entities.push(obj);
}

function spawnAmmo(){
  if(countType("ammo") >= MAX_AMMO_ON_SCREEN) return;
  const safe = [0,1,2].filter(ln => laneSafeForHorizon(ln, 0.8));
  const list = safe.length ? safe : [0,1,2];
  const ln = list[Math.floor(Math.random()*list.length)];
  const obj = makeAmmo(ln);
  game.appendChild(obj.el);
  entities.push(obj);
}

/* ====== 效果 ====== */
function applyPenalty(now){
  pauseUntil = Math.max(pauseUntil, now + PENALTY_MS);
  penaltyBox.style.display = "block";
  penaltyBox.querySelector("strong").textContent = String(Math.ceil((pauseUntil - now)/1000));
  game.animate(
    [{ transform:"translateX(0)" }, { transform:"translateX(-6px)" }, { transform:"translateX(6px)" }, { transform:"translateX(0)" }],
    { duration: 220, iterations: 1 }
  );
}

function applyBoost(now){
  boostUntil = Math.max(boostUntil, now + BOOST_MS);
  player.classList.add("boosting");
  topHud.classList.add("boosting");
}

function updateAmmoUI(){
  ammoCountEl.textContent = String(ammo);
  shootBtn.textContent = ammo > 0 ? `⚡ 震波 (${ammo})` : "⚡ 震波";
}

function tryShock(now){
  if(over || finishing) return;
  if(now < pauseUntil) return;
  if(ammo <= 0) return;
  if(now - lastFireAt < FIRE_COOLDOWN_MS) return;

  ammo--;
  updateAmmoUI();
  lastFireAt = now;

  const s = makeShock(now);
  game.appendChild(s.el);
  entities.push(s);

  player.animate(
    [{ transform:"rotate(180deg) scale(1)" }, { transform:"rotate(180deg) scale(1.02)" }, { transform:"rotate(180deg) scale(1)" }],
    { duration:150, iterations:1 }
  );
}

/* ====== 排行榜 ====== */
function loadRanks(){
  try{
    const raw = localStorage.getItem(RANK_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr : [];
  }catch{ return []; }
}
function saveRanks(arr){ try{ localStorage.setItem(RANK_KEY, JSON.stringify(arr)); }catch{} }
function addRank(timeMs){
  const arr = loadRanks();
  arr.push({ t: timeMs, at: Date.now() });
  arr.sort((a,b)=>a.t-b.t);
  const top10 = arr.slice(0,10);
  saveRanks(top10);
  return top10;
}
function renderRanks(arr){
  rankListEl.innerHTML = "";
  if(!arr.length){
    const li = document.createElement("li");
    li.innerHTML = `<span>—</span><span>尚無紀錄</span>`;
    rankListEl.appendChild(li);
    return;
  }
  arr.forEach((r, idx)=>{
    const li = document.createElement("li");
    const isMe = (lastRunTimeMs !== null && Math.abs(r.t - lastRunTimeMs) < 1);
    if(isMe) li.classList.add("rankMe");
    li.innerHTML = `<span>#${idx+1}</span><span>${fmtSec(r.t)} s</span>`;
    rankListEl.appendChild(li);
  });
}

/* 距離=0 時：清空所有車/障礙/道具/震波 */
function purgeAllEntities(){
  for(const e of entities){
    try{ e.el && e.el.remove && e.el.remove(); }catch{}
  }
  entities = [];
}

/* ====== 終點：入院動畫（清場 + 延後結算 2 秒） ====== */
function enterHospitalAndWin(now){
  if(finishing || over) return;
  finishing = true;

  purgeAllEntities();

  finish.style.top = "0%";

  const centers = laneCenters();
  const targetX = centers[1] - player.offsetWidth/2;

  player.classList.add("finishing");
  player.style.left = targetX + "px";

  const startTop = player.offsetTop;
  const endTop = -90;

  player.style.bottom = "auto";
  player.style.top = startTop + "px";

  const t0 = performance.now();
  const step = (t)=>{
    const p = clamp((t - t0)/FINISH_RUNIN_MS, 0, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    player.style.top = (startTop + (endTop - startTop) * ease) + "px";
    if(p < 1){
      requestAnimationFrame(step);
    }else{
      finish.classList.add("success");
      if(!endScheduled){
        endScheduled = true;
        setTimeout(()=> gameEnd(), END_DELAY_MS);
      }
    }
  };
  requestAnimationFrame(step);
}

/* ====== 重置/結束 ====== */
function reset(){
  purgeAllEntities();
  distance = 0;
  over = false;
  finishing = false;
  endScheduled = false;

  pauseUntil = 0;
  boostUntil = 0;

  ammo = 0;
  lastFireAt = 0;
  touchLaneLock = 0;

  runStartAt = performance.now();
  elapsedMs = 0;
  timeNowEl.textContent = "0";

  penaltyBox.style.display = "none";
  player.classList.remove("boosting","finishing");
  topHud.classList.remove("boosting");

  player.style.top = "";
  player.style.bottom = "6%";

  finish.style.top = "-38%";
  finish.classList.remove("success");
  overlay.style.display = "none";

  setPlayerLane(1);
  updateRelativeDistance(0);
  distLeftEl.textContent = String(GOAL_DISTANCE);
  updateAmmoUI();

  lastRunTimeMs = null;
  renderRanks(loadRanks());

  lastFrame = performance.now();
  const now = performance.now();
  nextWaveAt = now + rand(WAVE_MIN_MS, WAVE_MAX_MS);
  nextBoostAt = now + rand(BOOST_MIN_MS, BOOST_MAX_MS);
  nextObAt = now + rand(OB_MIN_MS, OB_MAX_MS);
  nextAmmoAt = now + rand(AMMO_MIN_MS, AMMO_MAX_MS);

  showTouchHint();
}

function gameEnd(){
  if(over) return;
  over = true;
  overlay.style.display = "flex";

  lastRunTimeMs = elapsedMs;
  resultTitle.textContent = "✅ 成功抵達醫院！";
  resultText.textContent = `到院時間：${fmtSec(elapsedMs)} 秒（越快越好）`;

  try{ parent.postMessage({type:'GAME_CLEAR', game:'race', time: Math.floor(elapsedMs/1000)}, '*'); }catch(e){}

  const top10 = addRank(elapsedMs);
  renderRanks(top10);
}

function tick(now){
  if(over) return;

  const dt = Math.min(0.03, (now - lastFrame)/1000);
  lastFrame = now;

  elapsedMs = now - runStartAt;
  timeNowEl.textContent = String(Math.floor(elapsedMs/1000));

  if(now >= boostUntil){
    player.classList.remove("boosting");
    topHud.classList.remove("boosting");
  }

  if(now < pauseUntil){
    penaltyBox.style.display = "block";
    penaltyBox.querySelector("strong").textContent = String(Math.ceil((pauseUntil - now)/1000));
    requestAnimationFrame(tick);
    return;
  }else{
    penaltyBox.style.display = "none";
  }

  const forwardMult = (now < boostUntil) ? BOOST_FORWARD_MULT : 1.0;
  distance += (BASE_FORWARD_SPEED * forwardMult) * DIST_UNIT * dt;

  const left = Math.max(0, Math.ceil(GOAL_DISTANCE - distance));
  distLeftEl.textContent = String(left);

  const prog = clamp((distance / GOAL_DISTANCE) * 100, 0, 100);
  updateRelativeDistance(prog);

  if(prog > 88){
    const t = (prog - 88) / 12;
    finish.style.top = (-38 + 38 * t) + "%";
  }

  if(distance >= GOAL_DISTANCE){
    enterHospitalAndWin(now);
    return;
  }

  if(finishing){
    requestAnimationFrame(tick);
    return;
  }

  if(now >= nextWaveAt){
    const ok = spawnNpcWaveSmart(now);
    nextWaveAt = now + rand(WAVE_MIN_MS, WAVE_MAX_MS) + (ok ? 0 : 220);
  }
  if(now >= nextObAt){
    spawnObstacle();
    nextObAt = now + rand(OB_MIN_MS, OB_MAX_MS);
  }
  if(now >= nextBoostAt){
    spawnBoost();
    nextBoostAt = now + rand(BOOST_MIN_MS, BOOST_MAX_MS);
  }
  if(now >= nextAmmoAt){
    spawnAmmo();
    nextAmmoAt = now + rand(AMMO_MIN_MS, AMMO_MAX_MS);
  }

  for(let i = entities.length - 1; i >= 0; i--){
    const e = entities[i];

    if(e.type === "npc"){
      e.el.style.top = (e.el.offsetTop + (NPC_FALL_BASE * e.v) * dt) + "px";
      if(hit(player, e.el)){
        e.el.remove(); entities.splice(i,1);
        applyPenalty(now); break;
      }
      if(e.el.offsetTop > game.clientHeight + 160){
        e.el.remove(); entities.splice(i,1);
      }
    }

    if(e.type === "ob"){
      e.el.style.top = (e.el.offsetTop + OB_FALL * dt) + "px";
      if(hit(player, e.el)){
        e.el.remove(); entities.splice(i,1);
        applyPenalty(now); break;
      }
      if(e.el.offsetTop > game.clientHeight + 160){
        e.el.remove(); entities.splice(i,1);
      }
    }

    if(e.type === "boost"){
      e.el.style.top = (e.el.offsetTop + BOOST_FALL * dt) + "px";
      if(hit(player, e.el)){
        e.el.remove(); entities.splice(i,1);
        applyBoost(now); continue;
      }
      if(e.el.offsetTop > game.clientHeight + 140){
        e.el.remove(); entities.splice(i,1);
      }
    }

    if(e.type === "ammo"){
      e.el.style.top = (e.el.offsetTop + AMMO_FALL * dt) + "px";
      if(hit(player, e.el)){
        e.el.remove(); entities.splice(i,1);
        ammo++; updateAmmoUI();
        continue;
      }
      if(e.el.offsetTop > game.clientHeight + 140){
        e.el.remove(); entities.splice(i,1);
      }
    }

    if(e.type === "shock"){
      const age = now - e.born;
      const r = Math.min(SHOCK_MAX_RADIUS, 9 + (SHOCK_GROW_PX_PER_S * (age/1000)));
      e.r = r;

      e.el.style.width = (r*2) + "px";
      e.el.style.height = (r*2) + "px";
      e.el.style.left = (e.cx - r) + "px";
      e.el.style.top  = (e.cy - r) + "px";
      e.el.style.opacity = String(Math.max(0, 1 - age/SHOCK_LIFETIME_MS));

      for(let j = entities.length - 1; j >= 0; j--){
        const t = entities[j];
        if(t.type !== "ob") continue;

        const ox = t.el.offsetLeft + t.el.offsetWidth/2;
        const oy = t.el.offsetTop + t.el.offsetHeight/2;
        const d = Math.hypot(ox - e.cx, oy - e.cy);

        if(d <= r + 18){
          t.el.classList.add("shatter");
          setTimeout(()=>{ try{ t.el.remove(); }catch{} }, 260);
          entities.splice(j,1);
        }
      }

      if(age >= SHOCK_LIFETIME_MS){
        e.el.remove(); entities.splice(i,1);
      }
    }
  }

  requestAnimationFrame(tick);
}

/* 操作 */
function moveLeft(){ if(performance.now() < pauseUntil || over || finishing) return; setPlayerLane(lane - 1); }
function moveRight(){ if(performance.now() < pauseUntil || over || finishing) return; setPlayerLane(lane + 1); }

document.addEventListener("keydown", e=>{
  if(e.key==="ArrowLeft") moveLeft();
  if(e.key==="ArrowRight") moveRight();
  if(e.key===" "){ e.preventDefault(); tryShock(performance.now()); }
});

leftBtn.addEventListener("click", moveLeft);
rightBtn.addEventListener("click", moveRight);
shootBtn.addEventListener("click", ()=> tryShock(performance.now()));

game.addEventListener("touchstart", (e)=>{
  if(over || finishing) return;
  if(performance.now() < pauseUntil) return;

  e.preventDefault();

  if(e.touches.length >= 2){
    tryShock(performance.now());
    touchLaneLock = 0;
    return;
  }

  const touch = e.touches[0];
  const rect = game.getBoundingClientRect();
  const x = touch.clientX - rect.left;
  const side = (x < rect.width / 2) ? -1 : 1;

  if(side !== touchLaneLock){
    if(side < 0) moveLeft();
    else moveRight();
    touchLaneLock = side;
  }
}, { passive:false });

game.addEventListener("touchmove", (e)=>{
  if(over || finishing) return;
  if(performance.now() < pauseUntil) return;

  e.preventDefault();

  if(e.touches.length >= 2) return;

  const touch = e.touches[0];
  const rect = game.getBoundingClientRect();
  const x = touch.clientX - rect.left;
  const side = (x < rect.width / 2) ? -1 : 1;

  if(side !== touchLaneLock){
    if(side < 0) moveLeft();
    else moveRight();
    touchLaneLock = side;
  }
}, { passive:false });

game.addEventListener("touchend", (e)=>{
  e.preventDefault();
  touchLaneLock = 0;
}, { passive:false });

game.addEventListener("touchcancel", (e)=>{
  e.preventDefault();
  touchLaneLock = 0;
}, { passive:false });

function restart(){
  reset();
  requestAnimationFrame(tick);
}

restartBtn.addEventListener("click", restart);
restartSmallBtn.addEventListener("click", restart);

function handleResize(){
  updateResponsiveSizes();
  setPlayerLane(lane);
}

/* 初始化 */
updateResponsiveSizes();
reset();
requestAnimationFrame(tick);
window.addEventListener("resize", handleResize);
</script>
