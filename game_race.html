<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
<title>腦脈先鋒 萬用賽車引擎</title>

<style>
  :root{ --bg:#07080b; --road1:#1b1f2a; --road2:#111521; --text:#e9edf7; --accent:#00ffcc; --warn:#ffd166; --danger:#ff4d4d; --shadow:0 12px 40px rgba(0,0,0,.55); }
  html,body{ width: 100%; height: 100%; margin:0; padding:0; overflow:hidden; background:#000; color:var(--text); font-family:"PingFang TC","Noto Sans TC",system-ui,-apple-system,sans-serif; }
  body{ display:flex; justify-content:center; align-items:stretch; }

  #wrap{ position:relative; width:100%; max-width:420px; height:100%; display:flex; flex-direction:column; user-select:none; -webkit-user-select:none; touch-action:manipulation; }
  #game{ position:relative; flex:1; width:100%; min-height:0; border:1px solid rgba(255,255,255,.12); border-radius:18px; box-shadow:var(--shadow); overflow:hidden; background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,0)); }

  /* 頂部 HUD */
  #topHud{ position:absolute; left:50%; top:10px; transform:translateX(-50%); z-index:12; padding:8px 12px; border-radius:14px; background:linear-gradient(180deg, rgba(10,15,25,.82), rgba(10,15,25,.55)); border:1px solid rgba(255,255,255,.12); box-shadow:0 10px 22px rgba(0,0,0,.28); font-weight:900; letter-spacing:.3px; font-size:13px; white-space:nowrap; display:flex; align-items:center; gap:10px; }
  #topHud .num{ color:var(--accent); font-variant-numeric:tabular-nums; }
  #topHud.boosting .num{ filter:drop-shadow(0 0 10px rgba(0,255,204,.45)); }
  #timeHud{opacity:.95;font-weight:900;}
  #timeHud b{color:#fff;font-variant-numeric:tabular-nums;}
  #timeHud.danger b{color:var(--danger); animation:pulse 0.5s infinite;}
  @keyframes pulse{ 0%{opacity:1;} 50%{opacity:0.3;} 100%{opacity:1;} }

  /* 字牌 UI */
  #wordCollection { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); display: none; gap: 8px; z-index: 12; }
  .word-slot { width: 36px; height: 36px; border-radius: 8px; background: rgba(10, 15, 25, 0.8); border: 2px solid rgba(255, 255, 255, 0.2); color: rgba(255, 255, 255, 0.2); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
  .word-slot.active { background: linear-gradient(180deg, #00ffcc, #00b38f); border-color: #00ffcc; color: #000; box-shadow: 0 0 15px rgba(0, 255, 204, 0.8); }

  /* 場景與背景 */
  .road{ position:absolute; inset:0; transition: background 1s ease; background: radial-gradient(800px 420px at 50% 20%, rgba(0,255,204,.08), transparent 60%), linear-gradient(180deg, var(--road1) 0%, var(--road2) 100%); }
  .road::before{ content:""; position:absolute; inset:-10%; background:linear-gradient(90deg, rgba(0,0,0,0) 0%, rgba(255,255,255,.05) 30%, rgba(255,255,255,.03) 55%, rgba(0,0,0,0) 100%); transform:skewX(-12deg); animation:sweep 3.2s linear infinite; opacity:.55; }
  @keyframes sweep{ 0%{transform:translateX(-40%) skewX(-12deg);} 100%{transform:translateX(40%) skewX(-12deg);} }
  
  body.phase-sky .road { background: radial-gradient(800px 420px at 50% 20%, rgba(255,255,255,.2), transparent 60%), linear-gradient(180deg, #5dade2 0%, #2e86c1 100%); }
  body.phase-sea .road { background: radial-gradient(800px 420px at 50% 20%, rgba(0,255,204,.1), transparent 60%), linear-gradient(180deg, #117a65 0%, #0b5345 100%); }

  #lanes{ position:absolute; inset:0; pointer-events:none; opacity:.9; }
  .divider{ position:absolute; top:0; bottom:0; width:4px; background:repeating-linear-gradient(180deg, rgba(255,255,255,.30) 0 28px, rgba(255,255,255,0) 28px 54px); opacity:.55; }
  .divider.one{left:36.5%;} .divider.two{left:63.5%;}

  /* 天氣層 */
  #weatherOverlay { position:absolute; inset:0; pointer-events:none; z-index:8; transition:all 1s ease; opacity:0; }
  #weatherOverlay.fog { opacity:1; background:rgba(230,240,250,0.7); backdrop-filter:blur(4px); }
  #weatherOverlay.night { opacity:1; background:radial-gradient(circle at 50% 85%, transparent 15%, rgba(0,0,0,0.98) 60%); }
  #weatherOverlay.rain { opacity: 1; background: rgba(10, 20, 30, 0.4); }
  #weatherOverlay.rain::before { content: ""; position: absolute; width: 200%; height: 200%; top: -50%; left: -50%; background-image: linear-gradient(transparent, rgba(255,255,255,0.6) 10%, transparent 12%), linear-gradient(transparent, rgba(255,255,255,0.4) 10%, transparent 12%); background-size: 20px 100px, 35px 140px; transform: rotate(15deg); animation: rainDrop 0.25s linear infinite; }
  @keyframes rainDrop { 100% { background-position: 0 500px, 15px 750px; } }

  /* 終點 */
  #finish{ position:absolute; left:0; right:0; top:-38%; height:38%; display:flex; align-items:flex-end; justify-content:center; padding-bottom:14px; background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(230,236,255,.92)); color:#0b1220; border-bottom:1px solid rgba(0,0,0,.12); z-index:6; }
  #finish .sign{ background:#0b1220; color:#fff; padding:10px 14px; border-radius:14px; font-size:16px; font-weight:900; opacity:0; transition:all .35s ease; } #finish.success .sign{ opacity:1; transform:translateY(0); }

  /* 玩家車輛 */
  #player{ position:absolute; bottom:6%; z-index:7; transition:left 120ms ease; width:48px; height:78px; }
  #playerSkin { width: 100%; height: 100%; position: relative; }
  #playerSkin.carTop { border-radius:12px; border:1px solid rgba(255,255,255,.3); box-shadow:0 12px 24px rgba(0,0,0,.6); background: linear-gradient(180deg, #f0f4f8, #cbd5e1); }
  #playerSkin.carTop .sirens{ position:absolute; left:8px; right:8px; top:8px; height:6px; background:linear-gradient(90deg, #e12d39 45%, #1992d4 55%); animation:sirenFlash 0.5s infinite alternate; }
  @keyframes sirenFlash { 0% { box-shadow:-12px 0 15px rgba(225,45,57,0.8); } 100% { box-shadow:12px 0 15px rgba(25,146,212,0.8); } }
  #playerSkin.carTop::after{ content:"✚"; position:absolute; left:50%; top:44px; transform:translateX(-50%); font-size:12px; font-weight:1000; color:#fff; }
  
  /* 變形Skin */
  #playerSkin.heliTop .body { position: absolute; left: 12px; top: 10px; width: 24px; height: 45px; border-radius: 12px; background: #ff4d4d; }
  #playerSkin.heliTop .rotor { position: absolute; left: -11px; top: 30px; width: 70px; height: 6px; background: rgba(255,255,255,0.9); animation: spinRotor 0.15s linear infinite; }
  @keyframes spinRotor { 100% { transform: rotate(360deg); } }
  #playerSkin.boatTop .hull { position: absolute; left: 6px; top: 5px; width: 36px; height: 65px; border-radius: 50% 50% 10% 10%; background: #ff4d4d; }

  /* 震波 */
  .shock{ position:absolute; border:2px solid #00ffcc; border-radius:50%; box-shadow:0 0 15px #00ffcc; pointer-events:none; z-index:9; }
  .shatter{ animation: shatter 0.3s forwards; } @keyframes shatter{ 100% { transform: scale(1.5); opacity: 0; } }

  .npcCar{ position:absolute; width:48px; height:78px; background: linear-gradient(180deg, #566070, #232b38); border-radius:12px; transform: rotate(180deg); }
  .obstacle{ position:absolute; width:56px; height:26px; border-radius:4px; background:repeating-linear-gradient(45deg, #d35400, #d35400 10px, #2c3e50 10px, #2c3e50 20px); }
  .ammoPick{ position:absolute; width:44px; height:44px; border-radius:14px; background:rgba(255,255,0,0.2); border:1px solid #ffff00; display:grid; place-items:center; font-size:24px; }
  .ammoPick::before{content:"📣";}

  #penalty{ position:absolute; left:50%; top:54%; transform:translate(-50%,-50%); padding:12px; border-radius:14px; background:rgba(0,0,0,.8); display:none; z-index:15; text-align:center; font-weight:900; }
  #controls{ margin-top:10px; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  button{ border:none; border-radius:16px; padding:14px; color:#fff; background:#1b1f2a; border:1px solid #ffffff33; font-weight:900; cursor:pointer; }
  #overlay{ position:absolute; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.8); z-index:20; }
</style>
</head>

<body>
<audio id="bgm" src="assets/Midnight_Siren_Serenade.mp3" loop></audio>
<div id="wrap">
  <div id="game">
    <div id="weatherOverlay"></div>
    <div id="eventText" style="position:absolute;top:35%;left:50%;transform:translateX(-50%);opacity:0;transition:0.3s;z-index:100;font-size:28px;font-weight:bold;"></div>
    <div class="road"></div>
    <div id="lanes"><div class="divider one"></div><div class="divider two"></div></div>
    <div id="wordCollection">
        <div class="word-slot" id="slot-0">亞</div><div class="word-slot" id="slot-1">東</div><div class="word-slot" id="slot-2">醫</div><div class="word-slot" id="slot-3">院</div>
    </div>
    <div id="topHud">距離 <span class="num" id="distLeft">3500</span> 時間 <b id="timeNow">0</b>s</div>
    <div id="penalty">⛔ 碰撞延誤 3 秒</div>
    <div id="player"><div id="ammoFloat" style="position:absolute;top:-30px;left:50%;transform:translateX(-50%);color:#ffff00;font-weight:bold;">📣0</div><div id="playerSkin" class="carTop"></div></div>
    <div id="overlay"><div id="card" style="text-align:center;"><h2 id="resultTitle"></h2><p id="resultText"></p><button onclick="location.reload()" style="background:var(--accent);color:#000;">重新開始</button></div></div>
  </div>
  <div id="controls">
    <button onclick="moveLeft()">⬅️ 左切</button><button onclick="moveRight()">右切 ➡️</button>
    <button onclick="tryShock(performance.now())" style="background:var(--warn);color:#000;">📣 鳴笛</button><button onclick="location.reload()" style="background:var(--danger);">重來</button>
  </div>
</div>

<script>
const MODE_CONFIGS = {
    'case1': { distance: 3500, timeLimit: 50, words: false, mystery: false },
    'case2': { distance: 3500, timeLimit: 75, words: true, mystery: 'weather' },
    'case3': { distance: 5000, timeLimit: 90, transform: true, words: true, mystery: 'weather' },
    'ch_farthest': { distance: Infinity, endless: true, suddenDeath: true },
    'ch_fastest': { distance: 3500 },
    'ch_music': { distance: 5000, transform: true, mystery: 'music' }
};
const urlParams = new URLSearchParams(window.location.search);
const currentMode = urlParams.get('mode') || 'case1';
const cfg = MODE_CONFIGS[currentMode] || MODE_CONFIGS['case1'];

const BASE_FORWARD_SPEED = 1.0, DIST_UNIT = 85, NPC_FALL_BASE = 235, OB_FALL = 205;
const SHOCK_MAX_RADIUS = 80, SHOCK_GROW_SPEED = 500, SHOCK_LIFETIME = 260;

let lane = 1, distance = 0, entities = [], over = false, finishing = false, engineStarted = false;
let lastFrame = performance.now(), runStartAt = performance.now(), elapsedMs = 0;
let ammo = 5, lastFireAt = 0, pauseUntil = 0, currentWordIndex = 0, isSpawningGates = false, scheduledEvents = [];

function id(e){ return document.getElementById(e); }

function reset() {
    id('wordCollection').style.display = cfg.words ? 'flex' : 'none';
    setPlayerLane(1);
    buildSchedule();
    updateAmmoUI();
    engineStarted = true;
}

function buildSchedule() {
    scheduledEvents = [];
    if (cfg.words) [1,2,3,4].forEach(i => scheduledEvents.push({ d: (cfg.distance/5)*i, type: 'word', arg: i-1 }));
    if (cfg.mystery) [1.5, 3.5].forEach(i => scheduledEvents.push({ d: (cfg.distance/5)*i, type: 'mystery' }));
    scheduledEvents.sort((a,b) => a.d - b.d);
}

function laneCenters() {
    const w = game.clientWidth || window.innerWidth || 420;
    return [ w*0.24, w*0.5, w*0.76 ];
}

function setPlayerLane(idx) {
    lane = Math.max(0, Math.min(2, idx));
    player.style.left = (laneCenters()[lane] - 24) + "px";
}

function moveLeft() { if(performance.now() > pauseUntil) setPlayerLane(lane-1); }
function moveRight() { if(performance.now() > pauseUntil) setPlayerLane(lane+1); }

function updateAmmoUI() { id('ammoFloat').textContent = '📣' + ammo; }

function tryShock(now) {
    if (ammo <= 0 || now - lastFireAt < 300 || over || now < pauseUntil) return;
    ammo--; updateAmmoUI(); lastFireAt = now;
    // 播放鳴笛音
    ensureAudio(); playTone(900, 0.15, "triangle", 0.05); setTimeout(()=>playTone(700, 0.15, "triangle", 0.05), 150);
    const el = document.createElement("div"); el.className = "shock";
    const cx = player.offsetLeft + 24, cy = player.offsetTop + 40;
    game.appendChild(el);
    entities.push({ type: "shock", el, born: now, cx, cy, r: 10 });
}

function ensureAudio(){
    const bgm = id('bgm');
    if(bgm.paused) { bgm.volume = 0.3; bgm.play().catch(()=>{}); }
}
function playTone(freq, dur, type, vol){
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ac.createOscillator(); const gain = ac.createGain();
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ac.currentTime);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(); osc.stop(ac.currentTime + dur);
}

function spawnNPC() {
    if (isSpawningGates) return;
    const lns = [0, 2]; // ★ 強制排除中間車道 1
    const ln = lns[Math.floor(Math.random()*2)];
    const el = document.createElement("div"); el.className = "npcCar";
    el.style.left = (laneCenters()[ln] - 24) + "px"; el.style.top = "-100px";
    game.appendChild(el); entities.push({ type:"npc", el, lane:ln, v:1.0 });
}

function spawnObstacle() {
    if (isSpawningGates) return;
    const ln = Math.floor(Math.random()*3);
    const el = document.createElement("div"); el.className = "obstacle";
    el.style.left = (laneCenters()[ln] - 28) + "px"; el.style.top = "-100px";
    game.appendChild(el); entities.push({ type:"ob", el, lane:ln });
}

function spawnWordGates(idx) {
    isSpawningGates = true;
    entities.forEach(e => { if(e.type==="npc"||e.type==="ob") e.el.remove(); });
    entities = entities.filter(e => e.type==="shock");
    const decoys = ['台','大','馬','偕','長','庚'].sort(()=>Math.random()-0.5);
    const opts = [{t:WORD_TARGETS[idx], c:true}, {t:decoys[0], c:false}, {t:decoys[1], c:false}].sort(()=>Math.random()-0.5);
    opts.forEach((opt, ln) => {
        const el = document.createElement("div"); el.className = "gate word";
        el.style.left = (laneCenters()[ln] - 40) + "px"; el.style.top = "-200px";
        el.innerHTML = `<span style="font-size:40px;">${opt.t}</span>`;
        game.appendChild(el); entities.push({ type:"gate_word", el, lane:ln, correct:opt.c });
    });
}

function hit(a,b){
    const ar = a.getBoundingClientRect(), br = b.getBoundingClientRect();
    return !(ar.right<br.left+5 || ar.left>br.right-5 || ar.bottom<br.top+5 || ar.top>br.bottom-5);
}

function tick(now) {
    if (game.clientWidth < 10) { lastFrame = now; runStartAt = now; requestAnimationFrame(tick); return; }
    if (!engineStarted) { reset(); requestAnimationFrame(tick); return; }
    if (over) return;

    const dt = Math.min(0.05, (now - lastFrame) / 1000); lastFrame = now;
    if (now < pauseUntil) { requestAnimationFrame(tick); return; }

    elapsedMs = now - runStartAt;
    if (cfg.timeLimit) {
        let rem = cfg.timeLimit - (elapsedMs/1000);
        id('timeNow').textContent = Math.max(0, rem).toFixed(1);
        if (rem <= 0) return gameEnd(false, "時間耗盡");
    } else id('timeNow').textContent = (elapsedMs/1000).toFixed(1);

    distance += BASE_FORWARD_SPEED * DIST_UNIT * dt;
    id('distLeft').textContent = cfg.endless ? Math.floor(distance) : Math.max(0, Math.floor(cfg.distance - distance));

    if (!cfg.endless && distance >= cfg.distance && !finishing) { finishing = true; gameEnd(true, "抵達醫院"); }

    if (scheduledEvents.length > 0 && distance >= scheduledEvents[0].d) {
        let ev = scheduledEvents.shift();
        if (ev.type === 'word') spawnWordGates(ev.arg);
    }

    if (Math.random() < 0.02) spawnNPC();
    if (Math.random() < 0.01) spawnObstacle();
    if (Math.random() < 0.005) {
        const ln = Math.floor(Math.random()*3);
        const el = document.createElement("div"); el.className="ammoPick";
        el.style.left = (laneCenters()[ln]-22)+"px"; el.style.top="-100px";
        game.appendChild(el); entities.push({type:"ammo", el, lane:ln});
    }

    for (let i = entities.length - 1; i >= 0; i--) {
        const e = entities[i];
        if (e.type === 'shock') {
            let age = now - e.born;
            if (age > SHOCK_LIFETIME) { e.el.remove(); entities.splice(i, 1); continue; }
            e.r = 10 + (SHOCK_GROW_SPEED * (age/1000));
            e.el.style.width = e.el.style.height = (e.r*2)+'px';
            e.el.style.left = (e.cx - e.r)+'px'; e.el.style.top = (e.cy - e.r)+'px';
            entities.forEach((target, j) => {
                if (target.type === 'ob') {
                    if (Math.hypot(target.el.offsetLeft+28-e.cx, target.el.offsetTop+13-e.cy) < e.r + 20) {
                        target.el.classList.add('shatter'); setTimeout(()=>target.el.remove(), 300); entities.splice(j, 1);
                    }
                }
            });
            continue;
        }

        let speed = (e.type === 'npc' ? NPC_FALL_BASE : OB_FALL);
        if (e.type.startsWith('gate')) speed = OB_FALL * 1.2;
        e.el.style.top = (e.el.offsetTop + speed * dt) + "px";

        if (hit(player, e.el)) {
            if (e.type === 'gate_word') {
                if (e.correct) {
                    id('slot-'+currentWordIndex).classList.add('active'); currentWordIndex++; isSpawningGates = false;
                } else {
                    pauseUntil = now + 2000; id('penalty').style.display='block'; setTimeout(()=>id('penalty').style.display='none', 2000);
                    distance = Math.max(0, distance - 100); isSpawningGates = false;
                }
                entities.filter(x=>x.type==='gate_word').forEach(x=>x.el.remove()); entities = entities.filter(x=>x.type!=='gate_word');
                break;
            }
            if (e.type === 'npc' || e.type === 'ob') {
                if (cfg.suddenDeath) return gameEnd(false, "撞車損毀");
                pauseUntil = now + 3000; id('penalty').style.display='block'; setTimeout(()=>id('penalty').style.display='none', 3000);
                e.el.remove(); entities.splice(i, 1); break;
            }
            if (e.type === 'ammo') { ammo++; updateAmmoUI(); e.el.remove(); entities.splice(i,1); }
        }
        if (e.el.offsetTop > 850) { e.el.remove(); entities.splice(i, 1); if(e.type==='gate_word') isSpawningGates=false; }
    }
    requestAnimationFrame(tick);
}

function gameEnd(win, reason) {
    over = true; id('overlay').style.display = 'flex';
    id('resultTitle').textContent = win ? "✅ 任務成功" : "❌ 任務失敗";
    id('resultText').textContent = reason;
    parent.postMessage({ type: win ? 'GAME_CLEAR' : 'GAME_FAILED', time: Math.floor(elapsedMs/1000) }, '*');
}

requestAnimationFrame(tick);
</script>
</body>
</html>
