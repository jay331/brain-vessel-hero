<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
<title>腦脈先鋒 萬用賽車引擎</title>
<style>
  :root{ --bg:#07080b; --road1:#1b1f2a; --road2:#111521; --text:#e9edf7; --accent:#00ffcc; --warn:#ffd166; --danger:#ff4d4d; --shadow:0 12px 40px rgba(0,0,0,.55); }
  html,body{ width: 100%; height: 100%; margin:0; padding:0; overflow:hidden; background:#000; color:var(--text); font-family:"PingFang TC","Noto Sans TC",system-ui,-apple-system,sans-serif; }
  body{ display:flex; justify-content:center; align-items:stretch; }
  #wrap{ position:relative; width:100%; max-width:420px; height:100%; display:flex; flex-direction:column; user-select:none; -webkit-user-select:none; touch-action:manipulation; }
  #game{ position:relative; flex:1; width:100%; min-height:0; border:1px solid rgba(255,255,255,.12); border-radius:18px; box-shadow:var(--shadow); overflow:hidden; background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,0)); }
  #topHud{ position:absolute; left:50%; top:10px; transform:translateX(-50%); z-index:12; padding:8px 12px; border-radius:14px; background:linear-gradient(180deg, rgba(10,15,25,.82), rgba(10,15,25,.55)); border:1px solid rgba(255,255,255,.12); box-shadow:0 10px 22px rgba(0,0,0,.28); font-weight:900; font-size:13px; white-space:nowrap; display:flex; align-items:center; gap:10px; }
  #topHud .num{ color:var(--accent); font-variant-numeric:tabular-nums; }
  #topHud.boosting .num{ filter:drop-shadow(0 0 10px rgba(0,255,204,.45)); }
  #timeHud{opacity:.95;font-weight:900;} #timeHud b{color:#fff;font-variant-numeric:tabular-nums;}
  #wordCollection { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); display: none; gap: 8px; z-index: 12; }
  .word-slot { width: 34px; height: 34px; border-radius: 8px; background: rgba(10, 15, 25, 0.8); border: 2px solid rgba(255, 255, 255, 0.2); color: rgba(255, 255, 255, 0.2); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; }
  .word-slot.active { background: linear-gradient(180deg, #00ffcc, #00b38f); border-color: #00ffcc; color: #000; box-shadow: 0 0 15px rgba(0, 255, 204, 0.8); }
  .road{ position:absolute; inset:0; background: radial-gradient(800px 420px at 50% 20%, rgba(0,255,204,.08), transparent 60%), linear-gradient(180deg, var(--road1) 0%, var(--road2) 100%); }
  #lanes{ position:absolute; inset:0; pointer-events:none; }
  .divider{ position:absolute; top:0; bottom:0; width:4px; background:repeating-linear-gradient(180deg, rgba(255,255,255,.30) 0 28px, rgba(255,255,255,0) 28px 54px); }
  .divider.one{left:36.5%;} .divider.two{left:63.5%;}
  #player{ position:absolute; bottom:6%; z-index:7; transition:left 120ms ease; width:48px; height:78px; }
  #playerSkin.carTop { border-radius:12px; border:1px solid rgba(255,255,255,.3); background: linear-gradient(180deg, #f0f4f8, #cbd5e1); }
  .npcCar{ position:absolute; width:48px; height:78px; background: linear-gradient(180deg, #566070, #232b38); border-radius:12px; transform: rotate(180deg); }
  .obstacle{ position:absolute; width:56px; height:26px; background:repeating-linear-gradient(45deg, #d35400, #d35400 10px, #2c3e50 10px, #2c3e50 20px); border-radius:4px; }
  .shock{ position:absolute; border:2px solid #00ffcc; border-radius:50%; pointer-events:none; z-index:10; }
  .shatter{ animation: shatter 0.3s forwards; } @keyframes shatter{ 100%{ transform:scale(1.5); opacity:0; } }
  #penalty{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); padding:20px; background:rgba(0,0,0,0.8); border-radius:15px; display:none; z-index:100; text-align:center; }
  #controls{ margin-top:10px; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  button{ border:none; border-radius:16px; padding:15px; color:#fff; background:#232b38; font-weight:bold; cursor:pointer; }
  #overlay{ position:absolute; inset:0; background:rgba(0,0,0,0.85); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:200; }
</style>
</head>
<body>
<audio id="bgm" src="assets/Midnight_Siren_Serenade.mp3" loop></audio>
<div id="wrap">
  <div id="game">
    <div id="weatherOverlay" style="position:absolute;inset:0;pointer-events:none;z-index:80;"></div>
    <div id="eventText" style="position:absolute;top:30%;left:50%;transform:translateX(-50%);opacity:0;transition:0.3s;z-index:90;font-weight:bold;font-size:24px;"></div>
    <div class="road"></div>
    <div id="lanes"><div class="divider one"></div><div class="divider two"></div></div>
    <div id="wordCollection">
        <div class="word-slot" id="slot-0">亞</div><div class="word-slot" id="slot-1">東</div><div class="word-slot" id="slot-2">醫</div><div class="word-slot" id="slot-3">院</div>
    </div>
    <div id="topHud">距離 <span class="num" id="distLeft">---</span> 時間 <b id="timeNow">0</b>s</div>
    <div id="finish" style="position:absolute;top:-100%;left:0;width:100%;height:40%;background:#fff;z-index:5;text-align:center;padding-top:20px;color:#000;font-weight:bold;">🏥 亞東醫院到了！</div>
    <div id="penalty">⛔ 碰撞延誤 <strong>3</strong> 秒</div>
    <div id="player"><div id="ammoFloat" style="position:absolute;top:-30px;left:50%;transform:translateX(-50%);color:#ffff00;font-weight:bold;">📣0</div><div id="playerSkin" style="width:100%;height:100%;"></div></div>
    <div id="overlay"><div id="card"><h2 id="resultTitle"></h2><p id="resultText"></p><ul id="rankList" style="list-style:none;padding:0;"></ul><button onclick="location.reload()" style="width:100%;background:var(--accent);color:#000;">重新開始</button></div></div>
  </div>
  <div id="controls">
    <button onclick="moveLeft()">⬅️ 左切</button><button onclick="moveRight()">右切 ➡️</button>
    <button onclick="tryShock(performance.now())" style="background:var(--warn);color:#000;">📣 鳴笛</button><button onclick="location.reload()" style="background:var(--danger);">重來</button>
  </div>
</div>

<script>
// --- 配置 ---
const MODE_CONFIGS = {
    'case1': { distance: 3500, timeLimit: 50, words: false, mystery: false },
    'case2': { distance: 3500, timeLimit: 75, words: true, mystery: 'weather' },
    'case3': { distance: 5000, timeLimit: 90, transform: true, words: true, mystery: 'weather' },
    'ch_farthest': { distance: Infinity, endless: true, suddenDeath: true },
    'ch_fastest': { distance: 3500 },
    'ch_music': { distance: 5000, transform: true, mystery: 'music' }
};
const urlParams = new URLSearchParams(window.location.search);
const currentMode = urlParams.get('mode') || 'case1';
const cfg = MODE_CONFIGS[currentMode] || MODE_CONFIGS['case1'];

// --- 常數 ---
const BASE_FORWARD_SPEED = 1.0;
const DIST_UNIT = 85; 
const NPC_FALL_BASE = 240;
const OB_FALL = 210;
const SHOCK_MAX_RADIUS = 80;
const SHOCK_GROW_SPEED = 500;
const SHOCK_LIFETIME = 300;

// --- 狀態 ---
let engineReady = false, lane = 1, distance = 0, entities = [], over = false, finishing = false;
let lastFrame = performance.now(), runStartAt = performance.now(), elapsedMs = 0;
let ammo = 5, lastFireAt = 0, pauseUntil = 0, boostUntil = 0;
let currentWordIndex = 0, isSpawningGates = false, scheduledEvents = [];

function id(e){ return document.getElementById(e); }

// --- 初始化 ---
function reset() {
    distance = 0; entities = []; currentWordIndex = 0;
    id('wordCollection').style.display = cfg.words ? 'flex' : 'none';
    setPlayerSkin(1); setPlayerLane(1);
    buildSchedule();
    engineReady = true;
    updateAmmoUI();
}

function buildSchedule() {
    scheduledEvents = [];
    if (cfg.words) [1,2,3,4].forEach(i => scheduledEvents.push({ d: (cfg.distance/5)*i, type: 'word', arg: i-1 }));
    if (cfg.mystery) [1.5, 3.5].forEach(i => scheduledEvents.push({ d: (cfg.distance/5)*i, type: 'mystery' }));
    scheduledEvents.sort((a,b) => a.d - b.d);
}

function setPlayerLane(idx) { lane = Math.max(0, Math.min(2, idx)); const centers = [id('game').clientWidth*0.24, id('game').clientWidth*0.5, id('game').clientWidth*0.76]; id('player').style.left = (centers[lane] - 24) + 'px'; }
function setPlayerSkin(p) { id('playerSkin').className = 'carTop'; id('playerSkin').innerHTML = '🚑'; }
function updateAmmoUI() { id('ammoFloat').textContent = '📣' + ammo; }

// --- 生成邏輯 ---
function spawnNPC() {
    if (isSpawningGates) return;
    // ★ 敵車絕對不從車道 1 (中間) 過來
    const possibleLanes = [0, 2];
    const ln = possibleLanes[Math.floor(Math.random() * 2)];
    const el = document.createElement('div'); el.className = 'npcCar'; el.innerHTML = '🚗';
    el.style.left = (laneCenters()[ln] - 24) + 'px'; el.style.top = '-100px';
    game.appendChild(el); entities.push({ type: 'npc', el, lane: ln, v: 1.0 });
}

function spawnObstacle() {
    if (isSpawningGates) return;
    const ln = Math.floor(Math.random() * 3);
    const el = document.createElement('div'); el.className = 'obstacle'; el.innerHTML = '🚧';
    el.style.left = (laneCenters()[ln] - 28) + 'px'; el.style.top = '-100px';
    game.appendChild(el); entities.push({ type: 'ob', el, lane: ln });
}

function laneCenters() { const w = id('game').clientWidth || 400; return [w*0.24, w*0.5, w*0.76]; }

function tryShock(now) {
    if (ammo <= 0 || now - lastFireAt < 500 || over) return;
    ammo--; updateAmmoUI(); lastFireAt = now;
    const el = document.createElement('div'); el.className = 'shock';
    const cx = id('player').offsetLeft + 24; const cy = id('player').offsetTop + 40;
    game.appendChild(el);
    entities.push({ type: 'shock', el, born: now, cx, cy, r: 10 });
}

function applyPenalty(now) {
    pauseUntil = now + 3000; id('penalty').style.display = 'block';
    setTimeout(() => { id('penalty').style.display = 'none'; }, 3000);
}

function spawnWordGates(idx) {
    isSpawningGates = true;
    entities.forEach(e => { if(e.type==='npc'||e.type==='ob') e.el.remove(); });
    entities = entities.filter(e => e.type==='shock');
    const WORD_TARGETS = ['亞', '東', '醫', '院'];
    const decoys = ['台','大','庚'].sort(()=>Math.random()-0.5);
    const opts = [{t: WORD_TARGETS[idx], c:true}, {t: decoys[0], c:false}, {t: decoys[1], c:false}].sort(()=>Math.random()-0.5);
    opts.forEach((opt, ln) => {
        const el = document.createElement('div'); el.className = 'gate word'; el.innerHTML = opt.t;
        el.style.left = (laneCenters()[ln] - 40) + 'px'; el.style.top = '-150px';
        game.appendChild(el); entities.push({ type: 'gate_word', el, lane: ln, correct: opt.c });
    });
}

// --- 核心循環 ---
function tick(now) {
    if (id('game').clientWidth < 10) { lastFrame = now; runStartAt = now; requestAnimationFrame(tick); return; }
    if (!engineReady) { reset(); requestAnimationFrame(tick); return; }
    if (over) return;

    const dt = Math.min(0.05, (now - lastFrame) / 1000);
    lastFrame = now;

    if (now < pauseUntil) { requestAnimationFrame(tick); return; }

    elapsedMs = now - runStartAt;
    if (cfg.timeLimit) {
        let rem = cfg.timeLimit - (elapsedMs/1000);
        id('timeNow').textContent = Math.max(0, rem).toFixed(1);
        if (rem <= 0) return gameEnd(false, "時間耗盡");
    } else { id('timeNow').textContent = (elapsedMs/1000).toFixed(1); }

    distance += BASE_FORWARD_SPEED * DIST_UNIT * dt;
    id('distLeft').textContent = cfg.endless ? Math.floor(distance) : Math.max(0, Math.floor(cfg.distance - distance));

    if (!cfg.endless && distance >= cfg.distance && !finishing) { finishing = true; gameEnd(true, "抵達醫院"); }

    if (scheduledEvents.length > 0 && distance >= scheduledEvents[0].d) {
        let ev = scheduledEvents.shift();
        if (ev.type === 'word') spawnWordGates(ev.arg);
    }

    if (Math.random() < 0.02) spawnNPC();
    if (Math.random() < 0.01) spawnObstacle();

    for (let i = entities.length - 1; i >= 0; i--) {
        const e = entities[i];
        if (e.type === 'shock') {
            let age = now - e.born; // ★ 這裡現在保證 e.born 存在
            if (age > SHOCK_LIFETIME) { e.el.remove(); entities.splice(i, 1); continue; }
            e.r = 10 + (SHOCK_GROW_SPEED * (age/1000));
            e.el.style.width = (e.r*2)+'px'; e.el.style.height = (e.r*2)+'px';
            e.el.style.left = (e.cx - e.r)+'px'; e.el.style.top = (e.cy - e.r)+'px';
            entities.forEach((target, j) => {
                if (target.type === 'ob') {
                    let tx = target.el.offsetLeft + 28, ty = target.el.offsetTop + 13;
                    if (Math.hypot(tx - e.cx, ty - e.cy) < e.r + 20) { target.el.classList.add('shatter'); setTimeout(()=>target.el.remove(), 300); entities.splice(j, 1); }
                }
            });
            continue;
        }

        let speed = (e.type === 'npc' ? NPC_FALL_BASE : OB_FALL);
        if (e.type.startsWith('gate')) speed = OB_FALL * 1.2;
        e.el.style.top = (e.el.offsetTop + speed * dt) + 'px';

        if (!over && hit(id('player'), e.el)) {
            if (e.type === 'gate_word') {
                if (e.correct) {
                    id('slot-'+currentWordIndex).classList.add('active'); currentWordIndex++; isSpawningGates = false;
                    entities.filter(x=>x.type==='gate_word').forEach(x=>x.el.remove()); entities = entities.filter(x=>x.type!=='gate_word');
                } else {
                    applyPenalty(now); distance -= 100; isSpawningGates = false;
                    entities.filter(x=>x.type==='gate_word').forEach(x=>x.el.remove()); entities = entities.filter(x=>x.type!=='gate_word');
                }
                break;
            }
            if (e.type === 'npc' || e.type === 'ob') {
                if (cfg.suddenDeath) return gameEnd(false, "車輛撞毀");
                applyPenalty(now); e.el.remove(); entities.splice(i, 1); break;
            }
        }
        if (e.el.offsetTop > 850) { e.el.remove(); entities.splice(i, 1); if(e.type==='gate_word') isSpawningGates=false; }
    }
    requestAnimationFrame(tick);
}

function moveLeft() { if(performance.now() > pauseUntil) setPlayerLane(lane-1); }
function moveRight() { if(performance.now() > pauseUntil) setPlayerLane(lane+1); }

function gameEnd(win, reason) {
    over = true; id('overlay').style.display = 'flex';
    id('resultTitle').textContent = win ? "任務成功" : "任務失敗";
    id('resultText').textContent = reason;
    try { parent.postMessage({ type: win ? 'GAME_CLEAR' : 'GAME_FAILED', time: Math.floor(elapsedMs/1000), score: Math.floor(distance) }, '*'); } catch(e){}
}

requestAnimationFrame(tick);
</script>
</body>
</html>
