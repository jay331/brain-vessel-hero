<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
<title>腦脈先鋒 萬用賽車引擎</title>

<style>
  :root{ --bg:#07080b; --road1:#1b1f2a; --road2:#111521; --text:#e9edf7; --accent:#00ffcc; --warn:#ffd166; --danger:#ff4d4d; --shadow:0 12px 40px rgba(0,0,0,.55); }
  html,body{ width: 100%; height: 100%; margin:0; padding:0; overflow:hidden; background:#000; color:var(--text); font-family:"PingFang TC","Noto Sans TC",system-ui,-apple-system,sans-serif; }
  body{ display:flex; justify-content:center; align-items:stretch; }

  #wrap{ position:relative; width:100%; max-width:420px; height:100%; display:flex; flex-direction:column; user-select:none; -webkit-user-select:none; touch-action:manipulation; }
  #game{ position:relative; flex:1; width:100%; min-height:0; border:1px solid rgba(255,255,255,.12); border-radius:18px; box-shadow:var(--shadow); overflow:hidden; background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,0)); }

  /* 頂部 HUD */
  #topHud{ position:absolute; left:50%; top:10px; transform:translateX(-50%); z-index:12; padding:8px 12px; border-radius:14px; background:linear-gradient(180deg, rgba(10,15,25,.82), rgba(10,15,25,.55)); border:1px solid rgba(255,255,255,.12); box-shadow:0 10px 22px rgba(0,0,0,.28); font-weight:900; letter-spacing:.3px; font-size:13px; white-space:nowrap; display:flex; align-items:center; gap:10px; }
  #topHud .num{ color:var(--accent); font-variant-numeric:tabular-nums; }
  #topHud.boosting .num{ filter:drop-shadow(0 0 10px rgba(0,255,204,.45)); }
  #timeHud{opacity:.95;font-weight:900;}
  #timeHud b{color:#fff;font-variant-numeric:tabular-nums;}
  #timeHud.danger b{color:var(--danger); animation:pulse 0.5s infinite;}
  @keyframes pulse{ 0%{opacity:1;} 50%{opacity:0.3;} 100%{opacity:1;} }

  /* 字牌 UI */
  #wordCollection { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); display: none; gap: 8px; z-index: 12; }
  .word-slot { width: 36px; height: 36px; border-radius: 8px; background: rgba(10, 15, 25, 0.8); border: 2px solid rgba(255, 255, 255, 0.2); color: rgba(255, 255, 255, 0.2); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
  .word-slot.active { background: linear-gradient(180deg, #00ffcc, #00b38f); border-color: #00ffcc; color: #000; box-shadow: 0 0 15px rgba(0, 255, 204, 0.8); }
  .word-slot.failed { background: linear-gradient(180deg, #ff4d4d, #c62828); border-color: #ff4d4d; color: #fff; box-shadow: 0 0 15px rgba(255, 77, 77, 0.8); }

  /* 場景與背景 */
  .road{ position:absolute; inset:0; transition: background 1s ease; background: radial-gradient(800px 420px at 50% 20%, rgba(0,255,204,.08), transparent 60%), linear-gradient(180deg, var(--road1) 0%, var(--road2) 100%); }
  .road::before{ content:""; position:absolute; inset:-10%; background:linear-gradient(90deg, rgba(0,0,0,0) 0%, rgba(255,255,255,.05) 30%, rgba(255,255,255,.03) 55%, rgba(0,0,0,0) 100%); transform:skewX(-12deg); animation:sweep 3.2s linear infinite; opacity:.55; }
  @keyframes sweep{ 0%{transform:translateX(-40%) skewX(-12deg);} 100%{transform:translateX(40%) skewX(-12deg);} }
  
  body.phase-sky .road { background: radial-gradient(800px 420px at 50% 20%, rgba(255,255,255,.2), transparent 60%), linear-gradient(180deg, #5dade2 0%, #2e86c1 100%); }
  body.phase-sky .road::before { background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.2) 30%, rgba(255,255,255,.1) 55%, rgba(255,255,255,0) 100%); }
  body.phase-sea .road { background: radial-gradient(800px 420px at 50% 20%, rgba(0,255,204,.1), transparent 60%), linear-gradient(180deg, #117a65 0%, #0b5345 100%); }
  body.phase-sea .road::before { background: linear-gradient(90deg, rgba(0,255,204,0) 0%, rgba(0,255,204,.15) 30%, rgba(0,255,204,.05) 55%, rgba(0,255,204,0) 100%); }

  #lanes{ position:absolute; inset:0; pointer-events:none; opacity:.9; }
  .edge{ position:absolute; top:0; bottom:0; width:4px; background:linear-gradient(180deg, rgba(255,255,255,.40), rgba(255,255,255,.16)); box-shadow:0 0 10px rgba(255,255,255,.08); }
  .edge.left{left:12%;} .edge.right{right:12%;}
  .divider{ position:absolute; top:0; bottom:0; width:4px; background:repeating-linear-gradient(180deg, rgba(255,255,255,.30) 0 28px, rgba(255,255,255,0) 28px 54px); opacity:.55; filter:drop-shadow(0 0 4px rgba(255,255,255,.06)); }
  .divider.one{left:36.5%;} .divider.two{left:63.5%;}
  body.phase-sky .edge, body.phase-sky .divider { background: rgba(255,255,255, 0.4); border: 1px dashed rgba(255,255,255, 0.6); box-shadow: 0 0 10px rgba(255,255,255,0.4); opacity: 0.6;}
  body.phase-sea .edge, body.phase-sea .divider { background: repeating-linear-gradient(180deg, rgba(0,255,204,.35) 0 20px, rgba(0,255,204,0) 20px 40px); box-shadow: 0 0 10px rgba(0,255,204,0.3); opacity: 0.6;}

  /* 天氣層 */
  #weatherOverlay { position:absolute; inset:0; pointer-events:none; z-index:8; transition:all 1s ease; opacity:0; }
  #weatherOverlay.fog { opacity:1; background:rgba(230,240,250,0.7); backdrop-filter:blur(4px); }
  #weatherOverlay.night { opacity:1; background:radial-gradient(circle at 50% 85%, transparent 15%, rgba(0,0,0,0.98) 60%); }
  #weatherOverlay.rain { opacity: 1; background: rgba(10, 20, 30, 0.4); }
  #weatherOverlay.rain::before { content: ""; position: absolute; width: 200%; height: 200%; top: -50%; left: -50%; background-image: linear-gradient(transparent, rgba(255,255,255,0.6) 10%, transparent 12%), linear-gradient(transparent, rgba(255,255,255,0.4) 10%, transparent 12%); background-size: 20px 100px, 35px 140px; background-position: 0 0, 15px 50px; transform: rotate(15deg); animation: rainDrop 0.25s linear infinite; pointer-events: none; }
  @keyframes rainDrop { 0% { background-position: 0 0, 15px 50px; } 100% { background-position: 0 500px, 15px 750px; } }
  #eventText { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); z-index: 50; color: #fff; font-size: 30px; font-weight: 1000; letter-spacing: 2px; text-shadow: 0 0 20px rgba(0,255,204,0.9), 0 4px 10px rgba(0,0,0,0.8); pointer-events: none; opacity: 0; transition: opacity 0.3s ease; text-align: center; white-space: nowrap; }

  /* 終點與進度條 */
  #finish{ position:absolute; left:0; right:0; top:-38%; height:38%; display:flex; align-items:flex-end; justify-content:center; padding-bottom:14px; background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(230,236,255,.92)); color:#0b1220; border-bottom:1px solid rgba(0,0,0,.12); z-index:6; }
  #finish .hospital{ width:86%; height:72%; border-radius:16px; background:radial-gradient(120px 90px at 50% 35%, rgba(0,255,204,.25), transparent 55%), #ffffff; box-shadow:0 10px 30px rgba(0,0,0,.18); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
  #finish .door{ position:absolute; bottom:10%; left:50%; transform:translateX(-50%); width:46%; height:26%; border-radius:14px; background:linear-gradient(180deg, rgba(11,18,32,.12), rgba(11,18,32,.04)); border:1px solid rgba(11,18,32,.18); box-shadow:inset 0 0 0 2px rgba(255,255,255,.35); }
  #finish .sign{ background:#0b1220; color:#fff; padding:10px 14px; border-radius:14px; font-size:16px; font-weight:900; letter-spacing:.4px; display:flex; align-items:center; gap:10px; box-shadow:0 8px 18px rgba(0,0,0,.20); opacity:0; transform:translateY(8px); transition:opacity .35s ease, transform .35s ease; }
  #finish.success .sign{ opacity:1; transform:translateY(0); }
  #finish .cross{ width:24px; height:24px; border-radius:7px; background:var(--accent); display:grid; place-items:center; color:#00130f; font-weight:900; }

  #rail{ position:absolute; right:10px; top:10px; width:52px; height:78%; z-index:10; display:flex; flex-direction:column; align-items:center; gap:10px; pointer-events:none; }
  .railPanel{ width:52px; border-radius:16px; background:linear-gradient(180deg, rgba(10,15,25,.72), rgba(10,15,25,.40)); border:1px solid rgba(255,255,255,.12); box-shadow:0 10px 22px rgba(0,0,0,.28); overflow:hidden; }
  #hospitalMark{ height:40px; display:grid; place-items:center; font-size:18px; }
  #trackBox{ flex:1; position:relative; }
  #trackLine{ position:absolute; left:50%; top:10px; bottom:10px; width:4px; transform:translateX(-50%); background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.06)); border-radius:999px; }
  #miniAmb{ position:absolute; left:50%; transform:translateX(-50%); bottom:10px; width:30px; height:30px; display:grid; place-items:center; border-radius:10px; background:rgba(0,255,204,.16); border:1px solid rgba(0,255,204,.35); box-shadow:0 10px 18px rgba(0,0,0,.25); font-size:18px; transition: bottom 0.1s linear; }
  #distanceText{ position:absolute; left:50%; transform:translateX(-50%); bottom:10px; margin-bottom:-32px; font-size:11px; opacity:.85; background:rgba(10,15,25,.55); border:1px solid rgba(255,255,255,.10); padding:4px 6px; border-radius:10px; white-space:nowrap; }

  /* 玩家車輛 */
  #player{ position:absolute; bottom:6%; z-index:7; transition:left 120ms ease; transform-origin:center; width:48px; height:78px; }
  #playerSkin { width: 100%; height: 100%; position: relative; }

  #playerSkin.carTop { border-radius:12px 12px 6px 6px; border:1px solid rgba(255,255,255,.3); box-shadow:0 12px 24px rgba(0,0,0,.6); }
  #playerSkin.carTop .body{ position:absolute; inset:0; border-radius:inherit; background: linear-gradient(180deg, #f0f4f8 0%, #cbd5e1 100%); }
  #playerSkin.carTop .glass{ position:absolute; left:6px; right:6px; top:12px; height:16px; border-radius:6px 6px 2px 2px; background:linear-gradient(180deg, #102a43, #334e68); border:2px solid #627d98; opacity:.95; }
  #playerSkin.carTop .lights{ position:absolute; left:8px; right:8px; top:2px; height:6px; display:flex; justify-content:space-between; gap:10px; opacity:1; }
  #playerSkin.carTop .lights span{ flex:1; border-radius:3px; background:#fff; box-shadow:0 -6px 12px rgba(255,255,255,0.9); }
  #playerSkin.carTop .sirens{ position:absolute; left:8px; right:8px; top:8px; height:6px; border-radius:3px; background:linear-gradient(90deg, #e12d39 45%, #1992d4 55%); animation:sirenFlash 0.5s infinite alternate; z-index:3; }
  @keyframes sirenFlash { 0% { box-shadow:-12px 0 15px rgba(225,45,57,0.8), 12px 0 0px rgba(25,146,212,0); } 100% { box-shadow:-12px 0 0px rgba(225,45,57,0), 12px 0 15px rgba(25,146,212,0.8); } }
  #playerSkin.carTop::before{ content:""; position:absolute; left:50%; top:34px; bottom:8px; width:14px; transform:translateX(-50%); border-radius:4px; background:#e12d39; z-index:1; }
  #playerSkin.carTop::after{ content:"✚"; position:absolute; left:50%; top:44px; transform:translateX(-50%); font-size:12px; font-weight:1000; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,0.5); z-index:2; }
  #playerSkin.carTop .wheels{ position:absolute; left:-4px; right:-4px; top:14px; bottom:14px; pointer-events:none; }
  #playerSkin.carTop .wheels::before, #playerSkin.carTop .wheels::after{ content:""; position:absolute; top:0; bottom:0; width:6px; border-radius:4px; background:#102a43; box-shadow:inset 0 2px 4px rgba(0,0,0,0.8); }
  #playerSkin.carTop .wheels::before{left:0;} #playerSkin.carTop .wheels::after{right:0;}

  /* 變形 Skin */
  #playerSkin.heliTop .tail { position: absolute; left: 22px; bottom: 0; width: 4px; height: 35px; background: #ddd; }
  #playerSkin.heliTop .body { position: absolute; left: 12px; top: 10px; width: 24px; height: 45px; border-radius: 12px; background: linear-gradient(180deg, #ff4d4d, #d9102f); }
  #playerSkin.heliTop .cabin { position: absolute; left: 16px; top: 16px; width: 16px; height: 14px; border-radius: 8px 8px 4px 4px; background: #111; opacity: 0.8; }
  #playerSkin.heliTop .cross { position: absolute; left: 50%; top: 38px; transform: translate(-50%, -50%); color: white; font-weight: bold; font-size: 14px; z-index: 3; }
  #playerSkin.heliTop .rotor { position: absolute; left: -11px; top: 30px; width: 70px; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.9); animation: spinRotor 0.15s linear infinite; z-index: 4; box-shadow: 0 0 5px rgba(0,0,0,0.2); }
  #playerSkin.heliTop .rotor::after { content: ""; position: absolute; left: 32px; top: -32px; width: 6px; height: 70px; border-radius: 3px; background: rgba(255,255,255,0.9); box-shadow: 0 0 5px rgba(0,0,0,0.2); }
  @keyframes spinRotor { 100% { transform: rotate(360deg); } }

  #playerSkin.boatTop .wake { position: absolute; left: 0; right: 0; bottom: -15px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.6); filter: blur(4px); }
  #playerSkin.boatTop .hull { position: absolute; left: 6px; top: 5px; width: 36px; height: 65px; border-radius: 50% 50% 10% 10%; background: linear-gradient(180deg, #ff4d4d, #d9102f); border: 2px solid rgba(255,255,255,0.8); box-shadow: 0 5px 10px rgba(0,0,0,0.4); }
  #playerSkin.boatTop .cabin { position: absolute; left: 14px; top: 25px; width: 20px; height: 20px; border-radius: 6px; background: #111; border: 2px solid #fff; opacity: 0.9; }
  #playerSkin.boatTop .cross { position: absolute; left: 50%; top: 48px; transform: translate(-50%, -50%); color: white; font-weight: bold; font-size: 12px; z-index: 3; }

  @keyframes transformAnim { 50% { transform: scale(0.1) rotate(360deg); opacity: 0; } 100% { transform: scale(1) rotate(720deg); opacity: 1; } }
  .transforming { animation: transformAnim 3s forwards; }

  /* 玩家狀態特效 */
  #player.flash-green { filter:drop-shadow(0 0 20px rgba(0,255,204,1)) brightness(1.3); }
  #player.armed { filter:drop-shadow(0 0 20px rgba(255,235,59,0.8)) drop-shadow(0 0 10px rgba(255,152,0,0.6)); }
  #player.jumping{ filter:drop-shadow(0 12px 20px rgba(122,168,255,.20)) drop-shadow(0 0 12px rgba(122,168,255,.18)); }
  #player.finishing{ transition:transform 600ms ease, top 600ms ease, left 250ms ease; filter:drop-shadow(0 0 18px rgba(0,255,204,.22)); }
  
  /* 彈藥標籤 */
  #ammoFloat{ position:absolute; left:50%; top:-30px; transform:translateX(-50%); min-width:40px; height:24px; padding:0 8px; border-radius:999px; display:flex; align-items:center; justify-content:center; background:rgba(10, 15, 25, 0.95); color:#ffff00; font-size:14px; font-weight:1000; line-height:1; border:1px solid rgba(255,255,0,.8); text-shadow: 0 0 5px rgba(255,255,0,0.5); pointer-events:none; z-index:15; }
  #ammoFloat.empty{ color:rgba(255,255,255,.4); border-color: rgba(255,255,255,.2); background:rgba(10, 15, 25, 0.8); box-shadow:none; text-shadow:none; }

  /* --- 閘門與障礙物 --- */
  .gate { position: absolute; width: 80px; height: 80px; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.8); box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(255,255,255,0.5); z-index: 8; animation: gateFloat 1s infinite alternate; }
  .gate.word { background: linear-gradient(180deg, #1e88e5, #1565c0); border: 2px solid #64b5f6; }
  .gate.mystery { background: linear-gradient(180deg, #9b59b6, #4a235a); border: 2px solid #d7bde2; box-shadow: 0 10px 20px rgba(155,89,182,0.6), inset 0 0 15px rgba(255,255,255,0.4); }
  .gate.trans { background: linear-gradient(180deg, #5dade2, #21618c); border: 2px solid #aed6f1; }
  .gate .icon { font-size: 40px; margin-top: 0; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5)); }
  @keyframes gateFloat { 0% { transform: translateY(0); } 100% { transform: translateY(-8px); } }

  .npcCar{ position:absolute; width:48px; height:78px; border-radius:12px 12px 6px 6px; border:1px solid rgba(255,255,255,.15); box-shadow:0 -10px 20px rgba(0,0,0,.6); transform: rotate(180deg); }
  .npcCar .body{ position:absolute; inset:0; border-radius:inherit; background: linear-gradient(180deg, #566070 0%, #232b38 100%); }
  .npcCar .glass{ position:absolute; left:6px; right:6px; top:12px; height:16px; border-radius:6px 6px 2px 2px; background:linear-gradient(180deg, #1c262b, #37474f); border:2px solid #455a64; opacity:.95; }
  .npcCar .rear-glass{ position:absolute; left:8px; right:8px; bottom:8px; height:10px; border-radius:2px 2px 4px 4px; background:#1c262b; }
  .npcCar .lights{ position:absolute; left:8px; right:8px; top:2px; height:6px; display:flex; justify-content:space-between; gap:10px; opacity:1; }
  .npcCar .lights span{ flex:1; border-radius:3px; background:#fff; box-shadow:0 -6px 12px rgba(255,255,255,0.7); }
  .npcCar .taillights{ position:absolute; left:8px; right:8px; bottom:2px; height:4px; display:flex; justify-content:space-between; gap:12px; opacity:.9; }
  .npcCar .taillights span{ flex:1; border-radius:2px; background:#ff5252; box-shadow:0 4px 8px rgba(255,82,82,0.8); }
  .npcCar .wheels{ position:absolute; left:-4px; right:-4px; top:14px; bottom:14px; pointer-events:none; }
  .npcCar .wheels::before, .npcCar .wheels::after{ content:""; position:absolute; top:0; bottom:0; width:6px; border-radius:4px; background:#111; box-shadow:inset 0 2px 4px rgba(0,0,0,0.8); }
  .npcCar .wheels::before{left:0;} .npcCar .wheels::after{right:0;}

  .boost{ position:absolute; width:46px; height:46px; border-radius:50%; background:radial-gradient(circle, rgba(0,255,204,0.5) 0%, rgba(0,255,204,0.1) 70%); border:2px solid #00ffcc; box-shadow:0 8px 16px rgba(0,0,0,0.5), 0 0 15px rgba(0,255,204,0.6), inset 0 0 10px rgba(0,255,204,0.6); display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .boost::before, .boost::after { content: ""; display: block; width: 12px; height: 12px; border-top: 4px solid #fff; border-left: 4px solid #fff; transform: rotate(45deg); filter: drop-shadow(0 0 4px #fff); }
  .boost::before { margin-top: 8px; margin-bottom: -6px; }

  .ammoPick{ position:absolute; width:44px; height:44px; border-radius:14px; background:radial-gradient(20px 20px at 35% 35%, rgba(255,255,0,.3), rgba(255,255,0,.1) 60%); border:1px solid rgba(255,255,0,.6); box-shadow:0 14px 24px rgba(0,0,0,.28), 0 0 22px rgba(255,255,0,.4); display:grid; place-items:center; font-size:24px; }
  .ammoPick::before{content:"📣"; filter:drop-shadow(0 0 8px #ffff00) drop-shadow(0 0 15px #ffeb3b); brightness(1.2);} 
  
  .obstacle{ position:absolute; width:56px; height:26px; border-radius:4px; background:repeating-linear-gradient(45deg, #d35400, #d35400 10px, #2c3e50 10px, #2c3e50 20px); border:2px solid #1a252f; box-shadow:0 10px 15px rgba(0,0,0,0.6), inset 0 0 5px rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; }
  .obstacle::after { content: ""; width: 8px; height: 8px; border-radius: 50%; background: #ff4d4d; box-shadow: 0 0 8px #ff4d4d; animation: obBlink 0.4s infinite alternate; }
  @keyframes obBlink { 0% { opacity: 0.3; } 100% { opacity: 1; box-shadow: 0 0 15px red; } }

  .shock{ position:absolute; width:18px; height:18px; border-radius:50%; border:2px solid #00ffcc; box-shadow:0 0 15px #00ffcc, inset 0 0 15px #00ffcc; background: radial-gradient(circle, rgba(0,255,204,0.1) 40%, rgba(0,255,204,0.5) 80%, transparent 100%); z-index:9; pointer-events:none; }
  .shatter{animation:shatter .28s ease-out forwards;}
  @keyframes shatter{ 0%{transform:scale(1);filter:brightness(1.1);} 100%{transform:scale(1.45);opacity:0;filter:brightness(1.8) blur(1px);} }
  
  #penalty{ position:absolute; left:50%; top:54%; transform:translate(-50%,-50%); padding:10px 12px; border-radius:14px; background:rgba(0,0,0,.55); border:1px solid rgba(255,255,255,.16); box-shadow:0 12px 30px rgba(0,0,0,.45); display:none; z-index:15; text-align:center; font-weight:900; letter-spacing:.3px; }
  #penalty strong{color:var(--warn);} #penalty .sub{ display:block; margin-top:4px; font-size:12px; opacity:.85; font-weight:700; }
  
  #controls{ margin-top:10px; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .btnRow{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  button{ border:none; border-radius:16px; padding:14px 12px; color:var(--text); background:linear-gradient(180deg, rgba(10,15,25,.85), rgba(10,15,25,.55)); border:1px solid rgba(255,255,255,.12); box-shadow:0 10px 22px rgba(0,0,0,.28); font-size:14px; font-weight:900; letter-spacing:.3px; }
  button:active{ transform:translateY(1px); box-shadow:0 6px 16px rgba(0,0,0,.30); }
  .accent{ border-color:rgba(0,255,204,.35); box-shadow:0 10px 22px rgba(0,255,204,.10), 0 10px 22px rgba(0,0,0,.28); }
  .danger{border-color:rgba(255,77,77,.35);}
  .shoot{ border-color:rgba(255,209,102,.35); box-shadow:0 10px 22px rgba(255,209,102,.10), 0 10px 22px rgba(0,0,0,.28); }

  #overlay{ position:absolute; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.55); z-index:20; }
  #card{ width:min(88%, 340px); border-radius:18px; background:linear-gradient(180deg, rgba(10,15,25,.90), rgba(10,15,25,.70)); border:1px solid rgba(255,255,255,.14); box-shadow:var(--shadow); padding:16px 14px; text-align:center; }
  #card h2{margin:6px 0 8px;font-size:18px;} #card p{margin:0 0 12px;opacity:.9;font-size:13px;line-height:1.4;} #card .small{opacity:.8;font-size:12px;}
  #rankBox{ margin-top:10px; text-align:left; border-radius:14px; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.04); overflow:hidden; }
  #rankBox .head{ padding:8px 10px; font-weight:900; font-size:12px; opacity:.95; background:rgba(0,0,0,.18); border-bottom:1px solid rgba(255,255,255,.10); display:flex; justify-content:space-between; }
  #rankList{ list-style:none; margin:0; padding:0; max-height:190px; overflow:auto; }
  #rankList li{ display:flex; justify-content:space-between; gap:10px; padding:7px 10px; font-size:12px; border-bottom:1px solid rgba(255,255,255,.06); font-variant-numeric:tabular-nums; }
  #rankList li:last-child{border-bottom:none;}

  @media (max-width:768px){
    #controls{display:none;}
    .edge{ width:4px; background:linear-gradient(180deg, rgba(255,255,255,.46), rgba(255,255,255,.18)); }
    .divider{ width:4px; background:repeating-linear-gradient(180deg, rgba(255,255,255,.34) 0 24px, rgba(255,255,255,0) 24px 48px); opacity:.62; }
    #player { width: 40px; height: 66px; bottom: 8%; }
    .npcCar { width:40px; height:66px; }
    #playerSkin.carTop::before { top:28px; bottom:6px; width:10px; }
    #playerSkin.carTop::after { top:36px; font-size:10px; }
    #playerSkin.carTop .glass, .npcCar .glass { left:5px; right:5px; top:10px; height:12px; }
    #playerSkin.carTop .lights, .npcCar .lights { left:6px; right:6px; top:3px; height:5px; gap:8px; }
    #playerSkin.carTop .sirens { left:6px; right:6px; top:6px; height:5px; }
    .npcCar .taillights { left:6px; right:6px; bottom:3px; height:3px; gap:10px; }
    .npcCar .rear-glass { left:6px; right:6px; bottom:6px; height:8px; }
    #ammoFloat{ top:-26px; bottom:auto; min-width:32px; height:20px; font-size:11px; padding:0 6px; }
    .boost{ width:40px; height:40px; } 
    .boost::before, .boost::after { width: 10px; height: 10px; border-width: 3px; }
    .ammoPick{ width:38px; height:38px; font-size:16px; } 
    .obstacle{ width:48px; height:22px; }
    .gate { width: 70px; height: 70px; font-size: 14px; }
    .gate .icon { font-size: 32px; }
  }
</style>
</head>
<body>
<audio id="bgm" src="assets/Midnight_Siren_Serenade.mp3" loop preload="auto"></audio>

<div id="wrap">
  <div id="game">
    <div id="weatherOverlay"></div>
    <div id="eventText">準備出發！</div>
    
    <div class="road"></div>
    <div id="lanes"><div class="edge left"></div><div class="edge right"></div><div class="divider one"></div><div class="divider two"></div></div>
    
    <div id="wordCollection">
        <div class="word-slot" id="slot-0">亞</div>
        <div class="word-slot" id="slot-1">東</div>
        <div class="word-slot" id="slot-2">醫</div>
        <div class="word-slot" id="slot-3">院</div>
    </div>

    <div id="topHud" aria-live="polite">
      <span id="distLabel">距離</span> <span class="num" id="distLeft">3500</span>
      <span id="timeHud"><span id="timeLabel">時間</span> <b id="timeNow">0</b>s</span>
    </div>

    <div id="finish"><div class="hospital"><div class="door"></div><div class="sign"><span class="cross">✚</span> 到院成功</div></div></div>
    <div id="rail"><div id="hospitalMark" class="railPanel">🏥</div><div id="trackBox" class="railPanel"><div id="trackLine"></div><div id="miniAmb">🚑</div><div id="distanceText">距離 100%</div></div></div>
    <div id="penalty">⛔ 延誤 <strong>3</strong> 秒<span class="sub">車輛重置中...</span></div>

    <div id="player">
      <div id="ammoFloat" class="empty">📣0</div>
      <div id="playerSkin" class="carTop"><div class="body"></div><div class="glass"></div><div class="wheels"></div><div class="sirens"></div><div class="lights"><span></span><span></span></div></div>
    </div>

    <div id="overlay">
      <div id="card">
        <h2 id="resultTitle">結果</h2><p id="resultText">—</p>
        <div id="rankBox">
          <div class="head"><span>🏁 最佳紀錄</span><span>(越快越好)</span></div>
          <ul id="rankList"></ul>
        </div>
        <button class="accent" id="restartBtn" style="margin-top:12px; width:100%;">重新挑戰</button>
      </div>
    </div>
  </div>

  <div id="controls">
    <div class="btnRow"><button class="accent" id="leftBtn">⬅️ 左切</button><button class="accent" id="rightBtn">右切 ➡️</button></div>
    <div class="btnRow"><button class="shoot" id="shootBtn">📣 鳴笛</button><button class="danger" id="restartSmallBtn">重來</button></div>
  </div>
</div>

<script>
// ==========================================
// ⚙️ 關卡參數設定區 (引擎入口)
// ==========================================
const MODE_CONFIGS = {
    'case1': { title: "任務一：基礎陸運", distance: 3500, timeLimit: 50, transform: false, words: false, mystery: false, endless: false, suddenDeath: false },
    'case2': { title: "任務二：認路與盲盒", distance: 3500, timeLimit: 75, transform: false, words: true, mystery: 'weather', endless: false, suddenDeath: false },
    'case3': { title: "任務三：全地形救援", distance: 5000, timeLimit: 90, transform: true, words: true, mystery: 'weather', endless: false, suddenDeath: false },
    'ch_farthest': { title: "挑戰：最遠距離", distance: Infinity, timeLimit: null, transform: false, words: false, mystery: false, endless: true, suddenDeath: true },
    'ch_fastest': { title: "挑戰：最快速度", distance: 3500, timeLimit: null, transform: false, words: false, mystery: false, endless: false, suddenDeath: false },
    'ch_music': { title: "挑戰：舒服兜風", distance: 5000, timeLimit: null, transform: true, words: false, mystery: 'music', endless: false, suddenDeath: false }
};

const urlParams = new URLSearchParams(window.location.search);
const currentMode = urlParams.get('mode') || 'case1'; // 預設使用 case1
const cfg = MODE_CONFIGS[currentMode] || MODE_CONFIGS['case1'];
document.title = "腦脈先鋒｜" + cfg.title;

// 常數
const DIST_UNIT = 12;
const BOOST_MS = 2500; 
const BOOST_FORWARD_MULT = 3.0;
const NPC_FALL_BASE = 235;
const OB_FALL = 205;
const FIRE_COOLDOWN_MS = 240;
const JUMP_DURATION_MS = 620;
const JUMP_HEIGHT_PX = 112;
const PENALTY_MS = 3000;
const END_DELAY_MS = 2000;

// 字牌與盲盒設定
const WORD_TARGETS = ['亞', '東', '醫', '院'];
const DECOY_WORDS = ['台','大','馬','偕','長','庚','榮','總','慈','濟','新','光','聯','合'];
const MUSIC_TRACKS = ["assets/bgm_music_1.mp3", "assets/bgm_music_2.mp3", "assets/bgm_music_3.mp3"];

// 全域變數
let lane = 1, distance = 0, entities = [], over = false, finishing = false;
let lastFrame = performance.now(), pauseUntil = 0, boostUntil = 0, ammo = 0, lastFireAt = 0;
let jumpUntil = 0, jumpLift = 0, runStartAt = 0, elapsedMs = 0;
let scheduledEvents = []; 
let weatherUntil = 0, currentWordIndex = 0, speedMultiplier = 1.0;
let audioCtx = null;
let carLongPressTimer = null, carLongPressTriggered = false;
let lastRunTimeMs = null, endScheduled = false;

// DOM
const game = document.getElementById("game");
const player = document.getElementById("player");
const playerSkin = document.getElementById("playerSkin");

// ==========================================
// 遊戲核心函式
// ==========================================

// 音效系統
function ensureAudio(){
  if(!audioCtx){
    const AC = window.AudioContext || window.webkitAudioContext;
    if(AC) audioCtx = new AC();
  }
  if(audioCtx && audioCtx.state === "suspended") audioCtx.resume().catch(()=>{});
  const bgm = document.getElementById('bgm');
  if(bgm && bgm.paused) { bgm.volume = 0.3; bgm.play().catch(()=>{}); }
}
function playTone(freq=440, dur=0.08, type="sine", volume=0.03){
  ensureAudio(); if(!audioCtx) return;
  const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + dur);
}
function sfxShoot(){ playTone(900, 0.15, "triangle", 0.05); setTimeout(()=>playTone(700, 0.15, "triangle", 0.05), 150); }
function sfxHit(){ playTone(180, 0.12, "sawtooth", 0.04); setTimeout(()=>playTone(120, 0.14, "sawtooth", 0.03), 40); }
function sfxPickup(){ playTone(720, 0.05, "triangle", 0.025); setTimeout(()=>playTone(980, 0.06, "triangle", 0.02), 45); }
function sfxGoal(){ playTone(660, 0.10, "triangle", 0.03); setTimeout(()=>playTone(880, 0.12, "triangle", 0.03), 110); setTimeout(()=>playTone(1180, 0.14, "triangle", 0.028), 230); }

// 工具函式
function clamp(n,a,b){ return Math.max(a, Math.min(b, n)); }
function rand(msMin, msMax){ return msMin + Math.random() * (msMax - msMin); }
function fmtSec(ms){ return (ms/1000).toFixed(1); }
function rectInflate(r, pad){ return { left:r.left+pad, right:r.right-pad, top:r.top+pad, bottom:r.bottom-pad }; }
function hit(a,b){
  const ar = rectInflate(a.getBoundingClientRect(), 6); 
  const br = rectInflate(b.getBoundingClientRect(), 6);
  return !(ar.right < br.left || ar.left > br.right || ar.bottom < br.top || ar.top > br.bottom);
}
function isTapOnPlayer(clientX, clientY){
  const r = player.getBoundingClientRect(); return clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom;
}

// 畫面與排版
function laneCenters(){
  let w = game.clientWidth; if (w === 0) w = Math.min(window.innerWidth, 420);
  const leftEdge = w * 0.12; const step = (w * 0.88 - leftEdge) / 3;
  return [ leftEdge + step*0.5, leftEdge + step*1.5, leftEdge + step*2.5 ];
}
function setPlayerLane(idx){
  lane = clamp(idx, 0, 2); 
  player.style.left = (laneCenters()[lane] - 24) + "px"; 
}
function setPlayerSkin(phase) {
  playerSkin.className = phase === 2 ? "heliTop" : phase === 3 ? "boatTop" : "carTop";
  const htmlMap = {
      1: `<div class="body"></div><div class="glass"></div><div class="wheels"></div><div class="sirens"></div><div class="lights"><span></span><span></span></div>`,
      2: `<div class="tail"></div><div class="body"></div><div class="cabin"></div><div class="rotor"></div><div class="cross">✚</div>`,
      3: `<div class="wake"></div><div class="hull"></div><div class="cabin"></div><div class="cross">✚</div>`
  };
  playerSkin.innerHTML = htmlMap[phase];
  document.getElementById('miniAmb').textContent = phase === 2 ? "🚁" : phase === 3 ? "🚤" : "🚑";
}

// 動態事件與實體生成
function buildSchedule() {
    scheduledEvents = [];
    if (cfg.words) {
        const step = cfg.distance / 5;
        for(let i=0; i<4; i++) scheduledEvents.push({ d: step*(i+1), type: 'word', arg: i });
    }
    if (cfg.transform) {
        const step = cfg.distance / 4;
        scheduledEvents.push({ d: step*1, type: 'trans', arg: { phase: 2, txt: '空運', icon: '🚁'} });
        scheduledEvents.push({ d: step*2, type: 'trans', arg: { phase: 3, txt: '海運', icon: '🚤'} });
        scheduledEvents.push({ d: step*3, type: 'trans', arg: { phase: 1, txt: '陸運', icon: '🚑'} });
    }
    if (cfg.mystery) {
        const amount = cfg.transform ? 3 : 2;
        const step = cfg.distance / (amount+1);
        for(let i=0; i<amount; i++) scheduledEvents.push({ d: step*(i+1) + 150, type: 'mystery' });
    }
    scheduledEvents.sort((a,b) => a.d - b.d);
}

function spawnNpcCar(laneIndex){
  const el = document.createElement("div"); el.className = "npcCar";
  el.innerHTML = `<div class="body"></div><div class="glass"></div><div class="rear-glass"></div><div class="wheels"></div><div class="lights"><span></span><span></span></div><div class="taillights"><span></span><span></span></div>`;
  el.style.left = (laneCenters()[laneIndex] - 24) + "px"; el.style.top = "-150px";
  return { type:"npc", el, v: 0.9 + Math.random()*0.5, lane:laneIndex };
}
function spawnNpcWaveSmart(){
  const safeLanesNow = [0,1,2].filter(ln => {
      return !entities.some(e => e.lane === ln && (e.type==="npc" || e.type==="ob") && e.el.offsetTop < player.offsetTop && (player.offsetTop - e.el.offsetTop)/(OB_FALL) < 1.0);
  });
  if(safeLanesNow.length === 0) return false;
  
  let candidates = [0,2].filter(ln => !entities.some(e => e.lane === ln && e.type==="npc" && e.el.offsetTop < 240));
  if(candidates.length === 0) return false;
  
  const ln = candidates[Math.floor(Math.random() * candidates.length)];
  const obj = spawnNpcCar(ln); game.appendChild(obj.el); entities.push(obj);
  return true;
}
function spawnObstacle(){
  if(entities.filter(e=>e.type==="ob").length >= 2) return;
  const el = document.createElement("div"); el.className = "obstacle";
  el.style.left = (laneCenters()[1] - 28) + "px"; el.style.top = "-120px";
  game.appendChild(el); entities.push({ type:"ob", el, lane:1 });
}
function spawnBoost(){
  const ln = Math.floor(Math.random() * 3);
  const el = document.createElement("div"); el.className = "boost";
  el.style.left = (laneCenters()[ln] - 23) + "px"; el.style.top = "-110px";
  game.appendChild(el); entities.push({ type:"boost", el, lane:ln });
}
function spawnAmmo(){
  const ln = Math.floor(Math.random() * 3);
  const el = document.createElement("div"); el.className = "ammoPick";
  el.style.left = (laneCenters()[ln] - 22) + "px"; el.style.top = "-110px";
  game.appendChild(el); entities.push({ type:"ammo", el, lane:ln });
}
function spawnWordGates(idx) {
  entities = entities.filter(e => { if(e.type==="npc"||e.type==="ob"){e.el.remove(); return false;} return true; });
  let decoys = [...DECOY_WORDS].sort(()=>Math.random()-0.5);
  let opts = [ {char: WORD_TARGETS[idx], c: true}, {char: decoys[0], c: false}, {char: decoys[1], c: false} ].sort(()=>Math.random()-0.5);
  opts.forEach((opt, ln) => {
    let el = document.createElement("div"); el.className = "gate word"; el.innerHTML = `<span class="icon">${opt.char}</span>`;
    el.style.left = (laneCenters()[ln] - 40) + "px"; el.style.top = "-200px"; game.appendChild(el);
    entities.push({ type: "word_gate", el: el, lane: ln, isCorrect: opt.c, char: opt.char });
  });
}
function spawnTransformGates(arg) {
  entities = entities.filter(e => { if(e.type==="npc"||e.type==="ob"){e.el.remove(); return false;} return true; });
  [0,1,2].forEach(ln => {
    let el = document.createElement("div"); el.className = "gate trans"; el.innerHTML = `<span>${arg.txt}</span><span class="icon">${arg.icon}</span>`;
    el.style.left = (laneCenters()[ln] - 40) + "px"; el.style.top = "-200px"; game.appendChild(el);
    entities.push({ type: "trans_gate", el: el, lane: ln, phase: arg.phase, txt: `切換${arg.txt}` });
  });
}
function spawnMysteryGates() {
  entities = entities.filter(e => { if(e.type==="npc"||e.type==="ob"){e.el.remove(); return false;} return true; });
  [0,1,2].forEach(ln => {
    let el = document.createElement("div"); el.className = "gate mystery"; el.innerHTML = `<span>${cfg.mystery==='music'?'音樂':'變天'}</span><span class="icon">❓</span>`;
    el.style.left = (laneCenters()[ln] - 40) + "px"; el.style.top = "-200px"; game.appendChild(el);
    entities.push({ type: "mystery_gate", el: el, lane: ln });
  });
}

function triggerEventText(t) { 
    eventTextEl.textContent = t; eventTextEl.style.opacity = 1; 
    setTimeout(() => eventTextEl.style.opacity = 0, 2000); 
}

// 玩家技能與狀態
function updateAmmoUI(){
  document.getElementById('shootBtn').textContent = ammo > 0 ? `📣 鳴笛 (${ammo})` : "📣 鳴笛";
  const fl = document.getElementById('ammoFloat');
  if(fl){ fl.textContent = `📣${ammo}`; fl.classList.toggle("empty", ammo <= 0); }
  if (ammo > 0) player.classList.add("armed"); else player.classList.remove("armed");
}

function applyBoost(now){
  boostUntil = Math.max(boostUntil, now + BOOST_MS);
  player.classList.add("flash-green");
  setTimeout(()=>player.classList.remove("flash-green"), 500);
}

function applyPenalty(now){
  sfxHit(); pauseUntil = Math.max(pauseUntil, now + PENALTY_MS);
  boostUntil = 0; player.classList.remove("flash-green");
  document.getElementById('penalty').style.display = "block";
  document.getElementById('penalty').querySelector("strong").textContent = String(Math.ceil((pauseUntil - now) / 1000));
  game.animate([{ transform:"translateX(0)" }, { transform:"translateX(-6px)" }, { transform:"translateX(6px)" }, { transform:"translateX(0)" }], { duration:220, iterations:1 });
}

function tryShock(now){
  if(over || finishing || now < pauseUntil || ammo <= 0 || now - lastFireAt < FIRE_COOLDOWN_MS) return;
  ammo--; updateAmmoUI(); lastFireAt = now; sfxShoot();
  const el = document.createElement("div"); el.className = "shock";
  const cx = player.offsetLeft + 24; const cy = player.offsetTop + 39;
  el.style.left = (cx - 9) + "px"; el.style.top = (cy - 9) + "px";
  game.appendChild(el); entities.push({ type:"shock", el, born:now, r:9, cx, cy });
  player.animate([{ transform:`translateY(${-jumpLift}px) scale(1)` }, { transform:`translateY(${-jumpLift}px) scale(1.02)` }, { transform:`translateY(${-jumpLift}px) scale(1)` }], { duration:150, iterations:1 });
}

function tryJump(now){
  if(over || finishing || now < pauseUntil || now < jumpUntil || now < lastJumpAt + JUMP_COOLDOWN_MS) return;
  lastJumpAt = now; jumpUntil = now + JUMP_DURATION_MS; player.classList.add("jumping");
  player.animate([{ transform:`translateY(0px) scale(1)` }, { transform:`translateY(${-JUMP_HEIGHT_PX}px) scale(1.04)` }, { transform:`translateY(0px) scale(1)` }], { duration:JUMP_DURATION_MS, easing:"cubic-bezier(.2,.8,.2,1)", iterations:1 });
}

// 排行榜系統
function getRankKey() { return "bvp_rank_" + currentMode; }
function loadRanks(){ try{ const r = localStorage.getItem(getRankKey()); return r ? JSON.parse(r) : []; }catch{ return []; } }
function saveRanks(arr){ try{ localStorage.setItem(getRankKey(), JSON.stringify(arr)); }catch{} }
function addRank(val){ const arr = loadRanks(); arr.push({ t:val, at:Date.now() }); arr.sort((a,b)=>cfg.endless ? b.t-a.t : a.t-b.t); const top10 = arr.slice(0,10); saveRanks(top10); return top10; }
function renderRanks(arr){
  const list = document.getElementById('rankList'); list.innerHTML = "";
  if(!arr.length){ list.innerHTML = `<li><span>—</span><span>尚無紀錄</span></li>`; return; }
  arr.forEach((r, idx)=>{
    const li = document.createElement("li");
    if(lastRunTimeMs !== null && Math.abs(r.t - lastRunTimeMs) < 1) li.style.color = "var(--warn)";
    li.innerHTML = `<span>#${idx+1}</span><span>${cfg.endless ? r.t+' m' : fmtSec(r.t)+' s'}</span>`; 
    list.appendChild(li);
  });
}

function gameEnd(success, reason){
    if(over) return; over = true;
    document.getElementById('overlay').style.display = "flex"; 
    if(success) sfxGoal(); else sfxHit();
    
    let score = cfg.endless ? Math.floor(distance) : Math.floor(elapsedMs/1000);
    lastRunTimeMs = score;
    document.getElementById('resultTitle').textContent = success ? "✅ 任務成功！" : "❌ 任務失敗";
    document.getElementById('resultText').textContent = cfg.endless ? `行駛距離：${score} m\n(${reason})` : `結算時間：${score} 秒\n(${reason})`;
    
    if(success || cfg.endless) renderRanks(addRank(score));
    
    if(success && !cfg.endless) {
        try{ parent.postMessage({type:'GAME_CLEAR', game:currentMode, time:score}, '*'); }catch(e){}
    } else if(!success) {
        try{ parent.postMessage({type:'GAME_FAILED', game:currentMode, reason:reason}, '*'); }catch(e){}
    }
}

function reset(){
    entities.forEach(e => { try{e.el.remove();}catch{} });
    entities = []; distance = 0; over = false; finishing = false; pauseUntil = 0; boostUntil = 0;
    ammo = 0; jumpUntil = 0; jumpLift = 0; elapsedMs = 0; speedMultiplier = 1.0;
    runStartAt = performance.now(); lastFrame = performance.now();
    player.className = ""; document.getElementById('topHud').className = "";
    document.getElementById('finish').style.top = "-38%"; document.getElementById('finish').classList.remove("success");
    document.getElementById('overlay').style.display = "none";
    document.getElementById('weatherOverlay').className = ""; weatherUntil = 0;
    
    document.getElementById('wordCollection').style.display = cfg.words ? 'flex' : 'none';
    for(let i=0; i<4; i++) { const s=document.getElementById(`slot-${i}`); if(s) s.className="word-slot"; }
    currentWordIndex = 0;
    
    if(cfg.endless) {
        document.getElementById('distLabel').textContent = "行駛";
        document.getElementById('rail').style.display = 'none';
    } else {
        document.getElementById('distLabel').textContent = "剩餘";
        document.getElementById('rail').style.display = 'flex';
    }
    document.getElementById('timeLabel').textContent = cfg.timeLimit ? "倒數" : "時間";

    setPlayerSkin(1); document.body.className = "";
    setPlayerLane(1); updateAmmoUI(); renderRanks(loadRanks());
    buildSchedule();
    nextWaveAt = lastFrame + 1000; nextBoostAt = lastFrame + 2000; nextObAt = lastFrame + 1500; nextAmmoAt = lastFrame + 2500;
}

// 主遊戲迴圈
function tick(now){
    if(over) return;
    const dt = Math.max(0, Math.min(0.03, (now - lastFrame) / 1000)); lastFrame = now;
    elapsedMs = now - runStartAt; 
    
    if(cfg.timeLimit) {
        let remain = cfg.timeLimit - (elapsedMs/1000);
        document.getElementById('timeNow').textContent = Math.max(0, remain).toFixed(1);
        document.getElementById('timeHud').classList.toggle('danger', remain <= 10);
        if(remain <= 0) return gameEnd(false, "時限耗盡");
    } else {
        document.getElementById('timeNow').textContent = (elapsedMs/1000).toFixed(1);
    }

    jumpLift = clamp((now - (jumpUntil - JUMP_DURATION_MS)) / JUMP_DURATION_MS, 0, 1);
    jumpLift = now >= jumpUntil ? 0 : Math.sin(Math.PI * jumpLift) * JUMP_HEIGHT_PX;
    player.style.transform = `translateY(${-jumpLift}px)`;
    
    if(now >= jumpUntil) player.classList.remove("jumping");
    if(now >= boostUntil){ player.classList.remove("boosting"); document.getElementById('topHud').classList.remove("boosting"); }
    
    if(now < pauseUntil){
        document.getElementById('penalty').style.display = "block";
        document.getElementById('penalty').querySelector("strong").textContent = String(Math.ceil((pauseUntil - now) / 1000));
        requestAnimationFrame(tick); return;
    }else document.getElementById('penalty').style.display = "none";

    if (now >= weatherUntil && document.getElementById('weatherOverlay').className !== "") { document.getElementById('weatherOverlay').className = ""; }
    
    if(cfg.endless) speedMultiplier += (dt * 0.015);
    let forwardMult = speedMultiplier * (now < boostUntil ? BOOST_FORWARD_MULT : 1.0);
    distance += (BASE_FORWARD_SPEED * forwardMult) * DIST_UNIT * dt;
    
    if(cfg.endless) {
        document.getElementById('distLeft').textContent = Math.floor(distance);
    } else {
        const left = Math.max(0, Math.ceil(cfg.distance - distance));
        document.getElementById('distLeft').textContent = left;
        const prog = clamp((distance / cfg.distance) * 100, 0, 100); 
        document.getElementById('miniAmb').style.bottom = (10 + (document.getElementById('trackBox').clientHeight - 40) * (prog / 100)) + "px";
        document.getElementById('distanceText').textContent = "距離 " + Math.max(0, Math.round(100 - prog)) + "%";
        if(prog > 88) document.getElementById('finish').style.top = (-38 + 38 * ((prog - 88) / 12)) + "%";
        if(distance >= cfg.distance) {
            if(!finishing) { finishing = true; document.getElementById('finish').style.top = "0%"; player.classList.add("finishing"); setTimeout(()=>gameEnd(true, "抵達醫院"), END_DELAY_MS); }
            requestAnimationFrame(tick); return;
        }
    }

    if (scheduledEvents.length > 0 && distance >= scheduledEvents[0].d) {
        let ev = scheduledEvents.shift();
        if (ev.type === 'word') spawnWordGates(ev.arg);
        else if (ev.type === 'trans') spawnTransformGates(ev.arg);
        else if (ev.type === 'mystery') spawnMysteryGates();
    }

    if(now >= nextWaveAt){ if(spawnNpcWaveSmart()) nextWaveAt = now + rand(WAVE_MIN_MS, WAVE_MAX_MS); }
    if(now >= nextObAt){ spawnObstacle(); nextObAt = now + rand(OB_MIN_MS, OB_MAX_MS); }
    if(now >= nextBoostAt){ spawnBoost(); nextBoostAt = now + rand(BOOST_MIN_MS, BOOST_MAX_MS); }
    if(now >= nextAmmoAt){ spawnAmmo(); nextAmmoAt = now + rand(AMMO_MIN_MS, AMMO_MAX_MS); }

    const jumping = now < jumpUntil;
    for(let i = entities.length - 1; i >= 0; i--){
        const e = entities[i];
        let speed = (e.type === "npc" ? NPC_FALL_BASE * e.v : OB_FALL);
        e.el.style.top = (e.el.offsetTop + speed * dt) + "px";

        if(hit(player, e.el) || (e.type.includes('gate') && e.el.offsetTop > player.offsetTop && Math.abs(e.lane - lane) < 0.5)) {
            
            if(e.type === "word_gate") {
                if(e.isCorrect) {
                    sfxPickup(); triggerEventText(`✅ 正確！`);
                    document.getElementById(`slot-${currentWordIndex}`).classList.add('active');
                    currentWordIndex++;
                } else {
                    applyPenalty(now); triggerEventText(`❌ 走錯路倒退`);
                    distance = Math.max(0, distance - 250); 
                    scheduledEvents.unshift({d: distance + 200, type: 'word', arg: currentWordIndex}); 
                }
                entities.filter(x=>x.type==='word_gate').forEach(x=>x.el.remove()); entities = entities.filter(x=>x.type!=='word_gate');
                break;
            }

            if(e.type === "mystery_gate") {
                sfxPickup();
                entities.filter(x=>x.type==='mystery_gate').forEach(x=>x.el.remove()); entities = entities.filter(x=>x.type!=='mystery_gate');
                if(cfg.mystery === 'music') {
                    triggerEventText(`🎵 切換音樂風格`);
                    document.getElementById('bgm').src = MUSIC_TRACKS[Math.floor(Math.random() * MUSIC_TRACKS.length)];
                    document.getElementById('bgm').play();
                } else {
                    const ev = MYSTERY_EVENTS[Math.floor(Math.random()*MYSTERY_EVENTS.length)];
                    triggerEventText(ev.name); document.getElementById('weatherOverlay').className = ev.id; weatherUntil = now + ev.duration;
                }
                break;
            }

            if(e.type === "trans_gate") {
                sfxPickup(); triggerEventText(e.txt);
                entities.filter(x=>x.type==='trans_gate').forEach(x=>x.el.remove()); entities = entities.filter(x=>x.type!=='trans_gate');
                playerSkin.className = "transforming"; setTimeout(()=>playerSkin.className="", 3000);
                setTimeout(()=>{ setPlayerSkin(e.phase); document.body.className = e.phase===2?"phase-sky":e.phase===3?"phase-sea":""; }, 1500);
                break;
            }

            if(e.type === "npc" || e.type === "ob"){
                if (!jumping) {
                    if(cfg.suddenDeath) { e.el.remove(); return gameEnd(false, "發生車禍，車輛損毀"); }
                    else { e.el.remove(); entities.splice(i,1); applyPenalty(now); break; }
                }
            }

            if(e.type === "boost"){ e.el.remove(); entities.splice(i,1); applyBoost(now); sfxPickup(); continue; }
            if(e.type === "ammo"){ e.el.remove(); entities.splice(i,1); ammo++; updateAmmoUI(); sfxPickup(); continue; }
        }
        
        if(e.type === "shock"){
            const age = now - e.born; const r = Math.min(SHOCK_MAX_RADIUS, 9 + (SHOCK_GROW_PX_PER_S * (age / 1000)));
            e.el.style.width = (r * 2) + "px"; e.el.style.height = (r * 2) + "px"; e.el.style.left = (e.cx - r) + "px"; e.el.style.top = (e.cy - r) + "px"; e.el.style.opacity = String(Math.max(0, 1 - age / SHOCK_LIFETIME_MS));
            for(let j = entities.length - 1; j >= 0; j--){
                const t = entities[j]; if(t.type !== "ob") continue; 
                if(Math.hypot((t.el.offsetLeft+28) - e.cx, (t.el.offsetTop+13) - e.cy) <= r + 18){ t.el.classList.add("shatter"); setTimeout(()=>t.el.remove(), 260); entities.splice(j,1); }
            }
            if(age >= SHOCK_LIFETIME_MS){ e.el.remove(); entities.splice(i,1); }
        }

        if(e.el.offsetTop > game.clientHeight + 160){
            if(e.type === 'word_gate' && e.isCorrect) {
                applyPenalty(now); triggerEventText(`❌ 錯過路線倒退`);
                distance = Math.max(0, distance - 250); 
                scheduledEvents.unshift({d: distance + 200, type: 'word', arg: currentWordIndex}); 
                entities.filter(x=>x.type==='word_gate').forEach(x=>x.el.remove()); entities = entities.filter(x=>x.type!=='word_gate');
            } else {
                e.el.remove(); entities.splice(i,1);
            }
        }
    }
    requestAnimationFrame(tick);
}

// 輸入控制
function moveLeft(){ if(performance.now() < pauseUntil || over || finishing) return; setPlayerLane(lane - 1); }
function moveRight(){ if(performance.now() < pauseUntil || over || finishing) return; setPlayerLane(lane + 1); }

document.addEventListener("keydown", e=>{
  ensureAudio(); if(e.repeat) return;
  if(e.key === "ArrowLeft") moveLeft(); if(e.key === "ArrowRight") moveRight();
  if(e.key === "ArrowUp"){ e.preventDefault(); tryShock(performance.now()); }
  if(e.code === "Space"){ e.preventDefault(); tryJump(performance.now()); }
});
document.getElementById('leftBtn').onclick = ()=>{ ensureAudio(); moveLeft(); };
document.getElementById('rightBtn').onclick = ()=>{ ensureAudio(); moveRight(); };
document.getElementById('shootBtn').onclick = ()=>{ ensureAudio(); tryShock(performance.now()); };

game.addEventListener("touchstart", e=>{
  ensureAudio(); if(over || finishing || performance.now() < pauseUntil) return;
  const t = e.touches[0]; if(!t) return;
  if(isTapOnPlayer(t.clientX, t.clientY)){
    e.preventDefault(); carLongPressTriggered = false; clearTimeout(carLongPressTimer);
    carLongPressTimer = setTimeout(()=>{ carLongPressTriggered = true; tryJump(performance.now()); }, 260); return;
  }
  e.preventDefault(); if(t.clientX - game.getBoundingClientRect().left < game.clientWidth / 2) moveLeft(); else moveRight();
}, { passive:false });

game.addEventListener("touchend", e=>{
  clearTimeout(carLongPressTimer); const t = e.changedTouches[0]; if(!t){ carLongPressTriggered = false; return; }
  if(isTapOnPlayer(t.clientX, t.clientY)){ e.preventDefault(); if(!carLongPressTriggered) tryShock(performance.now()); }
  carLongPressTriggered = false;
}, { passive:false });

document.addEventListener("pointerdown", ensureAudio, { once:true });

document.getElementById('restartBtn').onclick = ()=>{ reset(); requestAnimationFrame(tick); };
document.getElementById('restartSmallBtn').onclick = ()=>{ reset(); requestAnimationFrame(tick); };
window.addEventListener("resize", ()=> setPlayerLane(lane));

// 啟動邏輯
function initGame() { reset(); requestAnimationFrame(tick); }
if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', ()=>setTimeout(initGame, 50));
else setTimeout(initGame, 50);

</script>
